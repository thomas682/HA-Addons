name: InfluxBro by Thomas
description: "Browse InfluxDB (table + mini graph), configure in UI, entity_id/friendly_name filters, and optionally delete ranges"
version: "1.6.0"
slug: influxbro
url: "http://192.168.2.65:7070/thomas/ha_addons/influxbro"

arch:
  - amd64
  - aarch64
  - armv7
  - armhf

startup: services
boot: auto

ports:
  8099/tcp: 8099

ingress: true
ingress_port: 8099

hassio_api: true
homeassistant_api: true

panel_icon: "mdi:database-eye"
panel_title: "Influx Browser"
map:
  - config:ro
options:
  allow_delete: false
  delete_confirm_phrase: "DELETE"
schema:
  allow_delete: bool
  delete_confirm_phrase: str
