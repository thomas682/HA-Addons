<header class="ib_topbar" aria-label="Topbar">
  <style>
    :root {
      --ib-topbar-h: 52px;
      --ib-bottombar-h: 38px;
      --ib-pagecard-min-h: 74px;
      --ib-pagecard-live-h: 74px;
      --ib-section-title-bg: {{ (cfg.get('ui_section_title_bg') or 'transparent') if cfg else 'transparent' }};
      --ib-section-title-fg: {{ (cfg.get('ui_section_title_fg') or 'inherit') if cfg else 'inherit' }};
      --ib-section-title-font-px: {{ (cfg.get('ui_section_title_font_px') or 13) | int }}px;
      --ib-section-level2-bg: {{ (cfg.get('ui_section_level2_bg') or '#8BA293') if cfg else '#8BA293' }};
      --ib-section-level2-fg: {{ (cfg.get('ui_section_level2_fg') or '#FFFFFF') if cfg else '#FFFFFF' }};
      --ib-section-level2-font-px: {{ (cfg.get('ui_section_level2_font_px') or 12) | int }}px;
      --ib-section-level3-bg: {{ (cfg.get('ui_section_level3_bg') or '#B8B17F') if cfg else '#B8B17F' }};
      --ib-section-level3-fg: {{ (cfg.get('ui_section_level3_fg') or '#FFFFFF') if cfg else '#FFFFFF' }};
      --ib-section-level3-font-px: {{ (cfg.get('ui_section_level3_font_px') or 11) | int }}px;

      /* Grouped font sizes (4x GUI + 3x tables) */
      --ib-font-gui-title: {{ (cfg.get('ui_gui_title_px') or 16) | int }}px;
      --ib-font-gui-heading: {{ (cfg.get('ui_gui_heading_px') or 14) | int }}px;
      --ib-font-gui-body: {{ (cfg.get('ui_gui_body_px') or 12) | int }}px;
      --ib-font-gui-meta: {{ (cfg.get('ui_gui_meta_px') or 10) | int }}px;
      --ib-font-tbl-title: {{ (cfg.get('ui_tbl_title_px') or 12) | int }}px;
      --ib-font-tbl-head: {{ (cfg.get('ui_tbl_head_px') or 11) | int }}px;
      --ib-font-tbl-cell: {{ (cfg.get('ui_tbl_cell_px') or 10) | int }}px;

      --ui-font: var(--ib-font-gui-body);
      --ui-font-small: var(--ib-font-gui-meta);
      --ib-statusbar-bg: {{ (cfg.get('ui_status_bar_bg') or '#FFFFFF') if cfg else '#FFFFFF' }};
      --ib-statusbar-fg: {{ (cfg.get('ui_status_bar_fg') or '#111111') if cfg else '#111111' }};
      --ib-bottombar-h: {{ (cfg.get('ui_status_bar_height_px') or 38) | int }}px;
      --ib-pagecard-title-size: var(--ib-font-gui-title);
      --ib-page-search-hl-color: {{ (cfg.get('ui_page_search_highlight_color') or '#FF9900') if cfg else '#FF9900' }};
      --ib-page-search-hl-width: {{ (cfg.get('ui_page_search_highlight_width_px') or 5) | int }}px;
      --ib-page-search-hl-duration-ms: {{ (cfg.get('ui_page_search_highlight_duration_ms') or 8000) | int }}ms;
      --ib-table-head-bg: {{ (cfg.get('ui_table_header_bg') or '#0B1F3A') if cfg else '#0B1F3A' }};
      --ib-table-head-fg: {{ (cfg.get('ui_table_header_fg') or '#FFFFFF') if cfg else '#FFFFFF' }};
      --ib-table-min-empty-rows: {{ (cfg.get('ui_table_min_empty_rows') or 5) | int }};
      --ib-nav-helper-history-limit: {{ (cfg.get('ui_nav_helper_history_limit') or 10) | int }};
      --ib-nav-helper-hl-color: {{ (cfg.get('ui_nav_helper_highlight_color') or '#FF9900') if cfg else '#FF9900' }};
      --ib-nav-helper-hl-duration-ms: {{ (cfg.get('ui_nav_helper_highlight_duration_ms') or 1400) | int }}ms;
      --ib-btn-bg: #eef3ff;
      --ib-btn-fg: #103a7c;
      --ib-btn-border: #cad7f2;
      --ib-btn-shadow: 0 1px 2px rgba(16, 58, 124, 0.14), 0 1px 3px rgba(16, 58, 124, 0.08);
      --ib-btn-hover-bg: #dce7ff;
      --ib-btn-active-bg: #cddcff;
      --ib-zoom-scale: 1;
      --ui-font-zoomed: var(--ui-font, 14px);
      --ui-font-small-zoomed: var(--ui-font-small, 11px);
    }

    /* Global zoom (font-based) - avoids breaking Plotly click hit-testing */
    body {
      font-size: var(--ui-font-zoomed);
      overflow-x: hidden;
      padding-top: calc(env(safe-area-inset-top, 0px) + var(--ib-topbar-h) + var(--ib-pagecard-live-h));
      padding-bottom: calc(var(--ib-bottombar-h) + env(safe-area-inset-bottom, 0px));
    }
    .muted { font-size: var(--ui-font-small-zoomed); }

    .ib_section_desc_row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 10px 0;
      padding: 8px 10px;
      border: 1px solid #e7e7e7;
      border-radius: 12px;
      background: #fafafa;
    }
    .ib_section_desc { font-size: var(--ib-font-gui-meta); opacity: 0.78; line-height: 1.4; }
    .ib_section_desc_actions { display: inline-flex; align-items: center; gap: 8px; flex: 0 0 auto; }
    body button {
      border-radius: 999px;
      border: 1px solid var(--ib-btn-border);
      background: var(--ib-btn-bg);
      color: var(--ib-btn-fg);
      box-shadow: var(--ib-btn-shadow);
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: background 120ms ease, box-shadow 120ms ease, transform 120ms ease, border-color 120ms ease;
    }
    body button:hover { background: var(--ib-btn-hover-bg); }
    body button:active { background: var(--ib-btn-active-bg); transform: translateY(1px); }
    body button:disabled { opacity: 0.55; box-shadow: none; cursor: not-allowed; }
    body button.active {
      background: #0b57d0;
      border-color: #0b57d0;
      color: #fff;
      box-shadow: 0 2px 8px rgba(11, 87, 208, 0.28);
    }

    /* Bottom error status bar */
    .ib_bottombar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: env(safe-area-inset-bottom, 0px);
      z-index: 9999;
      height: calc(var(--ib-bottombar-h) * var(--ib-zoom-scale));
      display: flex;
      align-items: center;
      gap: calc(10px * var(--ib-zoom-scale));
      padding: calc(6px * var(--ib-zoom-scale)) calc(12px * var(--ib-zoom-scale));
      padding-left: calc((12px * var(--ib-zoom-scale)) + env(safe-area-inset-left, 0px));
      padding-right: calc((12px * var(--ib-zoom-scale)) + env(safe-area-inset-right, 0px));
      box-sizing: border-box;
      background: var(--ib-statusbar-bg);
      color: var(--ib-statusbar-fg);
      backdrop-filter: blur(8px);
      border-top: 1px solid #eee;
    }
    .ib_bottombar .lbl { font-weight: 800; white-space: nowrap; }
    .ib_bottombar .time { font-variant-numeric: tabular-nums; opacity: 0.85; white-space: nowrap; }
    .ib_bottombar .msg { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ib_bottombar button { height: calc(28px * var(--ib-zoom-scale)); padding: calc(4px * var(--ib-zoom-scale)) calc(10px * var(--ib-zoom-scale)); }
    .ib_bottombar .chip {
      display: inline-flex;
      align-items: center;
      height: calc(24px * var(--ib-zoom-scale));
      padding: 0 calc(10px * var(--ib-zoom-scale));
      border-radius: 999px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: var(--ib-font-gui-meta);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .ib_bottombar .chip.ok { border-color: #b6e2c0; background: #eefaf1; color: #0a7a28; }
    .ib_bottombar .chip.err { border-color: #f2b0b0; background: #fff0f0; color: #b00020; }
    .ib_bottombar .chip.unk { border-color: #ddd; background: #fafafa; color: rgba(0,0,0,0.72); }
    @media (max-width: 980px){
      :root { --ib-bottombar-h: 46px; }
      /* Keep vertical centering even when wrapping (prevents OK/ERR chips from looking off-center). */
      .ib_bottombar { flex-wrap: wrap; height: var(--ib-bottombar-h); align-items: center; align-content: flex-start; }
      .ib_bottombar .msg { width: 100%; }
    }
    .ib_topbar {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      left: 0;
      right: 0;
      z-index: 10000;
      height: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 0;
      display: block;
      padding: 0;
      box-sizing: border-box;
      overflow: visible;
    }
    .ib_topbar .meta { font-size: var(--ib-font-gui-meta); opacity: 0.75; white-space: nowrap; }
    .ib_topbar select { height: 34px; padding: 6px 10px; max-width: 220px; }
    #ui_profile_sel { width: 80px; min-width: 80px; max-width: 80px; height: 34px; padding: 6px 4px; }
    .ib_topbar button { cursor:pointer; padding: 6px 10px; height: 34px; }
    .ib_topbar button.active { background:#0b0b0c; color:#fff; }
    .ib_topbar .zoom {
      display:flex;
      align-items:center;
      gap: 8px;
      padding-left: 10px;
      border-left: 1px solid rgba(0,0,0,0.08);
    }
    .ib_topbar .zoom button { width: calc(34px * var(--ib-zoom-scale)); padding: 0; font-weight: 900; }
    .ib_topbar .zoom .pct { font-variant-numeric: tabular-nums; min-width: calc(56px * var(--ib-zoom-scale)); text-align:center; }
    .ib_pagecard {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      left: 0;
      right: 0;
      z-index: 9998;
      min-height: var(--ib-pagecard-min-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: calc(12px * var(--ib-zoom-scale));
      padding: calc(10px * var(--ib-zoom-scale)) calc(12px * var(--ib-zoom-scale));
      padding-left: calc((12px * var(--ib-zoom-scale)) + env(safe-area-inset-left, 0px));
      padding-right: calc((12px * var(--ib-zoom-scale)) + env(safe-area-inset-right, 0px));
      box-sizing:border-box;
      background: var(--ib-section-title-bg);
      color: var(--ib-section-title-fg);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .ib_pagecard .brandwrap { display:flex; align-items:center; gap:12px; flex-wrap:wrap; min-width:0; }
    .ib_pagecard .brandbox { display:flex; flex-direction:column; min-width:0; gap:0; }
    .ib_pagecard .brand { font-weight:900; letter-spacing:.2px; font-size: var(--ib-font-gui-title); line-height:1; margin:0; }
    .ib_pagecard .byline { font-size: var(--ib-font-gui-meta); opacity:.8; margin-top:0; line-height:1; }
    .ib_pagecard .hintline { font-size: var(--ib-font-gui-meta); opacity:.75; line-height:1; margin-top:2px; }
    .ib_pagecard .branddonate { display:flex; flex-direction:row; align-items:center; gap: calc(8px * var(--ib-zoom-scale)); flex-wrap:wrap; }
    .ib_pagecard .title { font-weight: 800; font-size: var(--ib-pagecard-title-size); min-width:120px; line-height: 1.1; }
    .ib_pagecard .actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; min-width:0; }
    .ib_pagecard .actions input { height: calc(34px * var(--ib-zoom-scale)); padding: calc(6px * var(--ib-zoom-scale)) calc(10px * var(--ib-zoom-scale)); min-width:0; }
    .ib_pagecard .actions button { height: calc(34px * var(--ib-zoom-scale)); padding: calc(6px * var(--ib-zoom-scale)) calc(10px * var(--ib-zoom-scale)); }
    .ib_pagecard .actions .iconbtn { width: calc(34px * var(--ib-zoom-scale)); padding:0; display:inline-flex; align-items:center; justify-content:center; }
    .ib_pagecard .actions .iconbtn svg { width:18px; height:18px; }
    .ib_pagecard .actions .ib_topbar_mobile_toggle { display:none; }
    .ib_pagecard .actions .ib_nav_mobile_toggle { display:none; }
    .ib_pagecard .actions .topbar_profile_group { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; min-width:0; width:100%; }
    .ib_pagecard .actions .topbar_profile_group .zoom { display:flex; align-items:center; gap:8px; padding-left:10px; border-left:1px solid rgba(0,0,0,0.08); }
    .ib_pagecard .actions .topbar_profile_group .ib_clear_row { flex:1 1 180px; min-width:0; max-width:320px; min-height:34px; }
    .jump_hl {
      outline: var(--ib-page-search-hl-width) solid var(--ib-page-search-hl-color);
      outline-offset: 2px;
      border-radius: 10px;
      transition: outline-color 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 0 0 calc(var(--ib-page-search-hl-width) + 1px) color-mix(in srgb, var(--ib-page-search-hl-color) 18%, transparent);
    }
    mark.ib_search_mark { background: #ffec80; color: inherit; padding: 0 2px; border-radius: 4px; }
    .ib_pagecard_results { position:fixed; z-index:9997; top: calc(var(--ib-pagecard-live-h)); right:12px; width:min(560px, calc(100vw - 24px)); max-height:320px; overflow:auto; background:#fff; color:#111; border:1px solid #ddd; border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,0.18); display:none; }
    .ib_pagecard_results button { display:block; width:100%; text-align:left; border:0; border-bottom:1px solid #eee; background:#fff; padding:10px 12px; cursor:pointer; }
    .ib_pagecard_results button:hover { background:#f6f6f6; }
    .ib_page_search_btn.active { border-color:#ff9900; box-shadow:0 0 0 2px rgba(255,153,0,0.18); }
    .nav_jump_hl {
      outline: 3px solid var(--ib-nav-helper-hl-color);
      outline-offset: 2px;
      border-radius: 10px;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--ib-nav-helper-hl-color) 18%, transparent);
    }
    .ib_param_hint_badge {
      position:absolute;
      top:4px;
      right:4px;
      z-index:5;
      padding:2px 6px;
      border-radius:999px;
      background:#0b57d0;
      color:#fff;
      font-size:10px;
      line-height:1.2;
      box-shadow:0 2px 8px rgba(11,87,208,0.28);
      cursor:pointer;
    }

    .ib_badge {
      position: absolute;
      top: 2px;
      right: 2px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: #dc2626;
      color: #fff;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(220,38,38,0.28);
      display: none;
      pointer-events: none;
    }
    .ib_badge_warn { background: #f59e0b; box-shadow: 0 2px 8px rgba(245,158,11,0.28); }
    .ib_badge_info { background: #0b57d0; box-shadow: 0 2px 8px rgba(11,87,208,0.28); }
    .ib_page_search_modal_chk { display:flex; gap:8px; align-items:center; min-height:32px; }
    .ib_page_search_modal_chk input[type="checkbox"] { width:16px; height:16px; flex:0 0 16px; }
    @media (max-width: 980px){
      :root { --ib-pagecard-min-h: 118px; --ib-pagecard-live-h: 118px; }
      .ib_pagecard { flex-wrap:wrap; align-items:flex-start; }
      .ib_pagecard .actions { width:100%; justify-content:flex-start; }
      .ib_pagecard .actions input { min-width:0; width:100%; }
      .ib_pagecard .actions .topbar_profile_group { justify-content:flex-start; }
      .ib_pagecard .actions .topbar_profile_group .zoom { padding-left:0; border-left:0; }
      .ib_pagecard .actions .topbar_profile_group .ib_clear_row { flex:1 0 100%; max-width:none; }
      .ib_pagecard .title { width:100%; }
      .ib_pagecard .branddonate { width:100%; }
    }

    /* iPhone / small mobile: collapse/expand the heavy actions row */
    @media (max-width: 480px){
      :root { --ib-pagecard-min-h: 84px; --ib-pagecard-live-h: 84px; }
      .ib_pagecard .brandwrap { width:100%; flex-wrap:nowrap; align-items:flex-start; }
      .ib_pagecard .brandbox { flex: 1 1 auto; }
      .ib_pagecard .branddonate {
        width: auto;
        margin-left: auto;
        flex-wrap: nowrap;
        gap: 6px;
        align-self: flex-start;
      }
      .ib_pagecard .branddonate img { height: calc(22px * var(--ib-zoom-scale)) !important; max-height: calc(22px * var(--ib-zoom-scale)) !important; }
      .ib_pagecard .actions .ib_topbar_mobile_toggle { display:inline-flex; }
      .ib_pagecard .actions .ib_nav_mobile_toggle { display:inline-flex; }
      #ib_topbar_mobile_panel[hidden] { display:none !important; }

      /* iOS Safari: prevent input focus auto-zoom */
      input, select, textarea { font-size: 16px !important; }

      /* Touch targets (Apple HIG) */
      .ib_pagecard .actions button,
      .ib_pagecard .actions input,
      .ib_pagecard .actions select,
      .ib_topbar button,
      .ib_topbar select {
        height: max(calc(34px * var(--ib-zoom-scale)), 44px);
      }
      .ib_pagecard .actions .iconbtn { width: max(calc(34px * var(--ib-zoom-scale)), 44px); }
    }

    /* Shared UI: section info icon next to titles */
    .ib_summary_row {
      display:flex;
      align-items:center;
      gap: 10px;
      width: 100%;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ib-section-title-fg);
      box-sizing: border-box;
    }
    .ib_summary_row > span:first-child {
      flex: 1;
      min-width: 0;
    }
    .ib_summary_row > .ib_btn_group { display:none; }
    .ib_summary_row * { color: inherit; }
    .ib_summary_actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }
    .ib_info_icon {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.18);
      background: #fff;
      color: #111;
      cursor: pointer;
      line-height: 20px;
      text-align: center;
      flex: 0 0 auto;
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .ib_info_icon svg { display: block; }
    .ib_info_icon:hover { background: #f6f6f6; }
    .ib_info_icon:active { transform: translateY(1px); }
    .ib_cfg_icon {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.18);
      background: #fff;
      color: #111;
      cursor: pointer;
      line-height: 20px;
      text-align: center;
      flex: 0 0 auto;
      user-select: none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .ib_cfg_icon:hover { background:#f6f6f6; }
    .ib_cfg_back_icon {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.18);
      background: #fff;
      color: #111;
      cursor: pointer;
      line-height: 20px;
      text-align: center;
      flex: 0 0 auto;
      user-select: none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-right: 6px;
    }
    .ib_cfg_back_icon:hover { background:#f6f6f6; }

    /* Details marker: always show a left-side arrow (consistent). */
    main.content details { position: relative; }
    main.content details > summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 84px 8px 10px;
      border: 1px solid #cfd5e2;
      border-radius: 10px;
      background: var(--ib-section-title-bg);
      color: var(--ib-section-title-fg);
      font-size: var(--ib-section-title-font-px);
    }
    main.content details > summary::-webkit-details-marker { display: none; }
    main.content details > summary::before {
      content: "\25B8"; /* small right-pointing triangle */
      display: inline-block;
      width: 20px;
      font-size: 14px;
      opacity: 0.85;
      transform: rotate(0deg);
      transition: transform 120ms ease;
      text-align: center;
      line-height: 1;
    }
    main.content details[open] > summary::before { transform: rotate(90deg); }

    /* Theme system (MVP) (#405)
       Applies via html[data-theme] + html[data-accent]. */
    :root {
      --ib-bg: #f7f8fa;
      --ib-surface: #ffffff;
      --ib-surface-2: #f1f3f6;
      --ib-text: #1f2933;
      --ib-text-muted: #6b7280;
      --ib-border: #d7dce2;

      --ib-primary: #2563eb;
      --ib-primary-text: #ffffff;

      --ib-success: #14803c;
      --ib-warning: #b7791f;
      --ib-danger: #c53030;
      --ib-info: #2563eb;

      /* Integrate existing per-UI header color knobs */
      --ib-table-header-bg: var(--ib-table-head-bg);
      --ib-table-header-text: var(--ib-table-head-fg);
      --ib-table-row-hover: #e8f1ff;
      --ib-table-selected: #dbeafe;

      --ib-input-bg: #ffffff;
      --ib-input-text: #111827;

      --ib-button-bg: #eef3ff;
      --ib-button-text: #103a7c;
      --ib-button-border: #cad7f2;
      --ib-button-hover-bg: #dce7ff;
      --ib-button-active-bg: #cddcff;

      /* Map existing button variables */
      --ib-btn-bg: var(--ib-button-bg);
      --ib-btn-fg: var(--ib-button-text);
      --ib-btn-border: var(--ib-button-border);
      --ib-btn-hover-bg: var(--ib-button-hover-bg);
      --ib-btn-active-bg: var(--ib-button-active-bg);
    }

    html[data-theme="dark"] {
      --ib-bg: #0f1115;
      --ib-surface: #161a22;
      --ib-surface-2: #1d2330;
      --ib-text: #e5e7eb;
      --ib-text-muted: #9aa4b2;
      --ib-border: #2a3345;

      --ib-table-row-hover: rgba(99, 102, 241, 0.14);
      --ib-table-selected: rgba(59, 130, 246, 0.22);

      --ib-input-bg: #121726;
      --ib-input-text: #e5e7eb;

      --ib-button-bg: #1c2436;
      --ib-button-text: #e5e7eb;
      --ib-button-border: #2a3345;
      --ib-button-hover-bg: #25304a;
      --ib-button-active-bg: #2c3a5b;
    }

    html[data-theme="dark_blue"] {
      --ib-bg: #061325;

  <script>
  (function(){
    const CFG_MODE = String({{ ((cfg.get('ui_theme_mode') or 'system') if cfg else 'system') | tojson }} || 'system');
    const CFG_ACC = String({{ ((cfg.get('ui_theme_accent') or 'blue') if cfg else 'blue') | tojson }} || 'blue');

    let _mql = null;
    let _onSystemChange = null;
    function _applyTheme(theme){
      try{ document.documentElement.setAttribute('data-theme', String(theme || 'light')); }catch(e){}
    }
    function _applyAccent(acc){
      try{ document.documentElement.setAttribute('data-accent', String(acc || 'blue')); }catch(e){}
    }
    function apply(mode, accent){
      const m = String(mode || 'system').trim().toLowerCase();
      const a = String(accent || 'blue').trim().toLowerCase();
      _applyAccent(a);

      try{ if(_mql && _onSystemChange && _mql.removeEventListener) _mql.removeEventListener('change', _onSystemChange); }catch(e){}
      try{ if(_mql && _onSystemChange && _mql.removeListener) _mql.removeListener(_onSystemChange); }catch(e){}
      _mql = null;
      _onSystemChange = null;

      if(m === 'system'){
        try{
          _mql = window.matchMedia('(prefers-color-scheme: dark)');
          const isDark = !!(_mql && _mql.matches);
          _applyTheme(isDark ? 'dark' : 'light');
          _onSystemChange = ()=>{ try{ _applyTheme(_mql && _mql.matches ? 'dark' : 'light'); }catch(e){} };
          try{ if(_mql && _mql.addEventListener) _mql.addEventListener('change', _onSystemChange); }catch(e){}
          try{ if(_mql && _mql.addListener) _mql.addListener(_onSystemChange); }catch(e){}
        }catch(e){
          _applyTheme('light');
        }
        return;
      }
      _applyTheme(m);
    }

    window.InfluxBroTheme = {
      apply: apply,
      get: ()=>({
        mode: String(document.documentElement.getAttribute('data-theme') || ''),
        accent: String(document.documentElement.getAttribute('data-accent') || ''),
      }),
    };

    apply(CFG_MODE, CFG_ACC);
  })();
  </script>

  <script>
  (function(){
    const LS_ZOOM = 'influxbro_ui_zoom_pct_v1';
    const MIN = 60;
    const MAX = 160;
    const STEP = 5;

    function clamp(v){
      const n = Math.round(Number(v) || 100);
      if(!isFinite(n)) return 100;
      return Math.max(MIN, Math.min(MAX, n));
    }

    function getZoom(){
      try{ return clamp(localStorage.getItem(LS_ZOOM) || 100); }catch(e){ return 100; }
    }

    function _hasStoredZoom(){
      try{ return localStorage.getItem(LS_ZOOM) !== null; }catch(e){ return true; }
    }

    function _recommendDefaultZoom(){
      // Heuristic: if the user never set a zoom yet, pick a device-friendly default.
      // This is browser-local (localStorage) and therefore per device.
      try{
        const w = Math.max(0, Math.min(
          Number(window.innerWidth || 0) || 0,
          Number(document.documentElement && document.documentElement.clientWidth ? document.documentElement.clientWidth : 0) || 0
        ));
        if(!isFinite(w) || w <= 0) return 100;
        if(w <= 420) return 120; // iPhone portrait
        if(w <= 480) return 115;
        if(w <= 768) return 110;
        if(w <= 980) return 105;
        return 100;
      }catch(e){
        return 100;
      }
    }

    function _ensureDefaultZoomOnce(){
      try{
        if(_hasStoredZoom()) return;
        const z = _recommendDefaultZoom();
        try{ localStorage.setItem(LS_ZOOM, String(clamp(z))); }catch(e){}
      }catch(e){}
    }

    function setZoom(pct){
      const z = clamp(pct);
      try{ localStorage.setItem(LS_ZOOM, String(z)); }catch(e){}
      const scale = z / 100;
      try{ document.documentElement.style.setProperty('--ib-zoom-scale', String(scale)); }catch(e){}
      try{
        const cs = getComputedStyle(document.documentElement);
        const uiFont = String(cs.getPropertyValue('--ui-font') || '14px').trim();
        const uiSmall = String(cs.getPropertyValue('--ui-font-small') || '11px').trim();
        const n1 = parseFloat(uiFont.replace('px',''));
        const n2 = parseFloat(uiSmall.replace('px',''));
        const f1 = (isFinite(n1) ? n1 : 14) * scale;
        const f2 = (isFinite(n2) ? n2 : 11) * scale;
        document.documentElement.style.setProperty('--ui-font-zoomed', f1.toFixed(3) + 'px');
        document.documentElement.style.setProperty('--ui-font-small-zoomed', f2.toFixed(3) + 'px');
      }catch(e){}
      try{
        const $out = document.getElementById('ib_zoom_pct');
        if($out) $out.textContent = String(z) + '%';
      }catch(e){}
      try{ if(window.InfluxBroOnZoomChange) window.InfluxBroOnZoomChange(scale, z); }catch(e){}
      try{ if(window.InfluxBroTableCols && window.InfluxBroTableCols.refreshScale) window.InfluxBroTableCols.refreshScale(); }catch(e){}
      try{ if(window.InfluxBroTableHeight && window.InfluxBroTableHeight.refreshScale) window.InfluxBroTableHeight.refreshScale(); }catch(e){}
      try{ window.dispatchEvent(new Event('resize')); }catch(e){}
    }

    function initZoom(){
      const $m = document.getElementById('ib_zoom_out');
      const $p = document.getElementById('ib_zoom_in');
      if((!$m && !$p) || (($m && $m.dataset.ibZoomReady === '1') && ($p && $p.dataset.ibZoomReady === '1'))) return;
      try{ _ensureDefaultZoomOnce(); }catch(e){}
      try{ setZoom(getZoom()); }catch(e){}
      if($m && $m.dataset.ibZoomReady !== '1'){
        $m.dataset.ibZoomReady = '1';
        $m.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; setZoom(getZoom() - STEP); });
      }
      if($p && $p.dataset.ibZoomReady !== '1'){
        $p.dataset.ibZoomReady = '1';
        $p.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; setZoom(getZoom() + STEP); });
      }
    }

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initZoom, { once: true });
    else initZoom();
  })();

   // Auto-assign pickkeys/instancekeys for existing UI.
   // Pickkey is the stable product key (pk). Instancekey is the runtime-unique key (ik).
   (function(){
    function _normKey(s){
      try{ return String(s || '').trim().replace(/\s+/g,' '); }catch(e){ return ''; }
    }
    function _hashFNV1a(str){
      try{
        let h = 0x811c9dc5;
        for(let i=0;i<str.length;i+=1){
          h ^= str.charCodeAt(i);
          // h *= 16777619
          h = (h + ((h<<1) + (h<<4) + (h<<7) + (h<<8) + (h<<24))) >>> 0;
        }
        return ('00000000' + h.toString(16)).slice(-8);
      }catch(e){ return '00000000'; }
    }
    function _pageKey(){
      try{
        const p = String(location && location.pathname ? location.pathname : '').replace(/\/+$/,'');
        const seg = p.split('/').filter(Boolean).pop() || 'dashboard';
        if(seg === '6ce7c04c_influxbro') return 'dashboard';
        return String(seg || 'page').toLowerCase();
      }catch(e){ return 'page'; }
    }
    function _anchorKeyFor(el){
      try{
        const a = el.closest && el.closest('[data-ib-pickkey],[data-ui],[id]');
        if(!a) return '';
        const pk = _normKey(a.getAttribute && a.getAttribute('data-ib-pickkey'));
        if(pk) return pk;
        const ui = _normKey(a.getAttribute && a.getAttribute('data-ui'));
        if(ui) return 'ui.' + ui;
        const id = _normKey(a.getAttribute && a.getAttribute('id'));
        if(id) return 'id.' + id;
      }catch(e){}
      return '';
    }
    function _pathSig(el, root){
      try{
        const parts = [];
        let cur = el;
        for(let i=0;i<12;i+=1){
          if(!cur || cur === document.body || cur === document.documentElement) break;
          if(root && cur === root) break;
          const tag = String(cur.tagName || '').toLowerCase();
          let n = 1;
          try{
            let sib = cur;
            while((sib = sib.previousElementSibling)){
              if(String(sib.tagName||'').toLowerCase() === tag) n += 1;
            }
          }catch(e){}
          parts.unshift(tag + ':' + n);
          cur = cur.parentElement;
        }
        return parts.join('/');
      }catch(e){ return ''; }
    }
     function _ensurePickkey(el){
       try{
         if(!el || !el.getAttribute || !el.setAttribute) return;
         if(el.getAttribute('data-ib-pickkey')) return;
         const ui = _normKey(el.getAttribute('data-ui'));
         const id = _normKey(el.getAttribute('id'));
         const page = _pageKey();
         if(ui){ el.setAttribute('data-ib-pickkey', page + '.' + ui); el.setAttribute('data-ib-pickkey-auto', '1'); return; }
         if(id){ el.setAttribute('data-ib-pickkey', page + '.id.' + id); el.setAttribute('data-ib-pickkey-auto', '1'); return; }

        const anchor = el.closest && el.closest('[data-ui],[id],[data-ib-pickkey]');
        const base = _anchorKeyFor(el) || (page + '.auto');
        const sig = _pathSig(el, anchor);
         const tag = String(el.tagName || 'el').toLowerCase();
         const h = _hashFNV1a(base + '|' + tag + '|' + sig);
         el.setAttribute('data-ib-pickkey', base + '.auto.' + tag + '.' + h);
         el.setAttribute('data-ib-pickkey-auto', '1');
       }catch(e){}
     }

     function _ensureInstancekey(el){
       try{
         if(!el || !el.getAttribute || !el.setAttribute) return;
         if(el.getAttribute('data-ib-instancekey')) return;
         const pk = _normKey(el.getAttribute('data-ib-pickkey'));
         if(!pk) return;
         const item = _normKey(el.getAttribute('data-ib-itemkey'));
         if(item){
           el.setAttribute('data-ib-instancekey', pk + '[item=' + encodeURIComponent(item) + ']');
           return;
         }
         el.setAttribute('data-ib-instancekey', pk);
         el.setAttribute('data-ib-instancekey-auto', '1');
       }catch(e){}
     }

     function _dedupeAutoInstancekeys(){
       try{
         const groups = {};
         document.querySelectorAll('[data-ib-instancekey]').forEach((el)=>{
           try{
             if(!el || !el.getAttribute) return;
             const ik = _normKey(el.getAttribute('data-ib-instancekey'));
             if(!ik) return;
             if(!groups[ik]) groups[ik] = [];
             groups[ik].push(el);
           }catch(e){}
         });
         Object.keys(groups).forEach((ik)=>{
           const xs = groups[ik] || [];
           if(xs.length <= 1) return;
           // Only fix up auto-generated instancekeys. Explicit instancekeys remain untouched.
           xs.forEach((el)=>{
             try{
               if(String(el.getAttribute('data-ib-instancekey-auto') || '') !== '1') return;
               const anchor = el.closest && el.closest('[data-ui],[id],[data-ib-pickkey]');
               const base = _anchorKeyFor(el) || (_pageKey() + '.auto');
               const sig = _pathSig(el, anchor);
               const tag = String(el.tagName || 'el').toLowerCase();
               const h = _hashFNV1a(base + '|ik|' + ik + '|' + tag + '|' + sig);
               el.setAttribute('data-ib-instancekey', ik + '.auto.' + tag + '.' + h);
             }catch(e){}
           });
         });
       }catch(e){}
     }

     let _loggedPickStats = false;
     function _validatePickRegistry(){
       try{
         const pkMap = {};
         const ikMap = {};
         let autoPk = 0;
         let autoIk = 0;
         document.querySelectorAll('[data-ib-pickkey]').forEach((el)=>{
           try{
             const pk = _normKey(el.getAttribute('data-ib-pickkey'));
             if(!pk) return;
             pkMap[pk] = (pkMap[pk] || 0) + 1;
             if(String(el.getAttribute('data-ib-pickkey-auto') || '') === '1') autoPk += 1;
           }catch(e){}
         });
         document.querySelectorAll('[data-ib-instancekey]').forEach((el)=>{
           try{
             const ik = _normKey(el.getAttribute('data-ib-instancekey'));
             if(!ik) return;
             ikMap[ik] = (ikMap[ik] || 0) + 1;
             if(String(el.getAttribute('data-ib-instancekey-auto') || '') === '1') autoIk += 1;
           }catch(e){}
         });
         const pkDup = Object.keys(pkMap).filter(k=>pkMap[k] > 1);
         const ikDup = Object.keys(ikMap).filter(k=>ikMap[k] > 1);
         if(pkDup.length) console.error('[InfluxBro] pickkey collision(s):', pkDup.slice(0, 20));
         if(ikDup.length) console.error('[InfluxBro] instancekey collision(s):', ikDup.slice(0, 20));
         if(!_loggedPickStats){
           _loggedPickStats = true;
           if(autoPk || autoIk) console.warn('[InfluxBro] auto pickkeys:', autoPk, 'auto instancekeys:', autoIk);
         }
       }catch(e){}
     }

     function apply(){
       try{
        const sel = [
          '[data-ui]',
          '[id]',
          'button',
          'a',
          'input',
          'select',
          'textarea',
          'label',
          'details',
          'summary',
          'table',
          '.table_wrap',
          '.table_head',
          '.table_box',
          '.tbl_actions',
          '.ib_pagecard',
          '.ib_topbar',
          'nav.sidebar',
          '.nav_item',
        ].join(',');
         document.querySelectorAll(sel).forEach((el)=>{ _ensurePickkey(el); _ensureInstancekey(el); });
         _dedupeAutoInstancekeys();
         _validatePickRegistry();
       }catch(e){}
     }

    let _raf = 0;
    function _schedule(){
      try{
        if(_raf) cancelAnimationFrame(_raf);
        _raf = requestAnimationFrame(()=>{ _raf = 0; apply(); });
      }catch(e){ apply(); }
    }

    try{ window.InfluxBroPickKey = { apply, schedule: _schedule }; }catch(e){}
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ()=>apply(), {once:true});
    else apply();

    // Keep pickkeys on dynamically injected UI (best-effort, throttled).
    try{ new MutationObserver(()=>_schedule()).observe(document.body, {childList:true, subtree:true}); }catch(e){}
  })();
  </script>
  <script>
  (function(){
    function initPageCard(){
      const $card = document.getElementById('ib_pagecard');
      const $search = document.getElementById('ib_page_search');
      const $prev = document.getElementById('ib_page_search_prev');
      const $next = document.getElementById('ib_page_search_next');
      const $settings = document.getElementById('ib_page_search_settings');
      const $open = document.getElementById('ib_open_all');
      const $close = document.getElementById('ib_close_all');
      const $navBack = document.getElementById('ib_nav_back');
      const $navForward = document.getElementById('ib_nav_forward');
      const $paramHelp = document.getElementById('ib_param_help_toggle');
      const $results = document.getElementById('ib_pagecard_results');
      const $searchModal = document.getElementById('ib_page_search_modal');
      const $mobileToggle = document.getElementById('ib_topbar_mobile_toggle');
      const $mobilePanel = document.getElementById('ib_topbar_mobile_panel');
      const $navMobileToggle = document.getElementById('ib_nav_mobile_toggle');
      if(!$card || $card.dataset.ibPagecardReady === '1') return;
      $card.dataset.ibPagecardReady = '1';

      const main = document.querySelector('main.content');

      // Mobile nav drawer toggle (used by _nav.html via a shell class).
      (function(){
        const LS_KEY = 'influxbro.nav.mobile.open.v1';
        function _isMobile(){
          try{ return !!(window.matchMedia && window.matchMedia('(max-width: 980px)').matches); }catch(e){ return false; }
        }
        function _readOpen(){
          // Do not persist "open" across app launches.
          // Older versions used localStorage; migrate to sessionStorage and force-close legacy state.
          try{
            const ss = sessionStorage.getItem(LS_KEY);
            if(ss === '1') return true;
            if(ss === '0') return false;
          }catch(e){}
          try{
            const ls = localStorage.getItem(LS_KEY);
            if(ls === '1'){
              try{ localStorage.setItem(LS_KEY, '0'); }catch(e){}
            }
          }catch(e){}
          return false;
        }
        function _writeOpen(v){
          try{ sessionStorage.setItem(LS_KEY, v ? '1' : '0'); }catch(e){}
          // Ensure legacy persistence cannot re-open on next launch.
          try{ localStorage.setItem(LS_KEY, '0'); }catch(e){}
        }
        function _shell(){
          try{ return document.querySelector('.shell'); }catch(e){ return null; }
        }
        function _apply(){
          try{
            const sh = _shell();
            if(!sh || !$navMobileToggle) return;
            const mob = _isMobile();
            if(!mob){
              sh.classList.remove('ib_nav_mobile_open');
              try{ document.body.classList.remove('ib_nav_mobile_open'); }catch(e){}
              $navMobileToggle.setAttribute('aria-expanded', 'false');
              return;
            }
            const open = _readOpen();
            sh.classList.toggle('ib_nav_mobile_open', open);
            try{ document.body.classList.toggle('ib_nav_mobile_open', open); }catch(e){}
            $navMobileToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          }catch(e){}
        }
        try{
          if($navMobileToggle){
            $navMobileToggle.addEventListener('click', (ev)=>{
              try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
              const sh = _shell();
              if(!sh) return;
              const next = !sh.classList.contains('ib_nav_mobile_open');
              _writeOpen(next);
              _apply();
            });
          }
        }catch(e){}
        try{
          const mq = window.matchMedia ? window.matchMedia('(max-width: 980px)') : null;
          if(mq){
            if(mq.addEventListener) mq.addEventListener('change', _apply);
            else if(mq.addListener) mq.addListener(_apply);
          }
        }catch(e){}
        _apply();
      })();

      // iPhone: allow collapsing the large topbar action group.
      (function(){
        const LS_KEY = 'influxbro.topbar.mobile.open.v1';
        function _isSmallMobile(){
          try{ return !!(window.matchMedia && window.matchMedia('(max-width: 480px)').matches); }catch(e){ return false; }
        }
        function _readOpen(){
          try{ return localStorage.getItem(LS_KEY) === '1'; }catch(e){ return false; }
        }
        function _writeOpen(v){
          try{ localStorage.setItem(LS_KEY, v ? '1' : '0'); }catch(e){}
        }
        function _apply(){
          try{
            if(!$mobileToggle || !$mobilePanel) return;
            const small = _isSmallMobile();
            if(!small){
              $mobilePanel.hidden = false;
              $mobileToggle.setAttribute('aria-expanded', 'true');
              try{ $mobileToggle.classList.remove('active'); }catch(e){}
              try{ if(window.InfluxBroTopbarLayout && window.InfluxBroTopbarLayout.update) window.InfluxBroTopbarLayout.update(); }catch(e){}
              return;
            }
            const open = _readOpen();
            $mobilePanel.hidden = !open;
            $mobileToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
            try{ $mobileToggle.classList.toggle('active', open); }catch(e){}
            try{ if(window.InfluxBroTopbarLayout && window.InfluxBroTopbarLayout.update) window.InfluxBroTopbarLayout.update(); }catch(e){}
          }catch(e){}
        }
        try{
          if($mobileToggle && $mobilePanel){
            $mobileToggle.addEventListener('click', ()=>{
              try{ _writeOpen($mobilePanel.hidden); }catch(e){}
              _apply();
            });
          }
        }catch(e){}
        try{
          const mq = window.matchMedia ? window.matchMedia('(max-width: 480px)') : null;
          if(mq){
            if(mq.addEventListener) mq.addEventListener('change', _apply);
            else if(mq.addListener) mq.addListener(_apply);
          }
        }catch(e){}
        _apply();
      })();

      function setAllDetailsOpen(root, wantOpen){
        try{
          if(!root) return;
          root.querySelectorAll('details').forEach(d=>{ d.open = !!wantOpen; });
        }catch(e){}
      }
      try{ if($open) $open.addEventListener('click', ()=>setAllDetailsOpen(main, true)); }catch(e){}
      try{ if($close) $close.addEventListener('click', ()=>setAllDetailsOpen(main, false)); }catch(e){}

      const SEARCH_CFG_KEY = 'influxbro.page.search.cfg.v1';
      const NAV_HISTORY_KEY = 'influxbro.nav.helper.history.v1';
      const NAV_INDEX_KEY = 'influxbro.nav.helper.index.v1';
      const NAV_PENDING_KEY = 'influxbro.nav.helper.pending.v1';
      const PARAM_HELP_KEY = 'influxbro.nav.helper.param_help.v1';
      const NAV_HISTORY_LIMIT_DEFAULT = {{ (cfg.get('ui_nav_helper_history_limit') or 10) | int }};
      const PARAM_LINKS = {

    function _norm(s){ return String(s || '').trim(); }
    function _lc(s){ return _norm(s).toLowerCase(); }

    function _isLikelyPickString(s){
      const t = _norm(s);
      return /^<\s*PICK\s*:/i.test(t);
    }

    function _parsePickString(raw){
      const t0 = _norm(raw);
      if(!t0) return { ok:false, error:'leer' };
      const t = t0.replace(/^\s+|\s+$/g, '');
      if(!/^<\s*PICK\s*:/i.test(t) || !/>\s*$/.test(t)){
        return { ok:false, error:'format' };
      }
      // Strip <PICK: and trailing >
      const inner = t.replace(/^<\s*PICK\s*:/i, '').replace(/>\s*$/,'');
      const pipe = inner.indexOf('|');
      if(pipe < 0) return { ok:false, error:'missing_pipe' };
      if(inner.indexOf('|', pipe + 1) >= 0) return { ok:false, error:'too_many_pipes' };
      const page = _norm(inner.slice(0, pipe));
      const payload = _norm(inner.slice(pipe + 1));
      if(!page || !payload) return { ok:false, error:'empty_parts' };

      // v=1 format: v=1;pk=...;ik=...
      if(/^v\s*=\s*1\b/i.test(payload)){
        const parts = payload.split(';').map(x=>_norm(x)).filter(Boolean);
        const kv = {};
        parts.forEach((p)=>{
          const eq = p.indexOf('=');
          if(eq < 0) return;
          const k = _lc(p.slice(0, eq));
          const v = p.slice(eq + 1);
          if(!k) return;
          kv[k] = v;
        });
        const pkEnc = kv.pk !== undefined ? String(kv.pk || '') : '';
        const ikEnc = kv.ik !== undefined ? String(kv.ik || '') : '';
        let pk = '';
        let ik = '';
        try{ pk = decodeURIComponent(pkEnc); }catch(e){ pk = pkEnc; }
        try{ ik = decodeURIComponent(ikEnc); }catch(e){ ik = ikEnc; }
        pk = _norm(pk);
        ik = _norm(ik) || pk;
        if(!pk) return { ok:false, error:'missing_pk' };
        return { ok:true, v:1, page, pk, ik, raw:t0 };
      }

      // Legacy format: <PICK:Page|pickkey>
      const pk = payload;
      if(!pk) return { ok:false, error:'missing_pk' };
      return { ok:true, v:0, page, pk, ik: pk, raw:t0 };
    }

    function _handlePickInput(raw){

        _pickMsg('Pickkey', 'Ungueltiger Pickkey-String. Erwartetes Format: ' + ex + '\n\nLegacy wird ebenfalls akzeptiert: <PICK:Dashboard|page_main.input_search>', true);
        return;

      const curPage = (window.currentPageLabel ? window.currentPageLabel() : 'Seite');
      if(_lc(parsed.page) !== _lc(curPage)){

        return;

    function _clearSearchMarks(root){

    function _markFirstOccurrence(el, q){
      try{
        const needle = _lc(q);
        if(!needle) return;
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
          acceptNode: (n)=>{
            try{
              if(!n || !n.nodeValue) return NodeFilter.FILTER_REJECT;
              const s = _lc(n.nodeValue);
              if(!s) return NodeFilter.FILTER_REJECT;
              return s.includes(needle) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
            }catch(e){
              return NodeFilter.FILTER_REJECT;
            }
          }
        });
        const n = walker.nextNode();
        if(!n) return;

        const raw = String(n.nodeValue || '');
        const idx = _lc(raw).indexOf(needle);
        if(idx < 0) return;

        const before = raw.slice(0, idx);
        const hit = raw.slice(idx, idx + String(q).length);
        const after = raw.slice(idx + String(q).length);

        const frag = document.createDocumentFragment();
        if(before) frag.appendChild(document.createTextNode(before));
        const m = document.createElement('mark');
        m.className = 'ib_search_mark';
        m.textContent = hit || String(q);
        frag.appendChild(m);
        if(after) frag.appendChild(document.createTextNode(after));

        const p = n.parentNode;
        if(!p) return;
        p.replaceChild(frag, n);
      }catch(e){}
    }
    function _sectionPathFor(el){

            if(!cur) break;

      function buildIndex(){
        try{
          const cfg = activeSearchCfg();
          const sel = 'button[id], select[id], input[id], textarea[id], [data-ui]';
          const seen = new Set();
          const out = [];
          (main || document).querySelectorAll(sel).forEach(el=>{
            try{
              const ui = _norm(el.getAttribute('data-ui'));
              const id = _norm(el.getAttribute('id'));
              const key = ui || ('#' + id);
              if(!key || seen.has(key)) return;
              if(id === 'ib_page_search') return;
              seen.add(key);

              // Settings page: group containers contain a huge amount of text; do not index them by visible text.
              const isGroupContainer = _isSettingsPage() && ui && ui.startsWith('config_settings.group_');
              const label = _labelFor(el);
              const sect = _sectionPathFor(el);
              const txt = isGroupContainer ? '' : _norm(el.textContent || el.getAttribute('placeholder') || el.getAttribute('title') || '');
              const directTxt = isGroupContainer ? '' : _directTextFor(el);
              const tooltip = isGroupContainer ? '' : _tooltipTextFor(el);
              const parts = [];
              if(cfg.key) parts.push(key);
              if(cfg.label && !isGroupContainer) parts.push(label);
              if(cfg.visible_text && !isGroupContainer) parts.push(txt);
              if(cfg.direct_text && !isGroupContainer) parts.push(directTxt);
              if(cfg.sections) parts.push(sect.join(' / '));
              if(cfg.tooltip && !isGroupContainer) parts.push(tooltip);
              const hay = parts.map(_lc).join(' | ');
              out.push({el, ui:key, txt: label || txt, sect, hay, parts:{key, label, txt, direct_text: directTxt, sections: sect.join(' / '), tooltip}});
            }catch(e){}
          });

          // Also index important visible text blocks so the page search works on every page.
          // Keep it bounded to avoid huge/slow DOM scans.
          try{

              ? '.param_label, .param_hint, details > summary, .table_title, .table_head, h1, h2, h3, .muted'
              : 'details > summary, .table_title, .table_head, h1, h2, h3, .muted';
            const scope = (main || document);
            const maxTextNodes = _isSettingsPage() ? 2600 : 1200;
            let nText = 0;
            scope.querySelectorAll(txtSel).forEach((el)=>{
              try{
                if(nText >= maxTextNodes) return;
                const txt = _norm(el.textContent || '');
                if(!txt) return;
                // Skip extremely long blobs (manual/changelog etc.)
                if(txt.length > 3800) return;
                const sect = _sectionPathFor(el);
                const ui = _norm(el.getAttribute && el.getAttribute('data-ui'));
                const key = ui || ('text:' + txt.slice(0, 60));
                const parts = [];
                if(cfg.key) parts.push(key);
                if(cfg.visible_text) parts.push(txt);
                if(cfg.sections) parts.push(sect.join(' / '));
                const hay = parts.map(_lc).join(' | ');
                out.push({el, ui: key, txt: txt, sect, hay, parts:{key, label:'', txt, direct_text:'', sections: sect.join(' / '), tooltip:''}});
                nText += 1;
              }catch(e){}
            });
          }catch(e){}

          return out;
        }catch(e){ return []; }

      function previewSearchIndex(){

            try{
              const safe_parts = {};

              }catch(e){}

                ui: _escHtml(x && x.ui ? x.ui : ''),
                txt: _escHtml(x && x.txt ? x.txt : ''),
                sect: (x && x.sect && x.sect.length) ? x.sect.map(_escHtml) : [],

            }
          });

      }

se; return String(v || '').trim(); }).map(([k,v])=>`${k}: ${String(v)}`).join(' | ')}</div></div>`).join('') || '<div style="padding:10px 12px;" class="muted">Keine Treffer mit aktueller Filterung.</div>'}</div></div></div>`;

          const m = String(s || '').trim().match(/^rgba?\(([^)]+)\)$/i);
          if(!m) return null;
          const parts = m[1].split(',').map(x=>String(x || '').trim());
          if(parts.length < 3) return null;
          const r = Math.max(0, Math.min(255, parseFloat(parts[0])));
          const g = Math.max(0, Math.min(255, parseFloat(parts[1])));
          const b = Math.max(0, Math.min(255, parseFloat(parts[2])));
          const a = (parts.length >= 4) ? Math.max(0, Math.min(1, parseFloat(parts[3]))) : 1;
          if(!isFinite(r) || !isFinite(g) || !isFinite(b) || !isFinite(a)) return null;

      function _bgRgbFor(el){

        }
        const el = target && target.el ? target.el : null;
        const pk = el && el.getAttribute ? String(el.getAttribute('data-ib-pickkey') || '').trim() : '';
        const ik = el && el.getAttribute ? String(el.getAttribute('data-ib-instancekey') || '').trim() : '';
        const dataUi = el && el.getAttribute ? String(el.getAttribute('data-ui') || '').trim() : '';
        const id = el && el.getAttribute ? String(el.getAttribute('id') || '').trim() : '';
        const olType = el && el.getAttribute ? String(el.getAttribute('data-cache-oltype') || '').trim() : '';
        return page + '|' + pk + '|' + ik + '|' + dataUi + '|' + id + '|' + olType;
      }catch(e){ return ''; }
    }

    function _encPickVal(s){
      try{ return encodeURIComponent(String(s || '').trim()); }catch(e){ return ''; }
    }

    function _fmtPickV1(page, pk, ik){
      const p = String(page || '').trim() || 'Seite';
      const a = String(pk || '').trim();
      const b = String(ik || '').trim() || a;
      return '<PICK:' + p + '|v=1;pk=' + _encPickVal(a) + ';ik=' + _encPickVal(b) + '>';
    }

    function _multiDisplayFor(target){
      try{
        const page = (window.currentPageLabel ? window.currentPageLabel() : 'Seite');
        if(target && target.kind === 'fallback'){
          const css = String(target.name || '').trim() || 'element';
          return '<' + [page, ('fallback:' + css), ''].join(',') + '>';
        }
        const el = target && target.el ? target.el : null;
        const pk = el && el.getAttribute ? String(el.getAttribute('data-ib-pickkey') || '').trim() : '';
        const ik = el && el.getAttribute ? String(el.getAttribute('data-ib-instancekey') || '').trim() : '';
        const dataUi = el && el.getAttribute ? String(el.getAttribute('data-ui') || '').trim() : '';
        const id = el && el.getAttribute ? String(el.getAttribute('id') || '').trim() : '';
        const olType = el && el.getAttribute ? String(el.getAttribute('data-cache-oltype') || '').trim() : '';
        if(pk) return _fmtPickV1(page, pk, ik);
        const parts = [page, dataUi, id];
        if(olType) parts.push(olType);
        return '<' + parts.join(',') + '>';
      }catch(e){ return ''; }
    }

    function _multiOutlineApply(el){
      try{
        if(!el || !el.setAttribute) return;
        if(el.hasAttribute(MULTI_OUTLINE_ATTR)) return;
        el.setAttribute(MULTI_OUTLINE_ATTR, '1');
        const prev = el.getAttribute('style') || '';
        el.setAttribute('data-ib-multipick-prevstyle', prev);
        const hex = _outlineHexFor(el);
        el.style.outline = '2px solid ' + hex;
        el.style.outlineOffset = '2px';
      }catch(e){}
    }

    function _multiOutlineRemove(el){
      try{
        if(!el || !el.removeAttribute) return;
        if(!el.hasAttribute(MULTI_OUTLINE_ATTR)) return;
        const prev = el.getAttribute('data-ib-multipick-prevstyle') || '';
        el.removeAttribute(MULTI_OUTLINE_ATTR);
        el.removeAttribute('data-ib-multipick-prevstyle');
        el.setAttribute('style', prev);
      }catch(e){}
    }

    function _multiOutlineRemoveAll(){
      try{
        document.querySelectorAll('[' + MULTI_OUTLINE_ATTR + ']').forEach(_multiOutlineRemove);
      }catch(e){}
    }

    function _multiBarEnsure(){
      if(multiBar) return multiBar;
      multiBar = document.createElement('div');
      multiBar.id = 'ib_multipick_bar';
      // Placed below pagecard (sticky topbar). Uses existing CSS vars for spacing.
      multiBar.style.position = 'fixed';
      multiBar.style.left = '12px';
      multiBar.style.right = '12px';
      multiBar.style.top = 'calc(var(--ib-topbar-h, 52px) + var(--ib-pagecard-live-h, 0px) + 4px)';
      // Must be above scrim (99999) and overlay (100000) so chip/button clicks reach it.
      multiBar.style.zIndex = '100002';
      multiBar.style.background = '#1a1a2e';
      multiBar.style.color = '#fff';
      multiBar.style.border = '1px solid #333';
      multiBar.style.borderRadius = '10px';
      multiBar.style.padding = '8px 10px';
      multiBar.style.boxShadow = '0 4px 14px rgba(0,0,0,0.25)';
      multiBar.style.fontSize = '12px';
      multiBar.style.lineHeight = '1.4';
      multiBar.style.display = 'none';
      multiBar.style.pointerEvents = 'auto';
      multiBar.setAttribute('data-ui', 'picker_multi.panel_bar');
      multiBar.setAttribute('title', 'picker_multi.panel_bar');
      document.body.appendChild(multiBar);
      return multiBar;
    }

    function _multiBarRender(){
      _multiBarEnsure();
      const chips = multiItems.map((it, idx)=>{
        const safe = String(it.display || '')
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        return '<span class="ib_mp_chip" data-mp-idx="' + idx + '" style="display:inline-flex;align-items:center;gap:4px;background:#2a2a44;border:1px solid #444;border-radius:14px;padding:2px 8px;margin:2px;cursor:pointer;" title="Klicken zum Entfernen">'
          + '<span>' + safe + '</span>'
          + '<span style="opacity:0.7;">x</span>'
          + '</span>';
      }).join('');
      const count = multiItems.length;
      multiBar.innerHTML =
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
        + '<strong data-ui="picker_multi.lbl_title">Multi-Pick (' + count + ')</strong>'
        + '<div id="ib_mp_chips" style="flex:1 1 auto;min-width:0;">' + (chips || '<em style="opacity:0.6;">Noch kein Element ausgewaehlt</em>') + '</div>'
        + '<button type="button" id="ib_mp_end" class="btn_sm" data-ui="picker_multi.btn_ende" style="width:auto;">Ende</button>'
        + '<button type="button" id="ib_mp_pop" class="btn_sm" data-ui="picker_multi.btn_letztes_loeschen" style="width:auto;">Letztes loeschen</button>'
        + '<button type="button" id="ib_mp_cancel" class="btn_sm" data-ui="picker_multi.btn_abbruch" style="width:auto;">Abbruch</button>'
        + '</div>';
      multiBar.style.display = 'block';

      // Wire chip click to toggle/remove.
      try{
        multiBar.querySelectorAll('.ib_mp_chip').forEach((chip)=>{
          chip.addEventListener('click', (ev)=>{
            try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
            const idx = Number(chip.getAttribute('data-mp-idx'));
            if(!isFinite(idx) || idx < 0 || idx >= multiItems.length) return;
            const removed = multiItems.splice(idx, 1)[0];
            try{ if(removed && removed.el) _multiOutlineRemove(removed.el); }catch(e){}
            _multiBarRender();
          });
        });
      }catch(e){}

      // Wire action buttons.
      try{
        const _b = (id)=>multiBar.querySelector('#' + id);
        const endBtn = _b('ib_mp_end');
        const popBtn = _b('ib_mp_pop');
        const cancelBtn = _b('ib_mp_cancel');
        if(endBtn) endBtn.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){} _multiFinish(); });
        if(popBtn) popBtn.addEventListener('click', (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          if(!multiItems.length) return;
          const removed = multiItems.pop();
          try{ if(removed && removed.el) _multiOutlineRemove(removed.el); }catch(e){}
          _multiBarRender();
        });
        if(cancelBtn) cancelBtn.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){} _multiCancel(); });
      }catch(e){}
    }

    function _multiBarHide(){
      try{ if(multiBar) multiBar.style.display = 'none'; }catch(e){}
    }

    async function _multiFinish(){
      try{
        const text = multiItems.map(it => String(it.display || '')).filter(Boolean).join(';');
        if(!text){
          try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('UI Picker (Multi)', 'Kein Element ausgewaehlt.'); }catch(e){}
        }else{
          const ok = await copyText(text);
          try{
            if(window.InfluxBroPopup && window.InfluxBroPopup.show){
              window.InfluxBroPopup.show('UI Picker (Multi)', ok ? ('Kopiert (' + multiItems.length + ' Elemente): ' + text) : ('Kopieren fehlgeschlagen: ' + text));
            }
          }catch(e){}
        }
      }catch(e){}
      _multiCleanupAndStop();
    }

    function _multiCancel(){
      _multiCleanupAndStop();
    }

    function _multiCleanupAndStop(){
      try{ _multiOutlineRemoveAll(); }catch(e){}
      multiItems = [];
      multiMode = false;
      _multiBarHide();
      stop();
    }

    function _multiAddOrToggle(target){
      if(!target || !target.el) return;
      const key = _multiKeyFor(target);
      if(!key) return;
      const existingIdx = multiItems.findIndex(it => it.key === key);
      if(existingIdx >= 0){
        // Toggle off: remove from list.
        const removed = multiItems.splice(existingIdx, 1)[0];
        try{ if(removed && removed.el) _multiOutlineRemove(removed.el); }catch(e){}
      }else{
        const display = _multiDisplayFor(target);
        if(!display) return;
        multiItems.push({ key, display, el: target.el });
        try{ _multiOutlineApply(target.el); }catch(e){}
      }
      _multiBarRender();
    }

    function stop(){
      active = false;
      currentEl = null;
      currentTargets = [];
      currentTargetIndex = 0;
      lastPointer = { x: null, y: null };
      try{ if($btn) $btn.classList.remove('active'); }catch(e){}
      try{ if($superBtn) $superBtn.classList.remove('active'); }catch(e){}
      try{ if(scrim) scrim.style.display = 'none'; }catch(e){}
      try{ if(overlay) overlay.style.display = 'none'; }catch(e){}
      try{ if(badge) badge.style.display = 'none'; }catch(e){}
      try{ restoreTitles(); }catch(e){}
      document.removeEventListener('mousemove', onMove, true);
      document.removeEventListener('mousedown', onMouseDown, true);
      document.removeEventListener('click', onClick, true);
      document.removeEventListener('wheel', onWheel, true);
      document.removeEventListener('keydown', onKey, true);
    }

    async function start(){
      active = true;
      ensureUi();
      try{ await _loadPickerCfg(); }catch(e){}
      try{ suppressTitles(); }catch(e){}
      try{ if(readSuper()){ if($superBtn) $superBtn.classList.add('active'); if($btn) $btn.classList.remove('active'); } else { if($btn) $btn.classList.add('active'); if($superBtn) $superBtn.classList.remove('active'); } }catch(e){}
      try{ if(scrim) scrim.style.display = 'block'; }catch(e){}
      document.addEventListener('mousemove', onMove, true);
      document.addEventListener('mousedown', onMouseDown, true);
      document.addEventListener('click', onClick, true);
      document.addEventListener('wheel', onWheel, { capture: true, passive: false });
      document.addEventListener('keydown', onKey, true);
    }

    function onMove(ev){
      if(!active) return;
      // Do not track pointer hover over our own multi-pick bar.
      try{ if(ev && ev.target && ev.target.closest && ev.target.closest('#ib_multipick_bar')){ overlay.style.display='none'; badge.style.display='none'; return; } }catch(e){}
      lastPointer = { x: ev.clientX, y: ev.clientY };
      currentTargetIndex = 0;
      renderTarget(pickTarget(ev.target, ev), ev);
    }

    function onWheel(ev){
      try{
        if(!active || !readSuper()) return;
        if(!currentTargets || currentTargets.length <= 1) return;
        ev.preventDefault();
        ev.stopPropagation();
        currentTargetIndex += ev.deltaY > 0 ? 1 : -1;
        if(currentTargetIndex < 0) currentTargetIndex = currentTargets.length - 1;
        if(currentTargetIndex >= currentTargets.length) currentTargetIndex = 0;
        const target = currentTargets[currentTargetIndex] || null;
        if(!target) return;
        renderTarget(target, { clientX: lastPointer.x, clientY: lastPointer.y });
      }catch(e){}
    }

    async function _copyCurrentTarget(target, ev){
      if(!target || !target.el) return;
      try{ ev && ev.preventDefault && ev.preventDefault(); ev && ev.stopPropagation && ev.stopPropagation(); }catch(e){}
      // #348 In multi-pick mode, add/toggle the target and keep picking.
      if(multiMode){
        _multiAddOrToggle(target);
        return;
      }
      const el = target.el;
      const name = String(target.name || '').trim();

      function _suppressedTitleFor(node){
        try{
          for(const pair of (tooltipSuppressed || [])){
            if(pair && pair[0] === node) return String(pair[1] || '').trim();
          }
        }catch(e){}
        return '';
      }

      function _normLine(s){
        return String(s || '').replace(/\s+/g, ' ').trim();
      }

      function _sectionPathForPicker(node){
        try{
          const parts = [];
          let cur = node;
          for(let i=0;i<30;i+=1){
            if(!cur) break;
            const d = cur.closest ? cur.closest('details') : null;
            if(!d) break;
            const sum = d.querySelector('summary');
            const t = _normLine(sum ? sum.textContent : '');
            if(t) parts.unshift(t);
            cur = d.parentElement;
          }
          return parts;
        }catch(e){
          return [];
        }
      }

      function _bestTitle(node){
        try{
          const a = _normLine(node.getAttribute ? (node.getAttribute('aria-label') || '') : '');
          if(a) return a;
          const t = _normLine(node.getAttribute ? (node.getAttribute('title') || '') : '');
          if(t) return t;
          const s = _normLine(_suppressedTitleFor(node));
          if(s) return s;
          const nm = _normLine(node.getAttribute ? (node.getAttribute('name') || '') : '');
          if(nm) return nm;
          const ph = _normLine(node.getAttribute ? (node.getAttribute('placeholder') || '') : '');
          if(ph) return ph;
        }catch(e){}
        return '';
      }

      const page = (window.currentPageLabel ? window.currentPageLabel() : 'Seite');
       const pickkey = _normLine(el.getAttribute ? (el.getAttribute('data-ib-pickkey') || '') : '');
       const instkey = _normLine(el.getAttribute ? (el.getAttribute('data-ib-instancekey') || '') : '');
       const dataUi = _normLine(el.getAttribute ? (el.getAttribute('data-ui') || '') : '');
       const id = _normLine(el.getAttribute ? (el.getAttribute('id') || '') : '');
       const olType = _normLine(el.getAttribute ? (el.getAttribute('data-cache-oltype') || '') : '');

      let text = '';
      if(target && target.kind === 'fallback'){
        // Keep the picker output stable even when we have no data-ui / id.
        // Requested format example: <Dashboard,,,Fallback: btn.ib_cfg_icon>
        let fb = String(target.name || '').trim();
        try{ fb = fb.split('|')[0].trim(); }catch(e){}
        try{ fb = fb.replace(/^button\./, 'btn.'); }catch(e){}
        text = '<' + [page, '', '', ('Fallback: ' + (fb || 'element'))].join(',') + '>';
       }else if(pickkey){
         // Canonical reference for chat/support (v=1: pk + ik)
         text = _fmtPickV1(page, pickkey, instkey || pickkey);
       }else{
         const parts = [page, dataUi, id];
         if(olType) parts.push(olType);
         text = '<' + parts.join(',') + '>';
       }
      const ok = await copyText(text);
      try{
        if(window.InfluxBroPopup && window.InfluxBroPopup.show){
          window.InfluxBroPopup.show('UI Picker', ok ? ('Kopiert: ' + text) : ('Kopieren fehlgeschlagen: ' + text));
        }
      }catch(e){}
      stop();
    }

    function onMouseDown(ev){
      try{
        if(!active) return;
        // Let clicks on the multi-pick bar through to its own handlers.
        if(ev && ev.target && ev.target.closest && ev.target.closest('#ib_multipick_bar')) return;
        const t = pickTarget(ev.target, ev);
        if(!t || !t.el) return;
        _copyCurrentTarget(t, ev).catch(()=>{});
      }catch(e){}
    }

    async function onClick(ev){
      if(!active) return;
      if(ev && ev.target && ev.target.closest && ev.target.closest('#ib_multipick_bar')) return;
      const t = pickTarget(ev.target, ev);
      if(!t || !t.el) return;
      await _copyCurrentTarget(t, ev);
    }

    function onKey(ev){
      try{
        if(ev && ev.key === 'Escape'){
          if(multiMode) _multiCancel();
          else stop();
        }
      }catch(e){}
    }

      $btn.addEventListener('click', (ev)=>{
        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        writeSuper(false);
        applySuperUi();
        // #348 Shift+Click activates extended multi-pick mode.
        const wantMulti = !!(ev && ev.shiftKey);
        if(active){
          if(multiMode){ _multiCancel(); return; }
          stop();
          return;
        }
        multiMode = wantMulti;
        if(multiMode){ multiItems = []; _multiBarRender(); }
        start().catch(()=>{});
      });
      $superBtn.addEventListener('click', (ev)=>{
        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        writeSuper(true);
        applySuperUi();
        const wantMulti = !!(ev && ev.shiftKey);
        if(active){
          if(multiMode){ _multiCancel(); return; }
          stop();
          return;
        }
        multiMode = wantMulti;
        if(multiMode){ multiItems = []; _multiBarRender(); }
        start().catch(()=>{});
      });
      applySuperUi();
    }

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPicker, { once: true });
    else initPicker();
  })();
  </script>
  <script>
  // Keep CSS var --ib-topbar-h in sync with actual topbar height (responsive)
  (function(){
    let _ibTopbarRaf = 0;
    function _measurePagecardHeight(pc){
      try{
        if(!pc) return 0;
        const prevMin = pc.style.minHeight;
        const prevHeight = pc.style.height;
        pc.style.minHeight = 'var(--ib-pagecard-min-h)';
        pc.style.height = 'auto';
        void pc.offsetHeight;
        const ph = Math.ceil(pc.getBoundingClientRect().height || 0);
        pc.style.minHeight = prevMin;
        pc.style.height = prevHeight;
        return ph;
      }catch(e){ return 0; }
    }
    function _updateTopbarHeight(){
      try{
        const el = document.querySelector('.ib_topbar');
        if(!el) return;
        const h = Math.ceil(el.getBoundingClientRect().height);
        document.documentElement.style.setProperty('--ib-topbar-h', String(h) + 'px');
        const pc = document.getElementById('ib_pagecard');
        if(pc){
          const ph = _measurePagecardHeight(pc);
          document.documentElement.style.setProperty('--ib-pagecard-live-h', String(Math.max(0, ph)) + 'px');
        }
        const bb = document.querySelector('.ib_bottombar');
        if(bb){ const bh = Math.ceil(bb.getBoundingClientRect().height); document.documentElement.style.setProperty('--ib-bottombar-h', String(bh) + 'px'); }
      }catch(e){}
    }
    function _scheduleTopbarHeightUpdate(){
      try{
        if(_ibTopbarRaf) cancelAnimationFrame(_ibTopbarRaf);
        _ibTopbarRaf = requestAnimationFrame(()=>{
          _ibTopbarRaf = 0;
          _updateTopbarHeight();
        });
      }catch(e){ _updateTopbarHeight(); }
    }
    try{ window.InfluxBroTopbarLayout = { update: _scheduleTopbarHeightUpdate }; }catch(e){}
    try{ _scheduleTopbarHeightUpdate(); window.addEventListener('resize', _scheduleTopbarHeightUpdate); new MutationObserver(_scheduleTopbarHeightUpdate).observe(document.body, { childList: true, subtree: true, attributes: true }); }catch(e){}
  })();
  </script>

  <span class="lbl">Letzter Fehler:</span>

  <button id="ib_error_last" type="button" data-ui="errors_main.btn_last" title="errors.last" style="width:auto;">Letzter Fehler</button>
  <button id="ib_error_dialog" type="button" data-ui="errors_main.btn_dialog" title="errors.dialog" style="width:auto;">Fehlerdialog</button>

  <button id="ib_error_git" type="button" data-ui="errors_main.btn_git_bugreport" title="errors.git_bugreport" style="width:auto;"><svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="vertical-align:middle; margin-right:6px;"><path d="M9 4h6l1.5 2.5H20l-1.7 3 .7 1.2-1.7 2.8H20l-3 5h-3.5L12 20l-1.5-1.5H7l-3-5h2.7L5 10.7l.7-1.2-1.7-3H7.5L9 4Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="10" r="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 13v3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Git Bugreport</button>
</div>

<script>
  (function(){
  const $bar = document.getElementById('ib_error_bar');
  const $t = document.getElementById('ib_error_time');
  const $m = document.getElementById('ib_error_msg');
  const $influx = document.getElementById('ib_influx_chip');
  const $bLast = document.getElementById('ib_error_last');
  const $bDlg = document.getElementById('ib_error_dialog');
  const $bBug = document.getElementById('ib_error_bugreport');
  const $bLogs5 = document.getElementById('ib_error_logs5');
  const $bJumpLogs = document.getElementById('ib_error_jump_logs');
  const $bGit = document.getElementById('ib_error_git');

  function _fmtTs(iso){
    try{
      if(!iso) return '';
      const d = new Date(String(iso));
      if(!isFinite(d.getTime())) return String(iso);
      return d.toLocaleString();
    }catch(e){
      return String(iso || '');
    }
  }

  function render(){
    try{
      if(!window.InfluxBroErrors || !window.InfluxBroErrors.last) return;
      const e = window.InfluxBroErrors.last();
      if(e){
        if($t) $t.textContent = _fmtTs(e.at || '');
        if($m) $m.textContent = String(e.message || '').replace(/\s+/g,' ').trim();
      }else{
        if($t) $t.textContent = '';
        if($m) $m.textContent = '-';
      }
      if($bar) $bar.style.display = 'flex';
    }catch(e){}
  }

  try{ if($bLast) $bLast.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; try{ window.InfluxBroErrors && window.InfluxBroErrors.showLast && window.InfluxBroErrors.showLast(); }catch(x){}; }); }catch(e){}
  try{ if($bDlg) $bDlg.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; try{ window.InfluxBroErrors && window.InfluxBroErrors.showDialog && window.InfluxBroErrors.showDialog(); }catch(x){}; }); }catch(e){}
  try{ if($bBug) $bBug.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; try{ const e0 = (window.InfluxBroErrors && window.InfluxBroErrors.last) ? window.InfluxBroErrors.last() : null; const msg = e0 && e0.message ? String(e0.message) : 'Manueller Bugreport'; if(window.InfluxBroBugreport && window.InfluxBroBugreport.run) window.InfluxBroBugreport.run(msg); }catch(x){}; }); }catch(e){}
  try{ if($bLogs5) $bLogs5.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; try{ const btn = document.getElementById('influxbro_popup_logs'); if(btn) btn.click(); }catch(x){}; }); }catch(e){}
  try{ if($bJumpLogs) $bJumpLogs.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; try{ const btn = document.getElementById('influxbro_popup_jump_logs'); if(btn) btn.click(); }catch(x){}; }); }catch(e){}

  try{ if($bGit) $bGit.addEventListener('click', (ev)=>{
    try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
    try{
      const e0 = (window.InfluxBroErrors && window.InfluxBroErrors.last) ? window.InfluxBroErrors.last() : null;
      const msg = e0 && e0.message ? String(e0.message) : 'Manueller Bugreport (bitte beschreiben)';
      if(window.InfluxBroBugreport && window.InfluxBroBugreport.run) window.InfluxBroBugreport.run(msg);
      else if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Git Bugreport', 'Bugreport Funktion ist nicht verfuegbar (Tooltips nicht geladen).');
    }catch(e){}
  }); }catch(e){}

  try{ window.addEventListener('influxbro:error', ()=>{ render(); }); }catch(e){}
  setTimeout(()=>{ try{ render(); }catch(e){} }, 0);

  async function pollInflux(){
    if(!$influx) return;
    try{
      const r = await fetch('./api/influx_ping');
      const j = await r.json().catch(()=>null);
      if(!j || !j.ok){
        const msg = (j && j.message) ? String(j.message) : ('HTTP ' + r.status);
        $influx.className = 'chip err';
        $influx.textContent = 'ERR';
        $influx.title = 'Influx Verbindung: Fehler: ' + msg;
        return;
      }
      const c = (j.connected === true) ? true : ((j.connected === false) ? false : null);
      if(c === true){
        $influx.className = 'chip ok';
        $influx.textContent = 'OK';
        $influx.title = 'Influx Verbindung: OK';
      }else if(c === false){
        const msg = String(j.message || 'Fehler');
        $influx.className = 'chip err';
        $influx.textContent = 'ERR';
        $influx.title = 'Influx Verbindung: ' + msg;
      }else{
        const msg = String(j.message || 'unbekannt');
        $influx.className = 'chip unk';
        $influx.textContent = '?';
        $influx.title = 'Influx Verbindung: ' + msg;
      }
    }catch(e){
      try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/influx_ping', {}, e); }catch(x){}
      try{
        $influx.className = 'chip err';
        $influx.textContent = 'ERR';
        $influx.title = 'Influx Verbindung: Failed to fetch';
      }catch(x){}
    }
  }

  try{ setTimeout(()=>{ pollInflux().catch(()=>{}); }, 200); }catch(e){}
  try{ setInterval(()=>{ pollInflux().catch(()=>{}); }, 30000); }catch(e){}

  async function pollInbox(){
    const $btn = document.getElementById('ib_inbox_btn');
    const $bdg = document.getElementById('ib_inbox_badge');
    if(!$btn || !$bdg) return;
    try{
      const r = await fetch('./api/watchlists/inbox_summary');
      const j = await r.json().catch(()=>null);
      if(!j || !j.ok){
        $bdg.style.display = 'none';
        return;
      }
      const s = (j.summary && typeof j.summary === 'object') ? j.summary : {};
      const open = Number(s.open || 0);
      const crit = Number(s.critical || 0);
      const neu = Number(s.new || 0);
      const show = Math.max(open, 0);
      if(show <= 0){
        $bdg.style.display = 'none';
      }else{
        $bdg.textContent = String(show);
        $bdg.classList.remove('ib_badge_warn','ib_badge_info');
        if(crit > 0){}
        else if(neu > 0) $bdg.classList.add('ib_badge_warn');
        else $bdg.classList.add('ib_badge_info');
        $bdg.style.display = 'inline-block';
      }
      $btn.title = `Inbox: open=${open} new=${neu} critical=${crit}`;
    }catch(e){
      try{ $bdg.style.display = 'none'; }catch(x){}
    }
  }

  try{
    const $btn = document.getElementById('ib_inbox_btn');
    if($btn) $btn.addEventListener('click', (ev)=>{
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      try{ window.location.href = './monitor?tab=inbox&focus=1'; }catch(e){}
    });
  }catch(e){}
  try{ setTimeout(()=>{ pollInbox().catch(()=>{}); }, 450); }catch(e){}
  try{ setInterval(()=>{ pollInbox().catch(()=>{}); }, 30000); }catch(e){}
  })();

  // Settings organizer (global button; runs on /config).
  (function(){
    const PENDING_KEY = 'influxbro.settings.organizer.pending.v1';
    function _isConfigPage(){
      try{
        const p = String(window.location && window.location.pathname ? window.location.pathname : '');
        return p.endsWith('/config') || p.endsWith('/config/');
      }catch(e){ return false; }
    }
    function _ensureModal(){
      let root = document.getElementById('ib_settings_organizer_modal');
      if(root) return root;
      root = document.createElement('div');
      root.id = 'ib_settings_organizer_modal';
      root.style.display = 'none';
      root.style.position = 'fixed';

      root.style.background = 'rgba(0,0,0,0.35)';
       root.innerHTML = `
        <div style="max-width:860px;margin:6vh auto;background:#fff;border-radius:12px;padding:16px;box-shadow:0 16px 60px rgba(0,0,0,0.3);" data-ui="settings_organizer.dialog" data-ib-pickkey="settings_organizer.dialog">

      document.body.appendChild(root);
