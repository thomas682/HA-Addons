<header class="ib_topbar" aria-label="Topbar">
  <style>
    :root {
      --ib-topbar-h: 52px;
      --ib-bottombar-h: 38px;
      --ib-section-title-bg: {{ (cfg.get('ui_section_title_bg') or 'transparent') if cfg else 'transparent' }};
      --ib-section-title-fg: {{ (cfg.get('ui_section_title_fg') or 'inherit') if cfg else 'inherit' }};
      --ib-zoom-scale: 1;
      --ui-font-zoomed: var(--ui-font, 14px);
      --ui-font-small-zoomed: var(--ui-font-small, 11px);
    }

    /* Global zoom (font-based) - avoids breaking Plotly click hit-testing */
    body {
      font-size: var(--ui-font-zoomed);
      padding-bottom: calc(var(--ib-bottombar-h) + env(safe-area-inset-bottom, 0px));
    }
    .muted { font-size: var(--ui-font-small-zoomed); }

    /* Bottom error status bar */
    .ib_bottombar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      height: var(--ib-bottombar-h);
      display: none;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-top: 1px solid #eee;
    }
    .ib_bottombar .lbl { font-weight: 800; white-space: nowrap; }
    .ib_bottombar .time { font-variant-numeric: tabular-nums; opacity: 0.85; white-space: nowrap; }
    .ib_bottombar .msg { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ib_bottombar button { height: 28px; padding: 4px 10px; }
    .ib_bottombar .chip {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .ib_bottombar .chip.ok { border-color: #b6e2c0; background: #eefaf1; color: #0a7a28; }
    .ib_bottombar .chip.err { border-color: #f2b0b0; background: #fff0f0; color: #b00020; }
    .ib_bottombar .chip.unk { border-color: #ddd; background: #fafafa; color: rgba(0,0,0,0.72); }
    @media (max-width: 980px){
      :root { --ib-bottombar-h: 46px; }
      .ib_bottombar { flex-wrap: wrap; height: var(--ib-bottombar-h); align-items: flex-start; }
      .ib_bottombar .msg { width: 100%; }
    }
    .ib_topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      height: var(--ib-topbar-h);
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 12px;
      box-sizing: border-box;
    }
    .ib_topbar .left { display:flex; align-items:center; gap: 10px; min-width: 0; }
    .ib_topbar .right { display:flex; align-items:center; gap: 10px; }
    .ib_topbar .brand { font-weight: 900; letter-spacing: 0.2px; }
    .ib_topbar .meta { font-size: 12px; opacity: 0.75; white-space: nowrap; }
    .ib_topbar select { height: 34px; padding: 6px 10px; max-width: 220px; }
    .ib_topbar button { cursor:pointer; padding: 6px 10px; height: 34px; }
    .ib_topbar button.active { background:#0b0b0c; color:#fff; }
    .ib_topbar .zoom {
      display:flex;
      align-items:center;
      gap: 8px;
      padding-left: 10px;
      border-left: 1px solid rgba(0,0,0,0.08);
    }
    .ib_topbar .zoom button { width: 34px; padding: 0; font-weight: 900; }
    .ib_topbar .zoom .pct { font-variant-numeric: tabular-nums; min-width: 56px; text-align:center; }
    @media (max-width: 980px){
      :root { --ib-topbar-h: 64px; }
      .ib_topbar { flex-wrap: wrap; height: var(--ib-topbar-h); align-items: flex-start; }
      .ib_topbar .left { flex-wrap: wrap; }
      .ib_topbar .right { width: 100%; justify-content: space-between; }
      .ib_topbar select { max-width: 180px; }
    }

    /* Shared UI: section info icon next to titles */
    .ib_summary_row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      width: 100%;
      padding: 4px 8px;
      border-radius: 10px;
      background: var(--ib-section-title-bg);
      color: var(--ib-section-title-fg);
      box-sizing: border-box;
    }
    .ib_summary_row * { color: inherit; }
    .ib_info_icon {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.18);
      background: #fff;
      color: #111;
      cursor: pointer;
      font-weight: 900;
      line-height: 20px;
      text-align: center;
      flex: 0 0 auto;
      user-select: none;
    }
    .ib_info_icon:hover { background: #f6f6f6; }
    .ib_info_icon:active { transform: translateY(1px); }

    /* Details marker: always show a left-side arrow (consistent). */
    main.content details > summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    main.content details > summary::-webkit-details-marker { display: none; }
    main.content details > summary::before {
      content: "\25B8"; /* small right-pointing triangle */
      display: inline-block;
      width: 20px;
      font-size: 14px;
      opacity: 0.85;
      transform: rotate(0deg);
      transition: transform 120ms ease;
      text-align: center;
      line-height: 1;
    }
    main.content details[open] > summary::before { transform: rotate(90deg); }
  </style>

  <div class="left" data-ui="topbar.profile" title="topbar.profile">
    <div class="brand">InfluxBro</div>
    <select id="ui_profile_sel" data-ui="nav.profile.select" title="nav.profile.select"></select>
    <button id="ui_profile_apply" type="button" data-ui="nav.profile.apply" title="nav.profile.apply">Anwenden</button>
    <button id="ui_profile_save" type="button" data-ui="nav.profile.save" title="nav.profile.save">Speichern</button>
    <button id="ui_profile_info" type="button" data-ui="nav.profile.info" title="nav.profile.info">Info</button>
    <button id="ui_picker_toggle" type="button" data-ui="nav.ui_picker" title="nav.ui_picker">Picker</button>
    <span class="meta" id="ui_profile_hint">Version: {{ addon_version }}</span>
  </div>

  <div class="right">
    <div class="zoom" data-ui="topbar.zoom" title="topbar.zoom">
      <span class="meta">Zoom</span>
      <button id="ib_zoom_out" type="button" aria-label="Zoom out" data-ui="topbar.zoom.out" title="topbar.zoom.out">-</button>
      <span class="pct" id="ib_zoom_pct" data-ui="topbar.zoom.pct" title="topbar.zoom.pct">100%</span>
      <button id="ib_zoom_in" type="button" aria-label="Zoom in" data-ui="topbar.zoom.in" title="topbar.zoom.in">+</button>
    </div>
  </div>

  <script>
  (function(){
    const LS_ZOOM = 'influxbro_ui_zoom_pct_v1';
    const MIN = 60;
    const MAX = 160;
    const STEP = 5;

    const $out = document.getElementById('ib_zoom_pct');
    const $m = document.getElementById('ib_zoom_out');
    const $p = document.getElementById('ib_zoom_in');

    function clamp(v){
      const n = Math.round(Number(v) || 100);
      if(!isFinite(n)) return 100;
      return Math.max(MIN, Math.min(MAX, n));
    }

    function getZoom(){
      try{ return clamp(localStorage.getItem(LS_ZOOM) || 100); }catch(e){ return 100; }
    }

    function setZoom(pct){
      const z = clamp(pct);
      try{ localStorage.setItem(LS_ZOOM, String(z)); }catch(e){}
      const scale = z / 100;
      try{ document.documentElement.style.setProperty('--ib-zoom-scale', String(scale)); }catch(e){}

      // Compute zoomed font sizes from the configured CSS vars.
      try{
        const cs = getComputedStyle(document.documentElement);
        const uiFont = String(cs.getPropertyValue('--ui-font') || '14px').trim();
        const uiSmall = String(cs.getPropertyValue('--ui-font-small') || '11px').trim();
        const n1 = parseFloat(uiFont.replace('px',''));
        const n2 = parseFloat(uiSmall.replace('px',''));
        const f1 = (isFinite(n1) ? n1 : 14) * scale;
        const f2 = (isFinite(n2) ? n2 : 11) * scale;
        document.documentElement.style.setProperty('--ui-font-zoomed', f1.toFixed(3) + 'px');
        document.documentElement.style.setProperty('--ui-font-small-zoomed', f2.toFixed(3) + 'px');
      }catch(e){}

      try{ if($out) $out.textContent = String(z) + '%'; }catch(e){}

      // Let responsive components (e.g. Plotly) recompute sizes.
      try{ window.dispatchEvent(new Event('resize')); }catch(e){}
    }

    function inc(d){
      const cur = getZoom();
      setZoom(cur + d);
    }

    try{ setZoom(getZoom()); }catch(e){}
    try{ if($m) $m.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; inc(-STEP); }); }catch(e){}
    try{ if($p) $p.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; inc(STEP); }); }catch(e){}
  })();
  </script>
  <script>
  (function(){
    const $btn = document.getElementById('ui_picker_toggle');
    if(!$btn) return;

    let active = false;
    let currentEl = null;
    let overlay = null;
    let badge = null;

    function ensureUi(){
      if(!overlay){
        overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.zIndex = '100000';
        overlay.style.pointerEvents = 'none';
        overlay.style.border = '2px solid #0b0b0c';
        overlay.style.background = 'rgba(11,11,12,0.06)';
        overlay.style.borderRadius = '8px';
        overlay.style.display = 'none';
        document.body.appendChild(overlay);
      }
      if(!badge){
        badge = document.createElement('div');
        badge.style.position = 'fixed';
        badge.style.zIndex = '100001';
        badge.style.pointerEvents = 'none';
        badge.style.padding = '6px 8px';
        badge.style.background = '#0b0b0c';
        badge.style.color = '#fff';
        badge.style.fontSize = '12px';
        badge.style.fontFamily = 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
        badge.style.borderRadius = '8px';
        badge.style.maxWidth = 'min(70vw, 640px)';
        badge.style.wordBreak = 'break-word';
        badge.style.display = 'none';
        document.body.appendChild(badge);
      }
    }

    async function copyText(txt){
      const s = String(txt || '').trim();
      if(!s) return false;
      try{ if(navigator && navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(s); return true; } }catch(e){}
      try{
        const ta = document.createElement('textarea');
        ta.value = s;
        ta.setAttribute('readonly','readonly');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        return true;
      }catch(e){ return false; }
    }

    function pickTarget(el){
      try{
        if(!el || el === document.body || el === document.documentElement) return null;
        const withUi = el.closest && el.closest('[data-ui]');
        return withUi || null;
      }catch(e){ return null; }
    }

    function currentPageLabel(){
      try{
        const active = document.querySelector('.nav_item.active');
        if(active){
          const spans = active.querySelectorAll('span');
          const txt = String((spans && spans.length ? spans[spans.length - 1].textContent : active.textContent) || '').trim();
          if(txt) return txt;
        }
      }catch(e){}
      try{
        const p = String(location && location.pathname ? location.pathname : '').replace(/\/+$/,'');
        const seg = p.split('/').filter(Boolean).pop() || 'Dashboard';
        return seg === '6ce7c04c_influxbro' ? 'Dashboard' : seg;
      }catch(e){}
      return 'Seite';
    }

    function renderTarget(el, ev){
      ensureUi();
      if(!el){
        overlay.style.display = 'none';
        badge.style.display = 'none';
        currentEl = null;
        return;
      }
      currentEl = el;
      const r = el.getBoundingClientRect();
      overlay.style.display = 'block';
      overlay.style.left = Math.max(0, r.left - 2) + 'px';
      overlay.style.top = Math.max(0, r.top - 2) + 'px';
      overlay.style.width = Math.max(0, r.width + 4) + 'px';
      overlay.style.height = Math.max(0, r.height + 4) + 'px';
      const name = String(el.getAttribute('data-ui') || '').trim();
      badge.textContent = name || '(kein data-ui)';
      badge.style.display = 'block';
      const x = ev && typeof ev.clientX === 'number' ? ev.clientX + 12 : (r.left + 12);
      const y = ev && typeof ev.clientY === 'number' ? ev.clientY + 12 : (r.top + 12);
      badge.style.left = Math.max(8, Math.min(window.innerWidth - 260, x)) + 'px';
      badge.style.top = Math.max(8, Math.min(window.innerHeight - 60, y)) + 'px';
    }

    function stop(){
      active = false;
      currentEl = null;
      try{ if($btn) $btn.classList.remove('active'); }catch(e){}
      try{ if(overlay) overlay.style.display = 'none'; }catch(e){}
      try{ if(badge) badge.style.display = 'none'; }catch(e){}
      document.removeEventListener('mousemove', onMove, true);
      document.removeEventListener('click', onClick, true);
      document.removeEventListener('keydown', onKey, true);
    }

    function start(){
      active = true;
      ensureUi();
      try{ if($btn) $btn.classList.add('active'); }catch(e){}
      document.addEventListener('mousemove', onMove, true);
      document.addEventListener('click', onClick, true);
      document.addEventListener('keydown', onKey, true);
    }

    function onMove(ev){
      if(!active) return;
      const t = pickTarget(ev.target);
      renderTarget(t, ev);
    }

    async function onClick(ev){
      if(!active) return;
      const t = pickTarget(ev.target);
      if(!t) return;
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      const name = String(t.getAttribute('data-ui') || '').trim();
      const text = currentPageLabel() + ': ' + name;
      const ok = await copyText(text);
      try{
        if(window.InfluxBroPopup && window.InfluxBroPopup.show){
          window.InfluxBroPopup.show('UI Picker', ok ? ('Kopiert: ' + text) : ('Kopieren fehlgeschlagen: ' + text));
        }
      }catch(e){}
      stop();
    }

    function onKey(ev){
      try{ if(ev && ev.key === 'Escape') stop(); }catch(e){}
    }

    $btn.addEventListener('click', (ev)=>{
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      if(active) stop();
      else start();
    });
  })();
  </script>
  <script>
  // Keep CSS var --ib-topbar-h in sync with actual topbar height (responsive)
  (function(){
    function _updateTopbarHeight(){
      try{
        const el = document.querySelector('.ib_topbar');
        if(!el) return;
        const h = Math.ceil(el.getBoundingClientRect().height);
        document.documentElement.style.setProperty('--ib-topbar-h', String(h) + 'px');
        const bb = document.querySelector('.ib_bottombar');
        if(bb){ const bh = Math.ceil(bb.getBoundingClientRect().height); document.documentElement.style.setProperty('--ib-bottombar-h', String(bh) + 'px'); }
      }catch(e){}
    }
    try{ _updateTopbarHeight(); window.addEventListener('resize', _updateTopbarHeight); new MutationObserver(_updateTopbarHeight).observe(document.body, { childList: true, subtree: true, attributes: true }); }catch(e){}
  })();
  </script>
</header>

<div class="ib_bottombar" id="ib_error_bar" data-ui="errors.statusbar" title="errors.statusbar">
  <span class="lbl">Letzter Fehler:</span>
  <span class="time" id="ib_error_time"></span>
  <span class="msg" id="ib_error_msg"></span>
  <span class="lbl">Influx:</span>
  <span class="chip unk" id="ib_influx_chip" title="Influx Verbindung: unbekannt">?</span>
  <button id="ib_error_last" type="button" data-ui="errors.last" title="errors.last" style="width:auto;">Letzter Fehler</button>
  <button id="ib_error_dialog" type="button" data-ui="errors.dialog" title="errors.dialog" style="width:auto;">Fehlerdialog</button>
  <button id="ib_error_git" type="button" data-ui="errors.git_bugreport" title="errors.git_bugreport" style="width:auto;"><svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="vertical-align:middle; margin-right:6px;"><path d="M9 4h6l1.5 2.5H20l-1.7 3 .7 1.2-1.7 2.8H20l-3 5h-3.5L12 20l-1.5-1.5H7l-3-5h2.7L5 10.7l.7-1.2-1.7-3H7.5L9 4Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="10" r="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 13v3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Git Bugreport</button>
</div>

<script>
(function(){
  const $bar = document.getElementById('ib_error_bar');
  const $t = document.getElementById('ib_error_time');
  const $m = document.getElementById('ib_error_msg');
  const $influx = document.getElementById('ib_influx_chip');
  const $bLast = document.getElementById('ib_error_last');
  const $bDlg = document.getElementById('ib_error_dialog');
  const $bGit = document.getElementById('ib_error_git');

  function _fmtTs(iso){
    try{
      if(!iso) return '';
      const d = new Date(String(iso));
      if(!isFinite(d.getTime())) return String(iso);
      return d.toLocaleString();
    }catch(e){
      return String(iso || '');
    }
  }

  function render(){
    try{
      if(!window.InfluxBroErrors || !window.InfluxBroErrors.last) return;
      const e = window.InfluxBroErrors.last();
      if(e){
        if($t) $t.textContent = _fmtTs(e.at || '');
        if($m) $m.textContent = String(e.message || '').replace(/\s+/g,' ').trim();
      }else{
        if($t) $t.textContent = '';
        if($m) $m.textContent = '-';
      }
      if($bar) $bar.style.display = 'flex';
    }catch(e){}
  }

  try{ if($bLast) $bLast.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; try{ window.InfluxBroErrors && window.InfluxBroErrors.showLast && window.InfluxBroErrors.showLast(); }catch(x){}; }); }catch(e){}
  try{ if($bDlg) $bDlg.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; try{ window.InfluxBroErrors && window.InfluxBroErrors.showDialog && window.InfluxBroErrors.showDialog(); }catch(x){}; }); }catch(e){}

  try{ if($bGit) $bGit.addEventListener('click', (ev)=>{
    try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
    try{
      const e0 = (window.InfluxBroErrors && window.InfluxBroErrors.last) ? window.InfluxBroErrors.last() : null;
      const msg = e0 && e0.message ? String(e0.message) : 'Manueller Bugreport (bitte beschreiben)';
      if(window.InfluxBroBugreport && window.InfluxBroBugreport.run) window.InfluxBroBugreport.run(msg);
      else if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Git Bugreport', 'Bugreport Funktion ist nicht verfuegbar (Tooltips nicht geladen).');
    }catch(e){}
  }); }catch(e){}

  try{ window.addEventListener('influxbro:error', ()=>{ render(); }); }catch(e){}
  setTimeout(()=>{ try{ render(); }catch(e){} }, 0);

  async function pollInflux(){
    if(!$influx) return;
    try{
      const r = await fetch('./api/influx_ping');
      const j = await r.json().catch(()=>null);
      if(!j || !j.ok){
        const msg = (j && j.message) ? String(j.message) : ('HTTP ' + r.status);
        $influx.className = 'chip err';
        $influx.textContent = 'ERR';
        $influx.title = 'Influx Verbindung: Fehler: ' + msg;
        return;
      }
      const c = (j.connected === true) ? true : ((j.connected === false) ? false : null);
      if(c === true){
        $influx.className = 'chip ok';
        $influx.textContent = 'OK';
        $influx.title = 'Influx Verbindung: OK';
      }else if(c === false){
        const msg = String(j.message || 'Fehler');
        $influx.className = 'chip err';
        $influx.textContent = 'ERR';
        $influx.title = 'Influx Verbindung: ' + msg;
      }else{
        const msg = String(j.message || 'unbekannt');
        $influx.className = 'chip unk';
        $influx.textContent = '?';
        $influx.title = 'Influx Verbindung: ' + msg;
      }
    }catch(e){
      try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/influx_ping', {}, e); }catch(x){}
      try{
        $influx.className = 'chip err';
        $influx.textContent = 'ERR';
        $influx.title = 'Influx Verbindung: Failed to fetch';
      }catch(x){}
    }
  }

  try{ setTimeout(()=>{ pollInflux().catch(()=>{}); }, 200); }catch(e){}
  try{ setInterval(()=>{ pollInflux().catch(()=>{}); }, 30000); }catch(e){}
})();
</script>
