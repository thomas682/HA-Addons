    function _helpText(kind){
      if(kind === 'move_param'){
        return 'a) Diese Funktion erlaubt es Einstellungen auf der Seite Einstellungen in einen anderen Bereich zu verschieben.\n\nAblauf:\n- Danach wird eine S-Picker Funktion aktiviert.\n- Zuerst den Wert anklicken, den man verschieben will.\n- Danach ein Hauptpunkt oder ein Unterpunkt anklicken.\n- Anschliessend kommt eine Bestaetigung, ob der Wert aus dem Quellbereich in den Zielbereich verschoben werden soll.\n\nEs wird immer die gesamte Parameterzeile verschoben (Text links + Erlaeuterung + Werte rechts).';
      }
      if(kind === 'move_group'){
        return 'b) Verschieben von Hauptpunkten ordnet die Hauptpunkte in den Einstellungen neu.\n\nAblauf:\n- Zuerst den zu verschiebenden Hauptpunkt anklicken.\n- Danach den Ziel-Hauptpunkt anklicken.\n- Position eingeben: "vor" oder "nach".';
      }
      if(kind === 'rename_group'){
        return 'c) Umbenennen von Hauptpunkten aendert nur den sichtbaren Titel (interne IDs bleiben stabil).\n\nAblauf:\n- Hauptpunkt anklicken\n- Neuen Titel eingeben';
      }
      if(kind === 'create_group'){
        return 'e) Erzeuge Hauptpunkt erzeugt einen neuen Hauptpunkt in den Einstellungen.\nDu kannst angeben, an welcher Stelle er eingefuegt werden soll.';
      }
      if(kind === 'delete_group'){
        return 'd) Loeschen loescht einen ausgewaehlten Hauptpunkt.\nRegel: nur wirklich leer (keine Parameterzeilen, keine Unterpunkte).\nSystempunkte sind gesperrt und koennen nicht geloescht werden.';
      }
      if(kind === 'create_subgroup'){
        return 'i) Erzeuge Unterpunkt erzeugt einen neuen Unterpunkt.\nDu waehlst den Hauptpunkt und die Position darin.';
      }
      if(kind === 'move_subgroup'){
        return 'f) Verschieben von Unterpunkten ordnet Unterpunkte innerhalb eines Hauptpunkts neu (optional auch in einen anderen Hauptpunkt).\n\nAblauf:\n- Zuerst den zu verschiebenden Unterpunkt anklicken (nur direkte Unterpunkte).\n- Danach Ziel-Hauptpunkt oder Ziel-Unterpunkt anklicken.\n- Position eingeben: "vor" oder "nach".';
      }
      if(kind === 'rename_subgroup'){
        return 'g) Umbenennen von Unterpunkten aendert nur den sichtbaren Titel (interne IDs bleiben stabil).\n\nAblauf:\n- Unterpunkt anklicken (nur direkte Unterpunkte)\n- Neuen Titel eingeben';
      }
      if(kind === 'delete_subgroup'){
        return 'h) Loeschen loescht einen ausgewaehlten Unterpunkt.\nRegel: nur leer (keine Parameterzeilen).\nSystem-/Unterstrukturpunkte sind gesperrt.';
      }
      return '';
    }
    function _showErr(root, msg){
      try{
        const el = root.querySelector('#ib_settings_organizer_err');
        if(!el) return;
        const s = String(msg || '').trim();
        el.textContent = s;
        el.style.display = s ? 'block' : 'none';
      }catch(e){}
    }
    function open(){
      const root = _ensureModal();
      _showErr(root, '');
      try{ root.style.display = 'block'; }catch(e){}
      const sel = root.querySelector('#ib_settings_organizer_action');
      const help = root.querySelector('#ib_settings_organizer_help');
      if(help) help.textContent = _helpText(sel ? String(sel.value||'') : 'move_param');
    }
    function close(){
      const root = document.getElementById('ib_settings_organizer_modal');
      if(root) root.style.display = 'none';
    }
    function _startAction(kind){
      const root = _ensureModal();
      _showErr(root, '');
      const action = String(kind || '');
      try{ sessionStorage.setItem(PENDING_KEY, JSON.stringify({ action: action, at: Date.now() })); }catch(e){}
      if(!_isConfigPage()){
        try{ window.location.href = './config#settings_organizer'; }catch(e){}
        return;
      }
      try{
        if(window.InfluxBroSettingsOrganizer && window.InfluxBroSettingsOrganizer.start){
          window.InfluxBroSettingsOrganizer.start(action);
          close();
          return;
        }
      }catch(e){}
      _showErr(root, 'Einstellungen Organizer ist auf dieser Seite nicht verfuegbar.');
    }
    function _undo(){
      const root = _ensureModal();
      _showErr(root, '');
      try{ sessionStorage.setItem(PENDING_KEY, JSON.stringify({ action: 'undo', at: Date.now() })); }catch(e){}
      if(!_isConfigPage()){
        try{ window.location.href = './config#settings_organizer'; }catch(e){}
        return;
      }
      try{
        if(window.InfluxBroSettingsOrganizer && window.InfluxBroSettingsOrganizer.undo){
          window.InfluxBroSettingsOrganizer.undo();
          close();
          return;
        }
      }catch(e){}
      _showErr(root, 'Undo ist auf dieser Seite nicht verfuegbar.');
    }

    try{
      const btn = document.getElementById('ib_settings_move');
      if(btn) btn.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; open(); });
    }catch(e){}

    try{
      const root = _ensureModal();
      const closeBtn = root.querySelector('#ib_settings_organizer_close');
      if(closeBtn) closeBtn.addEventListener('click', ()=>close());
      const sel = root.querySelector('#ib_settings_organizer_action');
      const help = root.querySelector('#ib_settings_organizer_help');
      if(sel && help) sel.addEventListener('change', ()=>{ try{ help.textContent = _helpText(String(sel.value||'')); }catch(e){}; });
      const startBtn = root.querySelector('#ib_settings_organizer_start');
      if(startBtn && sel) startBtn.addEventListener('click', ()=>_startAction(String(sel.value||'')));
      const undoBtn = root.querySelector('#ib_settings_organizer_undo');
      if(undoBtn) undoBtn.addEventListener('click', ()=>_undo());
    }catch(e){}
  })();
</script>

<script>
  window.InfluxBroNormalizeSummaryActions = function(){
    try{
      document.querySelectorAll('main.content details > summary').forEach((summary)=>{
        const row = summary.querySelector('.ib_summary_row');
        if(!row) return;
        let actions = row.querySelector(':scope > .ib_summary_actions');
        if(!actions){
          actions = document.createElement('div');
          actions.className = 'ib_summary_actions';
          row.appendChild(actions);
        }
        row.querySelectorAll('.ib_info_icon, .ib_cfg_icon, .ib_cfg_back_icon').forEach((btn)=>{
          actions.appendChild(btn);
        });
        const emptyGroup = row.querySelector('.ib_btn_group');
        if(emptyGroup && !emptyGroup.children.length) emptyGroup.remove();
      });
    }catch(e){}
  };

  window.InfluxBroMoveSectionHeaderActionsToBody = function(){
    try{
      document.querySelectorAll('main.content details > summary').forEach((summary)=>{
        const details = summary && summary.parentElement ? summary.parentElement : null;
        if(!details) return;
        const row = summary.querySelector('.ib_summary_row');
        if(!row) return;

        // Info button can live in the section summary row.
        const infoBtn = row.querySelector('.ib_info_icon');
        const cfgBtn = row.querySelector('.ib_cfg_icon');
        const did = String(details.id || '').trim();
        const infoSourceBtn = infoBtn;
        if(!infoSourceBtn && !cfgBtn) return;

        const body = details.querySelector(':scope > summary + *');
        if(!body) return;
        if(details.querySelector(':scope > .ib_section_desc_row')) return;

        const descRow = document.createElement('div');
        descRow.className = 'ib_section_desc_row';
        const desc = document.createElement('div');
        desc.className = 'ib_section_desc';

        let full = '';
        try{
          if(infoSourceBtn){
            const raw = String(infoSourceBtn.getAttribute('data-info-body') || '').trim();
            full = raw.split(/\r?\n/).map(x=>String(x||'').trim()).filter(Boolean)[0] || String(infoSourceBtn.getAttribute('data-info-title') || '').trim();
          }
        }catch(e){ full = ''; }
        let short = String(full || '').trim();
        if(short.length > 180) short = short.slice(0, 177) + '...';
        desc.textContent = short;
        if(full) desc.title = full;

        const actions = document.createElement('div');
        actions.className = 'ib_section_desc_actions';
        try{ if(cfgBtn) actions.appendChild(cfgBtn); }catch(e){}
        // Keep the info button where it is; do not move it into the desc row.
        try{
          if(infoBtn) actions.appendChild(infoBtn);
        }catch(e){}

        descRow.appendChild(desc);
        if(actions.children && actions.children.length) descRow.appendChild(actions);

        // Put the desc row directly under the summary so it spans the same full width.
        try{ details.insertBefore(descRow, body); }catch(e){ try{ body.insertBefore(descRow, body.firstChild); }catch(x){ try{ body.appendChild(descRow); }catch(y){} } }

        try{
          const sActions = row.querySelector(':scope > .ib_summary_actions');
          if(sActions && !sActions.children.length) sActions.remove();
        }catch(e){}
      });
    }catch(e){}
  };

  document.addEventListener('DOMContentLoaded', ()=>{
    try{
      if(!(window.location && window.location.pathname && window.location.pathname.includes('config'))){
        document.querySelectorAll('summary .ib_summary_row .ib_info_icon').forEach((infoBtn)=>{
          const row = infoBtn.parentElement;
          if(!row) return;
          if(row.querySelector('.ib_cfg_icon')) return;
          const cfgBtn = document.createElement('button');
          cfgBtn.type = 'button';
          cfgBtn.className = 'ib_cfg_icon';
          cfgBtn.title = 'Zu Einstellungen';
          cfgBtn.setAttribute('aria-label', 'Zu Einstellungen');
          cfgBtn.innerHTML = '<svg fill="#000000" height="14" width="14" viewBox="0 0 24 24"><path d="M4,24c-1.1,0-2.1-0.4-2.8-1.2C0.5,22.1,0,21,0,20s0.4-2.1,1.2-2.8l8-8C9.1,8.7,9,8.1,9,7.5C9,3.4,12.4,0,16.5,0 c0.9,0,1.8,0.2,2.6,0.5L20.6,1L16,5.6L18.4,8L23,3.4l0.6,1.4C23.8,5.7,24,6.6,24,7.5c0,4.1-3.4,7.5-7.5,7.5 c-0.6,0-1.1-0.1-1.7-0.2l-8,8C6.1,23.6,5.1,24,4,24z M16.5,2c-3,0-5.5,2.5-5.5,5.5c0,0.6,0.1,1.1,0.3,1.7l0.2,0.6l-8.9,8.9 C2.2,19,2,19.5,2,20s0.2,1,0.6,1.4c0.7,0.8,2.1,0.8,2.8,0l8.9-8.9l0.6,0.2c0.5,0.2,1.1,0.3,1.7,0.3c3,0,5.5-2.5,5.5-5.5 c0-0.1,0-0.2,0-0.3l-3.6,3.6l-5.2-5.2L16.9,2C16.7,2,16.6,2,16.5,2z"></path></svg>';
          // Use capture so this still works even if other click handlers stopImmediatePropagation.
          cfgBtn.addEventListener('click', (ev)=>{
            try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
            try{
              const d = cfgBtn.closest('details');
              const did = d ? String(d.id || '').trim() : '';
              const jumps = {
                selection_details: { path: './config', selector: '#ui_sel_width_px', label: 'Dashboard: Messwertauswahl' },
                caching_section: { path: './config', selector: '#ui_analysis_cache_hidden_color', label: 'Dashboard: Caching' },
                analysis_section: { path: './config', selector: '#ui_analysis_max_age_years', label: 'Dashboard: Analyse' },
                outlier_section: { path: './config', selector: '#ui_raw_outlier_display_limit_per_type', label: 'Dashboard: Ausreißer' },
                raw_section: { path: './config', selector: '#ui_raw_max_points', label: 'Dashboard: Raw Daten' },
              };
              const j = jumps[did] || { path: './config', selector: '#ui_page_dashboard', label: 'Dashboard Settings' };
              try{
                localStorage.setItem('influxbro.nav.helper.pending.v1', JSON.stringify({
                  path: String(j.path || './config'),

                  ui: 'settings' + String(j.selector || ''),
                  page: 'Einstellungen',
                  label: String(j.label || 'Einstellungen'),
                }));
              }catch(e){}
              location.href = String(j.path || './config');
            }catch(e){
              try{ location.href = './config'; }catch(x){}
            }
          }, true);
          try{ row.insertBefore(cfgBtn, infoBtn); }catch(e){ row.appendChild(cfgBtn); }
        });
      }
      if(window.InfluxBroNormalizeSummaryActions) window.InfluxBroNormalizeSummaryActions();
      if(window.InfluxBroMoveSectionHeaderActionsToBody) window.InfluxBroMoveSectionHeaderActionsToBody();

<script>
  // Prevent buttons/links inside section summaries from toggling the details element.
  try{
    // IMPORTANT: do NOT use capture here, otherwise summary-interactions stop working
    // (event won't reach the target button). Bubble-phase preventDefault is enough.
    document.addEventListener('click', (ev)=>{
      try{
        const t = ev && ev.target && ev.target.closest ? ev.target.closest('summary button, summary a, summary input, summary select, summary textarea, summary label') : null;
        if(!t) return;
        ev.preventDefault();
      }catch(e){}
    });
  }catch(e){}

// Report page view on load.
// IMPORTANT: Set CSRF-relevant headers explicitly here. _topbar.html is included
// before _nav.html, so the global fetch monkey-patch from _nav.html that normally
// injects X-InfluxBro-Request is NOT yet active when this inline script runs.
// We also add X-Requested-With for defense-in-depth against proxies that may
// strip non-standard headers under HA Ingress.
try{
  const _pvPage = (window.currentPageLabel ? window.currentPageLabel() : '') || (window.location && window.location.pathname ? String(window.location.pathname).split('/').filter(Boolean).pop() : '');
  fetch('./api/page_view', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-InfluxBro-Request': '1',
      'X-Requested-With': 'InfluxBro',
    },
    body: JSON.stringify({page: _pvPage}),
    credentials: 'same-origin',
  }).catch((err)=>{
    // Report client-side failure to backend log per AGENTS.md Support & Logging rule.
    try{
      fetch('./api/client_log', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-InfluxBro-Request': '1',
          'X-Requested-With': 'InfluxBro',
        },
        body: JSON.stringify({level: 'warning', source: 'page_view', message: String(err && err.message || err)}),
        credentials: 'same-origin',
      }).catch(()=>{});
    }catch(e){}
  });
}catch(e){}

// Global action reporter for UI interactions
try{
  let _ACTION_THROTTLE = null;
  function _reportAction(type, id, value){
    if(!id) return;
    if(_ACTION_THROTTLE) clearTimeout(_ACTION_THROTTLE);
    _ACTION_THROTTLE = setTimeout(()=>{
      const page = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      // Explicit CSRF headers: _topbar.html inline code may run before _nav.html monkey-patch is active.
      fetch('./api/ui_event', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-InfluxBro-Request': '1',
          'X-Requested-With': 'InfluxBro',
        },
        body: JSON.stringify({type: type, ui: id, text: String(value || ''), page: page}),
        credentials: 'same-origin',
      }).catch(()=>{});
    }, 300);
  }

  document.addEventListener('click', (ev)=>{
    const btn = ev.target.closest('button');
    if(btn && btn.id && !btn.classList.contains('ib_info_icon') && !btn.classList.contains('ib_cfg_icon')){
      _reportAction('click', btn.dataset.ui || btn.id, btn.textContent.trim());
    }
  }, true);

  document.addEventListener('change', (ev)=>{
    const sel = ev.target.closest('select');
    if(sel && sel.id){
      _reportAction('select_change', sel.dataset.ui || sel.id, sel.value);
    }
    const chk = ev.target.closest('input[type="checkbox"]');
    if(chk && chk.id){
      _reportAction('checkbox_change', chk.dataset.ui || chk.id, chk.checked ? 'on' : 'off');
    }
  }, true);
}catch(e){}

// Global console error reporter - sends all browser errors to server log
try{
  function _pendingNavContext(){
    try{
      if(window.__InfluxBroNavContext && typeof window.__InfluxBroNavContext === 'object') return window.__InfluxBroNavContext;
    }catch(e){}
    try{
      const raw = sessionStorage.getItem('influxbro_nav_context_v1');
      const parsed = raw ? JSON.parse(raw) : null;
      return parsed && typeof parsed === 'object' ? parsed : null;
    }catch(e){
      return null;
    }
  }

  function _reportConsoleError(type, message, filename, lineno, stack){
    try{
      const pendingNav = _pendingNavContext();
      fetch('./api/client_error', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        keepalive: true,
        body: JSON.stringify({
          message: message || '',
          extra: {
            kind: 'console_error',
            type: type,
            filename: filename || '',
            lineno: lineno || 0,
            stack: (stack || '').substring(0, 4000),
            url: window.location.href.substring(0, 500),
            ts: new Date().toISOString(),
            pending_nav: pendingNav,
          }
        })
      }).catch(()=>{});
    }catch(e){}
  }

  window.addEventListener('error', (e)=>{
    _reportConsoleError('error', e.message, e.filename, e.lineno, e.error && e.error.stack);
  });

  window.addEventListener('unhandledrejection', (e)=>{
    const reason = e ? e.reason : null;
    const msg = String(reason && reason.message ? reason.message : reason || '');
    // Home Assistant / Ingress vendor noise on navigation (not actionable for users).
    if(msg.includes('No Listener: tabs:outgoing.message.ready')){
      try{ if(e && e.preventDefault) e.preventDefault(); }catch(x){}
    }
    _reportConsoleError('unhandledrejection', msg, '', 0, reason && reason.stack ? reason.stack : '');
  });
}catch(e){}
</script>
