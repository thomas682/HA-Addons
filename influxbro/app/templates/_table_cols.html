<style>
/* Shared table standard helpers (opt-in via .ib_tbl) */
table.ib_tbl th, table.ib_tbl td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
table.ib_tbl.ib_wrap th, table.ib_tbl.ib_wrap td { white-space: normal; overflow: visible; text-overflow: clip; overflow-wrap: anywhere; }

/* Shared table fonts (3 groups: title/head/cell) */
.table_title { font-size: var(--ib-font-tbl-title, 12px); font-weight: 800; }
table.ib_tbl thead th { font-size: var(--ib-font-tbl-head, 11px); }
table.ib_tbl tbody td { font-size: var(--ib-font-tbl-cell, 10px); }

/* Sticky header (applies when table scrolls inside a box) */
table.ib_tbl thead th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--ib-table-head-bg, #f6f6f6);
  color: var(--ib-table-head-fg, inherit);
}

/* Sort indicators (generic + aria-sort) */
table.ib_tbl thead th[aria-sort="ascending"]::after { content: " \25B2"; opacity: 0.65; font-size: var(--ib-font-tbl-head, 11px); }
table.ib_tbl thead th[aria-sort="descending"]::after { content: " \25BC"; opacity: 0.65; font-size: var(--ib-font-tbl-head, 11px); }
table.ib_tbl thead th[data-ib-sort="asc"]::after { content: " \25B2"; opacity: 0.65; font-size: var(--ib-font-tbl-head, 11px); }
table.ib_tbl thead th[data-ib-sort="desc"]::after { content: " \25BC"; opacity: 0.65; font-size: var(--ib-font-tbl-head, 11px); }

/* Filter row inside thead */
thead tr.ib_filter_row th { background: #fcfcfc; position: sticky; top: 0; z-index: 2; }
thead tr.ib_filter_row input, thead tr.ib_filter_row select { width: 100%; height: calc(26px * var(--ib-zoom-scale, 1)); padding: calc(2px * var(--ib-zoom-scale, 1)) calc(6px * var(--ib-zoom-scale, 1)); box-sizing: border-box; font-size: var(--ib-font-tbl-cell, 10px); }
</style>

<script>
// Shared helper for resizable table columns + auto-fit/window-fit widths.
// Uses localStorage per table id + page path.
(function(){
  if(window.InfluxBroTableCols) return;

  function _norm(s){
    return String(s || '').trim();
  }

  function _zoomScale(){
    try{
      const raw = getComputedStyle(document.documentElement).getPropertyValue('--ib-zoom-scale').trim();
      const n = Number(raw || '1');
      return (isFinite(n) && n > 0.1 && n < 6) ? n : 1;
    }catch(e){
      return 1;
    }
  }

  function _pageKey(){
    try{
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      const clean = p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '');
      return clean.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'root';
    }catch(e){
      return 'root';
    }
  }

  function _lsKeyV2(tableId){
    const id = _norm(tableId || '');
    return id ? (`influxbro.cols.v2.${_pageKey()}.${id}`) : `influxbro.cols.v2.${_pageKey()}.unknown`;
  }

  function _lsKeyV1(tableId){
    const id = _norm(tableId || '');
    return id ? (`influxbro.cols.${id}`) : 'influxbro.cols.unknown';
  }

  function _colKey(th, idx){
    const k = _norm(th && th.getAttribute ? th.getAttribute('data-key') : '');
    return k ? k : String(idx);
  }

  function _getTable(table){
    if(!table) return null;
    if(typeof table === 'string') return document.querySelector(table);
    return table;
  }

  function _getTableId(tbl){
    if(!tbl) return '';
    const id = _norm(tbl.getAttribute('id'));
    return id || '';
  }

  function _readWidths(tbl){
    try{
      const id = _getTableId(tbl);
      if(!id) return null;
      // Prefer v2 (page-scoped). Fallback to v1 (legacy) for migration.
      const raw2 = localStorage.getItem(_lsKeyV2(id));
      if(raw2){
        const j2 = JSON.parse(raw2);
        if(j2 && typeof j2 === 'object') return j2;
      }
      const raw1 = localStorage.getItem(_lsKeyV1(id));
      if(!raw1) return null;
      const j1 = JSON.parse(raw1);
      return (j1 && typeof j1 === 'object') ? j1 : null;
    }catch(e){
      return null;
    }
  }

  function _writeWidths(tbl){
    try{
      const id = _getTableId(tbl);
      if(!id) return;
      const sc = _zoomScale();
      const out = {};
      const ths = Array.from(tbl.querySelectorAll('thead th'));
      ths.forEach((th, idx)=>{
        const k = _colKey(th, idx);
        const w = Math.round((th.getBoundingClientRect().width || 0) / Math.max(0.1, sc));
        out[k] = w;
      });
      localStorage.setItem(_lsKeyV2(id), JSON.stringify(out));
    }catch(e){}
  }

  function applySavedWidths(tbl){
    try{
      const saved = _readWidths(tbl);
      if(!saved) return;
      const sc = _zoomScale();
      const ths = Array.from(tbl.querySelectorAll('thead th'));
      ths.forEach((th, idx)=>{
        const k = _colKey(th, idx);
        const w = Number(saved[k]);
        if(isFinite(w) && w >= 40 && w <= 1600) th.style.width = Math.round(w * sc) + 'px';
      });
    }catch(e){}
  }

  function _ensureResizer(th, nextTh, onDone){
    // Resize model: dragging a handle changes only the two adjacent columns
    // (left = current th, right = next th). The outer edges stay fixed.
    if(!th || !nextTh || th.querySelector('.col_resizer')) return;
    const rz = document.createElement('div');
    rz.className = 'col_resizer';
    rz.style.position = 'absolute';
    rz.style.right = '0';
    rz.style.top = '0';
    rz.style.width = '10px';
    rz.style.height = '100%';
    rz.style.cursor = 'col-resize';
    rz.style.userSelect = 'none';
    rz.style.opacity = '0.32';
    rz.style.background = 'linear-gradient(90deg, rgba(0,0,0,0), rgba(0,0,0,0.10))';

    let startX = 0;
    let startWL = 0;
    let startWR = 0;
    let dragging = false;

    function onMove(ev){
      if(!dragging) return;
      const x = ev && ev.clientX ? ev.clientX : 0;
      const dx = x - startX;
      const minW = 40;
      const maxW = 1600;
      const sum = startWL + startWR;
      let wl = startWL + dx;
      let wr = sum - wl;
      if(wl < minW){ wl = minW; wr = sum - wl; }
      if(wr < minW){ wr = minW; wl = sum - wr; }
      if(wl > maxW){ wl = maxW; wr = sum - wl; }
      if(wr > maxW){ wr = maxW; wl = sum - wr; }
      if(wl < minW || wr < minW) return;
      th.style.width = Math.round(wl) + 'px';
      nextTh.style.width = Math.round(wr) + 'px';
    }
    function onUp(){
      if(!dragging) return;
      dragging = false;
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      try{ onDone && onDone(); }catch(e){}
    }
    rz.addEventListener('mousedown', (ev)=>{
      ev.preventDefault();
      ev.stopPropagation();
      dragging = true;
      startX = ev.clientX;
      startWL = th.getBoundingClientRect().width;
      startWR = nextTh.getBoundingClientRect().width;
      document.body.style.userSelect = 'none';
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    // Prevent table-sort click handlers on the parent <th>.
    rz.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; });
    rz.addEventListener('dblclick', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; });

    th.style.position = 'relative';
    th.appendChild(rz);
  }

  function init(table){
    const tbl = _getTable(table);
    if(!tbl) return;
    // Needs an id for persistence.
    if(!_getTableId(tbl)) return;

    try{
      // Reasonable defaults for list tables.
      tbl.style.tableLayout = tbl.style.tableLayout || 'fixed';
    }catch(e){}

    applySavedWidths(tbl);
    const ths = Array.from(tbl.querySelectorAll('thead th'));
    ths.forEach((th, idx)=>{
      const nxt = ths[idx + 1];
      if(!nxt) return;
      _ensureResizer(th, nxt, ()=>_writeWidths(tbl));
    });
  }

  function windowFit(table, opts){
    const tbl = _getTable(table);
    if(!tbl) return;
    try{
      const ths = Array.from(tbl.querySelectorAll('thead th'));
      if(!ths.length) return;

      // Step 1: start from a content-fit baseline (full cell content visible).
      try{
        const maxRows = (opts && isFinite(Number(opts.autoFitMaxRows))) ? Math.max(0, Math.trunc(Number(opts.autoFitMaxRows))) : 200;
        const pad0 = (opts && isFinite(Number(opts.autoFitPad))) ? Math.max(0, Math.trunc(Number(opts.autoFitPad))) : 24;
        autoFit(tbl, {maxRows: maxRows, pad: pad0});
      }catch(e){}

      // Step 2: compute target width of the visible area (no horizontal scrollbar).
      const box = tbl.closest('.table_box') || tbl.parentElement;
      const maxW = box ? Math.round(box.getBoundingClientRect().width) : Math.round(tbl.getBoundingClientRect().width);
      if(!isFinite(maxW) || maxW <= 0) return;
      const target = Math.max(0, maxW - 4);

      // Step 3: shrink columns proportionally until we fit the target width.
      const minW = (opts && isFinite(Number(opts.minW))) ? Math.max(40, Math.trunc(Number(opts.minW))) : 60;
      const pad = (opts && isFinite(Number(opts.pad))) ? Math.max(0, Math.trunc(Number(opts.pad))) : 2;

      const cur = ths.map(th => Math.round(th.getBoundingClientRect().width || 0)).map(w => (isFinite(w) && w > 0) ? w : minW);
      const sum0 = cur.reduce((a,b)=>a+(isFinite(b)?b:0), 0) || (minW * ths.length);
      if(sum0 <= 0) return;

      // Start with a simple scale factor.
      let w = cur.map(x => Math.max(minW, Math.round((x / sum0) * target)));

      // If we still exceed target due to minW clamping, reduce again in a few passes.
      for(let pass=0; pass<6; pass++){
        const sum = w.reduce((a,b)=>a+b, 0);
        if(sum <= target) break;
        const reducible = w.reduce((a,wi)=>a+Math.max(0, wi - minW), 0);
        if(reducible <= 0) break;
        const need = sum - target;
        let reduced = 0;
        w = w.map((wi)=>{
          const can = Math.max(0, wi - minW);
          if(can <= 0) return wi;
          const take = Math.min(can, Math.round(need * (can / reducible)));
          reduced += take;
          return wi - take;
        });
        // If rounding made no progress, force 1px reductions.
        if(reduced <= 0){
          for(let i=0; i<w.length; i++){
            if(w[i] > minW){
              w[i] -= 1;
              reduced += 1;
              if((w.reduce((a,b)=>a+b,0)) <= target) break;
            }
          }
        }
      }

      ths.forEach((th, i)=>{
        let wi = w[i] || minW;
        if(wi < minW) wi = minW;
        if(wi > 1600) wi = 1600;
        th.style.width = (wi + pad) + 'px';
      });
      _writeWidths(tbl);
    }catch(e){}
  }

  function autoFit(table, opts){
    const tbl = _getTable(table);
    if(!tbl) return;
    const maxRows = (opts && isFinite(Number(opts.maxRows))) ? Math.max(0, Math.trunc(Number(opts.maxRows))) : 120;
    const pad = (opts && isFinite(Number(opts.pad))) ? Math.max(0, Math.trunc(Number(opts.pad))) : 24;

    const ths = Array.from(tbl.querySelectorAll('thead th'));
    const tbody = tbl.querySelector('tbody');
    const rows = tbody ? Array.from(tbody.querySelectorAll('tr')) : [];
    const sample = rows.slice(0, maxRows);

    // Temporarily ensure nowrap so scrollWidth reflects full content.
    const prev = [];
    try{
      sample.forEach(tr=>{
        Array.from(tr.children || []).forEach(td=>{
          prev.push([td, td.style.whiteSpace]);
          td.style.whiteSpace = 'nowrap';
        });
      });
    }catch(e){}

    try{
      ths.forEach((th, colIdx)=>{
        let w = th.scrollWidth || th.getBoundingClientRect().width;
        sample.forEach(tr=>{
          const td = tr.children && tr.children[colIdx] ? tr.children[colIdx] : null;
          if(!td) return;
          const sw = td.scrollWidth || td.getBoundingClientRect().width;
          if(sw > w) w = sw;
        });
        w = Math.round(w + pad);
        if(w < 40) w = 40;
        if(w > 1600) w = 1600;
        th.style.width = w + 'px';
      });
      _writeWidths(tbl);
    }catch(e){}

    try{
      prev.forEach(([td, ws])=>{ td.style.whiteSpace = ws || ''; });
    }catch(e){}
  }

  function refreshScale(){
    // Re-apply saved base widths with the current zoom scale.
    try{
      document.querySelectorAll('table').forEach((tbl)=>{
        try{ if(_getTableId(tbl)) applySavedWidths(tbl); }catch(e){}
      });
    }catch(e){}
  }

  window.InfluxBroTableCols = {
    init,
    autoFit,
    windowFit,
    applySavedWidths,
    refreshScale,
  };
})();
</script>

<script>
// Shared helper: dynamic table action bar + status line.
// Goal: keep table-specific buttons inside the .tbl_actions directly above the table.
(function(){
  if(window.InfluxBroTableToolbar) return;

  function _norm(s){ return String(s || '').trim(); }

  function _stablePath(){
    try{
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      return p.replace(/\?.*$/, '').trim() || '';
    }catch(e){
      return '';
    }
  }

  function _specFor(tid){
    try{
      const root = window.InfluxBroTableToolbarSpec;
      if(root && typeof root === 'object'){
        const pkey = _stablePath();
        return root[pkey + ':' + tid] || root[tid] || null;
      }
    }catch(e){}
    return null;
  }

  function _ensureHead(tbl){
    const wrap = tbl.closest('.table_wrap');
    if(!wrap) return null;
    let head = wrap.querySelector(':scope > .table_head');
    if(!head){
      head = document.createElement('div');
      head.className = 'table_head';
      head.style.minWidth = '0';
      try{ wrap.insertBefore(head, wrap.firstChild); }catch(e){ try{ wrap.appendChild(head); }catch(x){} }
    }
    return head;
  }

  function _ensureActions(head){
    let a = head.querySelector(':scope > .tbl_actions');
    if(!a){
      a = document.createElement('div');
      a.className = 'tbl_actions';
      head.appendChild(a);
    }
    return a;
  }

  function _ensureStatus(head){
    let s = head.querySelector(':scope > .tbl_status');
    if(!s){
      s = document.createElement('div');
      s.className = 'muted tbl_status';
      s.style.fontSize = '12px';
      s.style.opacity = '0.75';
      s.style.marginTop = '6px';
      s.style.lineHeight = '1.4';
      head.appendChild(s);
    }
    return s;
  }

  function _findByDataUi(actions, ui){
    try{ return actions.querySelector('[data-ui="' + ui + '"]'); }catch(e){ return null; }
  }

  function _findOrCreateButton(actions, opts){
    const ui = _norm(opts && opts.ui);
    const pick = _norm(opts && opts.pickkey);
    const title = _norm(opts && opts.title);
    const aria = _norm(opts && opts.aria);
    const id = _norm(opts && opts.id);
    let el = null;
    if(ui) el = _findByDataUi(actions, ui);
    if(!el && id){ try{ el = document.getElementById(id); }catch(e){} }
    if(!el){
      el = document.createElement('button');
      el.type = 'button';
      el.className = 'btn_sm';
      if(id) el.id = id;
      if(ui) el.setAttribute('data-ui', ui);
      if(pick) el.setAttribute('data-ib-pickkey', pick);
      if(title) el.title = title;
      if(aria) el.setAttribute('aria-label', aria);
      actions.appendChild(el);
    }else{
      // Ensure pickkeys are present for support.
      try{
        if(ui && !el.getAttribute('data-ui')) el.setAttribute('data-ui', ui);
        if(pick && !el.getAttribute('data-ib-pickkey')) el.setAttribute('data-ib-pickkey', pick);
      }catch(e){}
    }
    return el;
  }

  const ICON_REFRESH = '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><path d="M18.6091 5.89092L15.5 9H21.5V3L18.6091 5.89092ZM18.6091 5.89092C16.965 4.1131 14.6125 3 12 3C7.36745 3 3.55237 6.50005 3.05493 11M5.39092 18.1091L2.5 21V15H8.5L5.39092 18.1091ZM5.39092 18.1091C7.03504 19.8869 9.38753 21 12 21C16.6326 21 20.4476 17.5 20.9451 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
  const ICON_AUTOWIDTH = '<svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M5 5v14M19 5v14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 12h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 10l-2 2 2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 10l2 2-2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const ICON_WINDOWWIDTH = '<svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="4" y="6" width="16" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 12H6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M6 12l2-2M6 12l2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 12h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 12l-2-2M18 12l-2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const ICON_COPY = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" aria-hidden="true" focusable="false"><path d="M6 11C6 8.17157 6 6.75736 6.87868 5.87868C7.75736 5 9.17157 5 12 5H15C17.8284 5 19.2426 5 20.1213 5.87868C21 6.75736 21 8.17157 21 11V16C21 18.8284 21 20.2426 20.1213 21.1213C19.2426 22 17.8284 22 15 22H12C9.17157 22 7.75736 22 6.87868 21.1213C6 20.2426 6 18.8284 6 16V11Z" stroke="#1C274C" stroke-width="1.5"></path><path d="M6 19C4.34315 19 3 17.6569 3 16V10C3 6.22876 3 4.34315 4.17157 3.17157C5.34315 2 7.22876 2 11 2H15C16.6569 2 18 3.34315 18 5" stroke="#1C274C" stroke-width="1.5"></path></svg>';
  const ICON_COPY_ROW = '<svg fill="currentColor" viewBox="0 0 32 32" width="18" height="18" aria-hidden="true" focusable="false"><path d="M4 24h24v2H4z"></path><path d="M26 18H6v-4h20v4m2 0v-4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2H26a2 2 0 0 0 2-2Z"></path></svg>';
  const ICON_EXPORT = '<svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="vertical-align:middle;"><path d="M12 3v11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8.5 10.5 12 14l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 18.5h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M6.5 15.5v3M17.5 15.5v3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';

  function _pageKey(){
    try{
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      const clean = p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '');
      return clean.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'root';
    }catch(e){
      return 'root';
    }
  }

  async function _copyText(text){
    const s = String(text === null || text === undefined ? '' : text);
    try{
      if(navigator.clipboard && window.isSecureContext){
        await navigator.clipboard.writeText(s);
        return true;
      }
    }catch(e){}
    try{
      const ta = document.createElement('textarea');
      ta.value = s;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return !!ok;
    }catch(e){
      return false;
    }
  }

  function _tableToTsv(tbl){
    const ths = Array.from(tbl.querySelectorAll('thead tr:first-child th'));
    const cols = ths.map((th, idx)=>({th, idx, name:_norm(th.textContent)})).filter(c=>{
      try{ return !(c.th && c.th.style && String(c.th.style.display||'') === 'none'); }catch(e){ return true; }
    });
    const lines = [];
    lines.push(cols.map(c=>c.name).join('\t'));
    Array.from(tbl.querySelectorAll('tbody tr')).forEach(tr=>{
      try{
        if(tr && tr.style && String(tr.style.display||'') === 'none') return;
        const cells = Array.from(tr.children || []);
        const row = cols.map(c=>{
          const td = cells[c.idx];
          if(!td) return '';
          try{ if(td.style && String(td.style.display||'') === 'none') return ''; }catch(e){}
          return String(td.textContent || '').replace(/\r?\n/g, ' ').trim();
        });
        lines.push(row.join('\t'));
      }catch(e){}
    });
    return lines.join('\n');
  }

  function _csvEscape(v){
    const s = String(v === null || v === undefined ? '' : v);
    if(/[\n\r,\"]/g.test(s)) return '"' + s.replace(/\"/g, '""') + '"';
    return s;
  }

  function exportTableCsv(tbl){
    try{
      const ths = Array.from(tbl.querySelectorAll('thead tr:first-child th'));
      const cols = ths
        .map((th, idx)=>({ th, idx, name: _norm(th.textContent) }))
        .filter(({th})=>{
          try{ return !(th && th.style && String(th.style.display||'') === 'none'); }catch(e){ return true; }
        });
      const header = cols.map(c=>_csvEscape(c.name));
      const lines = [header.join(',')];
      Array.from(tbl.querySelectorAll('tbody tr')).forEach((tr)=>{
        try{
          if(tr && tr.style && String(tr.style.display||'') === 'none') return;
          const cells = Array.from(tr.children || []);
          const row = cols.map(c=>{
            const td = cells[c.idx];
            if(!td) return '';
            try{ if(td.style && String(td.style.display||'') === 'none') return ''; }catch(e){}
            return _csvEscape(td.textContent || '');
          });
          lines.push(row.join(','));
        }catch(e){}
      });
      const csv = lines.join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
      const tid = _norm(tbl.getAttribute('id')) || 'table';
      const ts = new Date().toISOString().replace(/[:.]/g, '-');
      const fn = `${tid}_${ts}.csv`;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fn;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ try{ URL.revokeObjectURL(a.href); }catch(e){} try{ a.remove(); }catch(e){} }, 500);
    }catch(e){}
  }

  function _countRows(tbl){
    try{
      const trs = Array.from(tbl.querySelectorAll('tbody tr'));
      const total = trs.length;
      const vis = trs.filter(tr=>!(tr && tr.style && String(tr.style.display||'') === 'none')).length;
      return {vis, total};
    }catch(e){
      return {vis:0, total:0};
    }
  }

  function _updateStatus(tbl, statusEl, spec){
    try{
      const c = _countRows(tbl);
      const parts = [];
      parts.push('Rows: ' + String(c.vis) + ' / ' + String(c.total));
      try{
        if(spec && spec.status && spec.status.fn){
          const fn = window[String(spec.status.fn || '')];
          if(typeof fn === 'function'){
            const extra = fn(tbl);
            if(extra) parts.push(String(extra));
          }
        }
      }catch(e){}
      statusEl.textContent = parts.join(' | ');
    }catch(e){}
  }

  function _reorderActions(actions, desired){
    try{
      const want = desired.filter(Boolean);
      const set = new Set(want);
      const extras = Array.from(actions.children || []).filter(n=>!set.has(n));
      actions.innerHTML = '';
      want.forEach(n=>{ try{ actions.appendChild(n); }catch(e){} });
      extras.forEach(n=>{ try{ actions.appendChild(n); }catch(e){} });
    }catch(e){}
  }

  function _setupTable(tbl){
    const tid = _norm(tbl.getAttribute('id'));
    if(!tid) return;
    const spec = _specFor(tid) || null;
    const uiPrefix = (spec && spec.uiPrefix) ? String(spec.uiPrefix).trim() : '';

    const head = _ensureHead(tbl);
    if(!head) return;
    const actions = _ensureActions(head);
    const statusEl = _ensureStatus(head);
    try{ _updateStatus(tbl, statusEl, spec); }catch(e){}

    // If there is no toolbar spec for this table yet, do not inject the full
    // standard button set. We still prefer hosting any injected Info/ColVis
    // buttons inside the table action bar.
    if(!spec){
      try{
        const infoBtn0 = actions.querySelector('button[data-table-info="' + tid + '"]');
        const colvisBtn0 = actions.querySelector('button[data-table-colvis="' + tid + '"]');
        if(infoBtn0 || colvisBtn0) _reorderActions(actions, [infoBtn0, colvisBtn0]);
      }catch(e){}
      return;
    }

    // Mandatory refresh + abort buttons.
    const refreshBtn = _findOrCreateButton(actions, {
      ui: uiPrefix ? (uiPrefix + '.btn_aktualisieren') : '',
      pickkey: uiPrefix ? (uiPrefix + '.btn_aktualisieren') : '',
      title: uiPrefix ? (uiPrefix + '.btn_aktualisieren') : 'Aktualisieren',
      aria: 'Aktualisieren',
      id: spec && spec.refresh && spec.refresh.id ? String(spec.refresh.id) : '',
    });
    refreshBtn.innerHTML = ICON_REFRESH;

    const abortBtn = _findOrCreateButton(actions, {
      ui: uiPrefix ? (uiPrefix + '.btn_abbruch') : '',
      pickkey: uiPrefix ? (uiPrefix + '.btn_abbruch') : '',
      title: uiPrefix ? (uiPrefix + '.btn_abbruch') : 'Abbruch',
      aria: 'Abbruch',
      id: spec && spec.abort && spec.abort.id ? String(spec.abort.id) : '',
    });
    abortBtn.textContent = 'Abbruch';

    // Export button.
    const exportBtn = _findOrCreateButton(actions, {
      ui: uiPrefix ? (uiPrefix + '.btn_export') : '',
      pickkey: uiPrefix ? (uiPrefix + '.btn_export') : '',
      title: uiPrefix ? (uiPrefix + '.btn_export') : 'Export (CSV)',
      aria: 'Export',
    });
    exportBtn.innerHTML = ICON_EXPORT;

    // Table standard buttons (dynamic for this table).
    const autoBtn = _findOrCreateButton(actions, {
      ui: uiPrefix ? (uiPrefix + '.btn_autobreite') : '',
      pickkey: uiPrefix ? (uiPrefix + '.btn_autobreite') : '',
      title: uiPrefix ? (uiPrefix + '.btn_autobreite') : 'Autobreite',
      aria: 'Spaltenbreite automatisch',
      id: (uiPrefix === 'dashboard_outliers') ? 'raw_outlier_autowidth' : '',
    });
    autoBtn.innerHTML = ICON_AUTOWIDTH;

    const winBtn = _findOrCreateButton(actions, {
      ui: uiPrefix ? (uiPrefix + '.btn_fensterbreite') : '',
      pickkey: uiPrefix ? (uiPrefix + '.btn_fensterbreite') : '',
      title: uiPrefix ? (uiPrefix + '.btn_fensterbreite') : 'Fensterbreite',
      aria: 'Fensterbreite',
      id: (uiPrefix === 'dashboard_outliers') ? 'raw_outlier_windowwidth' : '',
    });
    winBtn.innerHTML = ICON_WINDOWWIDTH;

    let wrapLbl = null;
    let wrapCb = null;
    try{
      wrapLbl = actions.querySelector('label[data-ib-wrap-for="' + tid + '"]');
      wrapCb = wrapLbl ? wrapLbl.querySelector('input[type="checkbox"]') : null;
    }catch(e){}
    if(!wrapLbl){
      wrapLbl = document.createElement('label');
      wrapLbl.setAttribute('data-ib-wrap-for', tid);
      wrapCb = document.createElement('input');
      wrapCb.type = 'checkbox';
      wrapCb.className = 'row_sel';
      if(uiPrefix){ wrapCb.setAttribute('data-ui', uiPrefix + '.chk_umbruch'); wrapCb.setAttribute('data-ib-pickkey', uiPrefix + '.chk_umbruch'); wrapCb.title = uiPrefix + '.chk_umbruch'; }
      if(uiPrefix === 'dashboard_outliers') wrapCb.id = 'raw_outlier_wrap';
      wrapLbl.appendChild(wrapCb);
      wrapLbl.appendChild(document.createTextNode('Umbruch'));
      actions.appendChild(wrapLbl);
    }

    let colFiltLbl = null;
    let colFiltCb = null;
    try{
      colFiltLbl = actions.querySelector('label[data-ib-colfilter-for="' + tid + '"]');
      colFiltCb = colFiltLbl ? colFiltLbl.querySelector('input[type="checkbox"]') : null;
    }catch(e){}
    if(!colFiltLbl){
      colFiltLbl = document.createElement('label');
      colFiltLbl.setAttribute('data-ib-colfilter-for', tid);
      colFiltCb = document.createElement('input');
      colFiltCb.type = 'checkbox';
      colFiltCb.className = 'row_sel';
      if(uiPrefix){ colFiltCb.setAttribute('data-ui', uiPrefix + '.chk_spaltenfilter'); colFiltCb.setAttribute('data-ib-pickkey', uiPrefix + '.chk_spaltenfilter'); colFiltCb.title = uiPrefix + '.chk_spaltenfilter'; }
      if(uiPrefix === 'dashboard_outliers') colFiltCb.id = 'raw_outlier_colfilter';
      colFiltLbl.appendChild(colFiltCb);
      colFiltLbl.appendChild(document.createTextNode('Spaltenfilter'));
      actions.appendChild(colFiltLbl);
    }

    const copyBtn = _findOrCreateButton(actions, {
      ui: uiPrefix ? (uiPrefix + '.btn_kopieren') : '',
      pickkey: uiPrefix ? (uiPrefix + '.btn_kopieren') : '',
      title: uiPrefix ? (uiPrefix + '.btn_kopieren') : 'Kopieren',
      aria: 'Kopieren',
      id: (uiPrefix === 'dashboard_outliers') ? 'raw_outlier_copy' : '',
    });
    copyBtn.innerHTML = ICON_COPY;

    const copyRowBtn = _findOrCreateButton(actions, {
      ui: uiPrefix ? (uiPrefix + '.btn_zeile_kopieren') : '',
      pickkey: uiPrefix ? (uiPrefix + '.btn_zeile_kopieren') : '',
      title: uiPrefix ? (uiPrefix + '.btn_zeile_kopieren') : 'Zeile kopieren',
      aria: 'Zeile kopieren',
      id: (uiPrefix === 'dashboard_outliers') ? 'raw_outlier_copy_row' : '',
    });
    copyRowBtn.innerHTML = ICON_COPY_ROW + '<span style="margin-left:6px;">Zeile kopieren</span>';

    // Wire handlers (best-effort).
    try{
      if(!refreshBtn.__ib_wired){
        refreshBtn.__ib_wired = true;
        refreshBtn.addEventListener('click', (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          try{
            if(spec && spec.refresh && spec.refresh.fn){
              const fn = window[String(spec.refresh.fn || '')];
              if(typeof fn === 'function') return fn();
            }
          }catch(e){}
        });
      }
    }catch(e){}

    try{
      if(!abortBtn.__ib_wired){
        abortBtn.__ib_wired = true;
        abortBtn.addEventListener('click', (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          try{
            if(spec && spec.abort && spec.abort.key){
              const k = String(spec.abort.key || '').trim();
              if(k && typeof window.abortKeyRequest === 'function') window.abortKeyRequest(k);
              return;
            }
            if(spec && spec.abort && spec.abort.fn){
              const fn = window[String(spec.abort.fn || '')];
              if(typeof fn === 'function') return fn();
            }
          }catch(e){}
        });
      }
    }catch(e){}

    try{
      if(!exportBtn.__ib_wired){
        exportBtn.__ib_wired = true;
        exportBtn.addEventListener('click', (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          exportTableCsv(tbl);
        });
      }
    }catch(e){}

    // Find injected standard elements.
    const infoBtn = actions.querySelector('button[data-table-info="' + tid + '"]');
    const colvisBtn = actions.querySelector('button[data-table-colvis="' + tid + '"]');

    // Reorder (left->right) for the required standard buttons.
    _reorderActions(actions, [
      refreshBtn,
      abortBtn,
      infoBtn,
      colvisBtn,
      autoBtn,
      winBtn,
      wrapLbl,
      colFiltLbl,
      copyBtn,
      copyRowBtn,
      exportBtn,
    ]);

    // Persist + apply wrap/colfilter state per table.
    try{
      const kWrap = 'influxbro.ui.wrap.v1.' + _pageKey() + '.' + tid;
      const kFilt = 'influxbro.ui.colfilter.v1.' + _pageKey() + '.' + tid;
      if(wrapCb){
        try{ wrapCb.checked = (localStorage.getItem(kWrap) || '') === '1'; }catch(e){}
        try{ window.InfluxBroTableWrap && window.InfluxBroTableWrap.setWrap('#' + tid, !!wrapCb.checked); }catch(e){}
        wrapCb.addEventListener('change', ()=>{
          try{ localStorage.setItem(kWrap, wrapCb.checked ? '1' : '0'); }catch(e){}
          try{ window.InfluxBroTableWrap && window.InfluxBroTableWrap.setWrap('#' + tid, !!wrapCb.checked); }catch(e){}
        });
      }
      if(colFiltCb){
        try{ colFiltCb.checked = (localStorage.getItem(kFilt) || '') === '1'; }catch(e){}
        try{ window.InfluxBroTableFilter && window.InfluxBroTableFilter.setVisible('#' + tid, !!colFiltCb.checked); }catch(e){}
        colFiltCb.addEventListener('change', ()=>{
          try{ localStorage.setItem(kFilt, colFiltCb.checked ? '1' : '0'); }catch(e){}
          try{ window.InfluxBroTableFilter && window.InfluxBroTableFilter.setVisible('#' + tid, !!colFiltCb.checked); }catch(e){}
        });
      }
    }catch(e){}

    // Wire standard handlers
    try{
      if(!autoBtn.__ib_wired){
        autoBtn.__ib_wired = true;
        autoBtn.addEventListener('click', (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          try{ window.InfluxBroTableCols && window.InfluxBroTableCols.autoFit('#' + tid, {maxRows: 80}); }catch(e){}
        });
      }
    }catch(e){}
    try{
      if(!winBtn.__ib_wired){
        winBtn.__ib_wired = true;
        winBtn.addEventListener('click', (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          try{ window.InfluxBroTableCols && window.InfluxBroTableCols.windowFit('#' + tid, {minW: 120}); }catch(e){}
        });
      }
    }catch(e){}
    try{
      if(!copyBtn.__ib_wired){
        copyBtn.__ib_wired = true;
        copyBtn.addEventListener('click', async (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          const tsv = _tableToTsv(tbl);
          await _copyText(tsv);
        });
      }
    }catch(e){}
    try{
      if(!copyRowBtn.__ib_wired){
        copyRowBtn.__ib_wired = true;
        copyRowBtn.addEventListener('click', async (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          try{
            const helper = window.InfluxBroTableRowCopy;
            if(helper && typeof helper.copySelectedRow === 'function') await helper.copySelectedRow('#' + tid, {});
          }catch(e){}
        });
      }
    }catch(e){}

    // Keep abort enabled only while inflight.
    try{
      const inflightVar = spec && spec.inflightVar ? String(spec.inflightVar || '') : '';
      if(inflightVar){
        const tick = ()=>{
          try{
            const on = !!window[inflightVar];
            abortBtn.disabled = !on;
            refreshBtn.disabled = !!on;
          }catch(e){}
        };
        tick();
        setInterval(tick, 400);
      }else{
        abortBtn.disabled = true;
      }
    }catch(e){}

    // Keep status updated.
    try{
      if(!tbl.__ib_toolbar_counts){
        tbl.__ib_toolbar_counts = true;
        const tbody = tbl.querySelector('tbody');
        if(tbody){
          const obs = new MutationObserver(()=>{ _updateStatus(tbl, statusEl, spec); });
          obs.observe(tbody, { childList:true, subtree:true, attributes:true, attributeFilter:['style'] });
        }
      }
    }catch(e){}
  }

  function inject(){
    try{
      document.querySelectorAll('table[id]').forEach((tbl)=>{
        _setupTable(tbl);
      });
    }catch(e){}
  }

  window.InfluxBroTableToolbar = { inject, exportCsv: exportTableCsv };

  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', inject);
    else inject();
  }catch(e){}
})();
</script>

<script>
// Shared helper: wrap vs. truncate for tables (opt-in)
(function(){
  if(window.InfluxBroTableWrap) return;

  function _getTable(table){
    if(!table) return null;
    if(typeof table === 'string') return document.querySelector(table);
    return table;
  }

  function setWrap(table, on){
    const tbl = _getTable(table);
    if(!tbl) return;
    try{
      tbl.classList.add('ib_tbl');
      if(on) tbl.classList.add('ib_wrap');
      else tbl.classList.remove('ib_wrap');
    }catch(e){}
  }

  window.InfluxBroTableWrap = { setWrap };
})();
</script>

<script>
// Shared helper: per-column filter row (client-side; best-effort)
(function(){
  if(window.InfluxBroTableFilter) return;

  function _norm(s){
    return String(s || '').trim();
  }

  function _getTable(table){
    if(!table) return null;
    if(typeof table === 'string') return document.querySelector(table);
    return table;
  }

  function _getKey(tbl){
    try{
      const id = _norm(tbl.getAttribute('id')) || 'unknown';
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      const clean = p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '');
      const pk = clean.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'root';
      return `influxbro.filters.v1.${pk}.${id}`;
    }catch(e){
      return 'influxbro.filters.v1.unknown';
    }
  }

  function _cellText(td){
    try{ return _norm(td && td.textContent ? td.textContent : ''); }catch(e){ return ''; }
  }

  function _readSaved(tbl){
    try{
      const raw = localStorage.getItem(_getKey(tbl));
      if(!raw) return null;
      const j = JSON.parse(raw);
      return (j && typeof j === 'object') ? j : null;
    }catch(e){
      return null;
    }
  }

  function _writeSaved(tbl, obj){
    try{ localStorage.setItem(_getKey(tbl), JSON.stringify(obj || {})); }catch(e){}
  }

  function _ensureFilterRow(tbl){
    const thead = tbl.querySelector('thead');
    if(!thead) return null;
    const existing = thead.querySelector('tr.ib_filter_row');
    if(existing) return existing;

    const hdr = thead.querySelector('tr');
    if(!hdr) return null;

    const ths = Array.from(hdr.children || []);
    const fr = document.createElement('tr');
    fr.className = 'ib_filter_row';
    ths.forEach((th, idx)=>{
      const c = document.createElement('th');
      c.setAttribute('data-col-idx', String(idx));
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = 'filter';
      inp.setAttribute('data-col-idx', String(idx));
      c.appendChild(inp);
      fr.appendChild(c);
    });
    thead.appendChild(fr);
    return fr;
  }

  function apply(tbl){
    const tbody = tbl.querySelector('tbody');
    const thead = tbl.querySelector('thead');
    if(!tbody || !thead) return;
    const fr = thead.querySelector('tr.ib_filter_row');
    if(!fr) return;
    const inputs = Array.from(fr.querySelectorAll('input[data-col-idx], select[data-col-idx]'));
    const want = {};
    inputs.forEach(inp=>{
      const idx = Number(inp.getAttribute('data-col-idx'));
      const v = _norm(inp.value).toLowerCase();
      if(v) want[idx] = v;
    });

    const rows = Array.from(tbody.querySelectorAll('tr'));
    rows.forEach(tr=>{
      let ok = true;
      const cells = Array.from(tr.children || []);
      Object.keys(want).forEach(k=>{
        const idx = Number(k);
        const v = want[idx];
        const t = _cellText(cells[idx]).toLowerCase();
        if(v && !t.includes(v)) ok = false;
      });
      tr.style.display = ok ? '' : 'none';
    });
  }

  function init(table, opts){
    const tbl = _getTable(table);
    if(!tbl) return;
    const fr = _ensureFilterRow(tbl);
    if(!fr) return;

    // Keep filter row visible under the header row (sticky offset)
    try{
      const thead = tbl.querySelector('thead');
      const hdr = thead ? thead.querySelector('tr') : null;
      const h = hdr ? Math.round(hdr.getBoundingClientRect().height || 0) : 0;
      if(h > 0){
        Array.from(fr.querySelectorAll('th')).forEach(th=>{ th.style.top = h + 'px'; });
      }
    }catch(e){}

    // Restore saved filter values
    const saved = _readSaved(tbl) || {};
    try{
      Array.from(fr.querySelectorAll('input[data-col-idx]')).forEach(inp=>{
        const idx = inp.getAttribute('data-col-idx');
        if(idx in saved) inp.value = String(saved[idx] || '');
      });
    }catch(e){}

    const onChange = ()=>{
      try{
        const out = {};
        Array.from(fr.querySelectorAll('input[data-col-idx]')).forEach(inp=>{
          const idx = inp.getAttribute('data-col-idx');
          const v = _norm(inp.value);
          if(v) out[idx] = v;
        });
        _writeSaved(tbl, out);
      }catch(e){}
      apply(tbl);
    };

    Array.from(fr.querySelectorAll('input')).forEach(inp=>{
      inp.addEventListener('input', ()=>{ onChange(); });
    });

    // Optionally start hidden
    const startHidden = !!(opts && opts.startHidden);
    if(startHidden) fr.style.display = 'none';
    apply(tbl);
  }

  function setVisible(table, on){
    const tbl = _getTable(table);
    if(!tbl) return;
    try{
      const fr = tbl.querySelector('thead tr.ib_filter_row');
      if(!fr) return;
      fr.style.display = on ? '' : 'none';
      if(!on) apply(tbl);
      else apply(tbl);
    }catch(e){}
  }

  window.InfluxBroTableFilter = { init, apply, setVisible };
})();
</script>

<script>
// Shared helper: copy selected table row with header into clipboard.
(function(){
  if(window.InfluxBroTableRowCopy) return;

  function _norm(s){ return String(s || '').replace(/\s+/g, ' ').trim(); }

  function _getTable(table){
    if(!table) return null;
    if(typeof table === 'string') return document.querySelector(table);
    return table;
  }

  function _getSelectedRow(tbl, selected){
    if(!tbl) return null;
    if(typeof selected === 'function'){
      try{ return selected(tbl) || null; }catch(e){ return null; }
    }
    if(typeof selected === 'string' && selected.trim()) return tbl.querySelector(selected);
    return tbl.querySelector('tbody tr.raw_sel, tbody tr[aria-selected="true"], tbody tr.selected');
  }

  function _copyText(txt){
    return new Promise((resolve)=>{
      const s = String(txt || '');
      try{
        if(navigator && navigator.clipboard && window.isSecureContext){
          navigator.clipboard.writeText(s).then(()=>resolve(true)).catch(()=>fallback());
          return;
        }
      }catch(e){}
      fallback();
      function fallback(){
        try{
          const ta = document.createElement('textarea');
          ta.value = s;
          ta.setAttribute('readonly', 'readonly');
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand('copy');
          try{ document.body.removeChild(ta); }catch(e){}
          resolve(!!ok);
        }catch(e){
          resolve(false);
        }
      }
    });
  }

  function _headerCells(tbl){
    try{
      const hdr = tbl.querySelector('thead tr:not(.ib_filter_row)');
      return hdr ? Array.from(hdr.children || []) : [];
    }catch(e){
      return [];
    }
  }

  function _rowCells(tr){
    try{ return Array.from(tr && tr.children ? tr.children : []); }catch(e){ return []; }
  }

  async function copySelectedRow(table, opts){
    const tbl = _getTable(table);
    if(!tbl) return { ok: false, error: 'table_not_found' };
    const row = _getSelectedRow(tbl, opts && opts.selectedRow);
    if(!row) return { ok: false, error: 'no_selected_row' };
    const headers = _headerCells(tbl).map((th)=> _norm(th.textContent || ''));
    const cells = _rowCells(row).map((td)=> _norm(td.textContent || ''));
    const text = ['...', headers.join('\t'), cells.join('\t'), '...'].join('\n');
    const ok = await _copyText(text);
    return { ok, text, header_count: headers.length, cell_count: cells.length };
  }

  window.InfluxBroTableRowCopy = { copySelectedRow };
})();
</script>

<script>
// Shared helper: table box height resize handle (persisted, per page+table)
(function(){
  if(window.InfluxBroTableHeight) return;

  function _norm(s){ return String(s || '').trim(); }

  function _zoomScale(){
    try{
      const raw = getComputedStyle(document.documentElement).getPropertyValue('--ib-zoom-scale').trim();
      const n = Number(raw || '1');
      return (isFinite(n) && n > 0.1 && n < 6) ? n : 1;
    }catch(e){
      return 1;
    }
  }

  function _keyFor(tableId){
    try{
      const id = _norm(tableId) || 'unknown';
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      const clean = p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '');
      const pk = clean.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'root';
      return `influxbro.table_h_px.v1.${pk}.${id}`;
    }catch(e){
      return 'influxbro.table_h_px.v1.unknown';
    }
  }

  const _ATTACHED = [];

  function refreshScale(){
    try{
      const sc = _zoomScale();
      _ATTACHED.forEach((r)=>{
        try{
          if(!r || !r.boxEl) return;
          const saved = Number(localStorage.getItem(r.key) || 0);
          if(isFinite(saved) && saved >= r.minPx){
            r.boxEl.style.height = Math.round(saved * sc) + 'px';
            r.boxEl.style.maxHeight = 'none';
          }
        }catch(e){}
      });
    }catch(e){}
  }

  function attach(boxEl, tableId, opts){
    if(!boxEl) return;
    const tid = _norm(tableId) || _norm(boxEl.getAttribute('data-table-id')) || '';
    const key = _keyFor(tid || 'unknown');

    const minPx = (opts && isFinite(Number(opts.minPx))) ? Math.max(120, Math.trunc(Number(opts.minPx))) : 160;
    const maxPx = (opts && isFinite(Number(opts.maxPx))) ? Math.max(minPx, Math.trunc(Number(opts.maxPx))) : Math.round(window.innerHeight * 0.9);

    try{
      if(!_ATTACHED.some((r)=>r && r.boxEl === boxEl && r.key === key)) _ATTACHED.push({boxEl, key, minPx});
    }catch(e){}

    try{
      const saved = Number(localStorage.getItem(key) || 0);
      if(isFinite(saved) && saved >= minPx){
        const sc = _zoomScale();
        boxEl.style.height = Math.round(saved * sc) + 'px';
        // If a manual height is set, disable the row-based max-height clamp.
        boxEl.style.maxHeight = 'none';
      }
    }catch(e){}

    // Create handle after the box (if not present)
    let handle = null;
    try{
      handle = boxEl.parentElement ? boxEl.parentElement.querySelector(`.ib_tbl_resize[data-for="${tid}"]`) : null;
    }catch(e){ handle = null; }
    if(!handle){
      handle = document.createElement('div');
      handle.className = 'ib_tbl_resize';
      handle.setAttribute('data-for', tid);
      handle.style.height = Math.round(12 * _zoomScale()) + 'px';
      handle.style.cursor = 'ns-resize';
      handle.style.marginTop = Math.round(8 * _zoomScale()) + 'px';
      handle.style.borderRadius = '999px';
      handle.style.background = 'linear-gradient(90deg, #eee, #f8f8f8)';
      try{ boxEl.insertAdjacentElement('afterend', handle); }catch(e){ boxEl.parentElement && boxEl.parentElement.appendChild(handle); }
    }

    let startY = 0;
    let startH = 0;
    let dragging = false;

    function onMove(ev){
      if(!dragging) return;
      const y = (ev && (ev.touches && ev.touches[0] ? ev.touches[0].clientY : ev.clientY)) || 0;
      const dy = y - startY;
      const sc = _zoomScale();
      let h = startH + (dy / Math.max(0.1, sc));
      if(h < minPx) h = minPx;
      if(h > maxPx) h = maxPx;
      boxEl.style.height = Math.round(h * sc) + 'px';
      boxEl.style.maxHeight = 'none';
      try{ ev.preventDefault(); }catch(e){}
    }

    function onUp(){
      if(!dragging) return;
      dragging = false;
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
      try{
        const sc = _zoomScale();
        const h = Math.round((boxEl.getBoundingClientRect().height || 0) / Math.max(0.1, sc));
        if(h >= minPx) localStorage.setItem(key, String(h));
      }catch(e){}
    }

    function onDown(ev){
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      dragging = true;
      startY = (ev && (ev.touches && ev.touches[0] ? ev.touches[0].clientY : ev.clientY)) || 0;
      startH = (boxEl.getBoundingClientRect().height || 0) / Math.max(0.1, _zoomScale());
      try{ boxEl.style.maxHeight = 'none'; }catch(e){}
      document.body.style.userSelect = 'none';
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchmove', onMove, {passive:false});
      window.addEventListener('touchend', onUp);
    }

    handle.addEventListener('mousedown', onDown);
    handle.addEventListener('touchstart', onDown, {passive:false});
  }

  window.InfluxBroTableHeight = { attach, refreshScale };
})();
</script>

<script>
// Shared helper: generic column sorting (client-side; persisted per page+table)
(function(){
  if(window.InfluxBroTableSort) return;

  function _norm(s){ return String(s || '').trim(); }
  function _getTable(table){
    if(!table) return null;
    if(typeof table === 'string') return document.querySelector(table);
    return table;
  }
  function _pageKey(){
    try{
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      const clean = p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '');
      return clean.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'root';
    }catch(e){
      return 'root';
    }
  }
  function _keyFor(tbl){
    const id = _norm(tbl.getAttribute('id')) || 'unknown';
    return `influxbro.sort.v1.${_pageKey()}.${id}`;
  }
  function _read(tbl){
    try{ return JSON.parse(localStorage.getItem(_keyFor(tbl)) || 'null'); }catch(e){ return null; }
  }
  function _write(tbl, st){
    try{ localStorage.setItem(_keyFor(tbl), JSON.stringify(st || {})); }catch(e){}
  }

  function _parseVal(s){
    const t = _norm(s);
    if(!t) return {t:'s', v:''};

    // de-DE datetime: dd.mm.yyyy[ HH:MM:SS[.mmm]]
    // Date.parse() is not reliable for this format.
    try{
      const m = t.match(/^(\d{2})\.(\d{2})\.(\d{4})(?:\s+(\d{2}):(\d{2}):(\d{2})(?:\.(\d{1,3}))?)?$/);
      if(m){
        const dd = Number(m[1]);
        const mm = Number(m[2]);
        const yyyy = Number(m[3]);
        const hh = Number(m[4] || 0);
        const mi = Number(m[5] || 0);
        const ss = Number(m[6] || 0);
        let ms = Number(m[7] || 0);
        if(isFinite(ms) && ms > 0 && String(m[7] || '').length === 1) ms = ms * 100;
        else if(isFinite(ms) && ms > 0 && String(m[7] || '').length === 2) ms = ms * 10;
        const dt = new Date(yyyy, mm - 1, dd, hh, mi, ss, ms);
        const ts = dt.getTime();
        if(isFinite(ts) && ts > 0) return {t:'d', v: ts};
      }
    }catch(e){}

    // ISO / RFC-ish dates
    const ms = Date.parse(t);
    if(isFinite(ms) && ms > 0) return {t:'d', v: ms};

    // number (best-effort; allow 1,23)
    const m = t.match(/^[-+]?\d+(?:[\.,]\d+)?$/);
    if(m){
      const x = parseFloat(t.replace(',', '.'));
      if(isFinite(x)) return {t:'n', v:x};
    }

    return {t:'s', v: t.toLowerCase()};
  }

  function _minRows(){
    try{
      const v = String(getComputedStyle(document.documentElement).getPropertyValue('--ib-table-min-empty-rows') || '').trim();
      const n = parseInt(v, 10);
      return (isFinite(n) && n >= 0) ? n : 5;
    }catch(e){
      return 5;
    }
  }

  function _ensureMinRows(tbl){
    try{
      const min = _minRows();
      if(!(isFinite(min) && min > 0)) return;
      const tbody = tbl.querySelector('tbody');
      if(!tbody) return;

      // Drop prior padding rows (if any)
      try{
        Array.from(tbody.querySelectorAll('tr[data-ib-empty="1"]')).forEach((tr)=>tr.remove());
      }catch(e){}

      const real = Array.from(tbody.querySelectorAll('tr')).filter((tr)=> String(tr.getAttribute('data-ib-empty') || '') !== '1');
      const need = min - real.length;
      if(need <= 0) return;

      const ths = Array.from(tbl.querySelectorAll('thead tr:first-child th'));
      const colCount = ths.length ? ths.length : (real.length ? (real[0].children ? real[0].children.length : 0) : 0);
      if(!(colCount > 0)) return;
      for(let i = 0; i < need; i++){
        const tr = document.createElement('tr');
        tr.setAttribute('data-ib-empty', '1');
        for(let c = 0; c < colCount; c++){
          const td = document.createElement('td');
          td.textContent = '';
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }catch(e){}
  }

  function apply(tbl, st){
    const tbody = tbl.querySelector('tbody');
    if(!tbody) return;
    const rows = Array.from(tbody.querySelectorAll('tr')).filter((tr)=> String(tr.getAttribute('data-ib-empty') || '') !== '1');
    if(!rows.length) return;

    const idx = Number(st && st.idx);
    if(!isFinite(idx) || idx < 0) return;
    const dir = (st && String(st.dir || 'asc').toLowerCase() === 'desc') ? 'desc' : 'asc';

    const withKey = rows.map((tr, i)=>{
      const td = (tr.children && tr.children[idx]) ? tr.children[idx] : null;
      const txt = td ? (td.getAttribute && td.getAttribute('data-sort') ? td.getAttribute('data-sort') : (td.textContent || '')) : '';
      const pv = _parseVal(txt);
      return {tr, i, pv};
    });

    withKey.sort((a,b)=>{
      const aa = a.pv; const bb = b.pv;
      // keep type order stable: numbers/dates before strings
      const order = (x)=> (x.t === 'n' ? 0 : (x.t === 'd' ? 1 : 2));
      const oa = order(aa); const ob = order(bb);
      if(oa !== ob) return oa - ob;
      let c = 0;
      if(aa.v < bb.v) c = -1;
      else if(aa.v > bb.v) c = 1;
      if(dir === 'desc') c = -c;
      return c !== 0 ? c : (a.i - b.i);
    });

    // Apply ordering
    const frag = document.createDocumentFragment();
    withKey.forEach(x=>frag.appendChild(x.tr));
    tbody.appendChild(frag);

    // Re-pad to min rows after sorting.
    _ensureMinRows(tbl);

    // Mark header
    try{
      const ths = Array.from(tbl.querySelectorAll('thead tr:first-child th'));
      ths.forEach((th, i)=>{
        th.removeAttribute('aria-sort');
        th.removeAttribute('data-ib-sort');
        if(i === idx){
          th.setAttribute('aria-sort', dir === 'asc' ? 'ascending' : 'descending');
          th.setAttribute('data-ib-sort', dir);
        }
      });
    }catch(e){}
  }

  function init(table, opts){
    const tbl = _getTable(table);
    if(!tbl) return;
    if(!tbl.getAttribute('id')) return;
    if(tbl.getAttribute('data-sort-custom') === '1') return;

    const ths = Array.from(tbl.querySelectorAll('thead tr:first-child th'));
    if(!ths.length) return;

    // Click handler
    ths.forEach((th, idx)=>{
      if(th.getAttribute('data-nosort') === '1') return;
      try{ if(th.querySelector && th.querySelector('input,select,button')) return; }catch(e){}
      th.style.cursor = th.style.cursor || 'pointer';
      th.addEventListener('click', (ev)=>{
        try{
          // ignore clicks on inputs inside header
          const t = ev && ev.target ? ev.target : null;
          if(t && (t.tagName === 'INPUT' || t.tagName === 'SELECT' || t.closest('input,select,button'))) return;
        }catch(e){}

        const cur = _read(tbl) || {};
        let dir = 'asc';
        if(Number(cur.idx) === idx){
          dir = (String(cur.dir||'asc').toLowerCase() === 'asc') ? 'desc' : 'asc';
        }else{
          dir = 'asc';
        }
        const st = {idx: idx, dir: dir};
        _write(tbl, st);
        apply(tbl, st);
      });
    });

    // Restore sort
    const st = _read(tbl);
    if(st && isFinite(Number(st.idx))) apply(tbl, st);

    // Ensure minimum visible empty rows even for empty tables.
    _ensureMinRows(tbl);
  }

  function inject(){
    try{
      document.querySelectorAll('table[id]').forEach((tbl)=>{
        if(tbl.__ib_sort_init) return;
        tbl.__ib_sort_init = true;
        init(tbl);
      });
    }catch(e){}
  }

  window.InfluxBroTableSort = { init, apply, inject };

  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', inject);
    else inject();
  }catch(e){}

  try{
    let t = null;
    const obs = new MutationObserver(()=>{
      if(t) return;
      t = setTimeout(()=>{ t = null; inject(); }, 120);
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }catch(e){}
})();
</script>

<script>
// Shared helper: column visibility picker (persisted per page+table)
(function(){
  if(window.InfluxBroTableColVis) return;

  function _norm(s){ return String(s || '').trim(); }

  function _stablePath(){
    try{
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      return p.replace(/\?.*$/, '').trim() || '';
    }catch(e){
      return '';
    }
  }

  function _toolbarSpecForId(tid){
    try{
      const root = window.InfluxBroTableToolbarSpec;
      if(root && typeof root === 'object'){
        const pkey = _stablePath();
        return root[pkey + ':' + tid] || root[tid] || null;
      }
    }catch(e){}
    return null;
  }

  function _uiPrefixForId(tid){

      const spec = _toolbarSpecForId(tid);
      const pre = spec && spec.uiPrefix ? String(spec.uiPrefix) : '';
      return pre.trim();
    }catch(e){}
    return '';
  }

  function _toolbarSpecFor(tid){
    try{
      const root = window.InfluxBroTableToolbarSpec;
      if(root && typeof root === 'object'){
        const pkey = _stablePath();
        return root[pkey + ':' + tid] || root[tid] || null;
      }
    }catch(e){}
    return null;
  }

  function _uiPrefixFor(tid){
    try{
      const spec = _toolbarSpecFor(tid);
      const pre = spec && spec.uiPrefix ? String(spec.uiPrefix) : '';
      return pre.trim();
    }catch(e){
      return '';
    }
  }
  function _pageKey(){
    try{
      const p = (window.location && window.location.pathname) ? String(window.location.pathname) : '';
      const clean = p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '');
      return clean.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'root';
    }catch(e){ return 'root'; }
  }
  function _keyFor(tid){
    const id = _norm(tid) || 'unknown';
    return `influxbro.colvis.v1.${_pageKey()}.${id}`;
  }
  function _getTable(table){
    if(!table) return null;
    if(typeof table === 'string') return document.querySelector(table);
    return table;
  }
  function _read(tid){
    try{
      const j = JSON.parse(localStorage.getItem(_keyFor(tid)) || 'null');
      if(!j || typeof j !== 'object') return {hidden: []};
      const h = Array.isArray(j.hidden) ? j.hidden.map(x=>Number(x)).filter(x=>isFinite(x) && x >= 0) : [];
      return {hidden: h};
    }catch(e){
      return {hidden: []};
    }
  }
  function _write(tid, st){
    try{ localStorage.setItem(_keyFor(tid), JSON.stringify(st || {hidden: []})); }catch(e){}
  }

  function _apply(tbl, hiddenIdx){
    const hid = new Set((hiddenIdx || []).map(x=>Number(x)).filter(x=>isFinite(x) && x >= 0));
    const rows = Array.from(tbl.querySelectorAll('tr'));
    rows.forEach(tr=>{
      const cells = Array.from(tr.children || []);
      cells.forEach((c, idx)=>{
        if(hid.has(idx)) c.style.display = 'none';
        else c.style.display = '';
      });
    });
  }

  function apply(tbl){
    if(!tbl) return;
    const tid = _norm(tbl.getAttribute('id'));
    if(!tid) return;
    const st = _read(tid);
    _apply(tbl, st.hidden || []);
  }

  function _ensureModal(){
    let root = document.getElementById('influxbro_colvis_root');
    if(root) return root;

    root = document.createElement('div');
    root.id = 'influxbro_colvis_root';
    root.style.position = 'fixed';
    root.style.inset = '0';
    root.style.zIndex = '10045';
    root.style.display = 'none';

    root.style.padding = '6vh 12px 12px 12px';

    const title = document.createElement('div');

    const close = document.createElement('button');

    head.appendChild(title);
    head.appendChild(close);

    const body = document.createElement('div');
    body.id = 'influxbro_colvis_body';
    body.style.marginTop = '10px';

    const actions = document.createElement('div');
    actions.style.display = 'flex';
    actions.style.gap = '10px';

    const allBtn = document.createElement('button');

    actions.appendChild(allBtn);
    actions.appendChild(noneBtn);

    card.appendChild(head);
    card.appendChild(body);
    card.appendChild(actions);
    root.appendChild(card);
    document.body.appendChild(root);

    function hide(){ try{ root.style.display = 'none'; }catch(e){} }
    close.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){} hide(); });
    root.addEventListener('click', (ev)=>{ if(ev && ev.target === root) hide(); });
    document.addEventListener('keydown', (ev)=>{ try{ if(ev && ev.key === 'Escape' && root.style.display !== 'none') hide(); }catch(e){} });
    return root;
  }

  function showForTable(tbl){
    const tid = _norm(tbl.getAttribute('id'));
    if(!tid) return;
    const root = _ensureModal();
    const $title = document.getElementById('influxbro_colvis_title');
    const $body = document.getElementById('influxbro_colvis_body');
    const $all = document.getElementById('influxbro_colvis_all');
    const $none = document.getElementById('influxbro_colvis_none');
    if(!$body) return;

    const ths = Array.from(tbl.querySelectorAll('thead tr:first-child th'));
    const st = _read(tid);
    const hid = new Set(st.hidden || []);

    if($title) $title.textContent = 'Spalten: ' + tid;

        else h.add(idx);
        const next = {hidden: Array.from(h.values()).sort((a,b)=>a-b)};

        _apply(tbl, next.hidden);

      const span = document.createElement('span');

      row.appendChild(cb);

    if($all) $all.onclick = (ev)=>{
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      _write(tid, {hidden: []});
      _apply(tbl, []);
      showForTable(tbl);
    };
    if($none) $none.onclick = (ev)=>{
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      const allHidden = ths.map((_,i)=>i);
      _write(tid, {hidden: allHidden});
      _apply(tbl, allHidden);
      showForTable(tbl);
    };

    root.style.display = 'block';
  }

  const ICON_COLS = '<svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M4 4h16v16H4V4zm2 2v12h3V6H6zm5 0v12h2V6h-2zm4 0v12h3V6h-3z"/></svg>';

  function inject(){
    try{
      document.querySelectorAll('table[id]').forEach((tbl)=>{
        const tid = _norm(tbl.getAttribute('id'));
        if(!tid) return;

        // Apply saved visibility
        try{ apply(tbl); }catch(e){}

        // Prefer adding the button to a nearby .table_head action bar.

        const head = wrap ? wrap.querySelector('.table_head') : null;
        if(!head) return;

        btn.setAttribute('data-table-colvis', tid);
        try{

          if(pre){
            btn.setAttribute('data-ui', pre + '.btn_spalten');

          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          showForTable(tbl);
        });
        host.appendChild(btn);
      });
    }catch(e){}
  }

  window.InfluxBroTableColVis = { apply, show: showForTable, inject };

  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', inject);
    else inject();
  }catch(e){}

  try{
    let t = null;
    const obs = new MutationObserver(()=>{
      if(t) return;
      t = setTimeout(()=>{ t = null; inject(); }, 120);
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }catch(e){}
})();
</script>

<script>
// Shared helper: show row counts (filtered/total) in .table_head (best-effort)
(function(){
  if(window.InfluxBroTableCounts) return;

  function _norm(s){ return String(s || '').trim(); }
  function _countRows(tbl){
    const tbody = tbl.querySelector('tbody');
    if(!tbody) return {vis:0, total:0};
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const total = rows.length;
    let vis = 0;
    rows.forEach(tr=>{
      const disp = (tr.style && tr.style.display) ? String(tr.style.display) : '';
      if(disp !== 'none') vis += 1;
    });
    return {vis, total};
  }

  function _ensureHost(tbl){
    const wrap = tbl.closest('.table_wrap');
    const head = wrap ? wrap.querySelector('.table_head') : null;
    if(!head) return null;

     // TOMBSTONE: TS-2026-0002 – Removed rowcount indicator for specific tables via opt-out.
     try{
       if(tbl && tbl.getAttribute && tbl.getAttribute('data-ib-hide-rowcounts') === '1') return null;
       if(wrap && wrap.getAttribute && wrap.getAttribute('data-ib-hide-rowcounts') === '1') return null;
     }catch(e){}
    let host = head.querySelector('[data-ib-rowcounts]');
    if(host) return host;

    // Prefer reusing an existing muted element as container.
    let muted = head.querySelector('.muted');
    if(!muted){
      muted = document.createElement('div');
      muted.className = 'muted';
      head.appendChild(muted);
    }

    // Append a dedicated span so we do not overwrite other dynamic info.
    host = document.createElement('span');
    host.setAttribute('data-ib-rowcounts', '1');
    try{
      const tid = _norm(tbl.getAttribute('id'));
      if(tid) host.setAttribute('data-ib-pickkey', 'table.' + tid + '.rowcount');
      if(tid) host.setAttribute('data-ui', 'table_rowcount.' + tid);
    }catch(e){}
    host.style.marginLeft = '10px';
    host.style.whiteSpace = 'nowrap';
    muted.appendChild(host);
    return host;
  }

  function update(tbl){
    try{
      const tid = _norm(tbl.getAttribute('id'));
      if(!tid) return;
      const host = _ensureHost(tbl);
      if(!host) return;
      const c = _countRows(tbl);
      host.textContent = `Rows: ${c.vis} / ${c.total}`;
    }catch(e){}
  }

  function attach(tbl){
    const tbody = tbl.querySelector('tbody');
    if(!tbody) return;
    update(tbl);
    try{
      const obs = new MutationObserver(()=>{ update(tbl); });
      obs.observe(tbody, { childList:true, subtree:true, attributes:true, attributeFilter:['style'] });
    }catch(e){}
  }

  function inject(){
    try{
      document.querySelectorAll('table[id]').forEach((tbl)=>{
        if(tbl.__ib_counts_attached) return;
        tbl.__ib_counts_attached = true;
        attach(tbl);
      });
    }catch(e){}
  }

  window.InfluxBroTableCounts = { update, inject };
  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', inject);
    else inject();
  }catch(e){}
})();
</script>

<script>
// Shared helper: show table column explanations (best-effort)
(function(){
  if(window.InfluxBroTableInfo) return;

  function _norm(s){
    return String(s || '').replace(/\s+/g, ' ').trim();
  }

  function _getTable(table){
    if(!table) return null;
    if(typeof table === 'string') return document.querySelector(table);
    return table;
  }

  function _stripKeySuffix(title){
    const t = _norm(title);
    // Tooltips append (key) at the end; remove for readability.
    return t.replace(/\s*\([^\)]+\)\s*$/g, '').trim();
  }

  function _stablePath(){
    try{
      const p = String(location && location.pathname ? location.pathname : '/');
      // Home Assistant ingress adds a volatile token segment.
      return p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '').replace(/\/+$/g, '') || '/';
    }catch(e){
      return '/';
    }
  }

  function _specFor(tbl){
    try{
      const tid = _norm(tbl.getAttribute('id'));
      if(!tid) return null;
      const root = window.InfluxBroTableInfoSpec;
      if(root && typeof root === 'object'){
        const pkey = _stablePath();
        const spec = root[pkey + ':' + tid] || root[tid];
        return (spec && typeof spec === 'object') ? spec : null;
      }
    }catch(e){}
    return null;
  }

  function _specColDesc(spec, colName){
    if(!spec) return '';
    const name = _norm(colName);
    if(!name) return '';
    try{
      if(spec.columns && typeof spec.columns === 'object'){
        // dict form
        if(!Array.isArray(spec.columns)){
          const d = spec.columns[name];
          if(d) return _norm(d);
          // fallback: case-insensitive match
          const k = Object.keys(spec.columns || {}).find(x => _norm(x).toLowerCase() === name.toLowerCase());
          if(k && spec.columns[k]) return _norm(spec.columns[k]);
        }
      }
    }catch(e){}
    return '';
  }

  function describeTable(tbl){
    const ths = Array.from(tbl.querySelectorAll('thead tr:first-child th'));
    const lines = [];

    const spec = _specFor(tbl);

    if(spec && spec.purpose){
      lines.push('Sinn und Zweck');
      lines.push(String(spec.purpose || '').trim());
      lines.push('');
    }

    lines.push('Funktion / Bedienung');
    lines.push('- Spaltenbreite: per Ziehen am Spaltenrand (Header).');
    lines.push('- Sortierung: per Klick auf Spaltenkopf (pro Spalte).');
    lines.push('- Spalten ein-/ausblenden: ueber Spalten-Button (falls vorhanden).');
    lines.push('- Volltextsuche/Filter: oberhalb der Tabelle.');
    lines.push('- Anzeige: Umbruch vs. Abschneiden (Checkbox, falls vorhanden).');
    lines.push('- Hoehe: unter der Tabelle per Balken (falls vorhanden).');
    lines.push('');
    lines.push('Spalten');

    ths.forEach((th, idx)=>{
      const name = _norm(th.textContent);
      const ttl = _stripKeySuffix(th.getAttribute('title'));
      const desc = ttl && ttl !== name ? ttl : '';
      const specDesc = _specColDesc(spec, name);
      const best = specDesc || desc;
      lines.push(`${idx+1}. ${name}${best ? (' - ' + best) : ''}`);
    });

    try{
      if(spec && Array.isArray(spec.actions) && spec.actions.length){
        lines.push('');
        lines.push('Aktionen');
        spec.actions.forEach(a=>{ lines.push('- ' + _norm(a)); });
      }
    }catch(e){}

    return lines.join('\n');
  }

  function show(table){
    const tbl = _getTable(table);
    if(!tbl) return;
    const id = _norm(tbl.getAttribute('id'));
    const title = id ? ('Tabelleninfo: ' + id) : 'Tabelleninfo';
    const msg = describeTable(tbl);
    try{
      if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show(title, msg);
      else alert(msg);
    }catch(e){
      try{ alert(msg); }catch(x){}
    }
  }

  const ICON_INFO = '<svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 10.8v6.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1.3" fill="currentColor"/></svg>';

  function _ensureButtonForTable(tbl){
    try{
      if(!tbl || !tbl.getAttribute) return;
      const tid = _norm(tbl.getAttribute('id'));
      if(!tid) return;

      // Prefer adding the button to the table action bar inside .table_head.
      const wrap = tbl.closest('.table_wrap');
      const head = wrap ? wrap.querySelector('.table_head') : null;
      const host = head ? (head.querySelector('.tbl_actions') || head.querySelector('.tbl_right') || head) : (wrap || tbl.parentElement);
      if(!host) return;

      const existing = host.querySelector && host.querySelector(`button[data-table-info="${tid}"]`);
      if(existing) return;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.innerHTML = ICON_INFO;
      btn.setAttribute('data-table-info', tid);
      try{
        const pre = _uiPrefixForId(tid);
        if(pre){
          btn.setAttribute('data-ui', pre + '.btn_tabelleninfo');
          btn.setAttribute('data-ib-pickkey', pre + '.btn_tabelleninfo');
        }
      }catch(e){}
        btn.style.cursor = 'pointer';
        btn.style.height = '30px';
        btn.style.padding = '6px 10px';
        btn.style.marginLeft = '8px';
        btn.style.opacity = '0.85';
        btn.title = 'Tabelleninfo';
      btn.addEventListener('click', (ev)=>{
        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        show(tbl);
      });

      if(head){
        // Place on the right side if possible.
        try{ head.style.alignItems = 'center'; }catch(e){}
        host.appendChild(btn);
      }else{
        host.insertBefore(btn, host.firstChild);
      }
    }catch(e){}
  }

  function inject(){
    try{
      document.querySelectorAll('table[id]').forEach(tbl=>_ensureButtonForTable(tbl));
    }catch(e){}
  }

  window.InfluxBroTableInfo = { show, inject };

  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', inject);
    else inject();
  }catch(e){}

  // Keep it in sync with dynamic DOM updates.
  try{
    let t = null;
    const obs = new MutationObserver(()=>{
      if(t) return;
      t = setTimeout(()=>{ t = null; inject(); }, 120);
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }catch(e){}
})();
</script>
