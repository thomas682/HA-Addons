  function _norm(s){
    return String(s || '').replace(/\s+/g, ' ').trim();
  }

  function _keyFromEl(el){
    try{
      if(!el) return '';
      const dui = _norm(el.getAttribute('data-ui'));
      if(dui) return dui;
      const id = _norm(el.getAttribute('id'));
      if(id) return '#' + id;

      // Table cells: try to derive a stable key from table + column
      const td = String(el.tagName||'').toLowerCase() === 'td' ? el : null;
      const th = String(el.tagName||'').toLowerCase() === 'th' ? el : null;
      const cell = td || th;
      if(cell){
        const tbl = cell.closest('table');
        const tid = tbl && tbl.getAttribute('id') ? _norm(tbl.getAttribute('id')) : '';
        const colKey = _norm(cell.getAttribute('data-key'));
        if(tid && colKey) return tid + ':' + colKey;
        if(tid) return tid;
      }

      const tag = String(el.tagName||'').toLowerCase();
      const cls = _norm(el.getAttribute('class'));
      if(cls){
        const c0 = cls.split(' ').filter(Boolean)[0] || '';
        if(c0) return tag + '.' + c0;
      }
      return tag;
    }catch(e){
      return '';
    }
  }

  function _ensureKeySuffix(title, key){
    const t = _norm(title);
    const k = _norm(key);
    if(!k) return t;
    const suffix = `(${k})`;
    if(t.includes(suffix)) return t;
    return (t ? (t + ' ' + suffix) : suffix);
  }

  function _short(s, n){
    const x = _norm(s);
    if(!x) return '';
    const m = Number(n) || 180;
    return x.length > m ? (x.slice(0, m) + '...') : x;
  }

  function _decap(s){
    const x = _norm(s);
    if(!x) return '';
    const c0 = x[0];
    if(c0 >= 'A' && c0 <= 'Z') return c0.toLowerCase() + x.slice(1);
    return x;
  }

  function _uiKind(el){
    try{
      const tag = String(el && el.tagName ? el.tagName : '').toLowerCase();
      if(tag === 'button') return 'button';
      if(tag === 'select') return 'select';
      if(tag === 'input'){
        const t = String(el.getAttribute('type') || '').toLowerCase();
        if(t === 'checkbox') return 'checkbox';
        return 'input';
      }
      return tag;
    }catch(e){
      return '';
    }
  }

  function _formatDescForKind(kind, desc, el){
    const d0 = _norm(desc);
    if(!kind) return d0;

    if(kind === 'button'){
      if(d0) return 'Dieser Button ' + _decap(d0);
      const t = _norm(el && el.textContent ? el.textContent : '');
      return t ? ('Dieser Button fuehrt aus: ' + t) : 'Dieser Button';
    }

    if(kind === 'checkbox'){
      if(d0) return 'Diese Checkbox ' + _decap(d0);
      const auto = _autoTitleFromContext(el) || '';
      const lbl = _norm(auto.split(':')[0] || auto);
      return lbl ? ('Diese Checkbox aktiviert/deaktiviert: ' + lbl) : 'Diese Checkbox';
    }

    if(kind === 'select'){
      if(d0) return 'Dieses Auswahlfeld ' + _decap(d0);
      const auto = _autoTitleFromContext(el) || '';
      const lbl = _norm(auto.split(':')[0] || auto);
      return lbl ? ('Dieses Auswahlfeld waehlt: ' + lbl) : 'Dieses Auswahlfeld';
    }

    return d0;
  }

  function _autoTitleFromContext(el){
    try{
      const tag = String(el && el.tagName ? el.tagName : '').toLowerCase();
      const isBtn = tag === 'button';
      const isInput = (tag === 'input' || tag === 'select' || tag === 'textarea');

      let labelTxt = '';
      let helpTxt = '';

      // Search a few ancestor levels for a nearby label/help.
      let cur = el;
      for(let i=0; i<5; i++){
        const p = cur && cur.parentElement ? cur.parentElement : null;
        if(!p) break;

        // Prefer a single label in the container.
        const labels = Array.from(p.querySelectorAll('label'))
          .map(l => _norm(l.textContent))
          .filter(Boolean);
        if(!labelTxt && labels.length){
          labelTxt = labels[0];
        }

        // Prefer explicit help blocks.
        if(!helpTxt){
          const h = p.querySelector('.muted.help') || p.querySelector('.muted');
          if(h) helpTxt = _norm(h.textContent);
        }

        if(labelTxt || helpTxt) break;
        cur = p;
      }

      if(isBtn){
        const t = _norm(el.textContent);
        const extra = helpTxt && helpTxt !== t ? helpTxt : '';
        return _short(extra ? (t + ': ' + extra) : t, 220);
      }

      if(isInput){
        if(labelTxt && helpTxt && helpTxt !== labelTxt){
          return _short(labelTxt + ': ' + helpTxt, 220);
        }
        if(labelTxt) return _short(labelTxt, 220);
        if(helpTxt) return _short(helpTxt, 220);
      }
    }catch(e){}
    return '';
  }

  function _looksLikeAutoKeyTitle(existing, key){
    const t = _norm(existing);
    const k = _norm(key);
    if(!t) return true;
    if(k && (t === k || t === ('#' + k) || t === ('data-ui:' + k))) return true;
    if(k && t === ('(' + k + ')')) return true;
    return false;
  }

  function _setTooltip(el, desc, key){
    try{
      const k = _norm(key);
      const kind = _uiKind(el);
      const d = _formatDescForKind(kind, desc, el);
      const existing = _norm(el.getAttribute('title'));
      let base = existing;

      // If missing or auto-key title, replace with description.
      if(!existing || _looksLikeAutoKeyTitle(existing, k)){
        base = d || existing;
      }

      // If still empty, fall back to element text.
      if(!base){
        const txt = _norm(el.textContent);
        base = _short(txt, 220);
      }

       // Always append the element key in parentheses.
       base = _ensureKeySuffix(base, k);
       if(base) el.setAttribute('title', base);

       // For checkbox inputs inside a label, mirror title onto the label.
       if(kind === 'checkbox'){
         try{
           const lab = el.closest('label');
           if(lab && !lab.getAttribute('title')) lab.setAttribute('title', base);
         }catch(e){}
       }
    }catch(e){}
  }

  function _tableCellDesc(td){
    try{
      const tr = td && td.parentElement ? td.parentElement : null;
      const tbl = td.closest('table');
      if(!tbl) return _short(td.textContent, 200);
      const thead = tbl.querySelector('thead');
      const ths = thead ? Array.from(thead.querySelectorAll('th')) : [];
      const tds = tr ? Array.from(tr.querySelectorAll('td')) : [];
      const idx = tds.indexOf(td);
      const th = (idx >= 0 && idx < ths.length) ? ths[idx] : null;
      const col = th ? _norm(th.textContent) : '';
      const val = _short(td.textContent, 200);
      if(col && val) return col + ': ' + val;
      if(col) return col;
      return val;
    }catch(e){
      return _short(td && td.textContent ? td.textContent : '', 200);
    }
  }

  function apply(){
    try{
      const root = document.querySelector('main.content') || document.body;
      const sel = [
        'button',
        'select',
        'input[type="checkbox"]',
        // Keep a few explicit help blocks.
        '.muted.help',
        '[data-ui^="tip."]'
      ].join(',');
      const nodes = Array.from(root.querySelectorAll(sel));
      nodes.forEach(el => {
        const tag = String(el.tagName||'').toLowerCase();
        if(!tag) return;
        if(tag === 'script' || tag === 'style' || tag === 'meta' || tag === 'link' || tag === 'option') return;

        // Only for visible elements.
        try{
          if(el.offsetParent === null && tag !== 'body') return;
        }catch(e){}

        const key = _keyFromEl(el);
        let desc = '';

        const dui = _norm(el.getAttribute('data-ui'));
        if(dui && TIPS[dui]) desc = TIPS[dui];
        else if(tag === 'th'){
          const t = _norm(el.textContent);
          desc = t ? ('Spalte: ' + t) : '';
        }else if(tag === 'td'){
          desc = _tableCellDesc(el);
        }else if(tag === 'summary'){
          const t = _norm(el.textContent);
          desc = t ? ('Abschnitt: ' + t) : '';
        }else if(tag === 'details'){
          const sum = el.querySelector('summary');
          const t = sum ? _norm(sum.textContent) : '';
          desc = t ? ('Bereich: ' + t) : '';
        }else{
          desc = _autoTitleFromContext(el) || '';
        }

        // If we have no description, still provide a stable tooltip (name only).
        _setTooltip(el, desc, key);
      });
    }catch(e){}
  }

  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', apply);
    else apply();
  }catch(e){}

  // Apply again on dynamic UI changes (tables, modals, etc.) - debounced
  try{
    let t = null;
    const obs = new MutationObserver(()=>{
      if(t) return;
      t = setTimeout(()=>{ t = null; apply(); }, 80);
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }catch(e){}
})();
</script>

// Used by err(...) functions to make errors visible.
(function(){
  if(window.InfluxBroPopup && window.InfluxBroPopup.error) return;

  let LAST = { msg: '', at: 0 };

  function _ensureUi(){
    let root = document.getElementById('influxbro_popup_root');
    if(root) return root;

    root = document.createElement('div');
    root.id = 'influxbro_popup_root';
    root.style.position = 'fixed';
    root.style.inset = '0';
    root.style.zIndex = '10050';
    root.style.display = 'none';
    root.style.background = 'rgba(0,0,0,0.45)';
    root.style.padding = '6vh 12px 12px 12px';
    root.style.boxSizing = 'border-box';
    root.style.overflow = 'auto';

    const card = document.createElement('div');
    card.id = 'influxbro_popup_card';
    card.style.maxWidth = '760px';
    card.style.margin = '0 auto';
    card.style.background = '#fff';
    card.style.borderRadius = '16px';
    card.style.boxShadow = '0 12px 60px rgba(0,0,0,0.28)';
    card.style.padding = '14px 14px 12px 14px';
    card.style.boxSizing = 'border-box';

    const head = document.createElement('div');
    head.style.display = 'flex';
    head.style.alignItems = 'baseline';
    head.style.justifyContent = 'space-between';
    head.style.gap = '12px';

    const title = document.createElement('div');
    title.id = 'influxbro_popup_title';
    title.textContent = 'Fehler';
    title.style.fontWeight = '800';
    title.style.fontSize = '16px';

    const btn = document.createElement('button');
    btn.id = 'influxbro_popup_close';
    btn.textContent = 'Schliessen';
    btn.style.cursor = 'pointer';
    btn.style.padding = '10px 12px';

    head.appendChild(title);
    head.appendChild(btn);

    const pre = document.createElement('pre');
    pre.id = 'influxbro_popup_pre';
    pre.style.margin = '10px 0 0 0';
    pre.style.padding = '10px 12px';
    pre.style.border = '1px solid #eee';
    pre.style.borderRadius = '12px';
    pre.style.background = '#fafafa';
    pre.style.whiteSpace = 'pre-wrap';
    pre.style.overflowWrap = 'anywhere';

    card.appendChild(head);
    card.appendChild(pre);
    root.appendChild(card);
    document.body.appendChild(root);

    function close(){
      try{ root.style.display = 'none'; }catch(e){}
    }

    btn.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){} close(); });
    root.addEventListener('click', (ev)=>{
      if(ev && ev.target === root) close();
    });
    document.addEventListener('keydown', (ev)=>{
      try{ if(ev && ev.key === 'Escape' && root.style.display !== 'none') close(); }catch(e){}
    });

    return root;
  }

  function _show(title, msg){
    const root = _ensureUi();
    const t = document.getElementById('influxbro_popup_title');
    const pre = document.getElementById('influxbro_popup_pre');
    if(t) t.textContent = title || 'Hinweis';
    if(pre) pre.textContent = String(msg || '');
    root.style.display = 'block';
  }

window.InfluxBroPopup = {
    error: (msg) => {
      const s = String(msg || '').trim();
      if(!s) return;
      const now = Date.now();
      if(LAST.msg === s && (now - LAST.at) < 800) return;
      LAST = { msg: s, at: now };
      _show('Fehler', s);
    }
  };
})();
</script>

<script>
// Client-side error logging (browser -> server log)
// Also keeps a small local ring buffer for export.
(function(){
  if(window.InfluxBroClientLog) return;

  const LS_KEY = 'influxbro_client_errors_v1';
  const MAX = 50;

  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }
  function _href(){
    try{ return String(location && location.href ? location.href : ''); }catch(e){ return ''; }
  }
  function _ua(){
    try{ return String(navigator && navigator.userAgent ? navigator.userAgent : ''); }catch(e){ return ''; }
  }
  function _nowIso(){
    try{ return new Date().toISOString(); }catch(e){ return ''; }
  }

  function _load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      const j = raw ? JSON.parse(raw) : [];
      return Array.isArray(j) ? j : [];
    }catch(e){
      return [];
    }
  }
  function _save(xs){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(xs)); }catch(e){}
  }
  function _push(entry){
    const xs = _load();
    xs.push(entry);
    while(xs.length > MAX) xs.shift();
    _save(xs);
  }

  let LAST_SEND = { key: '', at: 0 };

  async function _send(entry){
    try{
      const key = String(entry && entry.message ? entry.message : '');
      const now = Date.now();
      if(key && LAST_SEND.key === key && (now - LAST_SEND.at) < 800) return;
      LAST_SEND = { key, at: now };

      await fetch('./api/client_error', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          page: entry.page,
          message: entry.message,
          href: entry.href,
          ua: entry.ua,
          stack: entry.stack,
          extra: entry.extra,
        })
      });
    }catch(e){}
  }

  function reportError(message, extra, stack){
    const entry = {
      at: _nowIso(),
      page: _page(),
      message: String(message || '').slice(0, 8000),
      href: _href(),
      ua: _ua(),
      stack: String(stack || '').slice(0, 8000),
      extra: extra || null,
    };
    _push(entry);
    _send(entry);
  }

  function fetchError(url, opts, err){
    const m = (err && err.message) ? String(err.message) : String(err);
    reportError('Failed to fetch: ' + String(url || ''), {
      kind: 'fetch',
      url: String(url || ''),
      method: (opts && opts.method) ? String(opts.method) : 'GET',
      err: m,
    }, (err && err.stack) ? String(err.stack) : '');
  }

  window.InfluxBroClientLog = {
    reportError,
    fetchError,
    getBuffer: () => _load(),
  };

  // Global JS error hooks
  window.addEventListener('error', (ev)=>{
    try{
      const msg = ev && ev.message ? String(ev.message) : 'JS error';
      const src = ev && ev.filename ? String(ev.filename) : '';
      const line = ev && typeof ev.lineno === 'number' ? ev.lineno : null;
      const col = ev && typeof ev.colno === 'number' ? ev.colno : null;
      const stack = (ev && ev.error && ev.error.stack) ? String(ev.error.stack) : '';
      reportError(msg, { kind:'window.error', src, line, col }, stack);
    }catch(e){}
  });
  window.addEventListener('unhandledrejection', (ev)=>{
    try{
      const r = ev ? ev.reason : null;
      const msg = (r && r.message) ? String(r.message) : String(r || 'Unhandled promise rejection');
      const stack = (r && r.stack) ? String(r.stack) : '';
      reportError(msg, { kind:'unhandledrejection' }, stack);
    }catch(e){}
  });
})();
</script>
