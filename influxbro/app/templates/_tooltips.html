  function _norm(s){
    return String(s || '').replace(/\s+/g, ' ').trim();
  }

  function _keyFromEl(el){
    try{
      if(!el) return '';
      const dui = _norm(el.getAttribute('data-ui'));
      if(dui) return dui;
      const id = _norm(el.getAttribute('id'));
      if(id) return '#' + id;

      // Table cells: try to derive a stable key from table + column
      const td = String(el.tagName||'').toLowerCase() === 'td' ? el : null;
      const th = String(el.tagName||'').toLowerCase() === 'th' ? el : null;
      const cell = td || th;
      if(cell){
        const tbl = cell.closest('table');
        const tid = tbl && tbl.getAttribute('id') ? _norm(tbl.getAttribute('id')) : '';
        const colKey = _norm(cell.getAttribute('data-key'));
        if(tid && colKey) return tid + ':' + colKey;
        if(tid) return tid;
      }

      const tag = String(el.tagName||'').toLowerCase();
      const cls = _norm(el.getAttribute('class'));
      if(cls){
        const c0 = cls.split(' ').filter(Boolean)[0] || '';
        if(c0) return tag + '.' + c0;
      }
      return tag;
    }catch(e){
      return '';
    }
  }

  function _ensureKeySuffix(title, key){
    const t = _norm(title);
    const k = _norm(key);
    if(!k) return t;
    const suffix = `<${k}>`;
    if(t.includes(suffix)) return t;
    return (t ? (t + '\n' + suffix) : suffix);
  }

  function _short(s, n){
    const x = _norm(s);
    if(!x) return '';
      const m = Number(n) || 110;
    return x.length > m ? (x.slice(0, m) + '...') : x;
  }

  function _decap(s){
    const x = _norm(s);
    if(!x) return '';
    const c0 = x[0];
    if(c0 >= 'A' && c0 <= 'Z') return c0.toLowerCase() + x.slice(1);
    return x;
  }

  function _uiKind(el){
    try{
      const tag = String(el && el.tagName ? el.tagName : '').toLowerCase();
      if(tag === 'button') return 'button';
      if(tag === 'select') return 'select';
      if(tag === 'input'){
        const t = String(el.getAttribute('type') || '').toLowerCase();
        if(t === 'checkbox') return 'checkbox';
        return 'input';
      }
      return tag;
    }catch(e){
      return '';
    }
  }

  function _formatDescForKind(kind, desc, el){
    const d0 = _norm(desc);
    if(!kind) return d0;

    if(kind === 'button'){
      if(d0) return 'Dieser Button ' + _decap(d0);
      const t = _norm(el && el.textContent ? el.textContent : '');
      return t ? ('Dieser Button fuehrt aus: ' + t) : 'Dieser Button';
    }

    if(kind === 'checkbox'){
      if(d0) return 'Diese Checkbox ' + _decap(d0);
      const auto = _autoTitleFromContext(el) || '';
      const lbl = _norm(auto.split(':')[0] || auto);
      return lbl ? ('Diese Checkbox aktiviert/deaktiviert: ' + lbl) : 'Diese Checkbox';
    }

    if(kind === 'select'){
      if(d0) return 'Dieses Auswahlfeld ' + _decap(d0);
      const auto = _autoTitleFromContext(el) || '';
      const lbl = _norm(auto.split(':')[0] || auto);
      return lbl ? ('Dieses Auswahlfeld waehlt: ' + lbl) : 'Dieses Auswahlfeld';
    }

    return d0;
  }

  function _autoTitleFromContext(el){
    try{
      const tag = String(el && el.tagName ? el.tagName : '').toLowerCase();
      const isBtn = tag === 'button';
      const isInput = (tag === 'input' || tag === 'select' || tag === 'textarea');

      let labelTxt = '';
      let helpTxt = '';

      // Search a few ancestor levels for a nearby label/help.
      let cur = el;
      for(let i=0; i<5; i++){
        const p = cur && cur.parentElement ? cur.parentElement : null;
        if(!p) break;

        // Prefer a single label in the container.
        const labels = Array.from(p.querySelectorAll('label'))
          .map(l => _norm(l.textContent))
          .filter(Boolean);
        if(!labelTxt && labels.length){
          labelTxt = labels[0];
        }

        // Prefer explicit help blocks.
        if(!helpTxt){
          const h = p.querySelector('.muted.help') || p.querySelector('.muted');
          if(h) helpTxt = _norm(h.textContent);
        }

        if(labelTxt || helpTxt) break;
        cur = p;
      }

      if(isBtn){
        const t = _norm(el.textContent);
        const extra = helpTxt && helpTxt !== t ? helpTxt : '';
        return _short(extra ? (t + ': ' + extra) : t, 220);
      }

      if(isInput){
        if(labelTxt && helpTxt && helpTxt !== labelTxt){
          return _short(labelTxt + ': ' + helpTxt, 220);
        }
        if(labelTxt) return _short(labelTxt, 220);
        if(helpTxt) return _short(helpTxt, 220);
      }
    }catch(e){}
    return '';
  }

  function _looksLikeAutoKeyTitle(existing, key){
    const t = _norm(existing);
    const k = _norm(key);
    if(!t) return true;
    if(k && (t === k || t === ('#' + k) || t === ('data-ui:' + k))) return true;
    if(k && t === ('(' + k + ')')) return true;
    if(k && t === ('<' + k + '>')) return true;
    return false;
  }

  function _setTooltip(el, desc, key){
    try{
      const k = _norm(key);
      const kind = _uiKind(el);
      const d = _formatDescForKind(kind, desc, el);
      const existing = _norm(el.getAttribute('data-ib-title')) || _norm(el.getAttribute('title'));
      let base = existing;

      // If missing or auto-key title, replace with description.
      if(!existing || _looksLikeAutoKeyTitle(existing, k)){
        base = d || existing;
      }

      // If still empty, fall back to element text.
      if(!base){
        const txt = _norm(el.textContent);
        base = _short(txt, 220);
      }

       // Keep tooltips short (max. 2 lines) and append the key in parentheses on the second line.
       base = _short(base, 110);
       base = _ensureKeySuffix(base, k);
       if(base) el.setAttribute('data-ib-title', base);
       // Never keep native browser tooltips.
       try{ if(el.hasAttribute('title')) el.removeAttribute('title'); }catch(e){}

       // For checkbox inputs inside a label, mirror tooltip onto the label.
       if(kind === 'checkbox'){
         try{
           const lab = el.closest('label');
           if(lab){
             if(base && !lab.getAttribute('data-ib-title')) lab.setAttribute('data-ib-title', base);
             try{ if(lab.hasAttribute('title')) lab.removeAttribute('title'); }catch(e){}
           }
         }catch(e){}
       }
    }catch(e){}
  }

  function _tableCellDesc(td){
    try{
      const val = _short(td.textContent, 200);
      return val;
    }catch(e){
      return _short(td && td.textContent ? td.textContent : '', 200);
    }
  }

  function _pickerModeActive(){
    try{
      return !!document.querySelector('#ui_picker_toggle.active, #ui_superpicker_toggle.active');
    }catch(e){
      return false;
    }
  }

  function apply(){
    try{
      if(_pickerModeActive()) return;
      const root = document.querySelector('main.content') || document.body;

      // Performanceanalyse: Diagramm/Korrelation section should not use browser title-tooltips.
      // The diagram itself uses a custom dark tooltip.
      const perfDiag = root.querySelector('details[data-ui="perf_page.diagram.section_root" data-ib-pickkey="perf_page.diagram.section_root"]');
      if(perfDiag){
        try{ if(perfDiag.hasAttribute('title')) perfDiag.removeAttribute('title'); }catch(e){}
        try{ perfDiag.querySelectorAll('[title]').forEach(x=>{ try{ x.removeAttribute('title'); }catch(e){}; }); }catch(e){}
      }

      const sel = [
        'button',
        'select',
        'input[type="checkbox"]',
        // Keep a few explicit help blocks.
        '.muted.help',
        '[data-ui^="tip."]'
      ].join(',');
      const nodes = Array.from(root.querySelectorAll(sel));
      nodes.forEach(el => {
        try{ if(perfDiag && (el === perfDiag || perfDiag.contains(el))) return; }catch(e){}
        const tag = String(el.tagName||'').toLowerCase();
        if(!tag) return;
        if(tag === 'script' || tag === 'style' || tag === 'meta' || tag === 'link' || tag === 'option') return;

        // Only for visible elements.
        try{
          if(el.offsetParent === null && tag !== 'body') return;
        }catch(e){}

        const key = _keyFromEl(el);
        let desc = '';

        const dui = _norm(el.getAttribute('data-ui'));
        if(dui && TIPS[dui]) desc = TIPS[dui];
        else if(tag === 'th'){
          const t = _norm(el.textContent);
          desc = t ? ('Spalte: ' + t) : '';
        }else if(tag === 'td'){
          desc = _tableCellDesc(el);
        }else if(tag === 'summary'){
          const t = _norm(el.textContent);
          desc = t ? ('Abschnitt: ' + t) : '';
        }else if(tag === 'details'){
          const sum = el.querySelector('summary');
          const t = sum ? _norm(sum.textContent) : '';
          desc = t ? ('Bereich: ' + t) : '';
        }else{
          desc = _autoTitleFromContext(el) || '';
        }

        // If we have no description, still provide a stable tooltip (name only).
        _setTooltip(el, desc, key);
      });
    }catch(e){}
  }

  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', apply);
    else apply();
  }catch(e){}

  // Apply again on dynamic UI changes (tables, modals, etc.) - debounced
  try{
    let t = null;
    const obs = new MutationObserver(()=>{
      if(_pickerModeActive()) return;
      if(t) return;
      t = setTimeout(()=>{ t = null; apply(); }, 80);
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }catch(e){}
})();

      else btn.setAttribute('aria-label', String(o.aria || ''));
      if(o.tip === null){
        if(o.title !== null && o.title !== undefined){
          // Migrate legacy title storage to custom tooltip storage.
          try{ btn.setAttribute('data-ib-title', String(o.title || '')); }catch(e){}
        }else{
          btn.removeAttribute('data-ib-title');
        }
      }else{
        try{ btn.setAttribute('data-ib-title', String(o.tip || '')); }catch(e){}
      }
      // Never restore native browser tooltips.
      try{ if(btn.hasAttribute('title')) btn.removeAttribute('title'); }catch(e){}
      btn.removeAttribute('data-ib-icon-ov');
      btn.removeAttribute('data-ib-iconized');
      ORIG.delete(btn);
    }catch(e){}
  }

  function _applySvg(btn, svgHtml, labelForAria){
    try{
      if(!btn) return;
      const svg = _parseSvg(svgHtml);
      if(!svg) return;
      _storeOrig(btn);

      // If there is already an SVG inside, replace the first one.
      const existing = btn.querySelector ? btn.querySelector('svg') : null;
      if(existing && existing.parentNode){
        existing.replaceWith(svg);
      }else{
        // Keep existing label content if present.
        const hasElChild = Array.from(btn.childNodes || []).some(n => n && n.nodeType === Node.ELEMENT_NODE);
        if(!hasElChild){
          btn.innerHTML = '';
          btn.appendChild(svg);
        }else{
          btn.insertBefore(svg, btn.firstChild);
        }
      }

      const aria = _norm(btn.getAttribute('aria-label'));
      const title = _norm(btn.getAttribute('data-ib-title')) || _norm(btn.getAttribute('title'));
      const lbl = _norm(labelForAria || aria || btn.textContent);
      if(!aria && lbl) btn.setAttribute('aria-label', lbl);
      if(!title && lbl) btn.setAttribute('data-ib-title', lbl);
      try{ if(btn.hasAttribute('title')) btn.removeAttribute('title'); }catch(e){}
      btn.setAttribute('data-ib-icon-ov', '1');
    }catch(e){}
  }

  function _apply(root){
    try{
      const scope = root || (document.querySelector('main.content') || document.body);
      scope.querySelectorAll('button[data-ui],button.btn_sm').forEach((btn)=>{
        try{
          const uiKey = _norm(btn.getAttribute('data-ui'));
          const ov = uiKey && OV.items ? OV.items[uiKey] : null;
          if(ov){
            _applySvg(btn, ov, uiKey);
            return;
          }

          // Fallback: old behavior (exact text match on pure-text small buttons).
          if(btn.classList && btn.classList.contains('btn_sm')){
            if(btn.querySelector && btn.querySelector('svg')) return;
            const hasElChild = Array.from(btn.childNodes || []).some(n => n && n.nodeType === Node.ELEMENT_NODE);
            if(hasElChild) return;
            const txt = _norm(btn.textContent);
            if(txt && MAP[txt]){
              _storeOrig(btn);
              if(!btn.getAttribute('aria-label')) btn.setAttribute('aria-label', txt);
              if(!_norm(btn.getAttribute('data-ib-title')) && !_norm(btn.getAttribute('title'))) btn.setAttribute('data-ib-title', txt);
              try{ if(btn.hasAttribute('title')) btn.removeAttribute('title'); }catch(e){}
              btn.innerHTML = MAP[txt];
              btn.setAttribute('data-ib-iconized', '1');
              return;
            }
          }

          // If it was overridden/iconized before but there is no rule anymore: restore.
          if(btn.hasAttribute('data-ib-icon-ov') || btn.hasAttribute('data-ib-iconized')) _restore(btn);
        }catch(e){}
      });
    }catch(e){}
  }

  async function _load(){
    try{
      if(OV.loading) return OV.loading;
      OV.loading = fetch('./api/icon_svg')
        .then(r=>r.json())
        .then(j=>{
          if(j && j.ok && j.items && typeof j.items === 'object') OV.items = j.items;
          OV.loaded = true;
        })
        .catch(()=>{})
        .finally(()=>{ OV.loading = null; });
      return OV.loading;
    }catch(e){
      return null;
    }
  }

  // Exported hook: reload overrides and re-apply.
  try{
    window.InfluxBroApplyIconOverrides = function(root){
      try{
        return _load().then(()=>_apply(root)).catch(()=>_apply(root));
      }catch(e){
        try{ _apply(root); }catch(x){}
      }
    };
  }catch(e){}

  try{
    const run = ()=>{ try{ _load().then(()=>_apply(null)).catch(()=>_apply(null)); }catch(e){ try{ _apply(null); }catch(x){} } };
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
    else run();
  }catch(e){}

  // Keep it in sync with dynamic UI changes (no reload).
  try{
    let t = null;
    const obs = new MutationObserver(()=>{
      if(t) return;
      t = setTimeout(()=>{ t = null; _apply(null); }, 120);
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }catch(e){}
})();

// Section info icons: open the global popup with detailed help.
(function(){
  if(!window.InfluxBroDecodeInfoText){
    window.InfluxBroDecodeInfoText = function(text){
      const s = String(text || '');
      return s
        .replace(/\\r\\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t')
        .replace(/\\"/g, '"')
        .replace(/\\'/g, "'");
    };
  }

  function _norm(s){
    return String(s || '').replace(/\s+/g, ' ').trim();
  }

  function _getTitle(btn){
    const t = _norm(btn.getAttribute('data-info-title'));
    if(t) return t;
    const a = _norm(btn.getAttribute('aria-label'));
    if(a) return a;
    return 'Info';
  }

  function _getBody(btn){
    const b = String(btn.getAttribute('data-info-body') || '');
    return window.InfluxBroDecodeInfoText(b);
  }

  function _show(btn){
    const title = _getTitle(btn);
    const body = _getBody(btn);
    try{
      if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show(title, body);
      else alert(title + "\n\n" + body);
    }catch(e){
      try{ alert(title + "\n\n" + body); }catch(x){}
    }
  }

  function onClick(ev){
    try{
      const t = ev && ev.target ? ev.target : null;
      const btn = t && t.closest ? t.closest('button.ib_info_icon') : null;
      if(!btn) return;
      // Skip the global delegator when the button has a specific handler bound by
      // the page, signalled either by a dedicated attribute or by the absence of
      // both data-info-title and data-info-body while carrying a specific payload
      // (e.g. data-cache-info for the cache timeline info button in #343).
      const hasTitle = !!btn.getAttribute('data-info-title');
      const hasBody = !!btn.getAttribute('data-info-body');
      const skipGlobal = btn.hasAttribute('data-info-skip-global') || !!btn.getAttribute('data-cache-info');
      if(skipGlobal) return;
      if(!hasTitle && !hasBody) return;
      ev.preventDefault();
      ev.stopPropagation();
      _show(btn);
    }catch(e){}
  }

  try{
    document.addEventListener('click', onClick, true);
  }catch(e){}
})();
</script>

<script>
(function(){
  if(window.InfluxBroFieldClear) return;

  function dispatch(el){
    try{ el.dispatchEvent(new Event('input', { bubbles:true })); }catch(e){}
    try{ el.dispatchEvent(new Event('change', { bubbles:true })); }catch(e){}
  }

  function clearValue(el){
    try{
      if(!el) return;
      const tag = String(el.tagName || '').toLowerCase();
      if(tag === 'select'){
        el.value = '';
        if(String(el.value || '').trim() !== '' && el.options && el.options.length) el.selectedIndex = 0;
      }else{
        el.value = '';
      }
      dispatch(el);
      try{ el.focus(); }catch(e){}
    }catch(e){}
  }

  function ensureStyle(){
    try{
      if(document.getElementById('ib_clear_style')) return;
      const st = document.createElement('style');
      st.id = 'ib_clear_style';
      st.textContent = '.ib_clear_row{display:flex;align-items:center;gap:8px;width:100%}.ib_clear_row>input,.ib_clear_row>select,.ib_clear_row>textarea{flex:1 1 auto;min-width:0}.ib_clear_btn{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border:1px solid #cfd5e2;border-radius:10px;background:#fff;cursor:pointer;flex:0 0 auto;font-size:14px;font-weight:700;line-height:1}.ib_clear_btn:hover{background:#f6f7fb}.ib_clear_btn svg{width:16px;height:16px;pointer-events:none}';
      document.head.appendChild(st);
    }catch(e){}
  }

  function bind(btn){
    try{
      if(!btn || btn.dataset.ibClearReady === '1') return;
      ensureStyle();
      const targetId = String(btn.getAttribute('data-clear-for') || '').trim();
      if(!targetId) return;
      btn.addEventListener('click', (ev)=>{
        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        const el = document.getElementById(targetId);
        if(!el) return;
        clearValue(el);
      });
      btn.dataset.ibClearReady = '1';
    }catch(e){}
  }

  function scan(root){
    try{
      const scope = root || document;
      scope.querySelectorAll('.ib_clear_btn[data-clear-for]').forEach(bind);
    }catch(e){}
  }

  try{ scan(document); }catch(e){}
  try{
    const mo = new MutationObserver((mut)=>{ try{ (mut||[]).forEach(m=>{ (m.addedNodes||[]).forEach(n=>{ if(n && n.querySelectorAll) scan(n); }); }); }catch(e){}; });
    mo.observe(document.documentElement, { childList:true, subtree:true });
  }catch(e){}

  window.InfluxBroFieldClear = { scan };
})();
</script>

<script>
(function(){
  if(window.InfluxBroCascade) return;

  function _values(items){
    return (items || []).map(x => String(x || '').trim()).filter(Boolean);
  }

  function syncInput(input, items, opts){
    try{
      if(!input) return false;
      const o = opts || {};
      const xs = _values(items);
      const cur = String(input.value || '').trim();
      const valid = cur && xs.includes(cur);
      const preserveFocused = !!(o.preserveWhileFocused && document && document.activeElement === input);
      if(preserveFocused) return cur && !valid;
      if(cur && !valid && o.clearInvalid !== false) input.value = '';
      if(xs.length !== 1) return cur && !valid;
      if(o.requireSource){
        const sources = Array.isArray(o.requireSource) ? o.requireSource : [o.requireSource];
        const ok = sources.some(el => String(el && el.value || '').trim());
        if(!ok) return cur && !valid;
      }
      if(valid) return false;
      input.value = xs[0];
      return true;
    }catch(e){
      return false;
    }
  }

  window.InfluxBroCascade = { syncInput };
})();
</script>

    function _clampPopupSize(){
      try{
        const maxW = Math.max(320, window.innerWidth - 24);
        const maxH = Math.max(220, window.innerHeight - 24);
        const curW = Math.min(maxW, Math.max(320, Math.round(card.getBoundingClientRect().width || 0) || 860));

        card.style.maxHeight = maxH + 'px';
        card.style.width = curW + 'px';
        card.style.height = curH + 'px';
      }catch(e){}
    }

    function _applyPopupSize(title){
      try{
        CURRENT_POPUP_SIZE_KEY = _popupSizeStorageKey(title);
        const raw = localStorage.getItem(CURRENT_POPUP_SIZE_KEY);
        if(raw){
          const data = JSON.parse(raw);
          const w = Number(data && data.w);
          const h = Number(data && data.h);
          if(isFinite(w) && w >= 320) card.style.width = Math.round(w) + 'px';
          if(isFinite(h) && h >= 200) card.style.height = Math.round(h) + 'px';
        }
        _clampPopupSize();
      }catch(e){}
    }

    function _savePopupSize(){
      try{
        const rect = card.getBoundingClientRect();
        const payload = { w: Math.round(rect.width), h: Math.round(rect.height) };
        localStorage.setItem(CURRENT_POPUP_SIZE_KEY, JSON.stringify(payload));
      }catch(e){}
    }

    function _historyEntries(scope){
      try{
        return (window.InfluxBroQueryHistory && window.InfluxBroQueryHistory.list) ? window.InfluxBroQueryHistory.list(scope) : [];
      }catch(e){ return []; }
    }

    function _historyDisplayTime(it, clientTime){
      try{
        if(clientTime) return _fmtLocalTs(it && (it.started_at_client || it.at_client || it.at) ? (it.started_at_client || it.at_client || it.at) : '');
        return String(it && (it.started_at_source || it.at_source || it.at) ? (it.started_at_source || it.at_source || it.at) : '');
      }catch(e){ return ''; }
    }

    function _latestHistoryEntry(scope, queryText){
      try{
        const xs = _historyEntries(scope);
        const q = String(queryText || '').trim();
        if(q){
          for(let i = xs.length - 1; i >= 0; i -= 1){
            const it = xs[i];
            if(String(it && it.query ? it.query : '').trim() === q) return it || null;
          }
        }
        return xs.length ? (xs[xs.length - 1] || null) : null;
      }catch(e){ return null; }
    }

    function _historyTextEntries(scope, query, clientTime){
      try{
        const xs = _historyEntries(scope);
        const q = String(query || '').trim().toLowerCase();
        const filtered = !q ? xs : xs.filter((it)=>{
          const hay = [it && it.at, it && it.started_at_client, it && it.started_at_source, it && it.label, it && it.query, it && it.response, it && it.trigger_page, it && it.trigger_button, it && it.trigger_program, it && it.trace_id, it && it.action, (it && it.dur_ms !== undefined ? String(it.dur_ms) : '')].map(v => String(v || '').toLowerCase()).join('\n');
          return hay.includes(q);
        });
        return filtered.slice().reverse().map((it, idx)=>{
          const parts = [];
          const dur = (it && it.dur_ms !== null && it.dur_ms !== undefined && isFinite(Number(it.dur_ms))) ? Math.max(0, Math.round(Number(it.dur_ms))) : null;
          const durTxt = (dur !== null) ? (' | ' + String(dur) + ' ms') : '';
          parts.push(`#${idx + 1} | ${_historyDisplayTime(it, clientTime)}${it && it.label ? ' | ' + String(it.label) : ''}${durTxt}`);
          const trigger = _fmtTrigger(it);
          if(trigger) parts.push('ausgeloest durch: ' + trigger);
          if(dur !== null) parts.push('Dauer: ' + String(dur) + ' ms');
          parts.push('query:');
          parts.push(String(it && it.query ? it.query : '(leer)'));
          if(it && it.response){
            parts.push('response:');
            parts.push(String(it.response));
          }
          return parts.join('\n');
        }).join('\n\n-----\n\n');
      }catch(e){ return ''; }
    }

    try{

        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        if(historyBox.style.display === 'none') return;
        const total = contentWrap.getBoundingClientRect().height || 0;
        const histRect = historyBox.getBoundingClientRect();
        SPLIT_DRAG = { startY: ev.clientY, startH: histRect.height, totalH: total };
        document.body.style.userSelect = 'none';
      });
      window.addEventListener('mousemove', (ev)=>{
        if(!SPLIT_DRAG) return;
        const delta = SPLIT_DRAG.startY - ev.clientY;
        const contentGap = (()=>{ try{ return parseFloat(getComputedStyle(contentWrap).rowGap || getComputedStyle(contentWrap).gap || '0') || 0; }catch(e){ return 8; } })();
        const splitH = (()=>{ try{ return Math.round(split.getBoundingClientRect().height || 0) || 10; }catch(e){ return 10; } })();
        const preMin = (()=>{ try{ return parseFloat(getComputedStyle(pre).minHeight || '0') || 48; }catch(e){ return 48; } })();
        const histMin = (()=>{ try{ return parseFloat(getComputedStyle(historyBox).minHeight || '0') || 48; }catch(e){ return 48; } })();
        const reserve = preMin + splitH + contentGap;
        const maxH = Math.max(histMin, Math.round((SPLIT_DRAG.totalH || 0) - reserve));
        const nextH = Math.max(histMin, Math.min(maxH, Math.round((SPLIT_DRAG.startH || 180) + delta)));
        historyBox.style.flex = '0 0 ' + nextH + 'px';
      });
      window.addEventListener('mouseup', ()=>{
        if(!SPLIT_DRAG) return;
        SPLIT_DRAG = null;
        document.body.style.userSelect = '';
      });
    }catch(e){}

    async function doCopy(){
      try{ copyHint.textContent = ''; }catch(e){}
      const txt = String(_popupCurrentCopyText() || '');
      if(!txt){
        try{ copyHint.textContent = 'nichts zu kopieren'; }catch(e){}
        return;
      }
      try{
        // Modern API (usually requires secure context / permissions)
        let did = false;
        try{
          if(navigator && navigator.clipboard && navigator.clipboard.writeText && window && window.isSecureContext){
            await navigator.clipboard.writeText(txt);
            did = true;
          }
        }catch(e){ did = false; }

        if(!did){
          // Fallback for restricted/embedded contexts (e.g. HA ingress iframe)
          const ta = document.createElement('textarea');
          ta.value = txt;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          ta.style.top = '0';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          try{ ta.setSelectionRange(0, ta.value.length); }catch(e){}
          const success = document.execCommand('copy');
          document.body.removeChild(ta);
          if(!success) throw new Error('execCommand copy failed');
        }
        try{ copyHint.textContent = 'kopiert'; }catch(e){}
        setTimeout(()=>{ try{ copyHint.textContent = ''; }catch(e){} }, 900);
      }catch(e){
        try{ copyHint.textContent = 'copy fehlgeschlagen: ' + e.message; }catch(x){}
        console.error('Copy error:', e);
      }
    }
       copyBtn.addEventListener('click', (ev)=>{

       });
     });

    function _filenameFromContentDisposition(cd){
      try{
        const s = String(cd || '');
        const m = s.match(/filename\*=UTF-8''([^;]+)|filename="([^"]+)"|filename=([^;]+)/i);
        const raw = m ? (m[1] || m[2] || m[3]) : '';
        const fn = raw ? decodeURIComponent(raw.trim()) : '';
        return fn || '';
      }catch(e){
        return '';
      }
    }

    function _clip(s, n){
      const t = String(s || '');
      const m = Number(n) || 6000;
      return t.length > m ? (t.slice(0, m) + '\n... (truncated)') : t;
    }

    function _safeTitleFromMsg(msg){
      try{
        const s = String(msg || '').replace(/\s+/g, ' ').trim();
        if(!s) return 'Bugreport';
        const short = s.length > 80 ? (s.slice(0, 77) + '...') : s;
        return short;
      }catch(e){
        return 'Bugreport';
      }
    }

    function _snapshotLocalStorage(){
      try{
        const out = {};
        if(!window.localStorage) return out;
        for(let i=0; i<localStorage.length; i++){
          const k = localStorage.key(i);
          if(!k) continue;
          // Avoid storing huge values.
          const v = String(localStorage.getItem(k) || '');
          out[k] = v.length > 2000 ? (v.slice(0, 2000) + '...') : v;
        }
        return out;
      }catch(e){
        return {};
      }
    }

    async function _downloadDebugReport(issueTitle, msg, functionName){
      const payload = {
        tail: 0,
        issue: {
          title: String(issueTitle || ''),
          description: String(msg || ''),
          function: String(functionName || ''),
          steps: '',
        },
        client: {
          exported_at: new Date().toISOString(),
          page: 'popup',

          },
          client_errors: (window.InfluxBroClientLog && window.InfluxBroClientLog.getBuffer) ? window.InfluxBroClientLog.getBuffer() : [],
          local_storage: _snapshotLocalStorage(),
        }
      };

      let r;
      try{
        r = await fetch('./api/debug_report', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});

        try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/debug_report', payload, e); }catch(x){}

      }
      if(!r.ok){
        const t = await r.text().catch(()=> '');
        throw new Error(t || ('HTTP ' + r.status));
      }
      const blob = await r.blob();
      const cd = r.headers.get('content-disposition');
      const fn = _filenameFromContentDisposition(cd) || 'influxbro_debug_report.md';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fn;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{
        try{ URL.revokeObjectURL(a.href); }catch(e){}
        try{ a.remove(); }catch(e){}
      }, 0);
      return fn;
    }

    function _buildIssueBody(kind, userText, msg, meta, debugFilename, supportBundleFilename, functionName){
      const addonV = meta && meta.addon_version ? String(meta.addon_version) : '';
      const haCore = meta && meta.ha && meta.ha.core ? String(meta.ha.core) : '';
      const haSup = meta && meta.ha && meta.ha.supervisor ? String(meta.ha.supervisor) : '';
      const haOs = meta && meta.ha && meta.ha.os ? String(meta.ha.os) : '';
      const influxV = meta && meta.influx && meta.influx.version ? String(meta.influx.version) : '';
      const haArch = meta && meta.ha && meta.ha.arch ? String(meta.ha.arch) : '';
      const haInst = meta && meta.ha && meta.ha.installation_type ? String(meta.ha.installation_type) : '';
      const haPlat = meta && meta.ha && meta.ha.platform ? String(meta.ha.platform) : '';
      const recentActions = Array.isArray(meta && meta.recent_actions) ? meta.recent_actions : [];

      let body = '';
      if(kind === 'enhancement'){
        body += '### Gewuenschte Erweiterung\n\n';
        body += _clip(userText, 4000) + '\n\n';
        if(functionName) body += '### Funktion / Menueeintrag\n\n' + _clip(functionName, 200) + '\n\n';
        body += '### Kontext / Ausloeser\n\n';
        body += _clip(msg || 'Kein Popup-Text vorhanden.', 1200) + '\n\n';
      }else{
        body += '### Fehlerbeschreibung\n\n';
        body += _clip(userText, 4000) + '\n\n';
        if(functionName) body += '### Funktion / Menueeintrag\n\n' + _clip(functionName, 200) + '\n\n';
        body += '### Ausloeser / Aktion\n\n';
        body += _clip(msg, 1200) + '\n\n';
      }

      body += '### System / Versionen\n\n';
      if(haArch) body += '- architecture: ' + haArch + '\n';
      if(haInst) body += '- installation-type: ' + haInst + '\n';
      if(haPlat) body += '- platform: ' + haPlat + '\n';
      if(haSup) body += '- supervisor-version: ' + haSup + '\n';
      if(haCore) body += '- ha-version: ' + haCore + '\n';
      if(addonV) body += '- addon-version: ' + addonV + '\n';
      if(haOs) body += '- ha-os: ' + haOs + '\n';
      if(influxV) body += '- influx-version: ' + influxV + '\n';
      body += '\n';

      body += '### Aktionsliste\n\n';
      if(recentActions.length){
        recentActions.slice(-5).forEach((it) => {
          const at = it && it.at ? String(it.at) : '';
          const ui = it && it.ui ? String(it.ui) : '';
          const page = it && it.page ? String(it.page) : '';
          const text = it && it.text ? String(it.text) : '';
          body += '- ' + [at, page, ui, text].filter(Boolean).join(' | ') + '\n';
        });
      }else{
        body += '- keine aufgezeichneten Bedieneraktionen vorhanden\n';
      }
      body += '\n';

      if(kind === 'bug'){
        body += '### Debug report Anhang\n\n';
        body += '- Bitte die heruntergeladene Datei `influxbro_debug_report_*.md` anhaengen.\n';
        if(debugFilename) body += '- Bereits erzeugter Dateiname: `' + String(debugFilename) + '`\n';
        body += '\n';
        body += '### Support-Bundle (ZIP)\n\n';
        body += '- Optional: Support-Bundle ZIP anhaengen (serverseitig redigiert).\n';
        if(supportBundleFilename) body += '- Bereits erzeugter Dateiname: `' + String(supportBundleFilename) + '`\n';
      }
      return body;
    }

    function _openIssueComposer(opts){
      const composer = document.getElementById('influxbro_issue_composer');
      const kindEl = document.getElementById('influxbro_issue_kind');
      const titleEl = document.getElementById('influxbro_issue_title');
      const textEl = document.getElementById('influxbro_issue_text');
      const labelEl = document.getElementById('influxbro_issue_text_label');
      const functionEl = document.getElementById('influxbro_issue_function');
      const hintEl = document.getElementById('influxbro_issue_hint');
      const attachHelpEl = document.getElementById('influxbro_issue_attach_help');
      const bundleBoxEl = document.getElementById('influxbro_issue_support_bundle_box');
      const bundleChkEl = document.getElementById('influxbro_issue_support_bundle');
      const statusEl = document.getElementById('influxbro_issue_status');
      const cancelEl = document.getElementById('influxbro_issue_cancel');
      const submitEl = document.getElementById('influxbro_issue_submit');
      if(!composer || !kindEl || !titleEl || !textEl || !labelEl || !functionEl || !hintEl || !statusEl || !cancelEl || !submitEl) return;

      const msg = String(opts && opts.msg ? opts.msg : '').trim();
      const meta = opts && opts.meta ? opts.meta : null;
      const baseUrl = meta && meta.github_new_issue_url ? String(meta.github_new_issue_url) : '';
      const defaultBugText = String(opts && opts.prefillText ? opts.prefillText : 'siehe automatisch angehaengtes Logging / Bei Bedarf hier eigene Fehlerbeschreibung einfuegen....');
      const textState = { bug: defaultBugText, enhancement: '' };

      function close(){ composer.style.display = 'none'; statusEl.textContent = ''; }
      function sync(){
        const kind = String(kindEl.value || 'bug');
        const titlePrefix = (kind === 'enhancement') ? '[Enhancement]: ' : '[Bug]: ';
          const fallbackTitle = (kind === 'enhancement') ? 'Neue Erweiterung' : (String(opts && opts.prefillTitle ? opts.prefillTitle : _safeTitleFromMsg(msg)).replace(/^\[Bug\]:\s*/, ''));
        if(!String(titleEl.value || '').trim() || titleEl.dataset.autofill === '1'){
          titleEl.value = titlePrefix + fallbackTitle;
          titleEl.dataset.autofill = '1';
        }
        if(kind === 'enhancement'){
          labelEl.textContent = 'Erweiterung beschreiben';
          hintEl.textContent = 'Bitte die gewuenschte Erweiterung kurz beschreiben. Das Feld darf nicht leer bleiben.';
          if(attachHelpEl) attachHelpEl.style.display = 'none';
          if(bundleBoxEl) bundleBoxEl.style.display = 'none';
          textEl.value = textState.enhancement || '';
        }else{
          labelEl.textContent = 'Fehlerbeschreibung';
          hintEl.textContent = 'Bug erstellt ein Issue mit Label type/bug und laedt zusaetzlich einen Debug report herunter.';
          if(attachHelpEl) attachHelpEl.style.display = 'block';
          if(bundleBoxEl) bundleBoxEl.style.display = 'block';
          textEl.value = textState.bug || defaultBugText;
        }
        textEl.dataset.mode = kind;
      }

      kindEl.value = 'bug';
      functionEl.value = String(opts && opts.prefillFunction ? opts.prefillFunction : '');
      titleEl.dataset.autofill = '1';
      titleEl.oninput = ()=>{ titleEl.dataset.autofill = '0'; };
      kindEl.onchange = ()=>{
        const prevMode = String(textEl.dataset.mode || 'bug');
        textState[prevMode] = String(textEl.value || '');
        sync();
      };
      textEl.oninput = ()=>{
        const mode = String(textEl.dataset.mode || 'bug');
        textState[mode] = String(textEl.value || '');
      };
      cancelEl.onclick = close;
      sync();
      composer.style.display = 'block';
      setTimeout(()=>{ try{ textEl.focus(); textEl.select(); }catch(e){} }, 0);

      submitEl.onclick = async ()=>{
        const kind = String(kindEl.value || 'bug');
        const title = String(titleEl.value || '').trim();

        const userText = String(textEl.value || '').trim();

        if(!functionName){ statusEl.textContent = 'Bitte Funktion / Menueeintrag auswaehlen.'; return; }
        if(!userText){ statusEl.textContent = kind === 'bug' ? 'Bitte Fehlerbeschreibung eingeben.' : 'Bitte Erweiterung beschreiben.'; return; }

          }
        }

        const labels = (kind === 'enhancement') ? 'type/enhancement' : 'type/bug';
        const body = _buildIssueBody(kind, userText, msg, meta, fn, zipFn, functionName);
        const url = baseUrl + '?labels=' + encodeURIComponent(labels) + '&title=' + encodeURIComponent(title) + '&body=' + encodeURIComponent(body);

        }
      };

    async function _smartBugRun(msgOverride){
      const smart = document.getElementById('influxbro_smart_bug');
      const modeEl = document.getElementById('influxbro_sba_mode');
      const whereEl = document.getElementById('influxbro_sba_where');
      const whenEl = document.getElementById('influxbro_sba_when');
      const expectedEl = document.getElementById('influxbro_sba_expected');
      const actualEl = document.getElementById('influxbro_sba_actual');
      const stepsEl = document.getElementById('influxbro_sba_steps');
      const cancelEl = document.getElementById('influxbro_sba_cancel');
      const snapEl = document.getElementById('influxbro_sba_snapshot');
      const submitEl = document.getElementById('influxbro_sba_submit');
      const statusEl = document.getElementById('influxbro_sba_status');
      if(!smart || !modeEl || !whereEl || !whenEl || !expectedEl || !actualEl || !stepsEl || !cancelEl || !snapEl || !submitEl || !statusEl) return;

      let meta = null;
      let analysisRows = [];
      let snapshotId = '';
      const msg = String((msgOverride !== undefined && msgOverride !== null) ? msgOverride : (CURRENT_POPUP_VISIBLE_TEXT || '')).trim();
      try{
        const r = await fetch('./api/bugreport_meta');
        meta = await r.json().catch(()=>null);
      }catch(e){ meta = null; }
      try{
        const r = await fetch('./api/analysis_history?limit=50');
        const j = await r.json().catch(()=>null);
        analysisRows = Array.isArray(j && j.rows) ? j.rows : [];
      }catch(e){ analysisRows = []; }
      const recent = Array.isArray(meta && meta.recent_actions) ? meta.recent_actions : [];
      const lines = [];
      recent.slice(-10).forEach((it, idx)=>{
        lines.push(`#UI ${idx+1} | ${String(it && it.at || '')} | ${String(it && it.page || '')} | ${String(it && it.ui || '')} | ${String(it && it.text || '')}`);
      });
      analysisRows.slice(-20).forEach((it, idx)=>{
        lines.push(`#LOG ${idx+1} | ${String(it && it.at || '')} | ${String(it && it.kind || '')} / ${String(it && it.step || '')} | ${String(it && it.status || '')} | ${String(it && it.detail || '')}`);
      });
      modeEl.value = 'auto';
      whereEl.value = '';
      whenEl.value = new Date().toISOString();
      expectedEl.value = '';
      actualEl.value = msg || '';
      stepsEl.value = lines.join('\n');
      statusEl.textContent = '';
      smart.style.display = 'block';
      setTimeout(()=>{ try{ whereEl.focus(); }catch(e){} }, 0);

      cancelEl.onclick = ()=>{ smart.style.display = 'none'; statusEl.textContent = ''; };
      snapEl.onclick = async ()=>{

          const j = await r.json().catch(()=>null);
          if(!j || !j.ok) throw new Error(j && j.error ? j.error : 'Snapshot fehlgeschlagen');
          snapshotId = String(j.row && j.row.id || '');
          statusEl.textContent = snapshotId ? ('Snapshot: ' + snapshotId) : 'Snapshot erzeugt';
        }catch(e){ statusEl.textContent = String(e && e.message ? e.message : e); }
      };
      submitEl.onclick = async ()=>{

<script>
// Persistent UI error history (for query/GUI errors)
(function(){
  if(window.InfluxBroErrors) return;

  const LS_KEY = 'influxbro_ui_errors_v1';
  const MAX = 30;

  function _nowIso(){
    try{ return new Date().toISOString(); }catch(e){ return ''; }
  }
  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }

  function _load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      const j = raw ? JSON.parse(raw) : [];
      return Array.isArray(j) ? j : [];
    }catch(e){
      return [];
    }
  }
  function _save(xs){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(xs)); }catch(e){}
  }

  function add(message, meta){
    const msg = String(message || '').trim();
    if(!msg) return;
    const entry = {
      at: _nowIso(),
      page: _page(),
      message: msg.slice(0, 8000),
      meta: meta || null,
    };
    const xs = _load();
    xs.push(entry);
    while(xs.length > MAX) xs.shift();
    _save(xs);
    try{ window.dispatchEvent(new CustomEvent('influxbro:error', { detail: entry })); }catch(e){}
  }

  function all(){
    return _load();
  }

  function last(){
    const xs = _load();
    return xs.length ? xs[xs.length - 1] : null;
  }

  function clear(){
    _save([]);
    try{ window.dispatchEvent(new CustomEvent('influxbro:error', { detail: null })); }catch(e){}
  }

  function _fmtEntry(e){
    if(!e) return '';
    const at = String(e.at || '');
    const page = String(e.page || '');
    const msg = String(e.message || '');
    return (at ? (at + ' ') : '') + (page ? ('[' + page + '] ') : '') + msg;
  }

  function showLast(){
    const e = last();
    if(!e){
      try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Letzter Fehler', 'Kein Fehler gespeichert.'); }catch(x){}
      return;
    }
    const txt = _fmtEntry(e);
    try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Letzter Fehler', txt); }catch(x){}
  }

  function showDialog(){
    const xs = _load();
    if(!xs.length){
      try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Fehlerdialog', 'Keine Fehler gespeichert.'); }catch(x){}
      return;
    }
    const lines = [];
    const cur = xs[xs.length - 1];
    lines.push('Aktueller Fehler:');
    lines.push(_fmtEntry(cur));
    lines.push('');
    lines.push('Letzte Fehler:');
    for(const e of xs.slice().reverse()){
      lines.push('- ' + _fmtEntry(e));
    }
    lines.push('');
    lines.push('Hinweis: Der Verlauf wird im Browser (localStorage) gespeichert.');
    try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Fehlerdialog', lines.join('\n')); }catch(x){}
  }

  window.InfluxBroErrors = {
    add,
    all,
    last,
    clear,
    showLast,
    showDialog,
  };
})();
</script>

<script>
// Simple query history (client-side) for "Query Details" panels
(function(){
  if(window.InfluxBroQueryHistory) return;

  const MAX = 30;
  const PREFIX = 'influxbro_query_history_v1:';

  function _key(scope){
    const s = String(scope || '').trim() || 'global';
    return PREFIX + s;
  }
  function _load(scope){
    try{
      const raw = localStorage.getItem(_key(scope));
      const j = raw ? JSON.parse(raw) : [];
      return Array.isArray(j) ? j : [];
    }catch(e){
      return [];
    }
  }
  function _save(scope, xs){
    try{ localStorage.setItem(_key(scope), JSON.stringify(xs || [])); }catch(e){}
  }
  function _clipLines(txt, n){
    const s = String(txt || '').trim();
    if(!s) return '';
    const xs = s.split(/\r?\n/);
    const k = Math.max(1, Number(n) || 5);
    const out = xs.slice(0, k).join('\n');
    return xs.length > k ? (out + '\n...') : out;
  }

  function add(scope, label, query, response, startedAtOrMeta, maybeMeta){
    const q = String(query || '').trim();
    if(!q) return;
    const meta = (startedAtOrMeta && typeof startedAtOrMeta === 'object' && !Array.isArray(startedAtOrMeta)) ? startedAtOrMeta : (maybeMeta || {});
    const sourceIso = String((startedAtOrMeta && typeof startedAtOrMeta === 'object' && !Array.isArray(startedAtOrMeta)) ? (meta.started_at_source || meta.startedAtIso || '') : (startedAtOrMeta || meta.started_at_source || meta.startedAtIso || '')).trim();
    let clientIso = '';
    try{ clientIso = new Date().toISOString(); }catch(e){ clientIso = sourceIso || ''; }

    let durMs = null;
    try{
      const v = (meta && (meta.dur_ms !== undefined ? meta.dur_ms : (meta.durMs !== undefined ? meta.durMs : (meta.duration_ms !== undefined ? meta.duration_ms : meta.durationMs))));
      const n = Number(v);
      if(isFinite(n)) durMs = Math.max(0, Math.round(n));
    }catch(e){ durMs = null; }

    const ent = {
      at: String(sourceIso || clientIso),
      at_client: clientIso,
      at_source: String(sourceIso || clientIso),
      started_at_client: clientIso,
      started_at_source: String(sourceIso || clientIso),
      label: String(label || ''),
      query: q.slice(0, 20000),
      response: String(response || '').slice(0, 20000),
      trigger_page: String(meta.trigger_page || ''),
      trigger_button: String(meta.trigger_button || ''),
      trigger_program: String(meta.trigger_program || ''),
      trace_id: String(meta.trace_id || ''),
      span_id: String(meta.span_id || ''),
      action: String(meta.action || ''),
      dur_ms: durMs,
    };
    const xs = _load(scope);
    const prev = xs.length ? xs[xs.length - 1] : null;
    if(prev && String(prev.query || '') === ent.query && String(prev.label || '') === ent.label && String(prev.at || '') === ent.at) return;
    xs.push(ent);
    while(xs.length > MAX) xs.shift();
    _save(scope, xs);
  }

  function show(scope){
    try{
      if(window.InfluxBroPopup && window.InfluxBroPopup.show) _openHistoryInPopup(scope);
      else alert('Query History: ' + String(scope || 'global'));
    }catch(e){}
  }

  function list(scope){
    return _load(scope);
  }

  window.InfluxBroQueryHistory = { add, show, list };
})();

try{ if(window.location && window.location.pathname && !window.location.pathname.includes('config')) _ensureSummarySettingsButtons(); }catch(e){}
</script>

<script>
// Action/Trace correlation (UI -> API -> Query history)
(function(){
  if(window.InfluxBroTrace) return;

  const SS_KEY = 'influxbro_trace_current_v1';
  let _seq = 0;

  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }
  function _nowIso(){
    try{ return new Date().toISOString(); }catch(e){ return ''; }
  }
  function _rand(){
    try{ return Math.random().toString(16).slice(2, 10); }catch(e){ return '0'; }
  }
  function _clean(s){
    return String(s || '').replace(/[^a-zA-Z0-9_.:-]+/g, '_').slice(0, 80);
  }
  function _mkTraceId(page, actionUi){
    const ts = _nowIso().replace(/[:.]/g, '').replace(/Z$/, 'Z');
    _seq = (_seq + 1) % 100000;
    return [ts, _clean(page), _clean(actionUi), String(_seq), _rand()].filter(Boolean).join('|');
  }
  function _load(){
    try{
      const raw = sessionStorage.getItem(SS_KEY);
      const j = raw ? JSON.parse(raw) : null;
      return (j && typeof j === 'object') ? j : null;
    }catch(e){
      return null;
    }
  }
  function _save(t){
    try{ sessionStorage.setItem(SS_KEY, JSON.stringify(t || null)); }catch(e){}
  }
  function start(actionUi, meta){
    const page = _page();
    const startedAt = _nowIso();
    const tid = _mkTraceId(page, actionUi);
    const t = {
      trace_id: tid,
      page: page,
      action_ui: String(actionUi || ''),
      started_at: startedAt,
      last_at: startedAt,
      meta: meta || null,
      span_seq: 0,
    };
    _save(t);
    return t;
  }
  function current(){
    const t = _load();
    if(!t) return null;
    // expire after 10 minutes inactivity
    try{
      const last = Date.parse(String(t.last_at || ''));
      if(isFinite(last) && (Date.now() - last) > (10 * 60 * 1000)) return null;
    }catch(e){}
    return t;
  }
  function touch(){
    const t = current();
    if(!t) return null;
    t.last_at = _nowIso();
    _save(t);
    return t;
  }
  function nextSpanId(){
    const t = touch();
    if(!t) return '';
    try{ t.span_seq = (Number(t.span_seq || 0) + 1); }catch(e){ t.span_seq = 1; }
    _save(t);
    return String(t.trace_id || '') + ':' + String(t.span_seq || 0);
  }

  window.InfluxBroTrace = { start, current, touch, nextSpanId };
})();

// Fetch wrapper: attach trace headers + log client-side durations
(function(){
  if(window.__InfluxBroTraceFetchWrapped) return;
  const orig = window.fetch ? window.fetch.bind(window) : null;
  if(!orig) return;

  function _url(input){
    try{ return (typeof input === 'string') ? input : (input && input.url ? String(input.url) : ''); }catch(e){ return ''; }
  }
  function _shouldTrace(url){
    const u = String(url || '');
    if(!u) return false;
    if(!(u.startsWith('./api/') || u.startsWith('/api/') || u.includes('/api/'))) return false;
    if(u.includes('/api/trace/client_span')) return false;
    if(u.includes('/api/perf_event')) return false;
    if(u.includes('/api/perf_stats')) return false;
    if(u.includes('/api/client_error')) return false;
    if(u.includes('/api/client_log')) return false;
    return true;
  }

  function _shouldTrackLongWait(url, headers){
    try{
      const u = String(url || '');
      if(!_shouldTrace(u)) return false;
      const h = (headers && headers.get) ? headers : new Headers(headers || {});
      if(String(h.get('X-InfluxBro-Internal') || '') === '1') return false;
      return true;
    }catch(e){
      return false;
    }
  }

  window.fetch = function(input, init){
    const u = _url(input);
    const o = init || {};
    const headers0 = o.headers || {};
    // bypass recursion
    try{
      const h0 = (headers0 && headers0.get) ? headers0 : new Headers(headers0);
      if(String(h0.get('X-InfluxBro-Internal') || '') === '1') return orig(input, init);
    }catch(e){}

    const t = (window.InfluxBroTrace && window.InfluxBroTrace.current) ? window.InfluxBroTrace.current() : null;
    const doTrace = !!(t && t.trace_id && _shouldTrace(u));
    let spanId = '';
    let t0 = 0;
    let method = 'GET';
    let longwaitKey = '';

    let init2 = o;
    if(doTrace){
      try{ method = String(o.method || 'GET').toUpperCase(); }catch(e){}
      try{ spanId = window.InfluxBroTrace.nextSpanId(); }catch(e){ spanId = ''; }
      try{
        const h = new Headers(headers0);
        h.set('X-InfluxBro-Trace-Id', String(t.trace_id));
        h.set('X-InfluxBro-Span-Id', String(spanId || ''));
        h.set('X-InfluxBro-Action', String(t.action_ui || ''));
        h.set('X-InfluxBro-Trace-Started-At', String(t.started_at || ''));
        h.set('X-InfluxBro-Trace-Page', String(t.page || ''));
        init2 = Object.assign({}, o, { headers: h });
      }catch(e){}
      try{ t0 = performance.now(); }catch(e){ t0 = 0; }
    }

    try{
      method = String(o.method || method || 'GET').toUpperCase();
      longwaitKey = 'client:http.client:' + method + ' ' + String(u || '').slice(0, 240);
      if(window.InfluxBroLongWait && window.InfluxBroLongWait.begin && _shouldTrackLongWait(u, headers0)){
        window.InfluxBroLongWait.begin(longwaitKey, {
          key: longwaitKey,
          event_key: longwaitKey,
          event_type: 'http.client',
          source: 'client',
          page: (t && t.page) ? String(t.page) : _page(),
          ui: (t && t.action_ui) ? String(t.action_ui) : '',
          text: (t && t.action_ui) ? ('Warte auf ' + String(t.action_ui)) : ('Warte auf ' + method + ' ' + String(u || '').slice(0, 80)),
          detail: method + ' ' + String(u || '').slice(0, 240),
          extra: { url: String(u || '').slice(0, 240), method },
        });
      }
    }catch(e){}

    const p = orig(input, init2);
    return p.then((resp)=>{
      try{
        const dur = t0 ? Math.round(performance.now() - t0) : 0;
        const status = resp && typeof resp.status === 'number' ? resp.status : 0;
        const ok = resp && resp.ok;
        if(doTrace){
          // fire-and-forget client span
          orig('./api/trace/client_span', {
            method:'POST',
            headers:{'Content-Type':'application/json','X-InfluxBro-Internal':'1'},
            keepalive:true,
            body: JSON.stringify({
              trace_id: String(t.trace_id || ''),
              span_id: String(spanId || ''),
              page: String(t.page || ''),
              action: String(t.action_ui || ''),
              started_at: String(t.started_at || ''),
              method: String(method || 'GET'),
              url: String(u || ''),
              status_code: status,
              dur_ms: dur,
              status: (ok === false || status >= 400) ? 'err' : 'ok',
            })
          }).catch(()=>{});
        }
        try{
          if(window.InfluxBroLongWait && window.InfluxBroLongWait.finish){
            window.InfluxBroLongWait.finish(longwaitKey, {
              status: (ok === false || status >= 400) ? 'err' : 'ok',
              is_error: (ok === false || status >= 400),
              text: (ok === false || status >= 400) ? ('Fehler: ' + method + ' ' + String(u || '').slice(0, 80)) : ('Fertig: ' + method + ' ' + String(u || '').slice(0, 80)),
            });
          }
        }catch(e){}
      }catch(e){}
      return resp;
    }).catch((err)=>{
      try{
        if(window.InfluxBroLongWait && window.InfluxBroLongWait.finish){
          window.InfluxBroLongWait.finish(longwaitKey, {
            status: 'err',
            is_error: true,
            text: 'Fehler: ' + method + ' ' + String(u || '').slice(0, 80),
            extra: { error: String(err && err.message ? err.message : err || '') },
          });
        }
      }catch(e){}
      throw err;
    });
  };

  window.__InfluxBroTraceFetchWrapped = true;
})();
</script>

<script>
// Global button logging and button error reporting
(function(){
  if(window.InfluxBroButtons) return;

  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }
  function _buttonSel(){
    return 'button, input[type="button"], input[type="submit"], input[type="reset"], [role="button"]';
  }
  function _buttonTargetFromEvent(ev){
    try{ return ev && ev.target && ev.target.closest ? ev.target.closest(_buttonSel()) : null; }catch(e){ return null; }
  }
  function _buttonMeta(el){
    try{
      if(!el) return { ui:'', id:'', text:'', tag:'' };
      const txt = String(el.getAttribute('data-ui') || el.getAttribute('aria-label') || el.getAttribute('title') || el.textContent || '').replace(/\s+/g, ' ').trim();
      return {
        ui: String(el.getAttribute('data-ui') || '').trim(),
        id: String(el.getAttribute('id') || '').trim(),
        text: txt.slice(0, 120),
        tag: String(el.tagName || '').toLowerCase(),
      };
    }catch(e){ return { ui:'', id:'', text:'', tag:'' }; }
  }
  async function _log(kind, el, extra){
    try{
      const m = _buttonMeta(el);
      let tr = null;
      try{
        if(window.InfluxBroTrace){
          if(String(kind||'') === 'button_press') tr = window.InfluxBroTrace.start(m.ui || m.id || m.tag, m);
          else tr = window.InfluxBroTrace.current ? window.InfluxBroTrace.current() : null;
        }
      }catch(e){ tr = null; }
      const traceExtra = tr ? {
        trace_id: String(tr.trace_id || ''),
        action: String(tr.action_ui || ''),
        started_at: String(tr.started_at || ''),
        page: String(tr.page || ''),
      } : {};
      await fetch('./api/ui_event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          page: _page(),
          ui: m.ui || m.id || m.tag,
          text: m.text || m.id || m.tag,
          extra: Object.assign({ kind: String(kind || 'button_event') }, traceExtra, extra || {}, m),
        })
      });
    }catch(e){}
  }
  function reportError(err, context, el, extra){
    const msg = String(err && err.message ? err.message : err || 'Button-Fehler');
    const meta = Object.assign({ kind:'button_error', context: String(context || '') }, _buttonMeta(el), extra || {});
    try{ window.InfluxBroErrors && window.InfluxBroErrors.add && window.InfluxBroErrors.add(msg, meta); }catch(e){}
    try{ window.InfluxBroClientLog && window.InfluxBroClientLog.reportError && window.InfluxBroClientLog.reportError(msg, meta, String(err && err.stack ? err.stack : '')); }catch(e){}
    try{ _log('button_error', el, Object.assign({ error: msg }, meta)); }catch(e){}
  }

  try{
    document.addEventListener('click', (ev)=>{
      const btn = _buttonTargetFromEvent(ev);
      if(!btn) return;
      _log('button_press', btn, { pointer: 'click' });
    }, true);
  }catch(e){}

  try{
    const origAdd = EventTarget.prototype.addEventListener;
    if(!origAdd.__ib_button_wrap){
      EventTarget.prototype.addEventListener = function(type, listener, options){
        if(type !== 'click' || !listener) return origAdd.call(this, type, listener, options);
        if(typeof listener === 'function'){
          if(listener.__ib_button_wrapped) return origAdd.call(this, type, listener, options);
          const wrapped = function(){
            const ev = arguments && arguments.length ? arguments[0] : null;
            const btn = (this && this.matches && this.matches(_buttonSel())) ? this : _buttonTargetFromEvent(ev);
            try{
              const out = listener.apply(this, arguments);
              if(out && typeof out.then === 'function'){
                return out.catch((err)=>{
                  reportError(err, 'button.click', btn, { async: true });
                  throw err;
                });
              }
              return out;
            }catch(err){
              reportError(err, 'button.click', btn, { async: false });
              throw err;
            }
          };
          wrapped.__ib_button_wrapped = true;
          wrapped.__ib_button_original = listener;
          return origAdd.call(this, type, wrapped, options);
        }
        return origAdd.call(this, type, listener, options);
      };
      EventTarget.prototype.addEventListener.__ib_button_wrap = true;
    }
  }catch(e){}

  window.InfluxBroButtons = { log: _log, reportError };
})();
</script>

<script>
// Client-side error logging (browser -> server log)
// Also keeps a small local ring buffer for export.
(function(){
  if(window.InfluxBroClientLog) return;

  const LS_KEY = 'influxbro_client_errors_v1';
  const MAX = 50;

  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }
  function _href(){
    try{ return String(location && location.href ? location.href : ''); }catch(e){ return ''; }
  }
  function _ua(){
    try{ return String(navigator && navigator.userAgent ? navigator.userAgent : ''); }catch(e){ return ''; }
  }
  function _nowIso(){
    try{ return new Date().toISOString(); }catch(e){ return ''; }
  }

  function _load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      const j = raw ? JSON.parse(raw) : [];
      return Array.isArray(j) ? j : [];
    }catch(e){
      return [];
    }
  }
  function _save(xs){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(xs)); }catch(e){}
  }
  function _push(entry){
    const xs = _load();
    xs.push(entry);
    while(xs.length > MAX) xs.shift();
    _save(xs);
  }

  let LAST_SEND = { key: '', at: 0 };

  async function _send(entry){
    try{
      const key = String(entry && entry.message ? entry.message : '');
      const now = Date.now();
      if(key && LAST_SEND.key === key && (now - LAST_SEND.at) < 800) return;
      LAST_SEND = { key, at: now };

      await fetch('./api/client_error', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          page: entry.page,
          message: entry.message,
          href: entry.href,
          ua: entry.ua,
          stack: entry.stack,
          extra: entry.extra,
        })
      });
    }catch(e){}
  }

  function reportError(message, extra, stack){
    const entry = {
      at: _nowIso(),
      page: _page(),
      message: String(message || '').slice(0, 8000),
      href: _href(),
      ua: _ua(),
      stack: String(stack || '').slice(0, 8000),
      extra: extra || null,
    };
    _push(entry);
    try{ window.InfluxBroErrors && window.InfluxBroErrors.add && window.InfluxBroErrors.add(entry.message, entry.extra || null); }catch(e){}
    _send(entry);
  }

  function fetchError(url, opts, err){
    const m = (err && err.message) ? String(err.message) : String(err);
    reportError('Failed to fetch: ' + String(url || ''), {
      kind: 'fetch',
      url: String(url || ''),
      method: (opts && opts.method) ? String(opts.method) : 'GET',
      err: m,
    }, (err && err.stack) ? String(err.stack) : '');
  }

  window.InfluxBroClientLog = {
    reportError,
    fetchError,
    getBuffer: () => _load(),
  };

  // Global JS error hooks
  window.addEventListener('error', (ev)=>{
    try{
      const msg = ev && ev.message ? String(ev.message) : 'JS error';
      const src = ev && ev.filename ? String(ev.filename) : '';
      const line = ev && typeof ev.lineno === 'number' ? ev.lineno : null;
      const col = ev && typeof ev.colno === 'number' ? ev.colno : null;
      const stack = (ev && ev.error && ev.error.stack) ? String(ev.error.stack) : '';
      reportError(msg, { kind:'window.error', src, line, col }, stack);
    }catch(e){}
  });
  window.addEventListener('unhandledrejection', (ev)=>{
    try{
      const r = ev ? ev.reason : null;
      const msg = (r && r.message) ? String(r.message) : String(r || 'Unhandled promise rejection');
      const stack = (r && r.stack) ? String(r.stack) : '';
      reportError(msg, { kind:'unhandledrejection' }, stack);
    }catch(e){}
  });
})();
</script>
