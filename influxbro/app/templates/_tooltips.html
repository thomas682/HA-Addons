  function _norm(s){
    return String(s || '').replace(/\s+/g, ' ').trim();
  }

  function _keyFromEl(el){
    try{
      if(!el) return '';
      const dui = _norm(el.getAttribute('data-ui'));
      if(dui) return dui;
      const id = _norm(el.getAttribute('id'));
      if(id) return '#' + id;

      // Table cells: try to derive a stable key from table + column
      const td = String(el.tagName||'').toLowerCase() === 'td' ? el : null;
      const th = String(el.tagName||'').toLowerCase() === 'th' ? el : null;
      const cell = td || th;
      if(cell){
        const tbl = cell.closest('table');
        const tid = tbl && tbl.getAttribute('id') ? _norm(tbl.getAttribute('id')) : '';
        const colKey = _norm(cell.getAttribute('data-key'));
        if(tid && colKey) return tid + ':' + colKey;
        if(tid) return tid;
      }

      const tag = String(el.tagName||'').toLowerCase();
      const cls = _norm(el.getAttribute('class'));
      if(cls){
        const c0 = cls.split(' ').filter(Boolean)[0] || '';
        if(c0) return tag + '.' + c0;
      }
      return tag;
    }catch(e){
      return '';
    }
  }

  function _ensureKeySuffix(title, key){
    const t = _norm(title);
    const k = _norm(key);
    if(!k) return t;
    const suffix = `(${k})`;
    if(t.includes(suffix)) return t;
    return (t ? (t + ' ' + suffix) : suffix);
  }

  function _short(s, n){
    const x = _norm(s);
    if(!x) return '';
    const m = Number(n) || 180;
    return x.length > m ? (x.slice(0, m) + '...') : x;
  }

  function _decap(s){
    const x = _norm(s);
    if(!x) return '';
    const c0 = x[0];
    if(c0 >= 'A' && c0 <= 'Z') return c0.toLowerCase() + x.slice(1);
    return x;
  }

  function _uiKind(el){
    try{
      const tag = String(el && el.tagName ? el.tagName : '').toLowerCase();
      if(tag === 'button') return 'button';
      if(tag === 'select') return 'select';
      if(tag === 'input'){
        const t = String(el.getAttribute('type') || '').toLowerCase();
        if(t === 'checkbox') return 'checkbox';
        return 'input';
      }
      return tag;
    }catch(e){
      return '';
    }
  }

  function _formatDescForKind(kind, desc, el){
    const d0 = _norm(desc);
    if(!kind) return d0;

    if(kind === 'button'){
      if(d0) return 'Dieser Button ' + _decap(d0);
      const t = _norm(el && el.textContent ? el.textContent : '');
      return t ? ('Dieser Button fuehrt aus: ' + t) : 'Dieser Button';
    }

    if(kind === 'checkbox'){
      if(d0) return 'Diese Checkbox ' + _decap(d0);
      const auto = _autoTitleFromContext(el) || '';
      const lbl = _norm(auto.split(':')[0] || auto);
      return lbl ? ('Diese Checkbox aktiviert/deaktiviert: ' + lbl) : 'Diese Checkbox';
    }

    if(kind === 'select'){
      if(d0) return 'Dieses Auswahlfeld ' + _decap(d0);
      const auto = _autoTitleFromContext(el) || '';
      const lbl = _norm(auto.split(':')[0] || auto);
      return lbl ? ('Dieses Auswahlfeld waehlt: ' + lbl) : 'Dieses Auswahlfeld';
    }

    return d0;
  }

  function _autoTitleFromContext(el){
    try{
      const tag = String(el && el.tagName ? el.tagName : '').toLowerCase();
      const isBtn = tag === 'button';
      const isInput = (tag === 'input' || tag === 'select' || tag === 'textarea');

      let labelTxt = '';
      let helpTxt = '';

      // Search a few ancestor levels for a nearby label/help.
      let cur = el;
      for(let i=0; i<5; i++){
        const p = cur && cur.parentElement ? cur.parentElement : null;
        if(!p) break;

        // Prefer a single label in the container.
        const labels = Array.from(p.querySelectorAll('label'))
          .map(l => _norm(l.textContent))
          .filter(Boolean);
        if(!labelTxt && labels.length){
          labelTxt = labels[0];
        }

        // Prefer explicit help blocks.
        if(!helpTxt){
          const h = p.querySelector('.muted.help') || p.querySelector('.muted');
          if(h) helpTxt = _norm(h.textContent);
        }

        if(labelTxt || helpTxt) break;
        cur = p;
      }

      if(isBtn){
        const t = _norm(el.textContent);
        const extra = helpTxt && helpTxt !== t ? helpTxt : '';
        return _short(extra ? (t + ': ' + extra) : t, 220);
      }

      if(isInput){
        if(labelTxt && helpTxt && helpTxt !== labelTxt){
          return _short(labelTxt + ': ' + helpTxt, 220);
        }
        if(labelTxt) return _short(labelTxt, 220);
        if(helpTxt) return _short(helpTxt, 220);
      }
    }catch(e){}
    return '';
  }

  function _looksLikeAutoKeyTitle(existing, key){
    const t = _norm(existing);
    const k = _norm(key);
    if(!t) return true;
    if(k && (t === k || t === ('#' + k) || t === ('data-ui:' + k))) return true;
    if(k && t === ('(' + k + ')')) return true;
    return false;
  }

  function _setTooltip(el, desc, key){
    try{
      const k = _norm(key);
      const kind = _uiKind(el);
      const d = _formatDescForKind(kind, desc, el);
      const existing = _norm(el.getAttribute('title'));
      let base = existing;

      // If missing or auto-key title, replace with description.
      if(!existing || _looksLikeAutoKeyTitle(existing, k)){
        base = d || existing;
      }

      // If still empty, fall back to element text.
      if(!base){
        const txt = _norm(el.textContent);
        base = _short(txt, 220);
      }

       // Always append the element key in parentheses.
       base = _ensureKeySuffix(base, k);
       if(base) el.setAttribute('title', base);

       // For checkbox inputs inside a label, mirror title onto the label.
       if(kind === 'checkbox'){
         try{
           const lab = el.closest('label');
           if(lab && !lab.getAttribute('title')) lab.setAttribute('title', base);
         }catch(e){}
       }
    }catch(e){}
  }

  function _tableCellDesc(td){
    try{
      const tr = td && td.parentElement ? td.parentElement : null;
      const tbl = td.closest('table');
      if(!tbl) return _short(td.textContent, 200);
      const thead = tbl.querySelector('thead');
      const ths = thead ? Array.from(thead.querySelectorAll('th')) : [];
      const tds = tr ? Array.from(tr.querySelectorAll('td')) : [];
      const idx = tds.indexOf(td);
      const th = (idx >= 0 && idx < ths.length) ? ths[idx] : null;
      const col = th ? _norm(th.textContent) : '';
      const val = _short(td.textContent, 200);
      if(col && val) return col + ': ' + val;
      if(col) return col;
      return val;
    }catch(e){
      return _short(td && td.textContent ? td.textContent : '', 200);
    }
  }

  function apply(){
    try{
      const root = document.querySelector('main.content') || document.body;
      const sel = [
        'button',
        'select',
        'input[type="checkbox"]',
        // Keep a few explicit help blocks.
        '.muted.help',
        '[data-ui^="tip."]'
      ].join(',');
      const nodes = Array.from(root.querySelectorAll(sel));
      nodes.forEach(el => {
        const tag = String(el.tagName||'').toLowerCase();
        if(!tag) return;
        if(tag === 'script' || tag === 'style' || tag === 'meta' || tag === 'link' || tag === 'option') return;

        // Only for visible elements.
        try{
          if(el.offsetParent === null && tag !== 'body') return;
        }catch(e){}

        const key = _keyFromEl(el);
        let desc = '';

        const dui = _norm(el.getAttribute('data-ui'));
        if(dui && TIPS[dui]) desc = TIPS[dui];
        else if(tag === 'th'){
          const t = _norm(el.textContent);
          desc = t ? ('Spalte: ' + t) : '';
        }else if(tag === 'td'){
          desc = _tableCellDesc(el);
        }else if(tag === 'summary'){
          const t = _norm(el.textContent);
          desc = t ? ('Abschnitt: ' + t) : '';
        }else if(tag === 'details'){
          const sum = el.querySelector('summary');
          const t = sum ? _norm(sum.textContent) : '';
          desc = t ? ('Bereich: ' + t) : '';
        }else{
          desc = _autoTitleFromContext(el) || '';
        }

        // If we have no description, still provide a stable tooltip (name only).
        _setTooltip(el, desc, key);
      });

<script>
(function(){
  if(window.InfluxBroFieldClear) return;

  function eligible(el){
    try{
      if(!el || !el.tagName || !el.getAttribute) return false;
      if(el.closest && el.closest('.ib_no_clear')) return false;
      const tag = String(el.tagName || '').toLowerCase();
      if(tag !== 'input' && tag !== 'select' && tag !== 'textarea') return false;
      if(tag === 'input'){
        const t = String(el.getAttribute('type') || 'text').toLowerCase();
        if(['checkbox','radio','button','submit','hidden','file'].includes(t)) return false;
      }
      const ui = String(el.getAttribute('data-ui') || '').toLowerCase();
      const inSel = !!(el.closest && el.closest('.ib_sel_stack'));
      const looksLikeFilter = ui.includes('filter') || ui.includes('search') || ui.includes('measurement') || ui.includes('friendly') || ui.includes('entity') || ui.includes('field') || ui.includes('range');
      return inSel || looksLikeFilter;
    }catch(e){ return false; }
  }

  function hasValue(el){
    try{
      if(!el) return false;
      if(String((el.tagName||'').toLowerCase()) === 'select') return String(el.value || '').trim() !== '';
      return String(el.value || '').trim() !== '';
    }catch(e){ return false; }
  }

  function dispatch(el){
    try{ el.dispatchEvent(new Event('input', { bubbles:true })); }catch(e){}
    try{ el.dispatchEvent(new Event('change', { bubbles:true })); }catch(e){}
  }

  function clearValue(el){
    try{
      if(!el) return;
      const tag = String(el.tagName || '').toLowerCase();
      if(tag === 'select'){
        el.value = '';
        if(String(el.value || '').trim() !== '' && el.options && el.options.length) el.selectedIndex = 0;
      }else{
        el.value = '';
      }
      dispatch(el);
      try{ el.focus(); }catch(e){}
    }catch(e){}
  }

  function update(btn, el){
    try{ if(btn) btn.style.visibility = hasValue(el) ? 'visible' : 'hidden'; }catch(e){}
  }

  function ensureStyle(){
    try{
      if(document.getElementById('ib_clear_style')) return;
      const st = document.createElement('style');
      st.id = 'ib_clear_style';
      st.textContent = '.ib_clear_row{display:flex;align-items:center;gap:8px}.ib_clear_row>input,.ib_clear_row>select,.ib_clear_row>textarea{flex:1 1 auto}.ib_clear_btn{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border:1px solid #cfd5e2;border-radius:10px;background:#fff;cursor:pointer;flex:0 0 auto}.ib_clear_btn:hover{background:#f6f7fb}.ib_clear_btn svg{width:16px;height:16px;pointer-events:none}';
      document.head.appendChild(st);
    }catch(e){}
  }

  function enhance(el){
    try{
      if(!eligible(el) || el.dataset.ibClearReady === '1') return;
      ensureStyle();
      const row = document.createElement('div');
      row.className = 'ib_clear_row';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ib_clear_btn';
      btn.setAttribute('aria-label', 'Feld leeren');
      btn.setAttribute('title', 'Feld leeren');
      btn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 7h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M7 7l1 12h8l1-12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 11v5M14 11v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
      btn.addEventListener('click', (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; clearValue(el); update(btn, el); });
      const parent = el.parentNode;
      if(!parent) return;
      parent.insertBefore(row, el);
      row.appendChild(el);
      row.appendChild(btn);
      const onUpd = ()=>update(btn, el);
      el.addEventListener('input', onUpd);
      el.addEventListener('change', onUpd);
      update(btn, el);
      el.dataset.ibClearReady = '1';
    }catch(e){}
  }

  function scan(root){
    try{
      const scope = root || document;
      scope.querySelectorAll('input[id], select[id], textarea[id]').forEach(enhance);
    }catch(e){}
  }

  try{ scan(document); }catch(e){}
  try{
    const mo = new MutationObserver((mut)=>{ try{ (mut||[]).forEach(m=>{ (m.addedNodes||[]).forEach(n=>{ if(n && n.querySelectorAll) scan(n); }); }); }catch(e){}; });
    mo.observe(document.documentElement, { childList:true, subtree:true });
  }catch(e){}

  window.InfluxBroFieldClear = { scan };
})();
</script>

<script>
(function(){
  if(window.InfluxBroCascade) return;

  function _values(items){
    return (items || []).map(x => String(x || '').trim()).filter(Boolean);
  }

  function syncInput(input, items, opts){
    try{
      if(!input) return false;
      const o = opts || {};
      const xs = _values(items);
      const cur = String(input.value || '').trim();
      const valid = cur && xs.includes(cur);
      const preserveFocused = !!(o.preserveWhileFocused && document && document.activeElement === input);
      if(preserveFocused) return cur && !valid;
      if(cur && !valid && o.clearInvalid !== false) input.value = '';
      if(xs.length !== 1) return cur && !valid;
      if(o.requireSource){
        const sources = Array.isArray(o.requireSource) ? o.requireSource : [o.requireSource];
        const ok = sources.some(el => String(el && el.value || '').trim());
        if(!ok) return cur && !valid;
      }
      if(valid) return false;
      input.value = xs[0];
      return true;
    }catch(e){
      return false;
    }
  }

  window.InfluxBroCascade = { syncInput };
})();
</script>

    function _applyPopupSize(title){
      try{
        CURRENT_POPUP_SIZE_KEY = _popupSizeStorageKey(title);
        const raw = localStorage.getItem(CURRENT_POPUP_SIZE_KEY);
        if(!raw) return;
        const data = JSON.parse(raw);
        const w = Number(data && data.w);
        const h = Number(data && data.h);
        if(isFinite(w) && w >= 320) card.style.width = Math.round(w) + 'px';
        if(isFinite(h) && h >= 200) card.style.height = Math.round(h) + 'px';
      }catch(e){}
    }

    function _savePopupSize(){
      try{
        const rect = card.getBoundingClientRect();
        const payload = { w: Math.round(rect.width), h: Math.round(rect.height) };
        localStorage.setItem(CURRENT_POPUP_SIZE_KEY, JSON.stringify(payload));
      }catch(e){}
    }

    try{
      const ro = new ResizeObserver(()=>{ _savePopupSize(); });
      ro.observe(card);
    }catch(e){}

    function _filenameFromContentDisposition(cd){
      try{
        const s = String(cd || '');
        const m = s.match(/filename\*=UTF-8''([^;]+)|filename="([^"]+)"|filename=([^;]+)/i);
        const raw = m ? (m[1] || m[2] || m[3]) : '';
        const fn = raw ? decodeURIComponent(raw.trim()) : '';
        return fn || '';
      }catch(e){
        return '';
      }
    }

    function _clip(s, n){
      const t = String(s || '');
      const m = Number(n) || 6000;
      return t.length > m ? (t.slice(0, m) + '\n... (truncated)') : t;
    }

    function _safeTitleFromMsg(msg){
      try{
        const s = String(msg || '').replace(/\s+/g, ' ').trim();
        if(!s) return 'Bugreport';
        const short = s.length > 80 ? (s.slice(0, 77) + '...') : s;
        return short;
      }catch(e){
        return 'Bugreport';
      }
    }

    function _snapshotLocalStorage(){
      try{
        const out = {};
        if(!window.localStorage) return out;
        for(let i=0; i<localStorage.length; i++){
          const k = localStorage.key(i);
          if(!k) continue;
          // Avoid storing huge values.
          const v = String(localStorage.getItem(k) || '');
          out[k] = v.length > 2000 ? (v.slice(0, 2000) + '...') : v;
        }
        return out;
      }catch(e){
        return {};
      }
    }

    async function _downloadDebugReport(issueTitle, msg, functionName){
      const payload = {
        tail: 0,
        issue: {
          title: String(issueTitle || ''),
          description: String(msg || ''),
          function: String(functionName || ''),
          steps: '',
        },
        client: {
          exported_at: new Date().toISOString(),
          page: 'popup',
          href: String(location && location.href ? location.href : ''),
          user_agent: String(navigator && navigator.userAgent ? navigator.userAgent : ''),
          popup: {
            title: String(document.getElementById('influxbro_popup_title') ? document.getElementById('influxbro_popup_title').textContent : ''),
          },
          client_errors: (window.InfluxBroClientLog && window.InfluxBroClientLog.getBuffer) ? window.InfluxBroClientLog.getBuffer() : [],
          local_storage: _snapshotLocalStorage(),
        }
      };

      let r;
      try{
        r = await fetch('./api/debug_report', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      }catch(e){
        try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/debug_report', payload, e); }catch(x){}
        throw new Error('Failed to fetch');
      }
      if(!r.ok){
        const t = await r.text().catch(()=> '');
        throw new Error(t || ('HTTP ' + r.status));
      }
      const blob = await r.blob();
      const cd = r.headers.get('content-disposition');
      const fn = _filenameFromContentDisposition(cd) || 'influxbro_debug_report.md';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fn;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{
        try{ URL.revokeObjectURL(a.href); }catch(e){}
        try{ a.remove(); }catch(e){}
      }, 0);
      return fn;
    }

    function _buildIssueBody(kind, userText, msg, meta, debugFilename, functionName){
      const addonV = meta && meta.addon_version ? String(meta.addon_version) : '';
      const haCore = meta && meta.ha && meta.ha.core ? String(meta.ha.core) : '';
      const haSup = meta && meta.ha && meta.ha.supervisor ? String(meta.ha.supervisor) : '';
      const haOs = meta && meta.ha && meta.ha.os ? String(meta.ha.os) : '';
      const influxV = meta && meta.influx && meta.influx.version ? String(meta.influx.version) : '';
      const haArch = meta && meta.ha && meta.ha.arch ? String(meta.ha.arch) : '';
      const haInst = meta && meta.ha && meta.ha.installation_type ? String(meta.ha.installation_type) : '';
      const haPlat = meta && meta.ha && meta.ha.platform ? String(meta.ha.platform) : '';
      const recentActions = Array.isArray(meta && meta.recent_actions) ? meta.recent_actions : [];

      let body = '';
      if(kind === 'enhancement'){
        body += '### Gewuenschte Erweiterung\n\n';
        body += _clip(userText, 4000) + '\n\n';
        if(functionName) body += '### Funktion / Menueeintrag\n\n' + _clip(functionName, 200) + '\n\n';
        body += '### Kontext / Ausloeser\n\n';
        body += _clip(msg || 'Kein Popup-Text vorhanden.', 1200) + '\n\n';
      }else{
        body += '### Fehlerbeschreibung\n\n';
        body += _clip(userText, 4000) + '\n\n';
        if(functionName) body += '### Funktion / Menueeintrag\n\n' + _clip(functionName, 200) + '\n\n';
        body += '### Ausloeser / Aktion\n\n';
        body += _clip(msg, 1200) + '\n\n';
      }

      body += '### System / Versionen\n\n';
      if(haArch) body += '- architecture: ' + haArch + '\n';
      if(haInst) body += '- installation-type: ' + haInst + '\n';
      if(haPlat) body += '- platform: ' + haPlat + '\n';
      if(haSup) body += '- supervisor-version: ' + haSup + '\n';
      if(haCore) body += '- ha-version: ' + haCore + '\n';
      if(addonV) body += '- addon-version: ' + addonV + '\n';
      if(haOs) body += '- ha-os: ' + haOs + '\n';
      if(influxV) body += '- influx-version: ' + influxV + '\n';
      body += '\n';

      body += '### Aktionsliste\n\n';
      if(recentActions.length){
        recentActions.slice(-5).forEach((it) => {
          const at = it && it.at ? String(it.at) : '';
          const ui = it && it.ui ? String(it.ui) : '';
          const page = it && it.page ? String(it.page) : '';
          const text = it && it.text ? String(it.text) : '';
          body += '- ' + [at, page, ui, text].filter(Boolean).join(' | ') + '\n';
        });
      }else{
        body += '- keine aufgezeichneten Bedieneraktionen vorhanden\n';
      }
      body += '\n';

      if(kind === 'bug'){
        body += '### Debug report Anhang\n\n';
        body += '- Bitte die heruntergeladene Datei `influxbro_debug_report_*.md` anhaengen.\n';
        if(debugFilename) body += '- Bereits erzeugter Dateiname: `' + String(debugFilename) + '`\n';
      }
      return body;
    }

    function _openIssueComposer(opts){
      const composer = document.getElementById('influxbro_issue_composer');
      const kindEl = document.getElementById('influxbro_issue_kind');
      const titleEl = document.getElementById('influxbro_issue_title');
      const textEl = document.getElementById('influxbro_issue_text');
      const labelEl = document.getElementById('influxbro_issue_text_label');
      const functionEl = document.getElementById('influxbro_issue_function');
      const hintEl = document.getElementById('influxbro_issue_hint');
      const attachHelpEl = document.getElementById('influxbro_issue_attach_help');
      const statusEl = document.getElementById('influxbro_issue_status');
      const cancelEl = document.getElementById('influxbro_issue_cancel');
      const submitEl = document.getElementById('influxbro_issue_submit');
      if(!composer || !kindEl || !titleEl || !textEl || !labelEl || !functionEl || !hintEl || !statusEl || !cancelEl || !submitEl) return;

      const msg = String(opts && opts.msg ? opts.msg : '').trim();
      const meta = opts && opts.meta ? opts.meta : null;
      const baseUrl = meta && meta.github_new_issue_url ? String(meta.github_new_issue_url) : '';
      const defaultBugText = 'siehe automatisch angehaengtes Logging / Bei Bedarf hier eigene Fehlerbeschreibung einfuegen....';
      const textState = { bug: '', enhancement: '' };

      function close(){ composer.style.display = 'none'; statusEl.textContent = ''; }
      function sync(){
        const kind = String(kindEl.value || 'bug');
        const titlePrefix = (kind === 'enhancement') ? '[Enhancement]: ' : '[Bug]: ';
        const fallbackTitle = (kind === 'enhancement') ? 'Neue Erweiterung' : _safeTitleFromMsg(msg);
        if(!String(titleEl.value || '').trim() || titleEl.dataset.autofill === '1'){
          titleEl.value = titlePrefix + fallbackTitle;
          titleEl.dataset.autofill = '1';
        }
        if(kind === 'enhancement'){
          labelEl.textContent = 'Erweiterung beschreiben';
          hintEl.textContent = 'Bitte die gewuenschte Erweiterung kurz beschreiben. Das Feld darf nicht leer bleiben.';
          if(attachHelpEl) attachHelpEl.style.display = 'none';
          textEl.value = textState.enhancement || '';
        }else{
          labelEl.textContent = 'Fehlerbeschreibung';
          hintEl.textContent = 'Bug erstellt ein Issue mit Label type/bug und laedt zusaetzlich einen Debug report herunter.';
          if(attachHelpEl) attachHelpEl.style.display = 'block';
          textEl.value = textState.bug || defaultBugText;
        }
        textEl.dataset.mode = kind;
      }

      kindEl.value = 'bug';
      functionEl.value = '';
      titleEl.dataset.autofill = '1';
      titleEl.oninput = ()=>{ titleEl.dataset.autofill = '0'; };
      kindEl.onchange = ()=>{
        const prevMode = String(textEl.dataset.mode || 'bug');
        textState[prevMode] = String(textEl.value || '');
        sync();
      };
      textEl.oninput = ()=>{
        const mode = String(textEl.dataset.mode || 'bug');
        textState[mode] = String(textEl.value || '');
      };
      cancelEl.onclick = close;
      sync();
      composer.style.display = 'block';
      setTimeout(()=>{ try{ textEl.focus(); textEl.select(); }catch(e){} }, 0);

      submitEl.onclick = async ()=>{
        const kind = String(kindEl.value || 'bug');
        const title = String(titleEl.value || '').trim();
        const functionName = String(functionEl.value || '').trim();
        const userText = String(textEl.value || '').trim();
        if(!title){ statusEl.textContent = 'Kurztitel fehlt.'; return; }
        if(!functionName){ statusEl.textContent = 'Bitte Funktion / Menueeintrag auswaehlen.'; return; }
        if(!userText){ statusEl.textContent = kind === 'bug' ? 'Bitte Fehlerbeschreibung eingeben.' : 'Bitte Erweiterung beschreiben.'; return; }
        if(!baseUrl){ statusEl.textContent = 'Repo URL fehlt (Einstellungen -> Links).'; return; }

        let win = null;
        try{ win = window.open('about:blank', '_blank'); }catch(e){ win = null; }
        statusEl.textContent = (kind === 'bug') ? 'Debug report...' : 'Issue wird vorbereitet...';

        let fn = '';
        if(kind === 'bug'){
          try{ fn = await _downloadDebugReport(title.replace(/^\[Bug\]:\s*/, ''), msg, functionName); }catch(e){ try{ window.InfluxBroClientLog && window.InfluxBroClientLog.reportError && window.InfluxBroClientLog.reportError('Bugreport: debug_report failed', { err: String(e && e.message ? e.message : e) }, (e && e.stack) ? String(e.stack) : ''); }catch(x){} }
        }

        const labels = (kind === 'enhancement') ? 'type/enhancement' : 'type/bug';
        const body = _buildIssueBody(kind, userText, msg, meta, fn, functionName);
        const url = baseUrl + '?labels=' + encodeURIComponent(labels) + '&title=' + encodeURIComponent(title) + '&body=' + encodeURIComponent(body);
        try{
          if(win) win.location.href = url;
          else window.open(url, '_blank');
          statusEl.textContent = (kind === 'bug') ? 'Issue geoeffnet, Debug report bitte anhaengen.' : 'Issue geoeffnet.';
          try{ bugHint.textContent = (kind === 'bug') ? 'Bitte Debug report anhaengen' : 'Issue geoeffnet'; }catch(e){}
          close();
        }catch(e){
          statusEl.textContent = 'Issue konnte nicht geoeffnet werden.';
        }
      };
    }

<script>
// Persistent UI error history (for query/GUI errors)
(function(){
  if(window.InfluxBroErrors) return;

  const LS_KEY = 'influxbro_ui_errors_v1';
  const MAX = 30;

  function _nowIso(){
    try{ return new Date().toISOString(); }catch(e){ return ''; }
  }
  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }

  function _load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      const j = raw ? JSON.parse(raw) : [];
      return Array.isArray(j) ? j : [];
    }catch(e){
      return [];
    }
  }
  function _save(xs){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(xs)); }catch(e){}
  }

  function add(message, meta){
    const msg = String(message || '').trim();
    if(!msg) return;
    const entry = {
      at: _nowIso(),
      page: _page(),
      message: msg.slice(0, 8000),
      meta: meta || null,
    };
    const xs = _load();
    xs.push(entry);
    while(xs.length > MAX) xs.shift();
    _save(xs);
    try{ window.dispatchEvent(new CustomEvent('influxbro:error', { detail: entry })); }catch(e){}
  }

  function all(){
    return _load();
  }

  function last(){
    const xs = _load();
    return xs.length ? xs[xs.length - 1] : null;
  }

  function clear(){
    _save([]);
    try{ window.dispatchEvent(new CustomEvent('influxbro:error', { detail: null })); }catch(e){}
  }

  function _fmtEntry(e){
    if(!e) return '';
    const at = String(e.at || '');
    const page = String(e.page || '');
    const msg = String(e.message || '');
    return (at ? (at + ' ') : '') + (page ? ('[' + page + '] ') : '') + msg;
  }

  function showLast(){
    const e = last();
    if(!e){
      try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Letzter Fehler', 'Kein Fehler gespeichert.'); }catch(x){}
      return;
    }
    const txt = _fmtEntry(e);
    try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Letzter Fehler', txt); }catch(x){}
  }

  function showDialog(){
    const xs = _load();
    if(!xs.length){
      try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Fehlerdialog', 'Keine Fehler gespeichert.'); }catch(x){}
      return;
    }
    const lines = [];
    const cur = xs[xs.length - 1];
    lines.push('Aktueller Fehler:');
    lines.push(_fmtEntry(cur));
    lines.push('');
    lines.push('Letzte Fehler:');
    for(const e of xs.slice().reverse()){
      lines.push('- ' + _fmtEntry(e));
    }
    lines.push('');
    lines.push('Hinweis: Der Verlauf wird im Browser (localStorage) gespeichert.');
    try{ if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Fehlerdialog', lines.join('\n')); }catch(x){}
  }

  window.InfluxBroErrors = {
    add,
    all,
    last,
    clear,
    showLast,
    showDialog,
  };
})();
</script>

<script>
// Simple query history (client-side) for "Query Details" panels
(function(){
  if(window.InfluxBroQueryHistory) return;

  const MAX = 30;
  const PREFIX = 'influxbro_query_history_v1:';

  function _key(scope){
    const s = String(scope || '').trim() || 'global';
    return PREFIX + s;
  }
  function _load(scope){
    try{
      const raw = localStorage.getItem(_key(scope));
      const j = raw ? JSON.parse(raw) : [];
      return Array.isArray(j) ? j : [];
    }catch(e){
      return [];
    }
  }
  function _save(scope, xs){
    try{ localStorage.setItem(_key(scope), JSON.stringify(xs || [])); }catch(e){}
  }
  function _clipLines(txt, n){
    const s = String(txt || '').trim();
    if(!s) return '';
    const xs = s.split(/\r?\n/);
    const k = Math.max(1, Number(n) || 5);
    const out = xs.slice(0, k).join('\n');
    return xs.length > k ? (out + '\n...') : out;
  }

  function add(scope, label, query, response, startedAtIso){
    const q = String(query || '').trim();
    if(!q) return;
    const ent = {
      at: String(startedAtIso || new Date().toISOString()),
      label: String(label || ''),
      query: q.slice(0, 20000),
      response: String(response || '').slice(0, 20000),
    };
    const xs = _load(scope);
    const prev = xs.length ? xs[xs.length - 1] : null;
    if(prev && String(prev.query || '') === ent.query && String(prev.label || '') === ent.label && String(prev.at || '') === ent.at) return;
    xs.push(ent);
    while(xs.length > MAX) xs.shift();
    _save(scope, xs);
  }

  function show(scope){
    const xs = _load(scope);
    const lines = [];
    lines.push('Query History: ' + String(scope || 'global'));
    lines.push('');
    if(!xs.length){
      lines.push('(keine Eintraege)');
    }else{
      for(const it of xs.slice().reverse()){
        const at = String(it && it.at ? it.at : '');
        const lab = String(it && it.label ? it.label : '').trim();
        lines.push('- ' + (at ? at : '') + (lab ? (' | ' + lab) : ''));
        const q = _clipLines(it && it.query ? it.query : '', 5);
        if(q){
          lines.push('  query:');
          lines.push('  ' + q.replace(/\n/g, '\n  '));
        }
        const r = _clipLines(it && it.response ? it.response : '', 5);
        if(r){
          lines.push('  response:');
          lines.push('  ' + r.replace(/\n/g, '\n  '));
        }
      }
    }
    try{
      if(window.InfluxBroPopup && window.InfluxBroPopup.show) window.InfluxBroPopup.show('Query History', lines.join('\n'));
      else alert(lines.join('\n'));
    }catch(e){}
  }

  window.InfluxBroQueryHistory = { add, show };
})();

try{ _ensureSummarySettingsButtons(); }catch(e){}
</script>

<script>
// Global button logging and button error reporting
(function(){
  if(window.InfluxBroButtons) return;

  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }
  function _buttonSel(){
    return 'button, input[type="button"], input[type="submit"], input[type="reset"], [role="button"]';
  }
  function _buttonTargetFromEvent(ev){
    try{ return ev && ev.target && ev.target.closest ? ev.target.closest(_buttonSel()) : null; }catch(e){ return null; }
  }
  function _buttonMeta(el){
    try{
      if(!el) return { ui:'', id:'', text:'', tag:'' };
      const txt = String(el.getAttribute('data-ui') || el.getAttribute('aria-label') || el.getAttribute('title') || el.textContent || '').replace(/\s+/g, ' ').trim();
      return {
        ui: String(el.getAttribute('data-ui') || '').trim(),
        id: String(el.getAttribute('id') || '').trim(),
        text: txt.slice(0, 120),
        tag: String(el.tagName || '').toLowerCase(),
      };
    }catch(e){ return { ui:'', id:'', text:'', tag:'' }; }
  }
  async function _log(kind, el, extra){
    try{
      const m = _buttonMeta(el);
      await fetch('./api/ui_event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          page: _page(),
          ui: m.ui || m.id || m.tag,
          text: m.text || m.id || m.tag,
          extra: Object.assign({ kind: String(kind || 'button_event') }, extra || {}, m),
        })
      });
    }catch(e){}
  }
  function reportError(err, context, el, extra){
    const msg = String(err && err.message ? err.message : err || 'Button-Fehler');
    const meta = Object.assign({ kind:'button_error', context: String(context || '') }, _buttonMeta(el), extra || {});
    try{ window.InfluxBroErrors && window.InfluxBroErrors.add && window.InfluxBroErrors.add(msg, meta); }catch(e){}
    try{ window.InfluxBroClientLog && window.InfluxBroClientLog.reportError && window.InfluxBroClientLog.reportError(msg, meta, String(err && err.stack ? err.stack : '')); }catch(e){}
    try{ _log('button_error', el, Object.assign({ error: msg }, meta)); }catch(e){}
  }

  try{
    document.addEventListener('click', (ev)=>{
      const btn = _buttonTargetFromEvent(ev);
      if(!btn) return;
      _log('button_press', btn, { pointer: 'click' });
    }, true);
  }catch(e){}

  try{
    const origAdd = EventTarget.prototype.addEventListener;
    if(!origAdd.__ib_button_wrap){
      EventTarget.prototype.addEventListener = function(type, listener, options){
        if(type !== 'click' || !listener) return origAdd.call(this, type, listener, options);
        if(typeof listener === 'function'){
          if(listener.__ib_button_wrapped) return origAdd.call(this, type, listener, options);
          const wrapped = function(){
            const ev = arguments && arguments.length ? arguments[0] : null;
            const btn = (this && this.matches && this.matches(_buttonSel())) ? this : _buttonTargetFromEvent(ev);
            try{
              const out = listener.apply(this, arguments);
              if(out && typeof out.then === 'function'){
                return out.catch((err)=>{
                  reportError(err, 'button.click', btn, { async: true });
                  throw err;
                });
              }
              return out;
            }catch(err){
              reportError(err, 'button.click', btn, { async: false });
              throw err;
            }
          };
          wrapped.__ib_button_wrapped = true;
          wrapped.__ib_button_original = listener;
          return origAdd.call(this, type, wrapped, options);
        }
        return origAdd.call(this, type, listener, options);
      };
      EventTarget.prototype.addEventListener.__ib_button_wrap = true;
    }
  }catch(e){}

  window.InfluxBroButtons = { log: _log, reportError };
})();
</script>

<script>
// Client-side error logging (browser -> server log)
// Also keeps a small local ring buffer for export.
(function(){
  if(window.InfluxBroClientLog) return;

  const LS_KEY = 'influxbro_client_errors_v1';
  const MAX = 50;

  function _page(){
    try{ return (document && document.querySelector('main[data-ui]') && document.querySelector('main[data-ui]').getAttribute('data-ui')) || ''; }catch(e){ return ''; }
  }
  function _href(){
    try{ return String(location && location.href ? location.href : ''); }catch(e){ return ''; }
  }
  function _ua(){
    try{ return String(navigator && navigator.userAgent ? navigator.userAgent : ''); }catch(e){ return ''; }
  }
  function _nowIso(){
    try{ return new Date().toISOString(); }catch(e){ return ''; }
  }

  function _load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      const j = raw ? JSON.parse(raw) : [];
      return Array.isArray(j) ? j : [];
    }catch(e){
      return [];
    }
  }
  function _save(xs){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(xs)); }catch(e){}
  }
  function _push(entry){
    const xs = _load();
    xs.push(entry);
    while(xs.length > MAX) xs.shift();
    _save(xs);
  }

  let LAST_SEND = { key: '', at: 0 };

  async function _send(entry){
    try{
      const key = String(entry && entry.message ? entry.message : '');
      const now = Date.now();
      if(key && LAST_SEND.key === key && (now - LAST_SEND.at) < 800) return;
      LAST_SEND = { key, at: now };

      await fetch('./api/client_error', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          page: entry.page,
          message: entry.message,
          href: entry.href,
          ua: entry.ua,
          stack: entry.stack,
          extra: entry.extra,
        })
      });
    }catch(e){}
  }

  function reportError(message, extra, stack){
    const entry = {
      at: _nowIso(),
      page: _page(),
      message: String(message || '').slice(0, 8000),
      href: _href(),
      ua: _ua(),
      stack: String(stack || '').slice(0, 8000),
      extra: extra || null,
    };
    _push(entry);
    _send(entry);
  }

  function fetchError(url, opts, err){
    const m = (err && err.message) ? String(err.message) : String(err);
    reportError('Failed to fetch: ' + String(url || ''), {
      kind: 'fetch',
      url: String(url || ''),
      method: (opts && opts.method) ? String(opts.method) : 'GET',
      err: m,
    }, (err && err.stack) ? String(err.stack) : '');
  }

  window.InfluxBroClientLog = {
    reportError,
    fetchError,
    getBuffer: () => _load(),
  };

  // Global JS error hooks
  window.addEventListener('error', (ev)=>{
    try{
      const msg = ev && ev.message ? String(ev.message) : 'JS error';
      const src = ev && ev.filename ? String(ev.filename) : '';
      const line = ev && typeof ev.lineno === 'number' ? ev.lineno : null;
      const col = ev && typeof ev.colno === 'number' ? ev.colno : null;
      const stack = (ev && ev.error && ev.error.stack) ? String(ev.error.stack) : '';
      reportError(msg, { kind:'window.error', src, line, col }, stack);
    }catch(e){}
  });
  window.addEventListener('unhandledrejection', (ev)=>{
    try{
      const r = ev ? ev.reason : null;
      const msg = (r && r.message) ? String(r.message) : String(r || 'Unhandled promise rejection');
      const stack = (r && r.stack) ? String(r.stack) : '';
      reportError(msg, { kind:'unhandledrejection' }, stack);
    }catch(e){}
  });
})();
</script>
