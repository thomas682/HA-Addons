<script>
// Global tooltips helper (all pages)
// - Prefer explicit tips by data-ui key
// - Otherwise derive a short tooltip from nearby label/help text
(function(){
  const ENABLED = {{ 'true' if (cfg and cfg.get('ui_tooltips_enabled', true)) else 'false' }};

  function clearTitles(){
    try{
      const root = document.querySelector('main.content') || document.body;
      // Remove all title attributes so no tooltip is shown.
      root.querySelectorAll('[title]').forEach(el => {
        try{ el.removeAttribute('title'); }catch(e){}
      });
    }catch(e){}
  }

  if(!ENABLED){
    try{
      if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', clearTitles);
      else clearTitles();
    }catch(e){}
    return;
  }

  const TIPS = {
    // Dashboard
    'dashboard.load': 'Laedt Graph, Tabelle und Statistik aus InfluxDB (mit aktueller Auswahl/Zeitraum).',
    'dashboard.cancel': 'Bricht laufende Abfragen sofort ab (Query/Listen/Scan).',
    'dashboard.reset': 'Bricht laufende Abfragen ab und setzt Auswahlfelder zurueck (Zeitraum bleibt erhalten).',
    'dashboard.query_details': 'Zeigt den zuletzt verwendeten Influx Query-String der Aktualisierung.',
    'filterlist_outlier_scan': 'Startet Fehlersuche (DB-Scan) im aktuellen Graph-Zeitraum.',
    'filterlist_outlier_reset': 'Beendet Ausreisser-Modus und zeigt wieder normale Tabelle.',
    'filterlist_to_edit': 'Uebernimmt markierte Tabellenzeilen in die Bearbeitungsliste.',
    'editlist_apply': 'Schreibt alle geaenderten Werte aus der Bearbeitungsliste in die Datenbank (mit Bestaetigung).',

    // Backup
    'backup.take_dashboard': 'Uebernimmt measurement/field/entity_id/friendly_name aus dem Dashboard (aus Browser-Speicher).',
    'backup.create_full': 'Erstellt ein Fullbackup (alle Daten) in das Backup-Verzeichnis.',
    'backup.create_range_zoom': 'Erstellt ein Backup fuer den aktuellen Graph-Zoom-Zeitraum.',
    'backup.create_range_sel': 'Erstellt ein Backup fuer den ausgewaehlten Zeitraum (Zeitraum-Auswahl).',
    'backup.reload': 'Laedt die Backup-Liste neu.',
    'backup.delete': 'Loescht die ausgewaehlten Backups aus dem Backup-Verzeichnis.',
    'backup.query_details': 'Zeigt den zuletzt verwendeten Influx Query-String der Backup-Erstellung.',
    'backup.hint_full': 'Zeigt den Zeitraum, der bei Fullbackup gesichert wuerde.',
    'backup.hint_zoom': 'Zeigt den Zeitraum, der beim Zoom-Backup gesichert wuerde.',
    'backup.hint_sel': 'Zeigt den Zeitraum, der beim Auswahl-Backup gesichert wuerde.',

    // Restore
    'restore.reload': 'Laedt die Backup-Liste neu.',
    'restore.source_to_target': 'Uebernimmt Quellenamen (measurement/field/entity_id/friendly_name) in die Zielnamen.',
    'restore.run': 'Fuehrt den Restore in die Zielserie aus (schreibt Daten in InfluxDB).',

    // Logs
    'logs.refresh': 'Laedt Logs neu.',
    'logs.follow': 'Automatisch nachladen (Follow) ein/aus.',
    'logs.copy': 'Kopiert die aktuelle Log-Ansicht in die Zwischenablage.',
    'logs.download': 'Laedt Logs als Datei herunter.',
    'logs.clear': 'Leert nur die Ansicht (keine Logs werden geloescht).',

    // Stats page
    'stats.load': 'Startet die Gesamtstatistik (Hintergrundjob) fuer alle Serien im Filter.',
    'stats.cancel': 'Bricht den laufenden Statistik-Job ab.',
    'stats.delete_rows': 'Markiert alle aktuell sichtbaren Zeilen als geloescht (nur Ansicht).',
    'stats.save_cols': 'Speichert Spaltenbreiten der Tabelle im Browser.',
    'stats.mark_all': 'Markiert alle aktuell sichtbaren Zeilen (nach Filter+Suche).',
    'stats.clear_mark': 'Loescht die aktuelle Markierung.',
    'stats.reload_marked': 'Berechnet/Laedt fehlende Spalten nur fuer markierte Zeilen nach.',
    'stats.reload_filtered': 'Berechnet/Laedt fehlende Spalten fuer alle Zeilen im aktuellen Filter nach.',
  };

  function _norm(s){
    return String(s || '').replace(/\s+/g, ' ').trim();
  }

  function _keyFromEl(el){
    try{
      if(!el) return '';
      const dui = _norm(el.getAttribute('data-ui'));
      if(dui) return dui;
      const id = _norm(el.getAttribute('id'));
      if(id) return '#' + id;

      // Table cells: try to derive a stable key from table + column
      const td = String(el.tagName||'').toLowerCase() === 'td' ? el : null;
      const th = String(el.tagName||'').toLowerCase() === 'th' ? el : null;
      const cell = td || th;
      if(cell){
        const tbl = cell.closest('table');
        const tid = tbl && tbl.getAttribute('id') ? _norm(tbl.getAttribute('id')) : '';
        const colKey = _norm(cell.getAttribute('data-key'));
        if(tid && colKey) return tid + ':' + colKey;
        if(tid) return tid;
      }

      const tag = String(el.tagName||'').toLowerCase();
      const cls = _norm(el.getAttribute('class'));
      if(cls){
        const c0 = cls.split(' ').filter(Boolean)[0] || '';
        if(c0) return tag + '.' + c0;
      }
      return tag;
    }catch(e){
      return '';
    }
  }

  function _ensureKeySuffix(title, key){
    const t = _norm(title);
    const k = _norm(key);
    if(!k) return t;
    const suffix = `(${k})`;
    if(t.includes(suffix)) return t;
    return (t ? (t + ' ' + suffix) : suffix);
  }

  function _short(s, n){
    const x = _norm(s);
    if(!x) return '';
    const m = Number(n) || 180;
    return x.length > m ? (x.slice(0, m) + '...') : x;
  }

  function _autoTitleFromContext(el){
    try{
      const tag = String(el && el.tagName ? el.tagName : '').toLowerCase();
      const isBtn = tag === 'button';
      const isInput = (tag === 'input' || tag === 'select' || tag === 'textarea');

      let labelTxt = '';
      let helpTxt = '';

      // Search a few ancestor levels for a nearby label/help.
      let cur = el;
      for(let i=0; i<5; i++){
        const p = cur && cur.parentElement ? cur.parentElement : null;
        if(!p) break;

        // Prefer a single label in the container.
        const labels = Array.from(p.querySelectorAll('label'))
          .map(l => _norm(l.textContent))
          .filter(Boolean);
        if(!labelTxt && labels.length){
          labelTxt = labels[0];
        }

        // Prefer explicit help blocks.
        if(!helpTxt){
          const h = p.querySelector('.muted.help') || p.querySelector('.muted');
          if(h) helpTxt = _norm(h.textContent);
        }

        if(labelTxt || helpTxt) break;
        cur = p;
      }

      if(isBtn){
        const t = _norm(el.textContent);
        const extra = helpTxt && helpTxt !== t ? helpTxt : '';
        return _short(extra ? (t + ': ' + extra) : t, 220);
      }

      if(isInput){
        if(labelTxt && helpTxt && helpTxt !== labelTxt){
          return _short(labelTxt + ': ' + helpTxt, 220);
        }
        if(labelTxt) return _short(labelTxt, 220);
        if(helpTxt) return _short(helpTxt, 220);
      }
    }catch(e){}
    return '';
  }

  function _looksLikeAutoKeyTitle(existing, key){
    const t = _norm(existing);
    const k = _norm(key);
    if(!t) return true;
    if(k && (t === k || t === ('#' + k) || t === ('data-ui:' + k))) return true;
    if(k && t === ('(' + k + ')')) return true;
    return false;
  }

  function _setTooltip(el, desc, key){
    try{
      const k = _norm(key);
      const d = _norm(desc);
      const existing = _norm(el.getAttribute('title'));
      let base = existing;

      // If missing or auto-key title, replace with description.
      if(!existing || _looksLikeAutoKeyTitle(existing, k)){
        base = d || existing;
      }

      // If still empty, fall back to element text.
      if(!base){
        const txt = _norm(el.textContent);
        base = _short(txt, 220);
      }

      // Always append the element key in parentheses.
      base = _ensureKeySuffix(base, k);
      if(base) el.setAttribute('title', base);
    }catch(e){}
  }

  function _tableCellDesc(td){
    try{
      const tr = td && td.parentElement ? td.parentElement : null;
      const tbl = td.closest('table');
      if(!tbl) return _short(td.textContent, 200);
      const thead = tbl.querySelector('thead');
      const ths = thead ? Array.from(thead.querySelectorAll('th')) : [];
      const tds = tr ? Array.from(tr.querySelectorAll('td')) : [];
      const idx = tds.indexOf(td);
      const th = (idx >= 0 && idx < ths.length) ? ths[idx] : null;
      const col = th ? _norm(th.textContent) : '';
      const val = _short(td.textContent, 200);
      if(col && val) return col + ': ' + val;
      if(col) return col;
      return val;
    }catch(e){
      return _short(td && td.textContent ? td.textContent : '', 200);
    }
  }

  function apply(){
    try{
      const root = document.querySelector('main.content') || document.body;
      const nodes = Array.from(root.querySelectorAll('*'));
      nodes.forEach(el => {
        const tag = String(el.tagName||'').toLowerCase();
        if(!tag) return;
        if(tag === 'script' || tag === 'style' || tag === 'meta' || tag === 'link' || tag === 'option') return;

        // Only for visible elements.
        try{
          if(el.offsetParent === null && tag !== 'body') return;
        }catch(e){}

        const key = _keyFromEl(el);
        let desc = '';

        const dui = _norm(el.getAttribute('data-ui'));
        if(dui && TIPS[dui]) desc = TIPS[dui];
        else if(tag === 'th'){
          const t = _norm(el.textContent);
          desc = t ? ('Spalte: ' + t) : '';
        }else if(tag === 'td'){
          desc = _tableCellDesc(el);
        }else if(tag === 'summary'){
          const t = _norm(el.textContent);
          desc = t ? ('Abschnitt: ' + t) : '';
        }else if(tag === 'details'){
          const sum = el.querySelector('summary');
          const t = sum ? _norm(sum.textContent) : '';
          desc = t ? ('Bereich: ' + t) : '';
        }else{
          desc = _autoTitleFromContext(el) || '';
        }

        // If we have no description, still provide a stable tooltip (name only).
        _setTooltip(el, desc, key);
      });
    }catch(e){}
  }

  try{
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', apply);
    else apply();
  }catch(e){}

  // Apply again on dynamic UI changes (tables, modals, etc.) - debounced
  try{
    let t = null;
    const obs = new MutationObserver(()=>{
      if(t) return;
      t = setTimeout(()=>{ t = null; apply(); }, 80);
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }catch(e){}
})();
</script>
