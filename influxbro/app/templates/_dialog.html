            root.setAttribute('data-dialog-open-logged', '1');
            _dialogReport('dialog_open', root, { trigger: root.getAttribute('data-dialog-trigger') || '' });
            _notifyDialogOpened(root);
          }
          return;
        }
        if(root.getAttribute('data-dialog-open-logged') === '1'){
          root.removeAttribute('data-dialog-open-logged');
          if(root.getAttribute('data-dialog-maximized') === '1') _toggleDialogMaximize(root, panel, false);
          _dialogReport('dialog_close', root, { trigger: root.getAttribute('data-dialog-trigger') || '' });
          _notifyDialogClosed(root);
        }
      }catch(e){}
    }
    function _enhanceDialog(root, opts){
      try{
        if(!root) return;
        _ensureDialogStandardStyles();
        root = _dialogRoot(root) || root;
        const panel = _dialogPanel(root);
        if(!panel) return;
        root.setAttribute('data-dialog-root', '1');
        root.setAttribute('role', 'dialog');
        root.setAttribute('aria-modal', 'true');
        if(opts && opts.name) root.setAttribute('data-dialog-name', String(opts.name));
        if(opts && opts.template) root.setAttribute('data-dialog-template', String(opts.template));
        if(opts && opts.trigger) root.setAttribute('data-dialog-trigger', String(opts.trigger));
        const tpl = String(root.getAttribute('data-dialog-template') || 'dialog_info_popup');
        panel.classList.add('ib-dialog-v2', tpl.replace(/_/g, '-'));
        if(!panel.getAttribute('data-dialog-panel')) panel.setAttribute('data-dialog-panel', '1');
        _dialogApplyProfileSize(root, panel);
        _dialogApplyProfilePosition(root, panel);
        _ensureDialogHeaderActions(root, panel, opts && opts.closeSelector ? opts.closeSelector : null);
        _ensureDialogDescription(root, panel);
        _ensureDialogContentRegion(panel);
        _ensureDialogFooter(root, opts && opts.closeSelector ? opts.closeSelector : null, { buttonClass: 'btn_sm ib_dialog_superpicker', superpicker: false });
        _ensureDialogResize(root, panel);
        _ensureDialogDrag(root, panel);
        _ensureDialogMeta(root, panel);
        _ensureDialogInfoButton(root, panel);
        _ensureDialogKeyboard(root, panel, opts && opts.closeSelector ? opts.closeSelector : null);
        _syncDialogVisibility(root, panel);
        root.setAttribute('data-dialog-enhanced', '1');
      }catch(e){}
    }
    window.InfluxBroManualDocs = {
      targets: MANUAL_DOC_TARGETS,
      target: _manualDocTarget,
      href: _manualHrefFor,
      open: _openManualDoc,
    };
    window.InfluxBroDialogStandards = {
      specs: DIALOG_TEMPLATE_SPECS,
      metaText: _dialogMetaText,
      infoText: _dialogInfoText,
      openInfo: _openDialogTemplateInfo,
      enhance: _enhanceDialog,
      visibleDialog(){
        try{
          const candidates = Array.from(document.querySelectorAll('dialog,[data-dialog-root="1"], [role="dialog"]'));
          for(let i = candidates.length - 1; i >= 0; i -= 1){
            if(_dialogVisible(candidates[i])) return candidates[i];
          }
        }catch(e){}
        return null;
      },
    };
    function _superpickerKey(root){
      try{
        const raw = _dialogName(root).replace(/[^a-zA-Z0-9_.-]+/g, '_');
        return raw || 'dialog_unknown';
      }catch(e){ return 'dialog_unknown'; }
    }
    function _ensureDialogFooter(rootOrSelector, closeSelector, opts){
      try{
        const root = (typeof rootOrSelector === 'string') ? document.querySelector(rootOrSelector) : rootOrSelector;
        if(!root) return;
        const panel = _dialogPanel(root);
        if(!panel) return;
        root.setAttribute('data-dialog-root', '1');
        let footer = panel.querySelector('[data-dialog-footer="1"]');
        if(!footer){
          footer = document.createElement('div');
          footer.setAttribute('data-dialog-footer', '1');
          panel.appendChild(footer);
        }
        const meta = panel.querySelector('[data-dialog-meta="1"]');
        if(meta && meta.parentElement !== footer) footer.insertBefore(meta, footer.firstChild || null);
        footer.querySelectorAll('[data-open-superpicker="1"], .ib_dialog_superpicker').forEach((btn)=>{ try{ btn.remove(); }catch(e){} });
        footer.querySelectorAll('[id$="_close"], [data-ui$=".btn_close"], [data-ib-pickkey$=".btn_close"]').forEach((btn)=>{
          try{ btn.style.display = 'none'; }catch(e){}
        });
        const closeBtn = closeSelector ? root.querySelector(closeSelector) : null;
        if(closeBtn && closeBtn.parentElement !== footer && opts && opts.moveCloseToFooter) footer.appendChild(closeBtn);
      }catch(e){}
    }
    function _normalizeDialogFooters(){
      if(window.__ib_dialog_footer_busy) return;
      window.__ib_dialog_footer_busy = true;
      try{
        _ensureDialogFooter('#ib_page_search_modal', '#ib_page_search_modal_close');
        _ensureDialogFooter('#analysis_log_modal', '#analysis_log_modal_close', { buttonClass: 'btn_sm ib_dialog_superpicker', superpicker: true });
        document.querySelectorAll('dialog,[data-dialog-root="1"]').forEach((root)=>{
          try{
            _enhanceDialog(root, {
              name: _dialogName(root),
              template: String(root.getAttribute('data-dialog-template') || 'dialog_info_popup'),
              trigger: String(root.getAttribute('data-dialog-trigger') || '-'),
              superpicker: String(root.id || '') !== 'analysis_log_modal' ? undefined : true,
            });
          }catch(e){}
        });
      }catch(e){}
      finally{ try{ window.__ib_dialog_footer_busy = false; }catch(e){} }
    }
    try{
      const _scheduleDialogFooterNormalize = (()=>{
        let raf = 0;
        return ()=>{
          try{
            if(raf) cancelAnimationFrame(raf);
            raf = requestAnimationFrame(()=>{
              raf = 0;
              _normalizeDialogFooters();
            });
          }catch(e){ _normalizeDialogFooters(); }
        };
      })();
      if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', _scheduleDialogFooterNormalize, { once: true });
      else _scheduleDialogFooterNormalize();
      new MutationObserver(_scheduleDialogFooterNormalize).observe(document.body, { childList: true, subtree: true });
    }catch(e){}
  })();
  </script>
