<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InfluxBro – Handbuch</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    .shell { display:grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    @media (max-width: 980px){ .shell { grid-template-columns: 1fr; } }
    .sidebar { padding: 14px; border-right: 1px solid #eee; }
    @media (max-width: 980px){ .sidebar { border-right: 0; border-bottom: 1px solid #eee; } }
    .brand { margin-bottom: 10px; }
    .brand_title { font-weight: 800; font-size: 18px; }
    .brand_meta { opacity: 0.7; font-size: 12px; margin-top: 2px; }
    .nav_item { display:flex; align-items:center; gap: 10px; padding: 10px 10px; border-radius: 12px; text-decoration:none; color: inherit; }
    .nav_item:hover { background: #f6f6f6; }
    .nav_item.active { background: #0b0b0c; color: #fff; }
    .ico { width: 22px; height: 22px; display:inline-flex; align-items:center; justify-content:center; font-weight: 800; }

    .content { padding: 16px; padding-top: calc(var(--ib-topbar-h, 0px) + var(--ib-pagecard-h, 0px) + 20px); box-sizing:border-box; }
    .muted { opacity: 0.7; font-size: 12px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-top: 12px; }
    h2 { margin: 0; }

    .manual_layout { display:grid; grid-template-columns: 240px 1fr; gap: 12px; margin-top: 12px; }
    @media (max-width: 980px){ .manual_layout { grid-template-columns: 1fr; } }
    .toc { border: 1px solid #ddd; border-radius: 12px; padding: 10px; max-height: calc(100vh - 130px); overflow:auto; position: sticky; top: 12px; }
    @media (max-width: 980px){ .toc { position: relative; top: auto; max-height: none; } }
    .toc_title { font-weight: 800; margin-bottom: 6px; }
    .toc a { display:block; text-decoration:none; color: inherit; padding: 4px 6px; border-radius: 8px; }
    .toc a:hover { background: #f6f6f6; }
    .toc .lvl2 { padding-left: 10px; opacity: 0.9; }
    .toc .lvl3 { padding-left: 20px; opacity: 0.85; }
    .toc .lvl4 { padding-left: 30px; opacity: 0.8; }

    .md { line-height: 1.5; }
    .md h1, .md h2, .md h3, .md h4 { margin: 18px 0 10px 0; }
    .md h1:first-child, .md h2:first-child { margin-top: 0; }
    .md p { margin: 8px 0; }
    .md ul { margin: 8px 0 8px 20px; }
    .md li { margin: 4px 0; }
    .md code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.95em; background: #f6f6f6; padding: 1px 4px; border-radius: 6px; }
    .md pre { overflow:auto; background: #0b0b0c; color: #f2f2f2; padding: 10px 12px; border-radius: 12px; }
    .md pre code { background: transparent; padding: 0; }
    .md a { color: inherit; }
    .md img { max-width: 100%; height: auto; border-radius: 12px; border: 1px solid #eee; }
    .searchbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:12px; }
    .searchbar input { min-width:260px; flex:1; padding:8px 10px; }
    .searchbar button { padding:8px 10px; cursor:pointer; }
    .search_meta { font-size:12px; opacity:.8; min-width:72px; text-align:center; }
    mark.ib_search_hit { background:#ffe08a; color:inherit; padding:0 1px; border-radius:3px; }
    mark.ib_search_hit.active { background:#ff9900; color:#111; box-shadow:0 0 0 2px rgba(255,153,0,0.18); }
  </style>
</head>
<body>
  {% include "_topbar.html" %}
  <div class="shell">
    {% include "_nav.html" %}
    <main class="content" data-ui="manual_page.main" data-ib-pickkey="manual_page.main" title="manual.page">
      <h2>Handbuch</h2>
      <div class="muted">Quelle: <code>influxbro/MANUAL.md</code></div>

      <div class="searchbar" data-ui="manual_main.panel_searchbar" data-ib-pickkey="manual_main.panel_searchbar" title="manual.searchbar">
        <div class="ib_clear_row">
          <input id="manual_search" type="text" placeholder="Handbuch durchsuchen..." data-ui="manual_main.input_search" data-ib-pickkey="manual_main.input_search" title="manual.search" />
          <button type="button" class="ib_clear_btn" data-clear-for="manual_search" aria-label="Feld leeren" title="Feld leeren"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 7h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M7 7l1 12h8l1-12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 11v5M14 11v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
        </div>
        <div class="search_meta"><span id="manual_search_idx">0</span>/<span id="manual_search_cnt">0</span></div>
        <button id="manual_search_prev" type="button" data-ui="manual_search.btn_prev" data-ib-pickkey="manual_search.btn_prev" title="manual.search.prev">Zurueck</button>
        <button id="manual_search_next" type="button" data-ui="manual_search.btn_next" data-ib-pickkey="manual_search.btn_next" title="manual.search.next">Vor</button>
      </div>

      <div class="manual_layout" data-ui="manual_main.panel_layout" data-ib-pickkey="manual_main.panel_layout" title="manual.layout">
        <aside class="toc" data-ui="manual_main.panel_toc" data-ib-pickkey="manual_main.panel_toc" title="manual.toc">
          <div class="toc_title">Inhalt</div>
          <div id="toc_links"></div>
        </aside>

        <section class="card md" data-ui="manual_main.panel_content" data-ib-pickkey="manual_main.panel_content" title="manual.content">
          <div id="manual_html"></div>
        </section>
      </div>

      <script>
      const RAW = {{ (manual_text or "") | tojson }};
      let MANUAL_HITS = [];
      let MANUAL_CURSOR = -1;

      function esc(s){
        return String(s||"")
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;');
      }

      function slugify(s){
        return String(s||"")
          .toLowerCase()
          .replace(/[^a-z0-9\s_-]/g,'')
          .trim()
          .replace(/[\s_]+/g,'-')
          .replace(/-+/g,'-') || 'section';
      }

      function inlineMd(s){
        let out = esc(s);
        // images
        out = out.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (m, alt, url)=>{
          const u = String(url||'').trim();
          const src = /^(https?:)?\/\//i.test(u) || u.startsWith('/')
            ? esc(u)
            : ('./api/manual_asset?path=' + encodeURIComponent(u));
          return `<img alt="${esc(alt)}" src="${src}"/>`;
        });
        // links
        out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, txt, url)=>{
          const u = String(url||'').trim();
          return `<a href="${esc(u)}" target="_blank" rel="noreferrer">${esc(txt)}</a>`;
        });
        // inline code
        out = out.replace(/`([^`]+)`/g, (m, code)=>`<code>${esc(code)}</code>`);
        return out;
      }

      function renderMarkdown(md){
        const lines = String(md||'').replace(/\r\n/g,'\n').split('\n');
        const toc = [];
        const used = new Map();

        let html = '';
        let inCode = false;
        let codeLang = '';
        let codeBuf = [];
        let inUl = false;

        function closeUl(){ if(inUl){ html += '</ul>'; inUl = false; } }
        function closeCode(){
          if(inCode){
            const code = esc(codeBuf.join('\n'));
            html += `<pre><code class="lang-${esc(codeLang)}">${code}</code></pre>`;
            inCode = false; codeLang=''; codeBuf=[];
          }
        }

        function uniqId(base){
          const n = (used.get(base)||0) + 1;
          used.set(base, n);
          return n === 1 ? base : `${base}-${n}`;
        }

        for(const raw of lines){
          const line = raw || '';

          const mFence = line.match(/^```\s*(\S+)?\s*$/);
          if(mFence){
            if(inCode){
              closeCode();
            }else{
              closeUl();
              inCode = true;
              codeLang = (mFence[1]||'').trim();
              codeBuf = [];
            }
            continue;
          }

          if(inCode){
            codeBuf.push(line);
            continue;
          }

          const mHead = line.match(/^(#{1,4})\s+(.*)$/);
          if(mHead){
            closeUl();
            const lvl = mHead[1].length;
            const txt = (mHead[2]||'').trim();
            const id = uniqId(slugify(txt));
            toc.push({lvl, txt, id});
            html += `<h${lvl} id="${esc(id)}">${inlineMd(txt)}</h${lvl}>`;
            continue;
          }

          const mLi = line.match(/^\s*-\s+(.*)$/);
          if(mLi){
            if(!inUl){ html += '<ul>'; inUl = true; }
            html += `<li>${inlineMd(mLi[1])}</li>`;
            continue;
          }

          if(!line.trim()){
            closeUl();
            continue;
          }

          closeUl();
          html += `<p>${inlineMd(line)}</p>`;
        }

        closeUl();
        closeCode();
        return {html, toc};
      }

      const out = renderMarkdown(RAW);
      const $html = document.getElementById('manual_html');
      const $toc = document.getElementById('toc_links');
      if($html) $html.innerHTML = out.html;
      if($toc){
        $toc.innerHTML = '';
        out.toc.forEach(x=>{
          const a = document.createElement('a');
          a.href = '#' + x.id;
          a.textContent = x.txt;
          a.className = x.lvl === 1 ? '' : (x.lvl === 2 ? 'lvl2' : (x.lvl === 3 ? 'lvl3' : 'lvl4'));
          $toc.appendChild(a);
        });
      }

      function clearHits(){
        MANUAL_HITS.forEach((hit)=>{
          try{
            const parent = hit.parentNode;
            if(!parent) return;
            parent.replaceChild(document.createTextNode(hit.textContent || ''), hit);
            parent.normalize();
          }catch(e){}
        });
        MANUAL_HITS = [];
        MANUAL_CURSOR = -1;
      }

      function collectHits(root, needle){
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
          acceptNode(node){
            if(!node || !node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
            const p = node.parentElement;
            if(!p) return NodeFilter.FILTER_REJECT;
            if(['SCRIPT','STYLE','MARK'].includes(String(p.tagName || '').toUpperCase())) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });
        const nodes = [];
        while(walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach((node)=>{
          const txt = String(node.nodeValue || '');
          const low = txt.toLowerCase();
          let pos = 0;
          let idx = low.indexOf(needle, pos);
          if(idx < 0) return;
          const frag = document.createDocumentFragment();
          while(idx >= 0){
            if(idx > pos) frag.appendChild(document.createTextNode(txt.slice(pos, idx)));
            const mark = document.createElement('mark');
            mark.className = 'ib_search_hit';
            mark.textContent = txt.slice(idx, idx + needle.length);
            frag.appendChild(mark);
            MANUAL_HITS.push(mark);
            pos = idx + needle.length;
            idx = low.indexOf(needle, pos);
          }
          if(pos < txt.length) frag.appendChild(document.createTextNode(txt.slice(pos)));
          if(node.parentNode) node.parentNode.replaceChild(frag, node);
        });
      }

      function updateSearchMeta(){
        const $idx = document.getElementById('manual_search_idx');
        const $cnt = document.getElementById('manual_search_cnt');
        if($idx) $idx.textContent = MANUAL_HITS.length ? String(MANUAL_CURSOR + 1) : '0';
        if($cnt) $cnt.textContent = String(MANUAL_HITS.length);
      }

      function activateHit(i){
        if(!MANUAL_HITS.length){ MANUAL_CURSOR = -1; updateSearchMeta(); return; }
        MANUAL_CURSOR = ((i % MANUAL_HITS.length) + MANUAL_HITS.length) % MANUAL_HITS.length;
        MANUAL_HITS.forEach((el, idx)=>el.classList.toggle('active', idx === MANUAL_CURSOR));
        try{ MANUAL_HITS[MANUAL_CURSOR].scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){}
        updateSearchMeta();
      }

      function runManualSearch(){
        if(!$html) return;
        clearHits();
        const $input = document.getElementById('manual_search');
        const q = String($input && $input.value || '').trim().toLowerCase();
        if(!q){ updateSearchMeta(); return; }
        collectHits($html, q);
        activateHit(0);
      }

      const $manualSearch = document.getElementById('manual_search');
      const $manualPrev = document.getElementById('manual_search_prev');
      const $manualNext = document.getElementById('manual_search_next');
      if($manualSearch) $manualSearch.addEventListener('input', runManualSearch);
      if($manualPrev) $manualPrev.addEventListener('click', ()=>activateHit(MANUAL_CURSOR - 1));
      if($manualNext) $manualNext.addEventListener('click', ()=>activateHit(MANUAL_CURSOR + 1));

      // Allow deep links from tooltips: ./manual?q=<data-ui>
      try{
        const q0 = new URLSearchParams(String(location && location.search || '')).get('q');
        if(q0 && $manualSearch){
          $manualSearch.value = String(q0);
          runManualSearch();
        }
      }catch(e){}
      </script>

      {% include "_tooltips.html" %}
    </main>
  </div>
</body>
</html>
