  <script>
  // Ensure every visible control has a stable tooltip + internal name.
  // Also persist non-sensitive UI input state in localStorage so navigating away
  // (or updating the add-on) keeps the last UI selections.
  (function(){
    const TOOLTIP_ENABLED = {{ 'true' if (cfg and cfg.get('ui_tooltips_enabled', true)) else 'false' }};
    const SENSITIVE_IDS = new Set([
      'token',
      'password',
      'delete_confirm_phrase',
      'confirm_phrase',
      'confirm',
      'confirm_text',
    ]);

    function stablePath(){
      try{
        const p = String(location && location.pathname ? location.pathname : '/');
        // Home Assistant ingress adds a volatile token segment.
        return p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '').replace(/\/+/g, '/');
      }catch(e){
        return '/';
      }
    }

    function storageKeyForId(id){
      return 'influxbro_ui:' + stablePath() + ':' + String(id || '');
    }

    function isSensitive(el){
      try{
        const id = (el.getAttribute('id') || '').trim();
        if(id && SENSITIVE_IDS.has(id)) return true;
        const t = (el.getAttribute('type') || '').toLowerCase();
        if(t === 'password') return true;
        const nm = (el.getAttribute('name') || '').toLowerCase();
        if(nm.includes('token') || nm.includes('password')) return true;
        return false;
      }catch(e){
        return true;
      }
    }

    function snapshotValue(el){
      const tag = (el.tagName || '').toLowerCase();
      const type = (el.getAttribute('type') || '').toLowerCase();
      if(type === 'checkbox') return {t:'cb', v: !!el.checked};
      if(type === 'radio') return {t:'radio', v: !!el.checked};
      if(tag === 'select') return {t:'sel', v: String(el.value || '')};
      return {t:'txt', v: String(el.value || '')};
    }

    function applySnapshot(el, snap){
      if(!snap || typeof snap !== 'object') return;
      const type = (el.getAttribute('type') || '').toLowerCase();
      const tag = (el.tagName || '').toLowerCase();
      if((snap.t === 'cb' || snap.t === 'radio') && (type === 'checkbox' || type === 'radio')){
        el.checked = !!snap.v;
        return;
      }
      if(snap.t === 'sel' && tag === 'select'){
        el.value = String(snap.v || '');
        return;
      }
      if(snap.t === 'txt' && (tag === 'input' || tag === 'textarea')){
        el.value = String(snap.v || '');
      }
    }

    const RESTORED = new Set();
    function restoreEl(el){
      try{
        if(!el || !el.getAttribute) return;
        const id = (el.getAttribute('id') || '').trim();
        if(!id) return;
        if(RESTORED.has(id)) return;
        if(isSensitive(el)) return;
        const key = storageKeyForId(id);
        const raw = localStorage.getItem(key);
        if(!raw) return;
        const snap = JSON.parse(raw);
        applySnapshot(el, snap);
        // Mark restored after applying once.
        RESTORED.add(id);
      }catch(e){}
    }

    // Persist <details> open/closed state per page.
    function detailsStorageKey(){
      return 'influxbro_details:' + stablePath();
    }

    function restoreDetailsState(root){
      try{
        const raw = localStorage.getItem(detailsStorageKey());
        if(!raw) return;
        const j = JSON.parse(raw);
        if(!j || typeof j !== 'object') return;
        const scope = root || document;
        scope.querySelectorAll('details[id]').forEach(d => {
          const id = d.getAttribute('id');
          if(!id) return;
          if(Object.prototype.hasOwnProperty.call(j, id)){
            d.open = !!j[id];
          }
        });
      }catch(e){}
    }

    function snapshotDetailsState(root){
      const out = {};
      try{
        const scope = root || document;
        scope.querySelectorAll('details[id]').forEach(d => {
          const id = d.getAttribute('id');
          if(!id) return;
          out[id] = !!d.open;
        });
      }catch(e){}
      return out;
    }

    function saveDetailsState(root){
      try{
        const snap = snapshotDetailsState(root);
        localStorage.setItem(detailsStorageKey(), JSON.stringify(snap));
        return true;
      }catch(e){
        return false;
      }
    }

    function setAllDetailsOpen(root, wantOpen){
      try{
        const scope = root || document;
        scope.querySelectorAll('details').forEach(d => { d.open = !!wantOpen; });
      }catch(e){}
    }

    function ensureSectionToolbar(){
      try{
        const main = document.querySelector('main.content');
        if(!main) return;
        const h2 = main.querySelector('h2');
        if(!h2) return;
        const anyDetails = main.querySelector('details');
        if(!anyDetails) return;
        if(document.getElementById('influxbro_sections_bar')) return;

        const bar = document.createElement('div');
        bar.id = 'influxbro_sections_bar';
        bar.style.display = 'flex';
        bar.style.flexWrap = 'wrap';
        bar.style.gap = '8px';
        bar.style.alignItems = 'center';
        bar.style.margin = '8px 0 10px 0';

        const mkBtn = (txt) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.textContent = txt;
          b.style.padding = '8px 10px';
          b.style.height = '34px';
          b.style.borderRadius = '10px';
          b.style.border = '1px solid #ddd';
          b.style.background = '#fff';
          b.style.cursor = 'pointer';
          return b;
        };

        const bOpen = mkBtn('Alle oeffnen');
        bOpen.setAttribute('data-ui', 'sections.open_all');
        bOpen.onclick = (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          setAllDetailsOpen(main, true);
        };
        const bClose = mkBtn('Alle schliessen');
        bClose.setAttribute('data-ui', 'sections.close_all');
        bClose.onclick = (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          setAllDetailsOpen(main, false);
        };

        const bSave = mkBtn('Darstellung speichern');
        bSave.setAttribute('data-ui', 'sections.save');
        bSave.style.fontSize = '12px';
        bSave.style.opacity = '0.85';
        bSave.onclick = (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          const ok = saveDetailsState(main);
          // lightweight feedback via title
          bSave.setAttribute('title', ok ? 'Gespeichert.' : 'Speichern fehlgeschlagen.');
        };

        bar.appendChild(bOpen);
        bar.appendChild(bClose);
        bar.appendChild(bSave);

        // Insert after h2
        if(h2.nextSibling){
          h2.parentNode.insertBefore(bar, h2.nextSibling);
        }else{
          h2.parentNode.appendChild(bar);
        }

        // Restore persisted state (after bar exists)
        restoreDetailsState(main);
      }catch(e){}
    }

    function watchEl(el){
      try{
        if(!el || !el.getAttribute) return;
        const id = (el.getAttribute('id') || '').trim();
        if(!id) return;
        if(isSensitive(el)) return;
        const key = storageKeyForId(id);
        const save = ()=>{
          try{ localStorage.setItem(key, JSON.stringify(snapshotValue(el))); }catch(e){}
        };
        el.addEventListener('change', save);
        el.addEventListener('input', save);
      }catch(e){}
    }

    const HELP = {
      'sections.open_all': 'Oeffnet alle einklappbaren Bereiche auf dieser Seite.',
      'sections.close_all': 'Schliesst alle einklappbaren Bereiche auf dieser Seite.',
      'sections.save': 'Speichert den aktuellen Auf/Zu-Zustand der Bereiche fuer diese Seite.',
      'logs.server_profile': 'Setzt die Log-Stufe im Backend (wirkt sofort).',
      'logs.server_influx_queries': 'Wenn aktiv, werden Influx Query-Strings in TRACE geloggt.',
      'restore.source_to_target': 'Uebernimmt Measurement/Field/Tags aus dem Backup ins Ziel.',
      'restore.run': 'Fuehrt den Restore/Copy aus und ueberschreibt Daten im Ziel.',
    };

    function _tooltipFor(el){
      try{
        const ui = (el.getAttribute('data-ui') || '').trim();
        if(!ui) return '';
        const explicit = (el.getAttribute('data-help') || '').trim();
        const help = explicit || HELP[ui] || '';
        return help ? (ui + "\n" + help) : ui;
      }catch(e){
        return '';
      }
    }

    function applyTooltips(){
      if(!TOOLTIP_ENABLED) return;
      document.querySelectorAll('[data-ui]').forEach(el => {
        const ui = (el.getAttribute('data-ui') || '').trim();
        if(!ui) return;
        const want = _tooltipFor(el);
        const cur = el.getAttribute('title');
        // Preserve custom titles; otherwise keep title stable + helpful.
        if(!cur || cur === ui || cur.startsWith(ui + "\n")) el.setAttribute('title', want);
      });

      document.querySelectorAll('input, select, textarea, button, a').forEach(el => {
        if(el.getAttribute('data-ui')) return;
        const id = el.getAttribute('id');
        if(id){
          el.setAttribute('data-ui', id);
          if(!el.getAttribute('title')) el.setAttribute('title', id);
        }
      });
    }

    function clearTitles(){
      try{
        document.querySelectorAll('[title]').forEach(el => {
          try{ el.removeAttribute('title'); }catch(e){}
        });
      }catch(e){}
    }

    function scanPersistence(){
      document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
        restoreEl(el);
        watchEl(el);
      });
    }
    try{
      // Start early so values restore before page scripts use them.
    if(TOOLTIP_ENABLED) applyTooltips();
    else clearTitles();
    scanPersistence();
    ensureSectionToolbar();
    const obs = new MutationObserver((mut)=>{
      if(TOOLTIP_ENABLED) applyTooltips();
      try{
          // Restore/save for newly added nodes.
          (mut||[]).forEach(m=>{
            (m.addedNodes||[]).forEach(n=>{
              if(!n || !n.querySelectorAll) return;
              n.querySelectorAll('input[id], select[id], textarea[id]').forEach(el=>{
                restoreEl(el);
                watchEl(el);
              });
            });
          });
          ensureSectionToolbar();
        }catch(e){}
      });
      obs.observe(document.documentElement, {childList:true, subtree:true});
    }catch(e){}
  })();
  </script>
