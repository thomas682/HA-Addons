  <style>
    /* Standard sidebar look (shared across all pages). */
    .shell { display:grid; grid-template-columns: var(--ib-sidebar-w, 260px) 1fr; min-height: 100vh; padding-top: 20px; box-sizing: border-box; position: relative; }
    @media (max-width: 980px){ .shell { grid-template-columns: 1fr; } }
    nav.sidebar { padding: 14px; border-right: 1px solid #eee; }
    @media (max-width: 980px){ nav.sidebar { border-right: 0; border-bottom: 1px solid #eee; } }
    .brand { margin-bottom: 10px; }
    .brand_title { font-weight: 900; font-size: 22px; letter-spacing: 0.2px; }
    .brand_meta { opacity: 0.7; font-size: 12px; margin-top: 2px; }
    .nav_item { display:flex; align-items:center; gap: 10px; padding: 10px 10px; border-radius: 12px; text-decoration:none; color: inherit; font-size: 16px; }
    .nav_item:hover { background: #f6f6f6; }
    .nav_item.active { background: #0b0b0c; color: #fff; }
    .ico { width: 22px; height: 22px; display:inline-flex; align-items:center; justify-content:center; font-weight: 800; }
    .ico svg { width: 22px; height: 22px; display:block; opacity: 0.70; }
    .nav_item:hover .ico svg { opacity: 0.90; }
    .nav_item.active .ico svg { opacity: 1.0; }

    /* Sidebar tools (collapse/expand) */
    .sidebar_top { display:flex; align-items:center; justify-content:space-between; gap: 10px; margin-bottom: 10px; }
    #ib_sidebar_toggle { cursor:pointer; padding: 8px 10px; height: 32px; border: 1px solid #eee; border-radius: 12px; background: #fff; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 700; }
    #ib_sidebar_toggle:hover { background: #f6f6f6; }
    @media (max-width: 980px){ .sidebar_top { display:none; } }

    /* Splitbar (desktop only) */
    .ib_sidebar_splitter {
      position: absolute;
      top: calc(var(--ib-topbar-h, 0px) + var(--ib-pagecard-live-h, 0px) + 20px);
      bottom: 0;
      left: calc(var(--ib-sidebar-w, 260px) - 3px);
      width: 6px;
      cursor: col-resize;
      z-index: 10010;
      background: transparent;
    }
    .ib_sidebar_splitter:hover { background: rgba(0,0,0,0.06); }
    @media (max-width: 980px){ .ib_sidebar_splitter { display:none; } }

    /* Collapsed state (desktop only): icon-only nav */
    @media (min-width: 981px){
      .shell.ib_sidebar_collapsed nav.sidebar { padding: 10px 8px; }
      .shell.ib_sidebar_collapsed nav.sidebar .nav_item { justify-content:center; padding: 10px 6px; }
      .shell.ib_sidebar_collapsed nav.sidebar .nav_item > span:last-child { display:none; }
      .shell.ib_sidebar_collapsed #influxbro_status_panel { display:none; }
    }

    /* Desktop: keep sidebar fixed; scroll only content area. */
    @media (min-width: 981px){
      html, body { height: 100%; }
      body { overflow: hidden; }
      .shell { height: 100vh; min-height: 100vh; }
      .shell > nav.sidebar { position: sticky; top: calc(var(--ib-topbar-h, 0px) + var(--ib-pagecard-live-h, 0px) + 20px); height: calc(100vh - (var(--ib-topbar-h, 0px) + var(--ib-pagecard-live-h, 0px) + 20px)); overflow: auto; }
      .shell > main.content { height: calc(100vh - (var(--ib-topbar-h, 0px) + var(--ib-pagecard-live-h, 0px) + 20px)); overflow: auto; padding-bottom: calc(var(--ib-bottombar-h, 0px) + 18px); box-sizing: border-box; }
    }
    /* Mobile: normal page scrolling. */
    @media (max-width: 980px){
      body { overflow: auto; }
      .shell { height: auto; padding-top: 0; }

      /* Hamburger drawer: sidebar becomes an off-canvas overlay. */
      .shell > nav.sidebar {
        position: fixed;
        left: 0;
        top: calc(env(safe-area-inset-top, 0px) + var(--ib-topbar-h, 0px) + var(--ib-pagecard-live-h, 0px));
        bottom: calc(env(safe-area-inset-bottom, 0px));
        width: min(320px, 86vw);
        max-width: 86vw;
        background: #fff;
        border-right: 1px solid #eee;
        padding-left: calc(14px + env(safe-area-inset-left, 0px));
        padding-right: calc(14px + env(safe-area-inset-right, 0px));
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        transform: translateX(-105%);
        transition: transform 180ms ease;
        z-index: 10020;
      }
      .shell.ib_nav_mobile_open > nav.sidebar { transform: translateX(0); box-shadow: 0 12px 40px rgba(0,0,0,0.18); }

      #ib_nav_mobile_overlay {
        position: fixed;
        left: 0;
        right: 0;
        top: calc(env(safe-area-inset-top, 0px) + var(--ib-topbar-h, 0px) + var(--ib-pagecard-live-h, 0px));
        bottom: calc(env(safe-area-inset-bottom, 0px));
        background: rgba(0,0,0,0.28);
        display: none;
        z-index: 10015;
      }
      .shell.ib_nav_mobile_open #ib_nav_mobile_overlay { display: block; }

      .shell > main.content {
        height: auto;
        overflow: visible;
        padding-bottom: calc(var(--ib-bottombar-h, 0px) + 18px);
        box-sizing: border-box;
        max-width: 100%;
        overflow-x: hidden;
      }

      /* Touch targets */
      .nav_item { padding: 12px 12px; min-height: 44px; }
    }

  <script>
  // Ensure every visible control has a stable tooltip + internal name.
  // Also persist non-sensitive UI input state in localStorage so navigating away
  // (or updating the add-on) keeps the last UI selections.
  (function(){
  const TOOLTIP_ENABLED = {{ 'true' if (cfg and cfg.get('ui_tooltips_enabled', true)) else 'false' }};

  function _pickerModeActive(){
    try{
      return !!document.querySelector('#ui_picker_toggle.active, #ui_superpicker_toggle.active');
    }catch(e){
      return false;
    }
  }
    const SENSITIVE_IDS = new Set([
      'token',
      'password',
      'confirm',
      'confirm_text',
    ]);

    function stablePath(){
      try{
        const p = String(location && location.pathname ? location.pathname : '/');
        // Home Assistant ingress adds a volatile token segment.
        return p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '').replace(/\/+/g, '/');
      }catch(e){
        return '/';
      }
    }

    function storageKeyForId(id){
      return 'influxbro_ui:' + stablePath() + ':' + String(id || '');
    }

    // File-based persistence: mirror localStorage writes to the backend (/data/influxbro_ui_state.json).
    // Keep localStorage as a fast cache so existing page scripts keep working.
    const _LS_SET = (window.localStorage && window.localStorage.setItem) ? window.localStorage.setItem.bind(window.localStorage) : null;
    const _LS_REM = (window.localStorage && window.localStorage.removeItem) ? window.localStorage.removeItem.bind(window.localStorage) : null;
    let _UIBUF = null;
    let _UIT = null;
    let _DISABLE_HOOK = false;

    function _queueUiState(k, v){
      try{
        if(_DISABLE_HOOK) return;
        const key = String(k || '');
        if(!key.startsWith('influxbro')) return;
        if(!_UIBUF) _UIBUF = {};
        _UIBUF[key] = (v === null) ? null : String(v);
        if(_UIT) clearTimeout(_UIT);
        _UIT = setTimeout(_flushUiState, 220);
      }catch(e){}
    }

    async function _flushUiState(){
      try{
        if(!_UIBUF) return;
        const items = _UIBUF;
        _UIBUF = null;
        _UIT = null;
        await fetch('./api/ui_state/set', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({items}),
        }).catch(()=>{});
      }catch(e){}
    }

    try{
      if(window.localStorage && !window.localStorage.__influxbro_hooked && _LS_SET && _LS_REM){
        window.localStorage.__influxbro_hooked = true;
        const origSet = window.localStorage.setItem.bind(window.localStorage);
        const origRem = window.localStorage.removeItem.bind(window.localStorage);
        window.localStorage.setItem = (k, v)=>{ origSet(k, v); _queueUiState(k, v); };
        window.localStorage.removeItem = (k)=>{ origRem(k); _queueUiState(k, null); };
      }
    }catch(e){}

    async function _restoreUiStateFromServer(){
      try{
        const r = await fetch('./api/ui_state?prefix=' + encodeURIComponent('influxbro'));
        const j = await r.json().catch(()=>({ok:false}));
        if(!r.ok || !j || !j.ok) return;
        const items = (j.items && typeof j.items === 'object') ? j.items : {};
        _DISABLE_HOOK = true;
        Object.keys(items).forEach(k=>{
          try{
            const v = items[k];
            if(v === null || v === undefined){
              if(_LS_REM) _LS_REM(String(k));
              return;
            }
            if(_LS_SET) _LS_SET(String(k), String(v));
          }catch(e){}
        });
      }catch(e){}
      finally{ _DISABLE_HOOK = false; }
    }

    function isSensitive(el){
      try{
        const id = (el.getAttribute('id') || '').trim();
        if(id && SENSITIVE_IDS.has(id)) return true;
        const t = (el.getAttribute('type') || '').toLowerCase();
        if(t === 'password') return true;
        const nm = (el.getAttribute('name') || '').toLowerCase();
        if(nm.includes('token') || nm.includes('password')) return true;
        return false;
      }catch(e){
        return true;
      }
    }

    function snapshotValue(el){
      const tag = (el.tagName || '').toLowerCase();
      const type = (el.getAttribute('type') || '').toLowerCase();
      if(type === 'checkbox') return {t:'cb', v: !!el.checked};
      if(type === 'radio') return {t:'radio', v: !!el.checked};
      if(tag === 'select') return {t:'sel', v: String(el.value || '')};
      return {t:'txt', v: String(el.value || '')};
    }

    function applySnapshot(el, snap){
      if(!snap || typeof snap !== 'object') return;
      const type = (el.getAttribute('type') || '').toLowerCase();
      const tag = (el.tagName || '').toLowerCase();
      if((snap.t === 'cb' || snap.t === 'radio') && (type === 'checkbox' || type === 'radio')){
        el.checked = !!snap.v;
        return;
      }
      if(snap.t === 'sel' && tag === 'select'){
        el.value = String(snap.v || '');
        return;
      }
      if(snap.t === 'txt' && (tag === 'input' || tag === 'textarea')){
        el.value = String(snap.v || '');
      }
    }

    const RESTORED = new Set();
    function restoreEl(el){
      try{
        if(!el || !el.getAttribute) return;
        const id = (el.getAttribute('id') || '').trim();
        if(!id) return;
        if(RESTORED.has(id)) return;
        if(isSensitive(el)) return;
        const key = storageKeyForId(id);
        const raw = localStorage.getItem(key);
        if(!raw) return;
        const snap = JSON.parse(raw);
        applySnapshot(el, snap);
        // Mark restored after applying once.
        RESTORED.add(id);
      }catch(e){}
    }

    // Persist <details> open/closed state per page.
    function detailsStorageKey(){
      return 'influxbro_details:' + stablePath();
    }

    function restoreDetailsState(root){
      try{
        const raw = localStorage.getItem(detailsStorageKey());
        if(!raw) return;
        const j = JSON.parse(raw);
        if(!j || typeof j !== 'object') return;
        const scope = root || document;
        scope.querySelectorAll('details[id]').forEach(d => {
          const id = d.getAttribute('id');
          if(!id) return;
          if(Object.prototype.hasOwnProperty.call(j, id)){
            d.open = !!j[id];
          }
        });
      }catch(e){}
    }

    function snapshotDetailsState(root){
      const out = {};
      try{
        const scope = root || document;
        scope.querySelectorAll('details[id]').forEach(d => {
          const id = d.getAttribute('id');
          if(!id) return;
          out[id] = !!d.open;
        });
      }catch(e){}
      return out;
    }

    function saveDetailsState(root){
      try{
        const snap = snapshotDetailsState(root);
        localStorage.setItem(detailsStorageKey(), JSON.stringify(snap));
        return true;
      }catch(e){
        return false;
      }
    }

    function setAllDetailsOpen(root, wantOpen){
      try{
        const scope = root || document;
        scope.querySelectorAll('details').forEach(d => { d.open = !!wantOpen; });
      }catch(e){}
    }

    function ensureSectionToolbar(){
      try{
        const main = document.querySelector('main.content');
        if(!main) return;
        restoreDetailsState(main);

        // Auto-save <details> open/closed state on toggle.
        // This makes the UI remember the last expand/collapse state per page.
        try{
          if(!main.__influxbro_details_autosave){
            main.__influxbro_details_autosave = true;
            let t = null;
            main.addEventListener('toggle', (ev)=>{
              const el = ev && ev.target;
              if(!el || !el.tagName) return;
              if(String(el.tagName).toLowerCase() !== 'details') return;
              try{ if(t) clearTimeout(t); }catch(e){}
              t = setTimeout(()=>{ try{ saveDetailsState(main); }catch(e){} }, 80);
            }, true);
          }
        }catch(e){}
      }catch(e){}
    }

    function ensureStatusBus(){
      try{
        if(window.InfluxBroStatus) return;
        const SYSINFO_ENABLED = {{ 'true' if (cfg and cfg.get('ui_status_show_sysinfo', false)) else 'false' }};
        const $head = document.getElementById('influxbro_status_head');
        const $headTxt = document.getElementById('influxbro_status_head_txt');
        const $headTime = document.getElementById('influxbro_status_head_time');
        const $list = document.getElementById('influxbro_status_list');
        const $last = document.getElementById('influxbro_status_last');
        const $refresh = document.getElementById('influxbro_status_refresh');
        const $sys = document.getElementById('influxbro_sysinfo');
        const $sysTxt = document.getElementById('influxbro_sysinfo_txt');

        const LS_STATUS = 'influxbro_status_bus_v1';
        const STATUS_MAX_AGE_MS = 24 * 60 * 60 * 1000;

        const items = new Map();
        let last = null;
        let timer = null;

        function loadPersisted(){
          try{
            const raw = localStorage.getItem(LS_STATUS);
            if(!raw) return;
            const j = JSON.parse(raw);
            if(!j || typeof j !== 'object') return;
            const at = Number(j.at_ms || 0);
            if(!(isFinite(at) && at > 0)) return;
            if(Date.now() - at > STATUS_MAX_AGE_MS) return;

            const xs = Array.isArray(j.items) ? j.items : [];
            xs.forEach(x => {
              try{
                if(!x || typeof x !== 'object') return;
                const k = String(x.key || '');
                if(!k) return;
                const started = Number(x.started_at_ms || 0);
                if(!(isFinite(started) && started > 0)) return;
                items.set(k, {
                  key: k,
                  text: String(x.text || ''),
                  state: String(x.state || ''),
                  started_at_ms: started,
                  done_ms: (x.done_ms !== null && x.done_ms !== undefined) ? Number(x.done_ms) : null,
                });
              }catch(e){}
            });
            if(j.last && typeof j.last === 'object'){
              const t = String(j.last.text || '');
              last = t ? { text: t } : null;
            }
          }catch(e){}
        }

        let _PERSIST_T = null;
        function persistNow(){
          try{
            const xs = Array.from(items.values()).slice(0, 40).map(x => ({
              key: String(x.key || ''),
              text: String(x.text || ''),
              state: String(x.state || ''),
              started_at_ms: Number(x.started_at_ms || 0),
              done_ms: (x.done_ms !== null && x.done_ms !== undefined) ? Number(x.done_ms) : null,
            }));
            const j = { at_ms: Date.now(), items: xs, last: (last && last.text) ? {text: String(last.text)} : null };
            localStorage.setItem(LS_STATUS, JSON.stringify(j));
          }catch(e){}
        }
        function persistDebounced(){
          try{
            if(_PERSIST_T) clearTimeout(_PERSIST_T);
            _PERSIST_T = setTimeout(persistNow, 120);
          }catch(e){}
        }

        function fmtMs(ms){
          try{
            const s = Math.max(0, ms) / 1000;
            if(s < 60) return s.toFixed(1) + 's';
            const m = Math.floor(s/60);
            const r = (s - m*60);
            return m + 'm ' + r.toFixed(0) + 's';
          }catch(e){
            return '';
          }
        }

        function render(){
          try{
            const running = Array.from(items.values()).filter(x => x.state === 'running');
            if($head) $head.style.display = running.length ? 'flex' : 'none';
            if($headTxt) $headTxt.textContent = running.length ? String(running[0].text || 'Aktion laeuft...') : '';
            if($headTime) $headTime.textContent = running.length ? fmtMs(Date.now() - Number(running[0].started_at_ms || Date.now())) : '';

            if($list){
              const xs = Array.from(items.values()).slice().sort((a,b)=>Number(a.started_at_ms||0) - Number(b.started_at_ms||0));
              $list.innerHTML = '';
              xs.forEach(x => {
                const div = document.createElement('div');
                div.className = 'item';
                const left = document.createElement('div');
                const t = document.createElement('div');
                t.className = 't';
                t.textContent = String(x.text || '');
                const k = document.createElement('div');
                k.className = 'k';
                k.textContent = String(x.key || '');
                left.appendChild(t);
                left.appendChild(k);
                const tm = document.createElement('div');
                tm.className = 'tm';
                tm.textContent = (x.state === 'running')
                  ? fmtMs(Date.now() - Number(x.started_at_ms || Date.now()))
                  : ((x.done_ms !== null && x.done_ms !== undefined) ? fmtMs(Number(x.done_ms||0)) : '');
                div.appendChild(left);
                div.appendChild(tm);
                $list.appendChild(div);
              });
            }

            if($last){
              if(last && last.text){
                $last.style.display = 'block';
                $last.textContent = String(last.text);
              }else{
                $last.style.display = 'none';
                $last.textContent = '';
              }
            }
          }catch(e){}
        }

        function ensureTimer(){
          if(timer) return;
          timer = setInterval(render, 180);
        }

        let _SYS_T = null;
        async function refreshSysinfo(){
          if(!SYSINFO_ENABLED) return;
          try{
            const r = await fetch('./api/sysinfo');
            const j = await r.json().catch(()=>({ok:false}));
            if(!r.ok || !j.ok) return;
            const s = j.sys || {};
            const mem = s.rss || '';
            const data = s.addon_data || '';
            const df = s.disk_free || '';
            const dt = s.disk_total || '';
            const l1 = (s.loadavg_1 !== null && s.loadavg_1 !== undefined) ? String(s.loadavg_1) : '';
            const cpu = s.cpu_count ? String(s.cpu_count) : '';
            const parts = [];
            if(mem) parts.push('Mem: ' + mem);
            if(data) parts.push('Data: ' + data);
            if(df || dt) parts.push('Disk: ' + (df || '?') + ' / ' + (dt || '?'));
            if(l1) parts.push('Load1: ' + l1 + (cpu ? (' (CPU ' + cpu + ')') : ''));
            if($sysTxt) $sysTxt.textContent = parts.join(' | ');
            if($sys) $sys.style.display = parts.length ? 'flex' : 'none';
          }catch(e){}
        }

        function stopTimerIfIdle(){
          const running = Array.from(items.values()).some(x => x.state === 'running');
          if(running) return;
          if(timer){ clearInterval(timer); timer = null; }
        }

        function clearCompleted(){
          try{
            Array.from(items.values()).forEach(x => {
              try{
                const st = String(x.state || '');
                if(st && st !== 'running') items.delete(String(x.key || ''));
              }catch(e){}
            });
          }catch(e){}
          persistDebounced();
          render();
          stopTimerIfIdle();
        }

        window.InfluxBroStatus = {
          start: (key, text)=>{
            const k = String(key || '');
            if(!k) return;
            items.set(k, { key: k, text: String(text || ''), started_at_ms: Date.now(), state: 'running', done_ms: null });
            persistDebounced();
            ensureTimer();
            render();
          },
          progress: (key, text)=>{
            const k = String(key || '');
            const it = items.get(k);
            if(!it) return;
            it.text = String(text || it.text || '');
            items.set(k, it);
            persistDebounced();
            render();
          },
          done: (key, text)=>{
            const k = String(key || '');
            const it = items.get(k);
            if(it){
              it.state = 'done';
              it.done_ms = Date.now() - Number(it.started_at_ms || Date.now());
              it.text = String(text || it.text || '');
              items.set(k, it);
            }
            last = { text: String(text || '') };
            persistDebounced();
            render();
            stopTimerIfIdle();
          },
          fail: (key, text)=>{
            const k = String(key || '');
            const it = items.get(k);
            if(it){
              it.state = 'fail';
              it.done_ms = Date.now() - Number(it.started_at_ms || Date.now());
              it.text = String(text || it.text || '');
              items.set(k, it);
            }
            last = { text: String(text || '') };
            persistDebounced();
            render();
            stopTimerIfIdle();
          },
          clear: (key)=>{
            const k = String(key || '');
            if(!k) return;
            items.delete(k);
            persistDebounced();
            render();
            stopTimerIfIdle();
          },
          clearCompleted,
        };

        // Optional sysinfo poll
        try{
          if(SYSINFO_ENABLED){
            refreshSysinfo().catch(()=>{});
            _SYS_T = setInterval(()=>{ refreshSysinfo().catch(()=>{}); }, 5000);
          }
        }catch(e){}

        try{
          if($refresh && !$refresh.__influxbro_bound){
            $refresh.__influxbro_bound = true;
            $refresh.addEventListener('click', (ev)=>{
              try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
              clearCompleted();
            });
          }
        }catch(e){}

        // Restore persisted items so status survives page navigation.
        loadPersisted();
        render();
        try{
          if(Array.from(items.values()).some(x => String(x.state||'') === 'running')) ensureTimer();
        }catch(e){}
      }catch(e){}
    }

    // CSRF/Origin hardening: mark all API requests as XHR from our UI.
    // This is intentionally minimal and only touches same-origin /api/* calls.
    function initApiRequestHeader(){
      try{
        const orig = window.fetch;
        if(!orig || orig.__influxbro_patched) return;

        function _urlStr(input){
          try{
            if(typeof input === 'string') return input;
            if(input && typeof input.url === 'string') return input.url;
          }catch(e){}
          return '';
        }

        function _isApi(u){
          const s = String(u || '');
          return s.startsWith('./api/') || s.startsWith('/api/');
        }

        const patched = function(input, init){
          try{
            const u = _urlStr(input);
            if(!_isApi(u)) return orig(input, init);
            const i = init || {};
            const hdrs = new Headers(i.headers || (input && input.headers ? input.headers : undefined) || {});
            if(!hdrs.has('X-InfluxBro-Request')) hdrs.set('X-InfluxBro-Request', '1');
            if(!hdrs.has('X-Requested-With')) hdrs.set('X-Requested-With', 'InfluxBro');
            return orig(input, { ...i, headers: hdrs });
          }catch(e){
            return orig(input, init);
          }
        };
        patched.__influxbro_patched = true;
        window.fetch = patched;
      }catch(e){}
    }

    // Sidebar splitter + collapse/expand (desktop only).
    function initSidebarUi(){
      try{
        const navEl = document.querySelector('nav.sidebar');
        if(!navEl) return;
        const shell = navEl.closest ? navEl.closest('.shell') : null;
        if(!shell) return;

        // Mobile layout is single-column; do not apply sidebar collapse/split behavior.
        try{
          if(window.matchMedia && window.matchMedia('(max-width: 980px)').matches){
            shell.classList.remove('ib_sidebar_collapsed');
            return;
          }
        }catch(e){}

        const $toggle = document.getElementById('ib_sidebar_toggle');
        if(!$toggle) return;

        const LS_W = 'influxbro_sidebar_w_px_v1';
        const LS_COLL = 'influxbro_sidebar_collapsed_v1';

        const COLLAPSED_W = 56;
        const DEFAULT_W = 260;

        function clamp(v){
          const maxW = Math.min(520, Math.max(240, Math.floor((window.innerWidth || 1200) * 0.66)));
          const minW = 160;
          const x = Math.max(minW, Math.min(maxW, Math.round(Number(v || DEFAULT_W))));
          return x;
        }

        function loadWidth(){
          try{
            const raw = localStorage.getItem(LS_W);
            const v = Number(raw || '');
            return (isFinite(v) && v > 0) ? clamp(v) : DEFAULT_W;
          }catch(e){
            return DEFAULT_W;
          }
        }

        function loadCollapsed(){
          try{ return (localStorage.getItem(LS_COLL) || '0') === '1'; }catch(e){ return false; }
        }

        function saveCollapsed(on){
          try{ localStorage.setItem(LS_COLL, on ? '1' : '0'); }catch(e){}
        }

        function saveWidth(px){
          try{ localStorage.setItem(LS_W, String(Math.round(Number(px || DEFAULT_W)))); }catch(e){}
        }

        function applyState(widthPx, collapsed){
          try{
            const w = collapsed ? COLLAPSED_W : clamp(widthPx);
            shell.style.setProperty('--ib-sidebar-w', String(w) + 'px');
            shell.classList.toggle('ib_sidebar_collapsed', !!collapsed);
            $toggle.textContent = collapsed ? '>>' : '<<';
          }catch(e){}
        }

        let expandedW = loadWidth();
        let collapsed = loadCollapsed();
        applyState(expandedW, collapsed);

        // Splitter element (inserted once per page).
        let splitter = document.getElementById('ib_sidebar_splitter');
        if(!splitter){
          splitter = document.createElement('div');
          splitter.id = 'ib_sidebar_splitter';
          splitter.className = 'ib_sidebar_splitter';
          splitter.setAttribute('data-ui', 'nav_main.handle_sidebar_split');
          splitter.setAttribute('title', 'nav.sidebar.split');
          shell.appendChild(splitter);
        }

        function setDragging(on){
          try{ document.body.style.userSelect = on ? 'none' : ''; }catch(e){}
          try{ document.body.style.cursor = on ? 'col-resize' : ''; }catch(e){}
        }

        function startDrag(ev){
          try{
            if(window.matchMedia && window.matchMedia('(max-width: 980px)').matches) return;
            try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}

            if(collapsed){
              collapsed = false;
              saveCollapsed(false);
              applyState(expandedW, false);
            }

            const startX = Number(ev && ev.clientX ? ev.clientX : 0);
            const startW = expandedW;
            setDragging(true);

            function onMove(e2){
              try{
                const dx = Number(e2 && e2.clientX ? e2.clientX : 0) - startX;
                expandedW = clamp(startW + dx);
                applyState(expandedW, false);
              }catch(e){}
            }

            function onUp(){
              try{ window.removeEventListener('mousemove', onMove, true); }catch(e){}
              try{ window.removeEventListener('mouseup', onUp, true); }catch(e){}
              setDragging(false);
              saveWidth(expandedW);
            }

            window.addEventListener('mousemove', onMove, true);
            window.addEventListener('mouseup', onUp, true);
          }catch(e){}
        }

        if(!splitter.__influxbro_bound){
          splitter.__influxbro_bound = true;
          splitter.addEventListener('mousedown', startDrag, true);
        }

        if(!$toggle.__influxbro_bound){
          $toggle.__influxbro_bound = true;
          $toggle.addEventListener('click', (ev)=>{
            try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
            collapsed = !collapsed;
            saveCollapsed(collapsed);
            if(!collapsed){
              expandedW = loadWidth();
            }
            applyState(expandedW, collapsed);
          }, true);
        }

        // Keep width reasonable when resizing the window.
        if(!window.__influxbro_sidebar_resize_bound){
          window.__influxbro_sidebar_resize_bound = true;
          window.addEventListener('resize', ()=>{
            try{
              if(collapsed){
                applyState(expandedW, true);
                return;
              }
              expandedW = clamp(expandedW);
              applyState(expandedW, false);
              saveWidth(expandedW);
            }catch(e){}
          }, {passive:true});
        }
      }catch(e){}
    }

      pre.style.marginTop = '10px';
      pre.style.padding = '10px 12px';
      pre.style.fontSize = '{{ (cfg.get("ui_popup_pre_font_px") or 10) | int }}px';
      pre.style.border = '1px solid #eee';
      pre.style.borderRadius = '12px';
      pre.style.background = '#fafafa';
      pre.style.whiteSpace = 'pre-wrap';
      pre.style.overflowWrap = 'anywhere';
      pre.style.maxHeight = '60vh';
      pre.style.overflow = 'auto';

      card.appendChild(head);
      card.appendChild(tools);
      card.appendChild(pre);
      root.appendChild(card);
      document.body.appendChild(root);

      const hide = ()=>{ try{ root.style.display = 'none'; }catch(e){} };
      close.onclick = (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){} hide(); };
      root.addEventListener('click', (ev)=>{ if(ev && ev.target === root) hide(); });
      document.addEventListener('keydown', (ev)=>{ try{ if(ev && ev.key === 'Escape' && root.style.display !== 'none') hide(); }catch(e){} });
      return root;
    }

    function showProfileInfo(label, items){
      const root = _modalEnsure();
      const $t = document.getElementById('influxbro_profile_modal_title');
      const $q = document.getElementById('influxbro_profile_modal_q');
      const $cnt = document.getElementById('influxbro_profile_modal_cnt');
      const $pre = document.getElementById('influxbro_profile_modal_pre');
      const $prev = document.getElementById('influxbro_profile_modal_prev');
      const $next = document.getElementById('influxbro_profile_modal_next');
      const $wrap = document.getElementById('influxbro_profile_modal_wrap');
      if($t) $t.textContent = 'Profil: ' + String(label || '');

      const lines = [];
      const keys = Object.keys(items || {}).sort();
      keys.forEach(k=>{ lines.push(String(k) + ' = ' + String(items[k])); });
      const raw = lines.join('\n');

      let marks = [];
      let idx = -1;

      function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function render(){
        const term = String($q && $q.value ? $q.value : '').toLowerCase();
        try{
          if($wrap && $pre){
            $pre.style.whiteSpace = $wrap.checked ? 'pre-wrap' : 'pre';
            $pre.style.overflowWrap = $wrap.checked ? 'anywhere' : 'normal';
          }
        }catch(e){}
        if(!term){
          $pre.innerHTML = esc(raw);
          marks = [];
          idx = -1;
          if($cnt) $cnt.textContent = '0 Treffer';
          return;
        }
        const parts = raw.split(/\n/);
        const out = [];
        const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'ig');
        parts.forEach(line=>{
          const h = esc(line).replace(re, (m)=>'<mark>' + esc(m) + '</mark>');
          out.push(h);
        });
        $pre.innerHTML = out.join('\n');
        marks = Array.from($pre.querySelectorAll('mark'));
        if($cnt) $cnt.textContent = String(marks.length) + ' Treffer';
        idx = marks.length ? 0 : -1;
        jump(0);
      }
      function jump(delta){
        if(!marks.length) return;
        idx = (idx + delta + marks.length) % marks.length;
        marks.forEach(m=>m.classList.remove('active'));
        const m = marks[idx];
        try{ m.classList.add('active'); }catch(e){}
        try{ m.scrollIntoView({block:'center', behavior:'smooth'}); }catch(e){}
      }
      if($prev) $prev.onclick = (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; jump(-1); };
      if($next) $next.onclick = (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; jump(1); };
      if($q) $q.oninput = ()=>render();
      if($wrap) $wrap.onchange = ()=>render();

      if($q) $q.value = '';
      $pre.textContent = raw;
      if($cnt) $cnt.textContent = '0 Treffer';

      root.style.display = 'block';
      try{ if($q) $q.focus(); }catch(e){}
    }

    try{ window.showProfileInfo = showProfileInfo; }catch(e){}

    async function initProfilesUi(){
      const $sel = document.getElementById('ui_profile_sel');
      const $apply = document.getElementById('ui_profile_apply');
      const $save = document.getElementById('ui_profile_save');
      const $info = document.getElementById('ui_profile_info');
      const $hint = document.getElementById('ui_profile_hint');
      if(!$sel || !$apply || !$save || !$info) return;

      const j = await loadProfiles();
      if(!j) return;
      const xs = Array.isArray(j.profiles) ? j.profiles : [];
      $sel.innerHTML = '';
      xs.forEach(p=>{
        const o = document.createElement('option');
        o.value = String(p.id || '');
        o.textContent = String(p.label || p.id || '');
        $sel.appendChild(o);
      });
      if(j.active) $sel.value = String(j.active);
      if($hint){
        const cur = xs.find(p=>String(p.id||'')===String($sel.value||''));
        const lbl = cur ? String(cur.label||cur.id||'') : '';
        $hint.textContent = 'Aktiv: ' + (lbl || '-') + ' | Version: {{ addon_version }}';
      }

      $sel.onchange = ()=>{
        try{
          const cur = xs.find(p=>String(p.id||'')===String($sel.value||''));
          const lbl = cur ? String(cur.label||cur.id||'') : '';
          if($hint) $hint.textContent = 'Aktiv: ' + (String(j.active||'')===String($sel.value||'') ? (lbl||'-') : (String(j.active||'-'))) + ' | Auswahl: ' + (lbl||'-') + ' | Version: {{ addon_version }}';
        }catch(e){}
      };

      $apply.onclick = async (ev)=>{
        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        const id = String($sel.value||'').trim();
        if(!id) return;
        if(!confirm('Profil anwenden? Dies ueberschreibt die global gespeicherten GUI-Einstellungen.')) return;
        await fetch('./api/ui_profiles/apply', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id})}).then(r=>r.json()).catch(()=>null);
        location.reload();
      };
      $save.onclick = async (ev)=>{
        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        const id = String($sel.value||'').trim();
        if(!id) return;
        if(!confirm('Aktuellen Stand in dieses Profil speichern?')) return;
        await fetch('./api/ui_profiles/save', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id})}).then(r=>r.json()).catch(()=>null);
        const j2 = await loadProfiles();
        if(j2 && $hint){
          const xs2 = Array.isArray(j2.profiles) ? j2.profiles : [];
          const cur = xs2.find(p=>String(p.id||'')===String(id));
          const lbl = cur ? String(cur.label||cur.id||'') : id;
          $hint.textContent = 'Aktiv: ' + (lbl || '-') + ' | Version: {{ addon_version }}';
        }
      };
      $info.onclick = async (ev)=>{
        try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
        const id = String($sel.value||'').trim();
        if(!id) return;
        const r = await fetch('./api/ui_profiles/get?id=' + encodeURIComponent(id));
        const g = await r.json().catch(()=>({ok:false}));
        if(!r.ok || !g || !g.ok) return;
        const p = g.profile || {};
        showProfileInfo(p.label || p.id || id, p.items || {});
      };
    }

    function watchEl(el){
      try{
        if(!el || !el.getAttribute) return;
        const id = (el.getAttribute('id') || '').trim();
        if(!id) return;
        if(isSensitive(el)) return;
        const key = storageKeyForId(id);
        const save = ()=>{
          try{ localStorage.setItem(key, JSON.stringify(snapshotValue(el))); }catch(e){}
        };
        el.addEventListener('change', save);
        el.addEventListener('input', save);
      }catch(e){}
    }

    const HELP = {
      'sections.open_all': 'Oeffnet alle einklappbaren Bereiche auf dieser Seite.',
      'sections.close_all': 'Schliesst alle einklappbaren Bereiche auf dieser Seite.',
      'logs.server_profile': 'Setzt die Log-Stufe im Backend (wirkt sofort).',
      'logs.server_influx_queries': 'Wenn aktiv, werden Influx Query-Strings in TRACE geloggt.',
      'restore.source_to_target': 'Uebernimmt Measurement/Field/Tags aus dem Backup ins Ziel.',
      'restore.run': 'Fuehrt den Restore/Copy aus und ueberschreibt Daten im Ziel.',
    };

    function _tooltipFor(el){
      try{
        const ui = (el.getAttribute('data-ui') || '').trim();
        if(!ui) return '';
        const explicit = (el.getAttribute('data-help') || '').trim();
        const help = explicit || HELP[ui] || '';
        return help ? (ui + "\n" + help) : ui;
      }catch(e){
        return '';
      }
    }

    function applyTooltips(){
      if(!TOOLTIP_ENABLED) return;
      if(_pickerModeActive()) return;
      document.querySelectorAll('[data-ui]').forEach(el => {
        const ui = (el.getAttribute('data-ui') || '').trim();
        if(!ui) return;
        const want = _tooltipFor(el);
        const cur = el.getAttribute('title');
        // Preserve custom titles; otherwise keep title stable + helpful.
        if(!cur || cur === ui || cur.startsWith(ui + "\n")) el.setAttribute('title', want);
      });

      document.querySelectorAll('input, select, textarea, button, a').forEach(el => {
        if(el.getAttribute('data-ui')) return;
        const id = el.getAttribute('id');
        if(id){
          el.setAttribute('data-ui', id);
          if(!el.getAttribute('title')) el.setAttribute('title', id);
        }
      });
    }

    function clearTitles(){
      try{
        document.querySelectorAll('[title]').forEach(el => {
          try{ el.removeAttribute('title'); }catch(e){}
        });
      }catch(e){}
    }

    function scanPersistence(){
      document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
        restoreEl(el);
        watchEl(el);
      });
    }

    async function pruneInvalidUiKeys(){
      try{
        const p = stablePath();
        const prefix = 'influxbro_ui:' + p + ':';
        const keep = [];
        document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
          const id = (el.getAttribute('id') || '').trim();
          if(!id) return;
          if(isSensitive(el)) return;
          keep.push(prefix + id);
        });
        // details state key only valid if there are details on the page
        const hasDetails = !!document.querySelector('details[id]');
        if(!hasDetails){
          try{ localStorage.removeItem('influxbro_details:' + p); }catch(e){}
          _queueUiState('influxbro_details:' + p, null);
        }
        await fetch('./api/ui_state/prune', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({prefix, keep}),
        }).catch(()=>{});

        // Also prune local cache for this prefix
        try{
          const ks = new Set(keep);
          for(let i=0;i<localStorage.length;i++){
            const k = localStorage.key(i);
            if(!k) continue;
            if(k.startsWith(prefix) && !ks.has(k)){
              localStorage.removeItem(k);
            }
          }
        }catch(e){}
      }catch(e){}
    }

    // UI event logging (buttons) - best-effort, debounced
    function logUiClick(el){
      try{
        if(!el || !el.getAttribute) return;
        // Skip very noisy checkbox row selectors
        const cls = (el.getAttribute('class') || '').toLowerCase();
        if(cls.includes('row_sel')) return;

        const ui = (el.getAttribute('data-ui') || el.getAttribute('id') || '').trim();
        if(!ui) return;
        const txt = (el.textContent || '').trim().slice(0, 120);

        const page = '{{ nav }}';

        // debounce identical clicks
        const now = Date.now();
        const key = page + '|' + ui;
        if(!window.__INFLUXBRO_UI_LOG) window.__INFLUXBRO_UI_LOG = { last: new Map() };
        const m = window.__INFLUXBRO_UI_LOG.last;
        const prev = m.get(key) || 0;
        if(now - prev < 250) return;
        m.set(key, now);

        fetch('./api/ui_event', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ page, ui, text: txt }),
        }).catch(()=>{});
      }catch(e){}
    }

    // UI event logging (select/checkbox changes) - best-effort, throttled
    function logUiChange(el){
      try{
        if(!el || !el.getAttribute) return;
        const tag = String(el.tagName || '').toLowerCase();
        if(tag !== 'select' && tag !== 'input') return;
        const t = tag === 'input' ? String(el.getAttribute('type') || '').toLowerCase() : '';
        if(tag === 'input' && t && !['checkbox','datetime-local','number','text'].includes(t)) return;
        if(tag === 'input' && t === 'text'){
          // avoid logging free-text inputs (too noisy / potential sensitive)
          return;
        }

        const ui = (el.getAttribute('data-ui') || el.getAttribute('id') || '').trim();
        if(!ui) return;

        const page = '{{ nav }}';
        const now = Date.now();
        const key = 'chg|' + page + '|' + ui;
        if(!window.__INFLUXBRO_UI_LOG) window.__INFLUXBRO_UI_LOG = { last: new Map() };
        const m = window.__INFLUXBRO_UI_LOG.last;
        const prev = m.get(key) || 0;
        if(now - prev < 800) return;
        m.set(key, now);

        let v = '';
        try{
          if(tag === 'select') v = String(el.value || '');
          else if(t === 'checkbox') v = el.checked ? '1' : '0';
          else v = String(el.value || '');
        }catch(e){ v = ''; }
        v = String(v).slice(0, 120);

        fetch('./api/ui_event', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ page, ui, text: '', extra: { kind: 'change', value: v } }),
        }).catch(()=>{});
      }catch(e){}
    }

    try{
      document.addEventListener('click', (ev)=>{
        try{
          const t = ev && ev.target ? ev.target : null;
          if(!t) return;
          const b = t.closest ? t.closest('button') : null;
          if(b) return logUiClick(b);

          const a = t.closest ? t.closest('a.nav_item') : null;
          if(a){
            try{
              const navCtx = {
                href: String(a.getAttribute('href') || ''),
                ui: String(a.getAttribute('data-ui') || ''),
                text: String((a.textContent || '').trim()).slice(0, 120),
                from_page: '{{ nav }}',
                at: new Date().toISOString(),
              };
              try{ window.__InfluxBroNavContext = navCtx; }catch(e){}
              try{ sessionStorage.setItem('influxbro_nav_context_v1', JSON.stringify(navCtx)); }catch(e){}
              const ui = (a.getAttribute('data-ui') || a.getAttribute('href') || '').trim();
              const txt = (a.textContent || '').trim().slice(0, 120);
              const page = '{{ nav }}';
              if(ui){
                fetch('./api/ui_event', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({ page, ui, text: txt, extra: { kind: 'nav' } }),
                }).catch(()=>{});
              }
            }catch(e){}
          }
        }catch(e){}
      }, true);
    }catch(e){}

    try{
      document.addEventListener('change', (ev)=>{
        try{
          const t = ev && ev.target ? ev.target : null;
          if(!t) return;
          if(t.closest && t.closest('button')) return;
          logUiChange(t);
        }catch(e){}
      }, true);
    }catch(e){}
    try{
     // Start early so values restore before page scripts use them.
     ensureStatusBus();
     try{ initApiRequestHeader(); }catch(e){}
     try{ initSidebarUi(); }catch(e){}
      try{ initProfilesUi(); }catch(e){}
      if(TOOLTIP_ENABLED) applyTooltips();
      else clearTitles();
     // Restore from server (best-effort) then apply to DOM.
      _restoreUiStateFromServer().then(()=>{
        try{ scanPersistence(); }catch(e){}
        try{ ensureSectionToolbar(); }catch(e){}
        try{ pruneInvalidUiKeys(); }catch(e){}
      }).catch(()=>{});
     // Initial pass (local cache)
     scanPersistence();
     ensureSectionToolbar();
     const obs = new MutationObserver((mut)=>{
      if(TOOLTIP_ENABLED && !_pickerModeActive()) applyTooltips();
      try{
          // Restore/save for newly added nodes.
          (mut||[]).forEach(m=>{
            (m.addedNodes||[]).forEach(n=>{
              if(!n || !n.querySelectorAll) return;
              n.querySelectorAll('input[id], select[id], textarea[id]').forEach(el=>{
                restoreEl(el);
                watchEl(el);
              });
            });
          });
          ensureSectionToolbar();
        }catch(e){}
      });
      obs.observe(document.documentElement, {childList:true, subtree:true});
    }catch(e){}
  })();
  </script>
</nav>
