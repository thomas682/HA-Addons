  <script>
  // Ensure every visible control has a stable tooltip + internal name.
  // Also persist non-sensitive UI input state in localStorage so navigating away
  // (or updating the add-on) keeps the last UI selections.
  (function(){
    const TOOLTIP_ENABLED = {{ 'true' if (cfg and cfg.get('ui_tooltips_enabled', true)) else 'false' }};
    const SENSITIVE_IDS = new Set([
      'token',
      'password',
      'confirm',
      'confirm_text',
    ]);

    function stablePath(){
      try{
        const p = String(location && location.pathname ? location.pathname : '/');
        // Home Assistant ingress adds a volatile token segment.
        return p.replace(/\/api\/hassio_ingress\/[0-9a-fA-F]+/g, '').replace(/\/+/g, '/');
      }catch(e){
        return '/';
      }
    }

    function storageKeyForId(id){
      return 'influxbro_ui:' + stablePath() + ':' + String(id || '');
    }

    // File-based persistence: mirror localStorage writes to the backend (/data/influxbro_ui_state.json).
    // Keep localStorage as a fast cache so existing page scripts keep working.
    const _LS_SET = (window.localStorage && window.localStorage.setItem) ? window.localStorage.setItem.bind(window.localStorage) : null;
    const _LS_REM = (window.localStorage && window.localStorage.removeItem) ? window.localStorage.removeItem.bind(window.localStorage) : null;
    let _UIBUF = null;
    let _UIT = null;
    let _DISABLE_HOOK = false;

    function _queueUiState(k, v){
      try{
        if(_DISABLE_HOOK) return;
        const key = String(k || '');
        if(!key.startsWith('influxbro')) return;
        if(!_UIBUF) _UIBUF = {};
        _UIBUF[key] = (v === null) ? null : String(v);
        if(_UIT) clearTimeout(_UIT);
        _UIT = setTimeout(_flushUiState, 220);
      }catch(e){}
    }

    async function _flushUiState(){
      try{
        if(!_UIBUF) return;
        const items = _UIBUF;
        _UIBUF = null;
        _UIT = null;
        await fetch('./api/ui_state/set', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({items}),
        }).catch(()=>{});
      }catch(e){}
    }

    try{
      if(window.localStorage && !window.localStorage.__influxbro_hooked && _LS_SET && _LS_REM){
        window.localStorage.__influxbro_hooked = true;
        const origSet = window.localStorage.setItem.bind(window.localStorage);
        const origRem = window.localStorage.removeItem.bind(window.localStorage);
        window.localStorage.setItem = (k, v)=>{ origSet(k, v); _queueUiState(k, v); };
        window.localStorage.removeItem = (k)=>{ origRem(k); _queueUiState(k, null); };
      }
    }catch(e){}

    async function _restoreUiStateFromServer(){
      try{
        const r = await fetch('./api/ui_state?prefix=' + encodeURIComponent('influxbro'));
        const j = await r.json().catch(()=>({ok:false}));
        if(!r.ok || !j || !j.ok) return;
        const items = (j.items && typeof j.items === 'object') ? j.items : {};
        _DISABLE_HOOK = true;
        Object.keys(items).forEach(k=>{
          try{
            const v = items[k];
            if(v === null || v === undefined){
              if(_LS_REM) _LS_REM(String(k));
              return;
            }
            if(_LS_SET) _LS_SET(String(k), String(v));
          }catch(e){}
        });
      }catch(e){}
      finally{ _DISABLE_HOOK = false; }
    }

    function isSensitive(el){
      try{
        const id = (el.getAttribute('id') || '').trim();
        if(id && SENSITIVE_IDS.has(id)) return true;
        const t = (el.getAttribute('type') || '').toLowerCase();
        if(t === 'password') return true;
        const nm = (el.getAttribute('name') || '').toLowerCase();
        if(nm.includes('token') || nm.includes('password')) return true;
        return false;
      }catch(e){
        return true;
      }
    }

    function snapshotValue(el){
      const tag = (el.tagName || '').toLowerCase();
      const type = (el.getAttribute('type') || '').toLowerCase();
      if(type === 'checkbox') return {t:'cb', v: !!el.checked};
      if(type === 'radio') return {t:'radio', v: !!el.checked};
      if(tag === 'select') return {t:'sel', v: String(el.value || '')};
      return {t:'txt', v: String(el.value || '')};
    }

    function applySnapshot(el, snap){
      if(!snap || typeof snap !== 'object') return;
      const type = (el.getAttribute('type') || '').toLowerCase();
      const tag = (el.tagName || '').toLowerCase();
      if((snap.t === 'cb' || snap.t === 'radio') && (type === 'checkbox' || type === 'radio')){
        el.checked = !!snap.v;
        return;
      }
      if(snap.t === 'sel' && tag === 'select'){
        el.value = String(snap.v || '');
        return;
      }
      if(snap.t === 'txt' && (tag === 'input' || tag === 'textarea')){
        el.value = String(snap.v || '');
      }
    }

    const RESTORED = new Set();
    function restoreEl(el){
      try{
        if(!el || !el.getAttribute) return;
        const id = (el.getAttribute('id') || '').trim();
        if(!id) return;
        if(RESTORED.has(id)) return;
        if(isSensitive(el)) return;
        const key = storageKeyForId(id);
        const raw = localStorage.getItem(key);
        if(!raw) return;
        const snap = JSON.parse(raw);
        applySnapshot(el, snap);
        // Mark restored after applying once.
        RESTORED.add(id);
      }catch(e){}
    }

    // Persist <details> open/closed state per page.
    function detailsStorageKey(){
      return 'influxbro_details:' + stablePath();
    }

    function restoreDetailsState(root){
      try{
        const raw = localStorage.getItem(detailsStorageKey());
        if(!raw) return;
        const j = JSON.parse(raw);
        if(!j || typeof j !== 'object') return;
        const scope = root || document;
        scope.querySelectorAll('details[id]').forEach(d => {
          const id = d.getAttribute('id');
          if(!id) return;
          if(Object.prototype.hasOwnProperty.call(j, id)){
            d.open = !!j[id];
          }
        });
      }catch(e){}
    }

    function snapshotDetailsState(root){
      const out = {};
      try{
        const scope = root || document;
        scope.querySelectorAll('details[id]').forEach(d => {
          const id = d.getAttribute('id');
          if(!id) return;
          out[id] = !!d.open;
        });
      }catch(e){}
      return out;
    }

    function saveDetailsState(root){
      try{
        const snap = snapshotDetailsState(root);
        localStorage.setItem(detailsStorageKey(), JSON.stringify(snap));
        return true;
      }catch(e){
        return false;
      }
    }

    function setAllDetailsOpen(root, wantOpen){
      try{
        const scope = root || document;
        scope.querySelectorAll('details').forEach(d => { d.open = !!wantOpen; });
      }catch(e){}
    }

    function ensureSectionToolbar(){
      try{
        const main = document.querySelector('main.content');
        if(!main) return;
        const h2 = main.querySelector('h2');
        if(!h2) return;
        const anyDetails = main.querySelector('details');
        if(!anyDetails) return;
        if(document.getElementById('influxbro_sections_bar')) return;

        const bar = document.createElement('div');
        bar.id = 'influxbro_sections_bar';
        bar.style.display = 'flex';
        bar.style.flexWrap = 'wrap';
        bar.style.gap = '8px';
        bar.style.alignItems = 'center';
        bar.style.margin = '0';

        const mkBtn = (txt) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.textContent = txt;
          b.style.padding = '8px 10px';
          b.style.height = '34px';
          b.style.borderRadius = '10px';
          b.style.border = '1px solid #ddd';
          b.style.background = '#fff';
          b.style.cursor = 'pointer';
          return b;
        };

        const mkIconBtn = (svg, aria, ui, title)=>{
          const b = mkBtn('');
          b.innerHTML = svg;
          b.setAttribute('data-ui', ui);
          b.setAttribute('aria-label', aria);
          b.title = title || aria;
          return b;
        };

        const svgOpen = '<svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 5h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6"/></svg>';
        const svgClose = '<svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M18 15l-6-6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 19h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6"/></svg>';

        const bOpen = mkIconBtn(svgOpen, 'Alle oeffnen', 'sections.open_all', 'Alle oeffnen');
        bOpen.onclick = (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          setAllDetailsOpen(main, true);
        };
        const bClose = mkIconBtn(svgClose, 'Alle schliessen', 'sections.close_all', 'Alle schliessen');
        bClose.onclick = (ev)=>{
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
          setAllDetailsOpen(main, false);
        };

        bar.appendChild(bOpen);
        bar.appendChild(bClose);

        // Place the buttons next to the page title (same row), like the Dashboard header.
        let headerRow = h2.parentElement;
        if(!headerRow) headerRow = main;

        // If the page does not have a dedicated header row yet, create one.
        if(headerRow === main){
          const wrap = document.createElement('div');
          wrap.style.display = 'flex';
          wrap.style.justifyContent = 'space-between';
          wrap.style.gap = '12px';
          wrap.style.alignItems = 'baseline';
          wrap.style.flexWrap = 'wrap';
          // Insert wrapper where the h2 currently is.
          main.insertBefore(wrap, h2);
          wrap.appendChild(h2);
          headerRow = wrap;
        }

        // Align buttons to the right side of the header row.
        const right = document.createElement('div');
        right.style.display = 'flex';
        right.style.gap = '8px';
        right.style.flexWrap = 'wrap';
        right.style.alignItems = 'center';
        right.appendChild(bar);
        headerRow.appendChild(right);

        // Restore persisted state (after bar exists)
        restoreDetailsState(main);

        // Auto-save <details> open/closed state on toggle.
        // This makes the UI remember the last expand/collapse state per page.
        try{
          if(!main.__influxbro_details_autosave){
            main.__influxbro_details_autosave = true;
            let t = null;
            main.addEventListener('toggle', (ev)=>{
              const el = ev && ev.target;
              if(!el || !el.tagName) return;
              if(String(el.tagName).toLowerCase() !== 'details') return;
              try{ if(t) clearTimeout(t); }catch(e){}
              t = setTimeout(()=>{ try{ saveDetailsState(main); }catch(e){} }, 80);
            }, true);
          }
        }catch(e){}
      }catch(e){}
    }

    function ensureStatusBus(){
      try{
        if(window.InfluxBroStatus) return;
        const SYSINFO_ENABLED = {{ 'true' if (cfg and cfg.get('ui_status_show_sysinfo', false)) else 'false' }};
        const $head = document.getElementById('influxbro_status_head');
        const $headTxt = document.getElementById('influxbro_status_head_txt');
        const $headTime = document.getElementById('influxbro_status_head_time');
        const $list = document.getElementById('influxbro_status_list');
        const $last = document.getElementById('influxbro_status_last');
        const $refresh = document.getElementById('influxbro_status_refresh');
        const $sys = document.getElementById('influxbro_sysinfo');
        const $sysTxt = document.getElementById('influxbro_sysinfo_txt');

        const LS_STATUS = 'influxbro_status_bus_v1';
        const STATUS_MAX_AGE_MS = 24 * 60 * 60 * 1000;

        const items = new Map();
        let last = null;
        let timer = null;

        function loadPersisted(){
          try{
            const raw = localStorage.getItem(LS_STATUS);
            if(!raw) return;
            const j = JSON.parse(raw);
            if(!j || typeof j !== 'object') return;
            const at = Number(j.at_ms || 0);
            if(!(isFinite(at) && at > 0)) return;
            if(Date.now() - at > STATUS_MAX_AGE_MS) return;

            const xs = Array.isArray(j.items) ? j.items : [];
            xs.forEach(x => {
              try{
                if(!x || typeof x !== 'object') return;
                const k = String(x.key || '');
                if(!k) return;
                const started = Number(x.started_at_ms || 0);
                if(!(isFinite(started) && started > 0)) return;
                items.set(k, {
                  key: k,
                  text: String(x.text || ''),
                  state: String(x.state || ''),
                  started_at_ms: started,
                  done_ms: (x.done_ms !== null && x.done_ms !== undefined) ? Number(x.done_ms) : null,
                });
              }catch(e){}
            });
            if(j.last && typeof j.last === 'object'){
              const t = String(j.last.text || '');
              last = t ? { text: t } : null;
            }
          }catch(e){}
        }

        let _PERSIST_T = null;
        function persistNow(){
          try{
            const xs = Array.from(items.values()).slice(0, 40).map(x => ({
              key: String(x.key || ''),
              text: String(x.text || ''),
              state: String(x.state || ''),
              started_at_ms: Number(x.started_at_ms || 0),
              done_ms: (x.done_ms !== null && x.done_ms !== undefined) ? Number(x.done_ms) : null,
            }));
            const j = { at_ms: Date.now(), items: xs, last: (last && last.text) ? {text: String(last.text)} : null };
            localStorage.setItem(LS_STATUS, JSON.stringify(j));
          }catch(e){}
        }
        function persistDebounced(){
          try{
            if(_PERSIST_T) clearTimeout(_PERSIST_T);
            _PERSIST_T = setTimeout(persistNow, 120);
          }catch(e){}
        }

        function fmtMs(ms){
          try{
            const s = Math.max(0, ms) / 1000;
            if(s < 60) return s.toFixed(1) + 's';
            const m = Math.floor(s/60);
            const r = (s - m*60);
            return m + 'm ' + r.toFixed(0) + 's';
          }catch(e){
            return '';
          }
        }

        function render(){
          try{
            const running = Array.from(items.values()).filter(x => x.state === 'running');
            if($head) $head.style.display = running.length ? 'flex' : 'none';
            if($headTxt) $headTxt.textContent = running.length ? String(running[0].text || 'Aktion laeuft...') : '';
            if($headTime) $headTime.textContent = running.length ? fmtMs(Date.now() - Number(running[0].started_at_ms || Date.now())) : '';

            if($list){
              const xs = Array.from(items.values()).slice().sort((a,b)=>Number(a.started_at_ms||0) - Number(b.started_at_ms||0));
              $list.innerHTML = '';
              xs.forEach(x => {
                const div = document.createElement('div');
                div.className = 'item';
                const left = document.createElement('div');
                const t = document.createElement('div');
                t.className = 't';
                t.textContent = String(x.text || '');
                const k = document.createElement('div');
                k.className = 'k';
                k.textContent = String(x.key || '');
                left.appendChild(t);
                left.appendChild(k);
                const tm = document.createElement('div');
                tm.className = 'tm';
                tm.textContent = (x.state === 'running')
                  ? fmtMs(Date.now() - Number(x.started_at_ms || Date.now()))
                  : ((x.done_ms !== null && x.done_ms !== undefined) ? fmtMs(Number(x.done_ms||0)) : '');
                div.appendChild(left);
                div.appendChild(tm);
                $list.appendChild(div);
              });
            }

            if($last){
              if(last && last.text){
                $last.style.display = 'block';
                $last.textContent = String(last.text);
              }else{
                $last.style.display = 'none';
                $last.textContent = '';
              }
            }
          }catch(e){}
        }

        function ensureTimer(){
          if(timer) return;
          timer = setInterval(render, 180);
        }

        let _SYS_T = null;
        async function refreshSysinfo(){
          if(!SYSINFO_ENABLED) return;
          try{
            const r = await fetch('./api/sysinfo');
            const j = await r.json().catch(()=>({ok:false}));
            if(!r.ok || !j.ok) return;
            const s = j.sys || {};
            const mem = s.rss || '';
            const data = s.addon_data || '';
            const df = s.disk_free || '';
            const dt = s.disk_total || '';
            const l1 = (s.loadavg_1 !== null && s.loadavg_1 !== undefined) ? String(s.loadavg_1) : '';
            const cpu = s.cpu_count ? String(s.cpu_count) : '';
            const parts = [];
            if(mem) parts.push('Mem: ' + mem);
            if(data) parts.push('Data: ' + data);
            if(df || dt) parts.push('Disk: ' + (df || '?') + ' / ' + (dt || '?'));
            if(l1) parts.push('Load1: ' + l1 + (cpu ? (' (CPU ' + cpu + ')') : ''));
            if($sysTxt) $sysTxt.textContent = parts.join(' | ');
            if($sys) $sys.style.display = parts.length ? 'flex' : 'none';
          }catch(e){}
        }

        function stopTimerIfIdle(){
          const running = Array.from(items.values()).some(x => x.state === 'running');
          if(running) return;
          if(timer){ clearInterval(timer); timer = null; }
        }

        function clearCompleted(){
          try{
            Array.from(items.values()).forEach(x => {
              try{
                const st = String(x.state || '');
                if(st && st !== 'running') items.delete(String(x.key || ''));
              }catch(e){}
            });
          }catch(e){}
          persistDebounced();
          render();
          stopTimerIfIdle();
        }

        window.InfluxBroStatus = {
          start: (key, text)=>{
            const k = String(key || '');
            if(!k) return;
            items.set(k, { key: k, text: String(text || ''), started_at_ms: Date.now(), state: 'running', done_ms: null });
            persistDebounced();
            ensureTimer();
            render();
          },
          progress: (key, text)=>{
            const k = String(key || '');
            const it = items.get(k);
            if(!it) return;
            it.text = String(text || it.text || '');
            items.set(k, it);
            persistDebounced();
            render();
          },
          done: (key, text)=>{
            const k = String(key || '');
            const it = items.get(k);
            if(it){
              it.state = 'done';
              it.done_ms = Date.now() - Number(it.started_at_ms || Date.now());
              it.text = String(text || it.text || '');
              items.set(k, it);
            }
            last = { text: String(text || '') };
            persistDebounced();
            render();
            stopTimerIfIdle();
          },
          fail: (key, text)=>{
            const k = String(key || '');
            const it = items.get(k);
            if(it){
              it.state = 'fail';
              it.done_ms = Date.now() - Number(it.started_at_ms || Date.now());
              it.text = String(text || it.text || '');
              items.set(k, it);
            }
            last = { text: String(text || '') };
            persistDebounced();
            render();
            stopTimerIfIdle();
          },
          clear: (key)=>{
            const k = String(key || '');
            if(!k) return;
            items.delete(k);
            persistDebounced();
            render();
            stopTimerIfIdle();
          },
          clearCompleted,
        };

        // Optional sysinfo poll
        try{
          if(SYSINFO_ENABLED){
            refreshSysinfo().catch(()=>{});
            _SYS_T = setInterval(()=>{ refreshSysinfo().catch(()=>{}); }, 5000);
          }
        }catch(e){}

        try{
          if($refresh && !$refresh.__influxbro_bound){
            $refresh.__influxbro_bound = true;
            $refresh.addEventListener('click', (ev)=>{
              try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
              clearCompleted();
            });
          }
        }catch(e){}

        // Restore persisted items so status survives page navigation.
        loadPersisted();
        render();
        try{
          if(Array.from(items.values()).some(x => String(x.state||'') === 'running')) ensureTimer();
        }catch(e){}
      }catch(e){}
    }

    function showProfileInfo(label, items){
      const root = _modalEnsure();
      const $t = document.getElementById('influxbro_profile_modal_title');
      const $q = document.getElementById('influxbro_profile_modal_q');
      const $cnt = document.getElementById('influxbro_profile_modal_cnt');
      const $pre = document.getElementById('influxbro_profile_modal_pre');
      const $prev = document.getElementById('influxbro_profile_modal_prev');
      const $next = document.getElementById('influxbro_profile_modal_next');
      if($t) $t.textContent = 'Profil: ' + String(label || '');

      const lines = [];
      const keys = Object.keys(items || {}).sort();
      keys.forEach(k=>{ lines.push(String(k) + ' = ' + String(items[k])); });
      const raw = lines.join('\n');

      let marks = [];
      let idx = -1;

      function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function render(){
        const term = String($q && $q.value ? $q.value : '').toLowerCase();
        if(!term){
          $pre.innerHTML = esc(raw);
          marks = [];
          idx = -1;
          if($cnt) $cnt.textContent = '0 Treffer';
          return;
        }
        const parts = raw.split(/\n/);
        const out = [];
        const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'ig');
        parts.forEach(line=>{
          const h = esc(line).replace(re, (m)=>'<mark>' + esc(m) + '</mark>');
          out.push(h);
        });
        $pre.innerHTML = out.join('\n');
        marks = Array.from($pre.querySelectorAll('mark'));
        if($cnt) $cnt.textContent = String(marks.length) + ' Treffer';
        idx = marks.length ? 0 : -1;
        jump(0);
      }
      function jump(delta){
        if(!marks.length) return;
        idx = (idx + delta + marks.length) % marks.length;
        marks.forEach(m=>m.classList.remove('active'));
        const m = marks[idx];
        try{ m.classList.add('active'); }catch(e){}
        try{ m.scrollIntoView({block:'center', behavior:'smooth'}); }catch(e){}
      }
      if($prev) $prev.onclick = (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; jump(-1); };
      if($next) $next.onclick = (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}; jump(1); };
      if($q) $q.oninput = ()=>render();

      if($q) $q.value = '';
      $pre.textContent = raw;
      if($cnt) $cnt.textContent = '0 Treffer';

      root.style.display = 'block';
      try{ if($q) $q.focus(); }catch(e){}
    }

    async function pruneInvalidUiKeys(){
      try{
        const p = stablePath();
        const prefix = 'influxbro_ui:' + p + ':';
        const keep = [];
        document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
          const id = (el.getAttribute('id') || '').trim();
          if(!id) return;
          if(isSensitive(el)) return;
          keep.push(prefix + id);
        });
        // details state key only valid if there are details on the page
        const hasDetails = !!document.querySelector('details[id]');
        if(!hasDetails){
          try{ localStorage.removeItem('influxbro_details:' + p); }catch(e){}
          _queueUiState('influxbro_details:' + p, null);
        }
        await fetch('./api/ui_state/prune', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({prefix, keep}),
        }).catch(()=>{});

        // Also prune local cache for this prefix
        try{
          const ks = new Set(keep);
          for(let i=0;i<localStorage.length;i++){
            const k = localStorage.key(i);
            if(!k) continue;
            if(k.startsWith(prefix) && !ks.has(k)){
              localStorage.removeItem(k);
            }
          }
        }catch(e){}
      }catch(e){}
    }

    function logUiClick(el){
      try{
        if(!el || !el.getAttribute) return;
        // Skip very noisy checkbox row selectors
        const cls = (el.getAttribute('class') || '').toLowerCase();
        if(cls.includes('row_sel')) return;

        const ui = (el.getAttribute('data-ui') || el.getAttribute('id') || '').trim();
        if(!ui) return;
        const txt = (el.textContent || '').trim().slice(0, 120);

        const page = '{{ nav }}';

        // debounce identical clicks
        const now = Date.now();
        const key = page + '|' + ui;
        if(!window.__INFLUXBRO_UI_LOG) window.__INFLUXBRO_UI_LOG = { last: new Map() };
        const m = window.__INFLUXBRO_UI_LOG.last;
        const prev = m.get(key) || 0;
        if(now - prev < 250) return;
        m.set(key, now);

        fetch('./api/ui_event', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ page, ui, text: txt }),
        }).catch(()=>{});
      }catch(e){}
    }

    // UI event logging (select/checkbox changes) - best-effort, throttled
    function logUiChange(el){
      try{
        if(!el || !el.getAttribute) return;
        const tag = String(el.tagName || '').toLowerCase();
        if(tag !== 'select' && tag !== 'input') return;
        const t = tag === 'input' ? String(el.getAttribute('type') || '').toLowerCase() : '';
        if(tag === 'input' && t && !['checkbox','datetime-local','number','text'].includes(t)) return;
        if(tag === 'input' && t === 'text'){
          // avoid logging free-text inputs (too noisy / potential sensitive)
          return;
        }

        const ui = (el.getAttribute('data-ui') || el.getAttribute('id') || '').trim();
        if(!ui) return;

        const page = '{{ nav }}';
        const now = Date.now();
        const key = 'chg|' + page + '|' + ui;
        if(!window.__INFLUXBRO_UI_LOG) window.__INFLUXBRO_UI_LOG = { last: new Map() };
        const m = window.__INFLUXBRO_UI_LOG.last;
        const prev = m.get(key) || 0;
        if(now - prev < 800) return;
        m.set(key, now);

        let v = '';
        try{
          if(tag === 'select') v = String(el.value || '');
          else if(t === 'checkbox') v = el.checked ? '1' : '0';
          else v = String(el.value || '');
        }catch(e){ v = ''; }
        v = String(v).slice(0, 120);

        fetch('./api/ui_event', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ page, ui, text: '', extra: { kind: 'change', value: v } }),
        }).catch(()=>{});
      }catch(e){}
    }

      try{
          // Restore/save for newly added nodes.
          (mut||[]).forEach(m=>{
            (m.addedNodes||[]).forEach(n=>{
              if(!n || !n.querySelectorAll) return;
              n.querySelectorAll('input[id], select[id], textarea[id]').forEach(el=>{
                restoreEl(el);
                watchEl(el);
              });
            });
          });
          ensureSectionToolbar();
        }catch(e){}
      });
      obs.observe(document.documentElement, {childList:true, subtree:true});
    }catch(e){}
  })();
  </script>
</nav>
