<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InfluxBro – Logs</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    .shell { display:grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    @media (max-width: 980px){ .shell { grid-template-columns: 1fr; } }
    .sidebar { padding: 14px; border-right: 1px solid #eee; }
    @media (max-width: 980px){ .sidebar { border-right: 0; border-bottom: 1px solid #eee; } }
    .brand { margin-bottom: 10px; }
    .brand_title { font-weight: 800; font-size: 18px; }
    .brand_meta { opacity: 0.7; font-size: 12px; margin-top: 2px; }
    .nav_item { display:flex; align-items:center; gap: 10px; padding: 10px 10px; border-radius: 12px; text-decoration:none; color: inherit; }
    .nav_item:hover { background: #f6f6f6; }
    .nav_item.active { background: #0b0b0c; color: #fff; }
    .ico { width: 22px; height: 22px; display:inline-flex; align-items:center; justify-content:center; font-weight: 800; }

    .content { padding: 16px; }
    h2 { margin: 0; }
    .muted { opacity: 0.7; font-size: 12px; }
    .row { display:flex; gap: 10px; flex-wrap:wrap; align-items:end; margin-top: 10px; }
    label { display:block; font-size: 12px; opacity: 0.8; }
    input, select, button { padding: 10px 12px; height: 40px; box-sizing: border-box; }
    button { cursor:pointer; }
    input[type="checkbox"] { height:auto; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-top: 12px; }
    details.card { padding: 0; }
    details.card > summary { list-style:none; cursor:pointer; padding: 12px; font-weight:700; }
    details.card > summary::-webkit-details-marker { display:none; }
    details.card > .card_body { padding: 0 12px 12px 12px; }
    .logbox { border: 1px solid #eee; border-radius: 12px; padding: 12px; height: 65vh; overflow:auto; background: #0b0b0c; color: #f3f3f3; }
    pre { margin: 0; font-size: 12px; line-height: 1.35; white-space: pre; }
    .wrap pre { white-space: pre-wrap; word-break: break-word; }
    .err { color: #b00020; margin-top: 8px; white-space: pre-wrap; }
    .log_error_line { display: block; background: var(--log-error-bg, #ffe0e0); color: var(--log-error-fg, #b00020); }
    .log_warn_line { display: block; background: var(--log-warn-bg, #fff8e1); color: var(--log-warn-fg, #b07000); }
  </style>
</head>
<body>
  {% include "_topbar.html" %}
  <div class="shell">
    {% include "_nav.html" %}
    <main class="content" data-ui="logs_page.main" title="logs.page">
      <h2>Logs</h2>
      <div class="muted">InfluxBro Add-on Logs (Supervisor)</div>

      <details class="card" open data-ui="logs_page.section_root" title="logs.page">
        <summary><span class="ib_summary_row"><span>Logs</span><button type="button" class="ib_info_icon" data-info-title="Logs: Logs" data-info-body="Dieser Bereich zeigt Add-on- oder Supervisor-Logs, bietet Schnellfilter, Download/Export und Debug-Report-Funktionen." ><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><path d="M12 17V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/><path d="M7 3.33782C8.47087 2.48697 10.1786 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 10.1786 2.48697 8.47087 3.33782 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></span></summary>
        <div class="card_body">
      <div class="row">
        <div>
          <label>Quelle</label>
          <select id="source" data-ui="logs_main.select_source" title="logs.source">
            <option value="logfile" selected>Logfile</option>
            <option value="supervisor">Supervisor</option>
          </select>
        </div>
        <div>
          <label>Anzeigen</label>
          <select id="view_profile" data-ui="logs_main.select_view_profile" title="logs.view_profile">
            <option value="error">ERROR (nur Fehler)</option>
            <option value="debug">DEBUG</option>
            <option value="trace" selected>TRACE (Details)</option>
          </select>
        </div>
        <div>
          <label>Log Stufe (Server)</label>
          <select id="server_profile" data-ui="logs_main.select_server_profile" title="logs.server_profile">
            <option value="error">ERROR</option>
            <option value="debug" selected>DEBUG</option>
            <option value="trace">TRACE</option>
          </select>
        </div>
        <div>
          <label>Influx Queries</label>
          <label style="display:flex; align-items:center; gap:8px; height:40px; padding:0 4px;">
            <input id="server_influx_queries" type="checkbox" data-ui="logs_main.chk_server_influx_queries" title="logs.server_influx_queries" />
            <span class="muted" style="opacity:0.85;">protokollieren</span>
          </label>
        </div>
        <div>
          <label>Caching</label>
          <label style="display:flex; align-items:center; gap:8px; height:40px; padding:0 4px;">
            <input id="server_cache_usage" type="checkbox" data-ui="logs_main.chk_server_cache_usage" title="logs.server_cache_usage" />
            <span class="muted" style="opacity:0.85;">logge Caching</span>
          </label>
        </div>
        <div>
          <label>Tail</label>
          <select id="tail" data-ui="logs_main.select_tail" title="logs.tail">
            <option value="200">200</option>
            <option value="1000">1000</option>
            <option value="2000" selected>2000</option>
            <option value="5000">5000</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="refresh" data-ui="logs_main.btn_refresh" title="logs.refresh" aria-label="Refresh">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20 12a8 8 0 1 1-2.34-5.66" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M20 4v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span style="margin-left:6px;">Neu</span></button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="jump_oldest" data-ui="logs_main.btn_jump_oldest" title="logs.jump_oldest" aria-label="aeltester">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7 7v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M17 17l-5-5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span style="margin-left:6px;">ältester</span></button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="jump_newest" data-ui="logs_main.btn_jump_newest" title="logs.jump_newest" aria-label="neuster">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M17 7v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M7 7l5 5-5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span style="margin-left:6px;">neuester</span></button>
        </div>
        <div>
          <label>Follow</label>
          <input id="follow" type="checkbox" data-ui="logs_main.chk_follow" title="logs.follow" aria-label="Follow" checked />
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="copy" data-ui="logs_main.btn_copy" title="logs.copy" aria-label="Logs kopieren">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" aria-hidden="true" focusable="false"><path d="M6 11C6 8.17157 6 6.75736 6.87868 5.87868C7.75736 5 9.17157 5 12 5H15C17.8284 5 19.2426 5 20.1213 5.87868C21 6.75736 21 8.17157 21 11V16C21 18.8284 21 20.2426 20.1213 21.1213C19.2426 22 17.8284 22 15 22H12C9.17157 22 7.75736 22 6.87868 21.1213C6 20.2426 6 18.8284 6 16V11Z" stroke="#1C274C" stroke-width="1.5"></path><path d="M6 19C4.34315 19 3 17.6569 3 16V10C3 6.22876 3 4.34315 4.17157 3.17157C5.34315 2 7.22876 2 11 2H15C16.6569 2 18 3.34315 18 5" stroke="#1C274C" stroke-width="1.5"></path></svg>
          </button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="download" data-ui="logs_main.btn_download" title="logs.download" aria-label="Download">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 3v11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M8.5 10.5 12 14l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 18.5h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6.5 15.5v3M17.5 15.5v3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span style="margin-left:6px;">Download</span></button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="export" type="button" data-ui="logs_main.btn_export" title="logs.export" aria-label="Export">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 20V9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M8.5 12.5 12 9l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 5.5h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <rect x="5" y="15.5" width="14" height="4" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span style="margin-left:6px;">Export</span></button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="debug_report" type="button" data-ui="logs_main.btn_debug_report" title="logs.debug_report" aria-label="Debug report">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M9 4h6l1.5 2.5H20l-1.7 3 .7 1.2-1.7 2.8H20l-3 5h-3.5L12 20l-1.5-1.5H7l-3-5h2.7L5 10.7l.7-1.2-1.7-3H7.5L9 4Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <circle cx="12" cy="10" r="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
              <path d="M12 13v3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <span style="margin-left:6px;">Report</span></button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="clear" data-ui="logs_main.btn_clear" title="logs.clear" aria-label="Clear view">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3 6h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M8 6V4h8v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M19 6l-1 16H6L5 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <span style="margin-left:6px;">Leer</span></button>
        </div>
        <div>
          <label>Wrap</label>
          <input id="wrap" type="checkbox" data-ui="logs_main.chk_wrap" title="logs.wrap" />
        </div>
        <div style="flex:1; min-width: 40px;">
          <label>Suche</label>
          <div class="ib_clear_row">
            <input id="q" placeholder="Text..." data-ui="logs_main.input_search" title="logs.search" />
            <button type="button" class="ib_clear_btn" data-clear-for="q" aria-label="Feld leeren" title="Feld leeren"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 7h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M7 7l1 12h8l1-12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 11v5M14 11v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
          </div>
        </div>
        <div style="flex:1; min-width: 40px;">
          <label>Markieren</label>
          <div class="ib_clear_row">
            <input id="q_mark" placeholder="Text markieren..." data-ui="logs_main.input_search_mark" title="logs.search_mark" />
            <button type="button" class="ib_clear_btn" data-clear-for="q_mark" aria-label="Feld leeren" title="Feld leeren"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 7h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M7 7l1 12h8l1-12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 11v5M14 11v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
            <button id="q_mark_prev" type="button" data-ui="logs_main.btn_search_mark_prev" title="logs.search_mark_prev">Zurueck</button>
            <button id="q_mark_next" type="button" data-ui="logs_main.btn_search_mark_next" title="logs.search_mark_next">Weiter</button>
          </div>
        </div>
      </div>

      <div id="err" class="err"></div>

      <div class="card" id="log_card">
        <div class="logbox" id="logbox">
          <pre id="logpre" data-ui="logs_main.txt_text" title="logs.text"></pre>
        </div>
      </div>
        </div>
      </details>

      <script>
      const $source = document.getElementById('source');
      const $viewProfile = document.getElementById('view_profile');
      const $serverProfile = document.getElementById('server_profile');
      const $serverInfluxQueries = document.getElementById('server_influx_queries');
      const $serverCacheUsage = document.getElementById('server_cache_usage');
      const $tail = document.getElementById('tail');
      const $refresh = document.getElementById('refresh');
      const $jumpOldest = document.getElementById('jump_oldest');
      const $jumpNewest = document.getElementById('jump_newest');
      const $follow = document.getElementById('follow');
      const $copy = document.getElementById('copy');
      const $download = document.getElementById('download');
      const $clear = document.getElementById('clear');
      const $export = document.getElementById('export');
      const $debugReport = document.getElementById('debug_report');
      const $wrap = document.getElementById('wrap');
      const $q = document.getElementById('q');
      const $qMark = document.getElementById('q_mark');
      const $qMarkPrev = document.getElementById('q_mark_prev');
      const $qMarkNext = document.getElementById('q_mark_next');
      const $err = document.getElementById('err');
      const $logbox = document.getElementById('logbox');
      const $logpre = document.getElementById('logpre');

      let FOLLOW = true;
      let RAW = "";
      let TIMER = null;
      let MARKS = [];
      let MARK_IDX = -1;

      const LS_VIEW = "influxbro_logs_view_profile_v1";

      function loadViewProfile(){
        try{
          const v = localStorage.getItem(LS_VIEW);
          if(v && $viewProfile) $viewProfile.value = v;
        }catch(e){}
      }
      function saveViewProfile(){
        try{ if($viewProfile) localStorage.setItem(LS_VIEW, String($viewProfile.value||"")); }catch(e){}
      }

      function err(s){
        const msg = s || "";
        $err.textContent = msg;
        if(msg){
          try{
            if(window.InfluxBroPopup && window.InfluxBroPopup.error) window.InfluxBroPopup.error(msg);
            else alert(msg);
          }catch(e){}
        }
      }
      function applyWrap(){
        const card = document.getElementById('log_card');
        if(card) card.classList.toggle('wrap', !!$wrap.checked);
      }

      function jumpOldest(){
        try{ if($logbox) $logbox.scrollTop = 0; }catch(e){}
      }
      function jumpNewest(){
        try{ if($logbox) $logbox.scrollTop = ($logbox.scrollHeight || 0); }catch(e){}
      }

      function applyMarkSearch(){
        MARKS = [];
        MARK_IDX = -1;
        if(!$qMark || !$logpre) return;
        const term = String($qMark.value || '').trim();
        if(!term) return;
        const color = (()=>{
          try{
            const raw = String(getComputedStyle(document.documentElement).getPropertyValue('--ib-page-search-hl-color') || '').trim();
            return raw || '#FF9900';
          }catch(e){
            return '#FF9900';
          }
        })();
        const fill = /^#[0-9a-fA-F]{6}$/.test(color)
          ? (color + '66')
          : (/^#[0-9a-fA-F]{3}$/.test(color)
            ? ('#' + color.slice(1).split('').map(ch => ch + ch).join('') + '66')
            : color);
        const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'ig');
        $logpre.innerHTML = String($logpre.innerHTML || '').replace(re, m => `<mark style="background:${fill};">${m}</mark>`);
        MARKS = Array.from($logpre.querySelectorAll('mark'));
        if(MARKS.length){ MARK_IDX = 0; jumpMark(0); }
      }

      function jumpMark(delta){
        if(!MARKS.length) return;
        MARK_IDX = (MARK_IDX + delta + MARKS.length) % MARKS.length;
        MARKS.forEach(m => m.style.outline = '');
        const m = MARKS[MARK_IDX];
        if(m){
          try{
            const raw = String(getComputedStyle(document.documentElement).getPropertyValue('--ib-page-search-hl-color') || '').trim();
            m.style.outline = '2px solid ' + (raw || '#FF9900');
          }catch(e){
            m.style.outline = '2px solid #FF9900';
          }
          try{ m.scrollIntoView({block:'center', behavior:'smooth'}); }catch(e){}
        }
      }

      function applySearch(){
        const t = String($q.value || "").toLowerCase();
        const view = $viewProfile ? String($viewProfile.value || "trace") : "trace";
        const all = RAW.split("\n");

        const filtered = all.filter(l => {
          const s = String(l || "");
          const up = s.toUpperCase();
          const hasLvl = (up.includes(" ERROR ") || up.includes(" WARNING ") || up.includes(" INFO ") || up.includes(" DEBUG "));
          const isDetails = s.includes("influxbro.details");
          if(view === "error") return up.includes(" ERROR ") || up.includes("TRACEBACK") || up.includes("EXCEPTION");
          if(view === "debug"){
            if(isDetails) return false;
            return hasLvl ? true : true;
          }
          // trace
          return true;
        });

        function escapeHtml(s){
          return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function isErrorLine(s){
          const up = String(s || "").toUpperCase();
          if(up.includes(" ERROR ") || up.includes("EXCEPTION") || up.includes("TRACEBACK")) return true;
          if(up.includes("TypeError") || up.includes("TypeError:")) return true;
          if(up.includes("Cannot set properties")) return true;
          return false;
        }

        function isWarnLine(s){
          return String(s || "").toUpperCase().includes(" WARNING ");
        }

        if(!t){
          const html = filtered.map(l => {
            const esc = escapeHtml(l);
            if(isErrorLine(l)) return `<span class="log_error_line">${esc}</span>`;
            if(isWarnLine(l)) return `<span class="log_warn_line">${esc}</span>`;
            return esc;
          }).join("\n");
          $logpre.innerHTML = html;
          applyMarkSearch();
          return;
        }
        const searched = filtered.filter(l => String(l||"").toLowerCase().includes(t));
        const html = searched.map(l => {
          const esc = escapeHtml(l);
          if(isErrorLine(l)) return `<span class="log_error_line">${esc}</span>`;
          if(isWarnLine(l)) return `<span class="log_warn_line">${esc}</span>`;
          return esc;
        }).join("\n");
        $logpre.innerHTML = html;
        applyMarkSearch();
      }

      async function setServerProfile(p){
        try{
          const payload = { log_profile: String(p || "debug") };
          let r;
          try{
            r = await fetch("./api/config", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
          }catch(e){
            try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/config', {method:'POST'}, e); }catch(x){}
            throw new Error('Failed to fetch');
          }
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) throw new Error(j.error || ("HTTP " + r.status));
          return true;
        }catch(e){
          err(String(e && e.message ? e.message : e));
          return false;
        }
      }

      async function loadServerProfile(){
        if(!$serverProfile) return;
        try{
          let r;
          try{ r = await fetch("./api/config"); }
          catch(e){ try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/config', {}, e); }catch(x){} return; }
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) return;
          const cfg = j.config || {};
          const p = String(cfg.log_profile || "debug");
          if(["error","debug","trace"].includes(p)) $serverProfile.value = p;
          if($serverInfluxQueries) $serverInfluxQueries.checked = !!cfg.log_influx_queries;
          if($serverCacheUsage) $serverCacheUsage.checked = !!cfg.log_cache_usage;
        }catch(e){}
      }

      async function loadLogColors(){
        try{
          let r;
          try{ r = await fetch("./api/config"); }
          catch(e){ return; }
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) return;
          const cfg = j.config || {};
          const root = document.documentElement;
          const errBg = cfg.ui_log_error_bg || '#ffe0e0';
          const errFg = cfg.ui_log_error_fg || '#b00020';
          const warnBg = cfg.ui_log_warn_bg || '#fff8e1';
          const warnFg = cfg.ui_log_warn_fg || '#b07000';
          root.style.setProperty('--log-error-bg', errBg);
          root.style.setProperty('--log-error-fg', errFg);
          root.style.setProperty('--log-warn-bg', warnBg);
          root.style.setProperty('--log-warn-fg', warnFg);
        }catch(e){}
      }

      async function setServerInfluxQueries(on){
        try{
          const payload = { log_influx_queries: !!on };
          let r;
          try{
            r = await fetch("./api/config", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
          }catch(e){
            try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/config', {method:'POST'}, e); }catch(x){}
            throw new Error('Failed to fetch');
          }
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) throw new Error(j.error || ("HTTP " + r.status));
          return true;
        }catch(e){
          err(String(e && e.message ? e.message : e));
          return false;
        }
      }

      async function setServerCacheUsage(on){
        try{
          const payload = { log_cache_usage: !!on };
          let r;
          try{
            r = await fetch("./api/config", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
          }catch(e){
            try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/config', {method:'POST'}, e); }catch(x){}
            throw new Error('Failed to fetch');
          }
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) throw new Error(j.error || ("HTTP " + r.status));
          return true;
        }catch(e){
          err(String(e && e.message ? e.message : e));
          return false;
        }
      }

      async function loadLogs(){
        err("");
        const tail = Number($tail.value || 2000);
        const src = ($source && $source.value) ? String($source.value) : "logfile";
        const url = (src === "supervisor") ? `./api/logs?tail=${encodeURIComponent(tail)}` : `./api/logfile?tail=${encodeURIComponent(tail)}`;
        let r;
        try{
          r = await fetch(url);
        }catch(e){
          try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError(url, {}, e); }catch(x){}
          throw new Error('Failed to fetch');
        }
        let j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
        if(!r.ok || !j.ok){
          // Fallback: if supervisor fails, try logfile automatically.
          if(src === "supervisor"){
              try{
                try{
                  r = await fetch(`./api/logfile?tail=${encodeURIComponent(tail)}`);
                }catch(e){
                  try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError(`./api/logfile?tail=${encodeURIComponent(tail)}`, {}, e); }catch(x){}
                  throw new Error('Failed to fetch');
                }
                j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
                if(r.ok && j.ok){
                  err("Supervisor Logs nicht verfuegbar, zeige Logfile.");
                } else {
                  throw new Error(j.error || ("HTTP " + r.status));
                }
            }catch(e){
              throw new Error(j.error || ("HTTP " + r.status));
            }
          } else {
            throw new Error(j.error || ("HTTP " + r.status));
          }
        }
        RAW = String(j.text || "");
        applySearch();
        // autoscroll only when following and near bottom
        if(FOLLOW){
          $logbox.scrollTop = $logbox.scrollHeight;
        }
      }

      function snapshotLocalStorage(){
        const out = {};
        try{
          for(let i=0;i<localStorage.length;i++){
            const k = localStorage.key(i);
            if(!k) continue;
            if(!String(k).startsWith('influxbro_')) continue;
            if(k.toLowerCase().includes('token') || k.toLowerCase().includes('password')) continue;
            let v = '';
            try{ v = String(localStorage.getItem(k) || ''); }catch(e){ v = ''; }
            if(v.length > 4000) v = v.slice(0, 4000) + '...';
            out[k] = v;
          }
        }catch(e){}
        return out;
      }

      async function exportBundle(){
        err('');
        const tail = Number($tail.value || 2000);
        const bundle = {
          exported_at: new Date().toISOString(),
          page: 'logs',
          href: String(location && location.href ? location.href : ''),
          user_agent: String(navigator && navigator.userAgent ? navigator.userAgent : ''),
          ui: {
            source: String($source && $source.value ? $source.value : ''),
            view_profile: String($viewProfile && $viewProfile.value ? $viewProfile.value : ''),
            server_profile: String($serverProfile && $serverProfile.value ? $serverProfile.value : ''),
            server_influx_queries: !!($serverInfluxQueries && $serverInfluxQueries.checked),
            tail: tail,
            wrap: !!($wrap && $wrap.checked),
            search: String($q && $q.value ? $q.value : ''),
          },
          client_errors: (window.InfluxBroClientLog && window.InfluxBroClientLog.getBuffer) ? window.InfluxBroClientLog.getBuffer() : [],
          local_storage: snapshotLocalStorage(),
          visible_log_text: String($logpre && $logpre.textContent ? $logpre.textContent : ''),
          api: {},
        };

        async function addApi(name, url, opts){
          try{
            const r = await fetch(url, opts);
            const ct = String(r.headers.get('content-type') || '');
            const text = await r.text();
            bundle.api[name] = { ok: r.ok, status: r.status, content_type: ct, body: text };
          }catch(e){
            try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError(url, opts, e); }catch(x){}
            bundle.api[name] = { ok: false, error: String(e && e.message ? e.message : e) };
          }
        }

        await addApi('info', './api/info', {});
        await addApi('config', './api/config', {});
        await addApi('ha_debug', './api/ha_debug', {});
        await addApi('logs_diag', './api/logs_diag', {});
        await addApi('logfile', `./api/logfile?tail=${encodeURIComponent(tail)}`, {});
        await addApi('supervisor_logs', `./api/logs?tail=${encodeURIComponent(tail)}`, {});

        const ver = (function(){
          try{
            const j = JSON.parse(String(bundle.api.info && bundle.api.info.body ? bundle.api.info.body : '{}'));
            return (j && j.version) ? String(j.version) : 'unknown';
          }catch(e){
            return 'unknown';
          }
        })();

        const fn = `influxbro_export_${ver}_${new Date().toISOString().replace(/[:.]/g,'-')}.json`;
        const blob = new Blob([JSON.stringify(bundle, null, 2)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fn;
        document.body.appendChild(a);
        a.click();
        setTimeout(()=>{
          try{ URL.revokeObjectURL(a.href); }catch(e){}
          try{ a.remove(); }catch(e){}
        }, 0);
      }

      function _filenameFromContentDisposition(cd){
        try{
          const s = String(cd || '');
          const m = s.match(/filename\*=UTF-8''([^;]+)|filename="([^"]+)"|filename=([^;]+)/i);
          const raw = m ? (m[1] || m[2] || m[3]) : '';
          const fn = raw ? decodeURIComponent(raw.trim()) : '';
          return fn || '';
        }catch(e){
          return '';
        }
      }

      async function debugReport(){
        err('');
        const tail = Number($tail.value || 2000);
        const payload = {
          tail,
          issue: {
            title: '',
            description: '',
            steps: '',
          },
          client: {
            exported_at: new Date().toISOString(),
            page: 'logs',
            href: String(location && location.href ? location.href : ''),
            user_agent: String(navigator && navigator.userAgent ? navigator.userAgent : ''),
            ui: {
              source: String($source && $source.value ? $source.value : ''),
              view_profile: String($viewProfile && $viewProfile.value ? $viewProfile.value : ''),
              server_profile: String($serverProfile && $serverProfile.value ? $serverProfile.value : ''),
              server_influx_queries: !!($serverInfluxQueries && $serverInfluxQueries.checked),
              tail: tail,
              wrap: !!($wrap && $wrap.checked),
              search: String($q && $q.value ? $q.value : ''),
            },
            client_errors: (window.InfluxBroClientLog && window.InfluxBroClientLog.getBuffer) ? window.InfluxBroClientLog.getBuffer() : [],
            local_storage: snapshotLocalStorage(),
            visible_log_text: String($logpre && $logpre.textContent ? $logpre.textContent : ''),
          },
        };

        let r;
        try{
          r = await fetch('./api/debug_report', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        }catch(e){
          try{ window.InfluxBroClientLog && window.InfluxBroClientLog.fetchError && window.InfluxBroClientLog.fetchError('./api/debug_report', payload, e); }catch(x){}
          throw new Error('Failed to fetch');
        }
        if(!r.ok){
          const t = await r.text().catch(()=> '');
          throw new Error(t || ('HTTP ' + r.status));
        }
        const blob = await r.blob();
        const cd = r.headers.get('content-disposition');
        const fn = _filenameFromContentDisposition(cd) || 'influxbro_debug_report.md';
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fn;
        document.body.appendChild(a);
        a.click();
        setTimeout(()=>{
          try{ URL.revokeObjectURL(a.href); }catch(e){}
          try{ a.remove(); }catch(e){}
        }, 0);
      }

      function setFollow(v){
        FOLLOW = !!v;
        try{ if($follow) $follow.checked = FOLLOW; }catch(e){}
        try{ $follow.title = FOLLOW ? 'Follow: ein' : 'Follow: aus'; }catch(e){}
        if(TIMER){ clearInterval(TIMER); TIMER = null; }
        if(FOLLOW){
          TIMER = setInterval(()=>loadLogs().catch(e=>err(String(e && e.message ? e.message : e))), 2000);
        }
      }

      $refresh.addEventListener('click', ()=>loadLogs().catch(e=>err(String(e && e.message ? e.message : e))));
      if($jumpOldest) $jumpOldest.addEventListener('click', ()=>jumpOldest());
      if($jumpNewest) $jumpNewest.addEventListener('click', ()=>jumpNewest());
      if($source) $source.addEventListener('change', ()=>loadLogs().catch(e=>err(String(e && e.message ? e.message : e))));
      if($viewProfile) $viewProfile.addEventListener('change', ()=>{ saveViewProfile(); applySearch(); });
      if($serverProfile) $serverProfile.addEventListener('change', ()=>{ setServerProfile($serverProfile.value).then(()=>loadLogs().catch(()=>{})); });
      if($serverInfluxQueries) $serverInfluxQueries.addEventListener('change', ()=>{ setServerInfluxQueries($serverInfluxQueries.checked).then(()=>loadLogs().catch(()=>{})); });
      if($serverCacheUsage) $serverCacheUsage.addEventListener('change', ()=>{ setServerCacheUsage($serverCacheUsage.checked).then(()=>loadLogs().catch(()=>{})); });
      $follow.addEventListener('change', ()=>setFollow(!!($follow && $follow.checked)));
      $wrap.addEventListener('change', ()=>{ applyWrap(); });
      $q.addEventListener('input', ()=>applySearch());
      if($qMark) $qMark.addEventListener('input', ()=>applySearch());
      if($qMarkPrev) $qMarkPrev.addEventListener('click', ()=>jumpMark(-1));
      if($qMarkNext) $qMarkNext.addEventListener('click', ()=>jumpMark(1));
      $clear.addEventListener('click', ()=>{ RAW = ""; $logpre.innerHTML = ""; err(""); });
      $copy.addEventListener('click', async ()=>{
        try{ 
          await navigator.clipboard.writeText($logpre.textContent || ""); 
        }catch(e){ 
          // Fallback auf execCommand wenn clipboard API fehlschlägt
          const ta = document.createElement('textarea');
          ta.value = $logpre.textContent || "";
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          ta.style.top = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const success = document.execCommand('copy');
          document.body.removeChild(ta);
          if(!success) throw new Error('execCommand copy failed');
        }
      });
      $download.addEventListener('click', ()=>{
        const blob = new Blob([$logpre.textContent || ""], {type:"text/plain"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'influxbro-logs.txt';
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
      });

      if($export) $export.addEventListener('click', ()=>exportBundle().catch(e=>err(String(e && e.message ? e.message : e))));

      if($debugReport) $debugReport.addEventListener('click', ()=>debugReport().catch(e=>err(String(e && e.message ? e.message : e))));

      applyWrap();
      loadViewProfile();
      loadServerProfile();
      loadLogColors().catch(()=>{});
      setFollow(!!($follow && $follow.checked));
      loadLogs().then(()=>{ try{ jumpNewest(); }catch(e){} }).catch(e=>err(String(e && e.message ? e.message : e)));
      </script>

      {% include "_tooltips.html" %}
    </main>
  </div>
</body>
