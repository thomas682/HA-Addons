<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InfluxBro – Logs</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    .shell { display:grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    @media (max-width: 980px){ .shell { grid-template-columns: 1fr; } }
    .sidebar { padding: 14px; border-right: 1px solid #eee; }
    @media (max-width: 980px){ .sidebar { border-right: 0; border-bottom: 1px solid #eee; } }
    .brand { margin-bottom: 10px; }
    .brand_title { font-weight: 800; font-size: 18px; }
    .brand_meta { opacity: 0.7; font-size: 12px; margin-top: 2px; }
    .nav_item { display:flex; align-items:center; gap: 10px; padding: 10px 10px; border-radius: 12px; text-decoration:none; color: inherit; }
    .nav_item:hover { background: #f6f6f6; }
    .nav_item.active { background: #0b0b0c; color: #fff; }
    .ico { width: 22px; height: 22px; display:inline-flex; align-items:center; justify-content:center; font-weight: 800; }

    .content { padding: 16px; }
    h2 { margin: 0; }
    .muted { opacity: 0.7; font-size: 12px; }
    .row { display:flex; gap: 10px; flex-wrap:wrap; align-items:end; margin-top: 10px; }
    label { display:block; font-size: 12px; opacity: 0.8; }
    input, select, button { padding: 10px 12px; height: 40px; box-sizing: border-box; }
    button { cursor:pointer; }
    input[type="checkbox"] { height:auto; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-top: 12px; }
    .logbox { border: 1px solid #eee; border-radius: 12px; padding: 12px; height: 65vh; overflow:auto; background: #0b0b0c; color: #f3f3f3; }
    pre { margin: 0; font-size: 12px; line-height: 1.35; white-space: pre; }
    .wrap pre { white-space: pre-wrap; word-break: break-word; }
    .err { color: #b00020; margin-top: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="shell">
    {% include "_nav.html" %}
    <main class="content" data-ui="logs.page" title="logs.page">
      <h2>Logs</h2>
      <div class="muted">InfluxBro Add-on Logs (Supervisor)</div>

      <div class="row">
        <div>
          <label>Quelle</label>
          <select id="source" data-ui="logs.source" title="logs.source">
            <option value="logfile" selected>Logfile</option>
            <option value="supervisor">Supervisor</option>
          </select>
        </div>
        <div>
          <label>Anzeigen</label>
          <select id="view_profile" data-ui="logs.view_profile" title="logs.view_profile">
            <option value="error">ERROR (nur Fehler)</option>
            <option value="debug">DEBUG</option>
            <option value="trace" selected>TRACE (Details)</option>
          </select>
        </div>
        <div>
          <label>Log Stufe (Server)</label>
          <select id="server_profile" data-ui="logs.server_profile" title="logs.server_profile">
            <option value="error">ERROR</option>
            <option value="debug" selected>DEBUG</option>
            <option value="trace">TRACE</option>
          </select>
        </div>
        <div>
          <label>Influx Queries</label>
          <label style="display:flex; align-items:center; gap:8px; height:40px; padding:0 4px;">
            <input id="server_influx_queries" type="checkbox" data-ui="logs.server_influx_queries" title="logs.server_influx_queries" />
            <span class="muted" style="opacity:0.85;">protokollieren</span>
          </label>
        </div>
        <div>
          <label>Tail</label>
          <select id="tail" data-ui="logs.tail" title="logs.tail">
            <option value="200">200</option>
            <option value="1000">1000</option>
            <option value="2000" selected>2000</option>
            <option value="5000">5000</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="refresh" data-ui="logs.refresh" title="logs.refresh">Refresh</button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="follow" data-ui="logs.follow" title="logs.follow">Follow: aus</button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="copy" data-ui="logs.copy" title="logs.copy">Copy</button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="download" data-ui="logs.download" title="logs.download">Download</button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="clear" data-ui="logs.clear" title="logs.clear">Clear view</button>
        </div>
        <div>
          <label>Wrap</label>
          <input id="wrap" type="checkbox" data-ui="logs.wrap" title="logs.wrap" />
        </div>
        <div style="flex:1; min-width: 220px;">
          <label>Suche</label>
          <input id="q" placeholder="Text..." data-ui="logs.search" title="logs.search" />
        </div>
      </div>

      <div id="err" class="err"></div>

      <div class="card" id="log_card">
        <div class="logbox" id="logbox">
          <pre id="logpre" data-ui="logs.text" title="logs.text"></pre>
        </div>
      </div>

      <script>
      const $source = document.getElementById('source');
      const $viewProfile = document.getElementById('view_profile');
      const $serverProfile = document.getElementById('server_profile');
      const $serverInfluxQueries = document.getElementById('server_influx_queries');
      const $tail = document.getElementById('tail');
      const $refresh = document.getElementById('refresh');
      const $follow = document.getElementById('follow');
      const $copy = document.getElementById('copy');
      const $download = document.getElementById('download');
      const $clear = document.getElementById('clear');
      const $wrap = document.getElementById('wrap');
      const $q = document.getElementById('q');
      const $err = document.getElementById('err');
      const $logbox = document.getElementById('logbox');
      const $logpre = document.getElementById('logpre');

      let FOLLOW = false;
      let RAW = "";
      let TIMER = null;

      const LS_VIEW = "influxbro_logs_view_profile_v1";

      function loadViewProfile(){
        try{
          const v = localStorage.getItem(LS_VIEW);
          if(v && $viewProfile) $viewProfile.value = v;
        }catch(e){}
      }
      function saveViewProfile(){
        try{ if($viewProfile) localStorage.setItem(LS_VIEW, String($viewProfile.value||"")); }catch(e){}
      }

      function err(s){ $err.textContent = s || ""; }
      function applyWrap(){
        const card = document.getElementById('log_card');
        if(card) card.classList.toggle('wrap', !!$wrap.checked);
      }

      function applySearch(){
        const t = String($q.value || "").toLowerCase();
        const view = $viewProfile ? String($viewProfile.value || "trace") : "trace";
        const all = RAW.split("\n");

        const filtered = all.filter(l => {
          const s = String(l || "");
          const up = s.toUpperCase();
          const hasLvl = (up.includes(" ERROR ") || up.includes(" WARNING ") || up.includes(" INFO ") || up.includes(" DEBUG "));
          const isDetails = s.includes("influxbro.details");
          if(view === "error") return up.includes(" ERROR ") || up.includes("TRACEBACK") || up.includes("EXCEPTION");
          if(view === "debug"){
            if(isDetails) return false;
            return hasLvl ? true : true;
          }
          // trace
          return true;
        });

        if(!t){
          $logpre.textContent = filtered.join("\n");
          return;
        }
        $logpre.textContent = filtered.filter(l => String(l||"").toLowerCase().includes(t)).join("\n");
      }

      async function setServerProfile(p){
        try{
          const payload = { log_profile: String(p || "debug") };
          const r = await fetch("./api/config", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) throw new Error(j.error || ("HTTP " + r.status));
          return true;
        }catch(e){
          err(String(e && e.message ? e.message : e));
          return false;
        }
      }

      async function loadServerProfile(){
        if(!$serverProfile) return;
        try{
          const r = await fetch("./api/config");
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) return;
          const cfg = j.config || {};
          const p = String(cfg.log_profile || "debug");
          if(["error","debug","trace"].includes(p)) $serverProfile.value = p;
          if($serverInfluxQueries) $serverInfluxQueries.checked = !!cfg.log_influx_queries;
        }catch(e){}
      }

      async function setServerInfluxQueries(on){
        try{
          const payload = { log_influx_queries: !!on };
          const r = await fetch("./api/config", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
          const j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
          if(!r.ok || !j.ok) throw new Error(j.error || ("HTTP " + r.status));
          return true;
        }catch(e){
          err(String(e && e.message ? e.message : e));
          return false;
        }
      }

      async function loadLogs(){
        err("");
        const tail = Number($tail.value || 2000);
        const src = ($source && $source.value) ? String($source.value) : "logfile";
        const url = (src === "supervisor") ? `./api/logs?tail=${encodeURIComponent(tail)}` : `./api/logfile?tail=${encodeURIComponent(tail)}`;
        let r = await fetch(url);
        let j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
        if(!r.ok || !j.ok){
          // Fallback: if supervisor fails, try logfile automatically.
          if(src === "supervisor"){
            try{
              r = await fetch(`./api/logfile?tail=${encodeURIComponent(tail)}`);
              j = await r.json().catch(()=>({ok:false,error:"Invalid JSON"}));
              if(r.ok && j.ok){
                err("Supervisor Logs nicht verfuegbar, zeige Logfile.");
              } else {
                throw new Error(j.error || ("HTTP " + r.status));
              }
            }catch(e){
              throw new Error(j.error || ("HTTP " + r.status));
            }
          } else {
            throw new Error(j.error || ("HTTP " + r.status));
          }
        }
        RAW = String(j.text || "");
        applySearch();
        // autoscroll only when following and near bottom
        if(FOLLOW){
          $logbox.scrollTop = $logbox.scrollHeight;
        }
      }

      function setFollow(v){
        FOLLOW = !!v;
        $follow.textContent = FOLLOW ? "Follow: ein" : "Follow: aus";
        if(TIMER){ clearInterval(TIMER); TIMER = null; }
        if(FOLLOW){
          TIMER = setInterval(()=>loadLogs().catch(e=>err(String(e && e.message ? e.message : e))), 2000);
        }
      }

      $refresh.addEventListener('click', ()=>loadLogs().catch(e=>err(String(e && e.message ? e.message : e))));
      if($source) $source.addEventListener('change', ()=>loadLogs().catch(e=>err(String(e && e.message ? e.message : e))));
      if($viewProfile) $viewProfile.addEventListener('change', ()=>{ saveViewProfile(); applySearch(); });
      if($serverProfile) $serverProfile.addEventListener('change', ()=>{ setServerProfile($serverProfile.value).then(()=>loadLogs().catch(()=>{})); });
      if($serverInfluxQueries) $serverInfluxQueries.addEventListener('change', ()=>{ setServerInfluxQueries($serverInfluxQueries.checked).then(()=>loadLogs().catch(()=>{})); });
      $follow.addEventListener('click', ()=>setFollow(!FOLLOW));
      $wrap.addEventListener('change', ()=>{ applyWrap(); });
      $q.addEventListener('input', ()=>applySearch());
      $clear.addEventListener('click', ()=>{ RAW = ""; $logpre.textContent = ""; err(""); });
      $copy.addEventListener('click', async ()=>{
        try{ await navigator.clipboard.writeText($logpre.textContent || ""); }catch(e){ err("Copy failed: " + String(e)); }
      });
      $download.addEventListener('click', ()=>{
        const blob = new Blob([$logpre.textContent || ""], {type:"text/plain"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'influxbro-logs.txt';
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
      });

      applyWrap();
      loadViewProfile();
      loadServerProfile();
      loadLogs().catch(e=>err(String(e && e.message ? e.message : e)));
      </script>
    </main>
  </div>
</body>
</html>
