name: Bug report
description: Report a problem with the add-on
title: "[Bug]: "
labels:
  - type/bug
  - status/open

body:

  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

        Please provide as much information as possible so the issue can be reproduced.
        Include logs and steps to reproduce the problem.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this bug?
      options:
        - P1 - Critical: blocks usage / work cannot continue
        - P2 - High: major function broken, workaround missing
        - P3 - Medium: important issue, workaround exists
        - P4 - Low: minor issue or cosmetic problem
    validations:
      required: true
      
  - type: dropdown
    id: feature
    attributes:
      label: Feature / Function used
      description: Which part of the add-on were you using?
      options:
        - sonstiges
        - Dashboard
        - Monitor
        - Statistik
        - Backup
        - Restore
        - Kombinieren
        - Export
        - Import
        - Logs
        - Jobs & Cache
        - History
        - Diagnose
        - Changelog
        - Handbuch
        - Profilverwaltung
        - Einstellungen
    validations:
      required: true
      
  - type: textarea
    id: steps
    attributes:
      label: Fehlerbeschreibung
      description: Welches Problem trat auf, bitte genau beschreiben?
      placeholder: |
        1. Open the add-on UI
        2. Click on Statusleiste/Fehlerdiagnose/Bugreport ...
        3. Erstellt Issue in GitHub
        4. Füge ein bugreport.md vom Download
        5. Beschreibe den Fehler
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: Add-on logs
      description: Paste relevant logs from the add-on
      render: shell

  - type: textarea
    id: query
    attributes:
      label: Query / operation that caused the error (if applicable)
      description: Paste the Flux query or command that triggered the issue
      render: shell

  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      placeholder: e.g. 1.12.29

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      description: Version nur notwendig, wenn nicht Bugerport.md eingefügt wurde
      placeholder: e.g. 2026.3.0

  - type: input
    id: supervisor-version
    attributes:
      label: Supervisor version
      description: Version nur notwendig, wenn nicht Bugerport.md eingefügt wurde
      placeholder: e.g. 2026.02.0

  - type: dropdown
    id: installation-type
    attributes:
      label: Installation type
      description: Version nur notwendig, wenn nicht Bugerport.md eingefügt wurde
      options:
        - Home Assistant OS
        - Home Assistant Supervised
        - Home Assistant Container
        - Home Assistant Core

  - type: dropdown
    id: architecture
    attributes:
      label: System architecture
      options:
        - amd64
        - aarch64
        - armv7
        - i386
        - sonstige
