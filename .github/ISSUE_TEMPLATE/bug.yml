name: Bug report
description: Report a problem with the add-on
title: "[Bug]: "
labels:
  - type/bug
  - status/open

body:

  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please fill out as much information as possible so we can reproduce the issue.

  - type: dropdown
    id: feature
    attributes:
      label: Feature / Function
      description: Which part of the add-on were you using?
      options:
        - Global statistics
        - Full backup
        - Restore
        - Export
        - Scheduler
        - Web UI
        - Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can the issue be reproduced?
      placeholder: |
        1. Open add-on UI
        2. Click ...
        3. Run ...
        4. Error appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: What actually happened?

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or screenshots
      render: shell

  - type: textarea
    id: addon-config
    attributes:
      label: Add-on configuration
      description: Paste your add-on configuration if relevant
      render: yaml

  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      placeholder: e.g. 1.12.29
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.3.0
    validations:
      required: true

  - type: input
    id: supervisor-version
    attributes:
      label: Supervisor version
      placeholder: e.g. 2026.02.0

  - type: input
    id: ha-os
    attributes:
      label: Home Assistant OS / Installation type
      placeholder: e.g. HAOS / Docker / Supervised

  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: e.g. amd64 / aarch64 / armv7

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true
