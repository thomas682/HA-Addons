name: Bug report
description: Report something that is not working
title: "[Bug]: "
labels:
  - "type/bug"
  - "status/open"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do and what went wrong?
      placeholder: "When I click ..., I expected ..., but ..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, repeatable steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs (add-on logs, browser console) or attach screenshots.
      render: shell

  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      placeholder: "e.g. 1.11.97"

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.3.0"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
    validations:
      required: true
