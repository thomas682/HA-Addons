name: Profi Bugreport
description: Bugreport mit System- und Add-on-Details
title: "[Bug]: "
labels:
  - "type/bug"
  - "status/open"

body:
  - type: markdown
    attributes:
      value: |
        Bitte beschreibe das Problem moeglichst genau.

        Tipp: In der InfluxBro GUI kann ein Debug report erzeugt werden (Git Bugreport / Bugreport Button).
        Bitte die Datei `influxbro_debug_report_*.md` als Anhang hochladen.

  - type: textarea
    id: ausloeser
    attributes:
      label: Ausloeser / Aktion
      description: Was hast du gemacht, was ist passiert?
      placeholder: "Dashboard -> Aktualisieren ..."
    validations:
      required: true

  - type: textarea
    id: beobachtet
    attributes:
      label: Beobachtetes Verhalten / Fehlermeldung
      placeholder: "Fehlermeldung ..."
    validations:
      required: true

  - type: textarea
    id: erwartet
    attributes:
      label: Erwartetes Verhalten
      placeholder: "Ich erwarte ..."

  - type: textarea
    id: schritte
    attributes:
      label: Schritte zum Reproduzieren
      description: Optional, aber hilfreich.
      placeholder: |
        1.
        2.
        3.

  - type: dropdown
    id: feature
    attributes:
      label: Feature / Bereich
      description: Welcher Bereich war betroffen?
      options:
        - Dashboard
        - Statistik
        - Backup
        - Restore
        - Kombinieren
        - Export
        - Import
        - Logs
        - Jobs & Cache
        - History
        - Diagnose
        - Changelog
        - Handbuch
        - Profilverwaltung
        - Einstellungen
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Add-on Logs
      description: Relevante Log-Ausgabe (falls vorhanden)
      render: shell

  - type: textarea
    id: query
    attributes:
      label: Query / Operation (optional)
      description: Flux Query oder Aktion/Command (falls zutreffend)
      render: shell

  - type: input
    id: architecture
    attributes:
      label: Architektur (HA)
      placeholder: "amd64 / aarch64 / armv7 / ..."

  - type: input
    id: installation_type
    attributes:
      label: Installationstyp
      placeholder: "Home Assistant OS / Supervised / Container / Core"

  - type: input
    id: supervisor_version
    attributes:
      label: Supervisor Version
      placeholder: "z.B. 2026.03.0"

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Core Version
      placeholder: "z.B. 2026.3.1"

  - type: input
    id: addon_version
    attributes:
      label: Add-on Version
      placeholder: "z.B. 1.12.36"

  - type: input
    id: influx_version
    attributes:
      label: InfluxDB Version
      placeholder: "z.B. v2.7.10"

  - type: textarea
    id: debug_report
    attributes:
      label: Debug report Anhang
      description: Bitte die Debug report Datei (`influxbro_debug_report_*.md`) als Anhang hochladen.
      placeholder: "Anhang hochgeladen: ja/nein"
