name: Enhancement request
description: Suggest an improvement or new capability
title: "[Enhancement]: "
labels:
  - "type/enhancement"
  - "status/open"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.


  - type: dropdown
    id: feature
    attributes:
      label: Feature / Function used
      description: Which part of the add-on were you using?
      options:
        - Dashbaord Statistik
        - Statistik
        - Backup
        - Restore
        - Kombinieren
        - Export
        - Import
        - Logs
        - Jobs & Cache
        - History
        - Diagnose
        - Changelog
        - Handbuch
        - Profilverwaltung
        - Einstellungen
        - sonstiges
    validations:
      required: true
  
  - type: textarea
    id: requirement
    attributes:
      label: Request (as written)
      description: Please paste the request/wish in your own words.
      placeholder: "I want ..."
    validations:
      required: true

     
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true
