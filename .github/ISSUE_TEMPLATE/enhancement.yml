name: Enhancement request
description: Suggest an improvement or new capability
title: "[Enhancement]: "
labels:
  - "type/enhancement"
  - "status/open"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

  - type: textarea
    id: requirement
    attributes:
      label: Request (as written)
      description: Please paste the request/wish in your own words.
      placeholder: "I want ..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true
