name: Function documentation audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  function-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check pytest==8.4.2
      - run: python -m pytest tests/test_function_docs_validator.py -q
      - name: Require complete source-reviewed inventory
        run: python scripts/validate_function_docs.py
