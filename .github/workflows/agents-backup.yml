name: Protect and backup AGENTS.md

on:
  pull_request:
    paths:
      - "AGENTS.md"
  push:
    branches:
      - main
    paths:
      - "AGENTS.md"

permissions:
  contents: write

jobs:
  protect-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create timestamp
        id: timestamp
        run: |
          TS_UTC=$(date -u +"%Y-%m-%d_%H-%M-%S_UTC")
          SHORT_SHA=$(git rev-parse --short HEAD)
          SAFE_REF=$(echo "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9._-]#-#g')
          BACKUP_NAME="AGENTS_backup_${TS_UTC}_${SAFE_REF}_${SHORT_SHA}"
          echo "ts_utc=$TS_UTC" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "safe_ref=$SAFE_REF" >> "$GITHUB_OUTPUT"
          echo "backup_name=$BACKUP_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare savefiles backup folder
        run: |
          mkdir -p "savefiles/${{ steps.timestamp.outputs.backup_name }}"
          cp AGENTS.md "savefiles/${{ steps.timestamp.outputs.backup_name }}/AGENTS.changed.md"

      - name: Fetch base version from main
        run: |
          git fetch origin main
          git show origin/main:AGENTS.md > "savefiles/${{ steps.timestamp.outputs.backup_name }}/AGENTS.main-before-change.md"

      - name: Create diff
        run: |
          git diff --no-index \
            "savefiles/${{ steps.timestamp.outputs.backup_name }}/AGENTS.main-before-change.md" \
            "savefiles/${{ steps.timestamp.outputs.backup_name }}/AGENTS.changed.md" \
            > "savefiles/${{ steps.timestamp.outputs.backup_name }}/AGENTS.diff" || true

      - name: Create metadata file
        run: |
          cat > "savefiles/${{ steps.timestamp.outputs.backup_name }}/backup-info.txt" <<EOF
          Backup name: ${{ steps.timestamp.outputs.backup_name }}
          Date UTC: ${{ steps.timestamp.outputs.ts_utc }}
          Branch/Ref: ${{ github.ref_name }}
          Commit SHA: ${{ github.sha }}
          Actor: ${{ github.actor }}
          Event: ${{ github.event_name }}
          Repository: ${{ github.repository }}
          Workflow run: ${{ github.run_id }}
          EOF

      - name: Guard against accidental truncation
        run: |
          OLD_LINES=$(wc -l < "savefiles/${{ steps.timestamp.outputs.backup_name }}/AGENTS.main-before-change.md")
          NEW_LINES=$(wc -l < "savefiles/${{ steps.timestamp.outputs.backup_name }}/AGENTS.changed.md")

          echo "Old AGENTS.md lines: $OLD_LINES"
          echo "New AGENTS.md lines: $NEW_LINES"

          if [ "$NEW_LINES" -lt "$OLD_LINES" ]; then
            echo "ERROR: AGENTS.md has fewer lines than before."
            echo "This may indicate accidental truncation."
            exit 1
          fi

      - name: Commit backup into savefiles
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "savefiles/${{ steps.timestamp.outputs.backup_name }}"

          if git diff --cached --quiet; then
            echo "No backup changes to commit."
            exit 0
          fi

          git commit -m "chore: backup AGENTS.md ${{ steps.timestamp.outputs.backup_name }}"
          git push
