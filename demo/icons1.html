<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfluxBRO — Icon-Auswahl (3 Varianten)</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#292e36;
  --border:#30363d;--border-h:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#bc8cff;--pink:#f778ba;--cyan:#39d2c0;
  --mono:'SF Mono','Cascadia Code','Fira Code',monospace;
  --sans:'Inter','SF Pro Display',-apple-system,sans-serif;
  --tr:.22s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;padding:24px 32px 80px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{color:var(--text2);font-size:13px;margin-bottom:8px}

/* Summary bar */
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.sum-chip{font-size:11px;padding:5px 14px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:5px}
.sum-chip .sv{font-weight:700;color:var(--accent)}

/* Jump Nav */
.jump-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:24px;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
.jump-btn{font-size:10px;padding:4px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:var(--sans);transition:var(--tr);text-decoration:none;white-space:nowrap}
.jump-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Menu item row */
.mi{margin-bottom:24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:16px}
.mi-head{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.mi-num{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text3);background:var(--bg);padding:2px 8px;border-radius:6px;min-width:28px;text-align:center}
.mi-name{font-size:15px;font-weight:700;flex:1}
.mi-old{font-size:11px;color:var(--text3);font-family:var(--mono)}
.mi-role{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:600}

/* 3 variant cards */
.mi-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.vc{padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;border-right:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative;min-height:180px}
.vc:last-child{border-right:none}
.vc:hover{background:rgba(88,166,255,.03)}
.vc.picked{background:rgba(88,166,255,.06)}
.vc.picked::after{content:'✅ Gewählt';position:absolute;top:8px;right:8px;font-size:9px;background:rgba(63,185,80,.15);color:var(--green);padding:2px 8px;border-radius:8px;font-weight:600}

/* Variant label */
.vc-label{font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.vc-label.a{background:rgba(88,166,255,.1);color:var(--accent)}
.vc-label.b{background:rgba(188,140,255,.1);color:var(--purple)}
.vc-label.c{background:rgba(210,153,34,.1);color:var(--orange)}

/* Icon display */
.vc-icon{width:44px;height:44px;transition:transform .2s}
.vc:hover .vc-icon{transform:scale(1.15)}
.vc-icon svg{width:44px;height:44px}

/* Description */
.vc-desc{font-size:11px;color:var(--text2);text-align:center;line-height:1.4;max-width:200px}

/* Size previews */
.vc-sizes{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:8px}
.vc-sz{display:flex;align-items:center;justify-content:center;opacity:.6}
.vc-sz svg{display:block}

/* Copy button */
.vc-copy{position:absolute;bottom:8px;right:8px;font-size:9px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);padding:2px 8px;border-radius:6px;cursor:pointer;opacity:0;transition:var(--tr);font-family:var(--sans)}
.vc:hover .vc-copy{opacity:1}
.vc-copy:hover{border-color:var(--accent);color:var(--accent)}

/* Sidebar preview */
.preview-sidebar{position:fixed;right:24px;top:24px;width:260px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:0;z-index:50;box-shadow:0 12px 40px rgba(0,0,0,.5);max-height:calc(100vh - 48px);overflow-y:auto;display:none}
.preview-sidebar.show{display:block}
.ps-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg2);z-index:2}
.ps-close{margin-left:auto;cursor:pointer;font-size:14px;color:var(--text3);transition:var(--tr)}
.ps-close:hover{color:var(--red)}
.psi{display:flex;align-items:center;gap:10px;padding:9px 16px;transition:var(--tr);border-left:3px solid transparent}
.psi:first-of-type{border-left-color:var(--accent);background:rgba(88,166,255,.06)}
.psi .psi-icon{width:20px;height:20px;flex-shrink:0;opacity:.55}
.psi:first-of-type .psi-icon{opacity:1}
.psi .psi-name{font-size:12px;color:var(--text2)}
.psi:first-of-type .psi-name{color:var(--text);font-weight:600}
.ps-sep{height:1px;background:var(--border);margin:4px 16px}

/* Toggle */
.preview-toggle{position:fixed;right:24px;top:24px;z-index:49;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:10px;cursor:pointer;font-family:var(--sans);font-size:12px;transition:var(--tr);display:flex;align-items:center;gap:6px}
.preview-toggle:hover{border-color:var(--accent);color:var(--accent)}

.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:8px 20px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.copy-toast.show{opacity:1}

@media(max-width:900px){.mi-cards{grid-template-columns:1fr}.vc{border-right:none;border-bottom:1px solid var(--border)}.vc:last-child{border-bottom:none}.preview-sidebar{display:none!important}}
</style>
</head>

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const picked = {};
ITEMS.forEach(it => { picked[it.key] = 0; }); // default: variant A

// ════════════════════════════════════════
//  RENDER CATALOG
// ════════════════════════════════════════
function renderCatalog() {
  const labels = ['a','b','c'];
  const labelNames = ['Variante A','Variante B','Variante C'];

  document.getElementById('catalog').innerHTML = ITEMS.map((it, idx) => `
    <div class="mi" id="item-${it.key}">
      <div class="mi-head">
        <span class="mi-num">${idx+1}</span>
        <span class="mi-name">${it.name}</span>
        <span class="mi-old">bisher: „${it.old}"</span>
        <span class="mi-role" style="background:${it.roleBg};color:${it.roleColor}">${it.role}</span>
      </div>
      <div class="mi-cards">
        ${it.variants.map((v, vi) => `
          <div class="vc ${picked[it.key]===vi?'picked':''}" onclick="pick('${it.key}',${vi})">
            <span class="vc-label ${labels[vi]}">${labelNames[vi]}</span>
            <div class="vc-icon" style="color:${it.color}">${v.svg}</div>
            <div style="font-size:12px;font-weight:600">${v.label}</div>
            <div class="vc-desc">${v.desc}</div>
            <div class="vc-sizes">
              <div class="vc-sz" style="color:${it.color};width:16px;height:16px">${v.svg.replace('viewBox','style="width:16px;height:16px" viewBox')}</div>
              <div class="vc-sz" style="color:${it.color};width:24px;height:24px">${v.svg.replace('viewBox','style="width:24px;height:24px" viewBox')}</div>
              <div class="vc-sz" style="color:${it.color};width:32px;height:32px">${v.svg.replace('viewBox','style="width:32px;height:32px" viewBox')}</div>
            </div>
            <button class="vc-copy" onclick="event.stopPropagation();copySVG('${it.key}',${vi})">📋 SVG</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderJumpNav() {
  document.getElementById('jumpNav').innerHTML = ITEMS.map((it, i) =>
    `<a class="jump-btn" href="#item-${it.key}">${i+1}. ${it.name}</a>`
  ).join('');
}

// ════════════════════════════════════════
//  PICK & PREVIEW
// ════════════════════════════════════════
function pick(key, vi) {
  picked[key] = vi;
  renderCatalog();
  renderPreview();
}

function renderPreview() {
  const groups = [
    { items: ['dashboard','statistik','datenqualitaet','monitor'] },
    { items: ['backup','restore','kombinieren','export','import'] },
    { items: ['logs','performance','jobs','history','diagnose'] },
    { items: ['changelog','handbuch','profil','einstellungen'] },
  ];
  let html = '';
  groups.forEach((g, gi) => {
    if (gi > 0) html += '<div class="ps-sep"></div>';
    g.items.forEach((key, i) => {
      const it = ITEMS.find(x => x.key === key);
      const v = it.variants[picked[key]];
      const small = v.svg.replace(/width="[^"]*"/g,'').replace(/height="[^"]*"/g,'');
      const isFirst = gi === 0 && i === 0;
      html += `<div class="psi" ${isFirst?'style="border-left-color:'+it.color+';background:'+it.roleColor+'11"':''}>
        <div class="psi-icon" style="color:${isFirst?it.color:''}">${small}</div>
        <span class="psi-name" ${isFirst?'style="color:var(--text);font-weight:600"':''}>${it.name}</span>
      </div>`;
    });
  });
  document.getElementById('previewItems').innerHTML = html;
}

let previewVisible = false;
function togglePreview() {
  previewVisible = !previewVisible;
  document.getElementById('previewSidebar').classList.toggle('show', previewVisible);
  document.getElementById('previewToggle').style.display = previewVisible ? 'none' : '';
}

// ════════════════════════════════════════
//  COPY
// ════════════════════════════════════════
function copySVG(key, vi) {
  const it = ITEMS.find(x => x.key === key);
  const svg = it.variants[vi].svg.trim();
  try {
    navigator.clipboard.writeText(svg);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  } catch(e) {}
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
renderJumpNav();
renderCatalog();
renderPreview();
</script>
